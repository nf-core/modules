# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "fasta_gtf_bam_rpbp"
description: |
  End-to-end Rp-Bp execution given a genome FASTA, an annotation GTF and a
  set of Ribo-seq BAMs. Builds the Rp-Bp BED reference once per run
  (`rpbp/preparegenome`), then runs the per-sample six-step ORF prediction
  chain on each BAM: extract-metagene-profiles ->
  estimate-metagene-profile-bayes-factors -> select-periodic-offsets ->
  extract-orf-profiles -> estimate-orf-bayes-factors ->
  select-final-prediction-set. Each tool is a separate Nextflow process so
  resume only re-runs what changed. Emits per-sample predicted-ORF BED, DNA
  FASTA, protein FASTA and Bayes factor BED for downstream multi-caller
  aggregation.
keywords:
  - rpbp
  - orf
  - bayesian
  - translation
  - riboseq
components:
  - rpbp/preparegenome
  - rpbp/extractmetageneprofiles
  - rpbp/estimatemetagenebayesfactors
  - rpbp/selectperiodicoffsets
  - rpbp/extractorfprofiles
  - rpbp/estimateorfbayesfactors
  - rpbp/selectfinalpredictionset
input:
  - ch_bam:
      description: |
        Per-sample Ribo-seq BAM with index. Filter to Ribo-seq libraries
        upstream.
        Structure: [ val(meta), path(bam), path(bai) ]
  - ch_fasta_gtf:
      description: |
        Single-value channel of genome FASTA + annotation GTF. The GTF may
        be canonical or a hybrid (e.g. extended-ORF mode).
        Structure: [ val(meta), path(fasta), path(gtf) ]
output:
  - index:
      description: |
        Prepared Rp-Bp BED reference directory.
        Structure: [ val(meta), path(rpbp_index) ]
  - transcript_bed:
      description: |
        Annotated transcripts BED produced by `rpbp/preparegenome`.
        Structure: [ val(meta), path(*.annotated.bed.gz) ]
  - orfs_genomic_bed:
      description: |
        Per-ORF genomic BED produced by `rpbp/preparegenome`.
        Structure: [ val(meta), path(*.orfs-genomic.annotated.bed.gz) ]
  - orfs_exons_bed:
      description: |
        Per-ORF exons BED produced by `rpbp/preparegenome`.
        Structure: [ val(meta), path(*.orfs-exons.annotated.bed.gz) ]
  - metagene:
      description: |
        Per-sample metagene profiles.
        Structure: [ val(meta), path(*.metagene-profile.csv.gz) ]
  - metagene_bf:
      description: |
        Per-sample metagene periodicity Bayes factors.
        Structure: [ val(meta), path(*.metagene-periodicity-bayes-factors.csv.gz) ]
  - periodic:
      description: |
        Per-sample selected periodic offsets.
        Structure: [ val(meta), path(*.periodic-offsets.csv.gz) ]
  - orf_profiles:
      description: |
        Per-sample per-ORF P-site profile matrix.
        Structure: [ val(meta), path(*.profiles.mtx.gz) ]
  - lengths_offsets:
      description: |
        Per-sample selected lengths/offsets actually used by extract-orf-profiles.
        Structure: [ val(meta), path(*.periodic_lengths_offsets.tsv) ]
  - orf_bayes:
      description: |
        Per-sample per-ORF translation Bayes factors.
        Structure: [ val(meta), path(*.bayes-factors.bed.gz) ]
  - predicted:
      description: |
        Per-sample final filtered predicted-ORF BED.
        Structure: [ val(meta), path(*.predicted-orfs.filtered.bed.gz) ]
  - dna_fasta:
      description: |
        Per-sample predicted-ORF DNA FASTA.
        Structure: [ val(meta), path(*.predicted-orfs.filtered.dna.fa) ]
  - protein_fasta:
      description: |
        Per-sample predicted-ORF protein FASTA.
        Structure: [ val(meta), path(*.predicted-orfs.filtered.protein.fa) ]
  - versions:
      description: |
        Files containing software versions
        Structure: [ path(versions.yml) ]
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
