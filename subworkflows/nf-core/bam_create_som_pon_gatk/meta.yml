# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: bam_create_som_pon_gatk
description: Perform variant calling on a set of normal samples using mutect2 panel of normals mode. Group them into a genomicsdbworkspace using genomicsdbimport, then use this to create a panel of normals using createsomaticpanelofnormals.
keywords:
  - gatk4
  - mutect2
  - genomicsdbimport
  - createsomaticpanelofnormals
  - variant_calling
  - genomicsdb_workspace
  - panel_of_normals
components:
  - gatk4/mutect2
  - gatk4/genomicsdbimport
  - gatk4/createsomaticpanelofnormals
  - gatk4/mergevcfs
  - gatk4/mergemutectstats
input:
  - ch_input:
      type: list
      description: |
        An input channel containing the following files:
        - input: One or more BAM/CRAM files
        - input_index: The index/indices from the BAM/CRAM file(s)
        Structure: [ meta, path(input), path(input_index) ]
  - ch_fasta:
      type: list
      description: |
        Reference fasta file
        Structure: [ meta, path(fasta) ]
  - ch_fai:
      type: list
      description: |
        Reference fasta file index
        Structure: [ meta, path(fai) ]
  - ch_dict:
      type: list
      description: |
        GATK sequence dictionary
        Structure: [ meta, path(dict) ]
  - ch_intervals_gendb:
      type: file
      description: Interval file used for GenomicsDBImport
      pattern: "*.{bed,interval_list}"
  - ch_intervals_num:
      type: list
      description: |
        Intervals channel for scatter and gather strategy. Each item is a tuple of
        an interval file and the total number of intervals. Use [ [], 0 ] if no intervals.
        Structure: [ path(intervals), val(num_intervals) ]
output:
  - mutect2_vcf:
      type: list
      description: List of compressed vcf files to be used to make the gendb workspace
      pattern: "[ *.vcf.gz ]"
  - mutect2_index:
      type: list
      description: List of indexes of mutect2_vcf files
      pattern: "[ *vcf.gz.tbi ]"
  - mutect2_stats:
      type: list
      description: List of stats files that pair with mutect2_vcf files
      pattern: "[ *vcf.gz.stats ]"
  - genomicsdb:
      type: directory
      description: Directory containing the files that compose the genomicsdb workspace.
      pattern: "path/name_of_workspace"
  - pon_vcf:
      type: file
      description: Panel of normal as compressed vcf file
      pattern: "*.vcf.gz"
  - pon_index:
      type: file
      description: Index of pon_vcf file
      pattern: "*vcf.gz.tbi"
authors:
  - "@GCJMackenzie"
maintainers:
  - "@GCJMackenzie"
  - "@maxulysse"
