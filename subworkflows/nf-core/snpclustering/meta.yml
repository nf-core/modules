---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/nf-core/meta-schema.json

name: "snpclustering"
description: "End-to-end unsupervised clustering of genomic samples from multi-sample VCF files. Performs variant filtering (MAF + missingness), LD pruning, dimensionality reduction with FlashPCA2, clustering with KMeans and DBSCAN, internal validation metrics, t-SNE/UMAP visualizations and HTML report."
keywords:
  - genomics
  - unsupervised clustering
  - genomic sample clustering
  - VCF
  - FlashPCA2
  - KMeans
  - DBSCAN
  - nf-core
authors:
  - "Donald Baku (@dbaku42)"
components:
  - bcftools/filter
  - plink2/indeppairwise
  - plink2/vcf
  - flashpca2
  - local/kmeansclustering
  - local/dbscanclustering
  - local/clustermetrics
  - local/clusterviz
  - local/report
input:
  - vcf:
      type: file
      description: "Multi-sample VCF file (bgzipped and indexed)"
      pattern: "*.vcf.gz"
  - maf:
      type: float
      description: "Minimum minor allele frequency threshold"
      default: 0.01
  - missing:
      type: float
      description: "Maximum missingness threshold"
      default: 0.10
output:
  - cluster_labels:
      type: file
      description: "CSV file with per-sample cluster assignments"
      pattern: "cluster_labels.csv"
  - metrics:
      type: file
      description: "Table with all cluster quality metrics"
      pattern: "*_metrics.tsv"
  - plots:
      type: file
      description: "Directory containing PCA, t-SNE and UMAP plots"
      pattern: "plots/"
  - report:
      type: file
      description: "HTML report with results and visualizations"
      pattern: "report.html"
  - versions:
      type: file
      description: "File containing versions of all tools used"
      pattern: "versions.yml"
