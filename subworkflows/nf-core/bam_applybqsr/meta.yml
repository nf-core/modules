name: "bam_applybqsr"
description: |
  Apply Base Quality Score Recalibration (BQSR) to a BAM or CRAM file using
  GATK4 ApplyBQSR. Supports scatter-gather across genomic intervals: when
  more than one interval file is supplied per sample, the interval-level
  outputs are merged back together with samtools merge. When no intervals
  are supplied (num_intervals: 0), ApplyBQSR is run once on the whole
  input and no merge step is performed.
keywords:
  - bam
  - cram
  - bqsr
  - recalibration
  - gatk4
components:
  - gatk4/applybqsr
  - samtools/merge
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
    reads:
      type: file
      description: BAM or CRAM file to recalibrate
      pattern: "*.{bam,cram}"
    index:
      type: file
      description: Index of the BAM or CRAM file
      pattern: "*.{bai,crai}"
    recal:
      type: file
      description: Recalibration table produced by GATK4 BaseRecalibrator
      pattern: "*.table"
  - meta2:
      type: map
      description: |
        Groovy Map containing reference information
        e.g. [ id:'genome' ]
    fasta:
      type: file
      description: Reference genome fasta file
      pattern: "*.{fasta,fa}"
    fai:
      type: file
      description: Index of the reference fasta file
      pattern: "*.fai"
    dict:
      type: file
      description: GATK sequence dictionary for the reference fasta
      pattern: "*.dict"
  - intervals:
      type: file
      description: |
        Bed file (or interval_list) with the genomic regions to restrict
        recalibration to. Optional; pass [] if not used.
      pattern: "*.{bed,interval_list}"
    num_intervals:
      type: integer
      description: |
        Number of interval files being processed for this sample. Use 0
        (with intervals set to []) to run without intervals.
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
    reads:
      type: file
      description: |
        Recalibrated BAM or CRAM file. If more than one interval was used,
        this is the merged output; otherwise it is the direct ApplyBQSR
        output.
      pattern: "*.{bam,cram}"
    index:
      type: file
      description: Index of the recalibrated BAM or CRAM file
      pattern: "*.{bai,crai}"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@agrima2010"
maintainers:
  - "@agrima2010"
  - "@maxulysse"
