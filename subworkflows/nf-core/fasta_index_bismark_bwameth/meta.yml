# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "fasta_index_bismark_bwameth"
description: Generate index files from reference fasta for bismark and bwameth
keywords:
  - bismark
  - bwameth
  - prepare genome
  - index
components:
  - untar
  - gunzip
  - bismark/genomepreparation
  - bwameth/index
  - samtools/faidx
input:
  - fasta_fai:
      type: file
      description: |
        Reference genome
        Structure: [ val(meta), path(fasta), path(fai) ]
      pattern: "*.{fa/fa.gz,fai}"
  - bismark_index:
      type: file
      description: |
        Bismark genome index files
        Structure: [ val(meta), path(bismark_index) ]
  - bwameth_index:
      type: file
      description: |
        Bwameth genome index files
        Structure: [ val(meta), path(bwameth_index) ]
  - aligner:
      type: string
      description: |
        Aligner name (bismark, bismark_hisat, or bwameth)
  - use_mem2:
      type: boolean
      description: |
        Build a mem2 index when bwameth is chosen as an aligner, and an index path is not supplied
output:
  - fasta_fai:
      type: file
      description: |
        Reference genome
        Structure: [ val(meta), path(fasta), path(fai) ]
      pattern: "*.{fa/fa.gz,fai}"
  - bismark_index:
      type: file
      description: |
        Bismark genome index files
        Structure: [ val(meta), path(bismark_index) ]
        pattern: "BismarkIndex"
  - bwameth_index:
      type: file
      description: |
        Bwameth genome index files
        Structure: [ val(meta), path(bwameth_index) ]
        pattern: "index"
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@sateeshperi"
  - "dcarrillox"
maintainers:
  - "@sateeshperi"
  - "@dcarrillox"
