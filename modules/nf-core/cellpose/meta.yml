name: "cellpose"
description: cellpose segments cells in images using GPU-accelerated deep learning
keywords:
  - segmentation
  - image
  - cellpose
  - gpu
  - spatial-transcriptomics
tools:
  - "cellpose":
      description: "cellpose is an anatomical segmentation algorithm written in Python
        3 by Carsen Stringer and Marius Pachitariu"
      homepage: "https://github.com/MouseLand/cellpose"
      documentation: "https://cellpose.readthedocs.io/en/latest/command.html"
      tool_dev_url: "https://github.com/MouseLand/cellpose"
      doi: 10.1038/s41592-022-01663-4
      licence: ["BSD 3-Clause"]
      identifier: biotools:cellpose
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          (sample id)
    - image:
        type: file
        description: tif file ready for segmentation
        pattern: "*.{tif,tiff}"
        ontologies: []
  - - model:
        type: string
        description: |
          Cellpose pretrained model name (e.g. 'cyto3', 'nuclei', 'CPSAM').
          Passed to --pretrained_model. Leave empty to use default.
        ontologies: []
  - - maskname:
        type: string
        description: |
          Label to include in the output mask filename.
          Output mask will be named morphology.ome_<maskname>_masks.tif
        ontologies: []
output:
  mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*masks.tif":
          type: file
          description: labelled mask output from cellpose in tif format
          pattern: "${prefix}/*masks.tif"
          ontologies: []
  flows:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*flows.tif":
          type: file
          description: cell flow output from cellpose
          pattern: "${prefix}/*flows.tif"
          ontologies: []
  cells:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*seg.npy":
          type: file
          description: numpy array with cell segmentation data
          pattern: "${prefix}/*seg.npy"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@josenimo"
  - "@FloWuenne"
maintainers:
  - "@josenimo"
  - "@FloWuenne"
  - "@kbestak"
