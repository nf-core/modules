name: "cellpose"
description: cellpose segments cells in images using GPU-accelerated deep learning
keywords:
  - segmentation
  - image
  - cellpose
  - gpu
  - spatial-transcriptomics
tools:
  - "cellpose":
      description: "cellpose is an anatomical segmentation algorithm written in Python
        3 by Carsen Stringer and Marius Pachitariu"
      homepage: "https://github.com/MouseLand/cellpose"
      documentation: "https://cellpose.readthedocs.io/en/latest/command.html"
      tool_dev_url: "https://github.com/MouseLand/cellpose"
      doi: 10.1038/s41592-022-01663-4
      licence: ["BSD 3-Clause"]
      identifier: biotools:cellpose
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          (sample id)
    - image:
        type: file
        description: tif file ready for segmentation
        pattern: "*.{tif,tiff}"
        ontologies: []
  - - model_name:
        type: string
        description: |
          Cellpose pretrained model name (e.g. 'cyto3', 'nuclei', 'cyto2', 'CPSAM').
          Used when no custom model file is provided. Pass empty string to skip.
        ontologies: []
    - model_path:
        type: file
        description: |
          Custom cellpose model file. Takes priority over model_name when provided.
          Pass file('NO_FILE') when not using a custom model.
        pattern: "*"
        ontologies: []
output:
  mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*masks.tif":
          type: file
          description: labelled mask output from cellpose in tif format
          pattern: "${prefix}/*masks.tif"
          ontologies: []
  flows:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*flows.tif":
          type: file
          description: cell flow output from cellpose
          pattern: "${prefix}/*flows.tif"
          ontologies: []
  cells:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*seg.npy":
          type: file
          description: numpy array with cell segmentation data
          pattern: "${prefix}/*seg.npy"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
notes: |
  This module requires a Docker/Singularity/Podman container (conda is not supported
  due to complex CUDA/PyTorch dependencies).

  GPU support: Set `task.ext.use_gpu = true` to pass `--use_gpu` to cellpose.
  The container includes CUDA 12.4 and falls back to CPU automatically when no GPU
  is available. Use the `process_gpu` label to request GPU resources from your executor.

  Model selection via the model input channel (tuple of name and file):
    - Pretrained model:  ["cyto3", file("NO_FILE")]
    - Custom model file: ["", file("/path/to/model")]
    - Default (no model): ["", file("NO_FILE")]

  Additional cellpose CLI arguments can be passed via `task.ext.args`:
    ext.args = '--diameter 30 --flow_threshold 0.4 --cellprob_threshold 0'

  Model weights are not bundled in the container. Cellpose downloads them on first
  use to `$CELLPOSE_LOCAL_MODELS_PATH` (set to the work directory).
authors:
  - "@josenimo"
  - "@FloWuenne"
maintainers:
  - "@josenimo"
  - "@FloWuenne"
  - "@kbestak"
