name: "cellpose"
description: cellpose segments cells in images using GPU-accelerated deep learning
keywords:
  - segmentation
  - image
  - cellpose
  - gpu
  - spatial-transcriptomics
tools:
  - "cellpose":
      description: "cellpose is an anatomical segmentation algorithm written in Python
        3 by Carsen Stringer and Marius Pachitariu"
      homepage: "https://github.com/MouseLand/cellpose"
      documentation: "https://cellpose.readthedocs.io/en/latest/command.html"
      tool_dev_url: "https://github.com/MouseLand/cellpose"
      doi: 10.1038/s41592-022-01663-4
      licence: ["BSD 3-Clause"]
      identifier: biotools:cellpose
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          (sample id)
    - image:
        type: file
        description: tif file ready for segmentation
        pattern: "*.{tif,tiff}"
        ontologies: []
  - model:
      type: file
      description: |
        Optional custom cellpose model file. When provided, passed as
        --pretrained_model to cellpose. Pass [] (empty list) to use the
        default model (cpsam in cellpose 4).
      pattern: "*"
      ontologies: []
output:
  mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*masks.tif":
          type: file
          description: labelled mask output from cellpose in tif format
          pattern: "${prefix}/*masks.tif"
          ontologies: []
  flows:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*flows.tif":
          type: file
          description: cell flow output from cellpose
          pattern: "${prefix}/*flows.tif"
          ontologies: []
  cells:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            [sample id]
      - "${prefix}/*seg.npy":
          type: file
          description: numpy array with cell segmentation data
          pattern: "${prefix}/*seg.npy"
          ontologies: []
  versions_cellpose:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cellpose:
          type: string
          description: The name of the tool
      - "cellpose --version 2>&1 | grep 'cellpose version' | sed 's/.*:\\s*//' | tr -d ' '":
          type: eval
          description: The expression to obtain the version of the tool
  versions_python:
    - - ${task.process}:
          type: string
          description: The name of the process
      - python:
          type: string
          description: The name of the tool
      - "python --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_torch:
    - - ${task.process}:
          type: string
          description: The name of the process
      - torch:
          type: string
          description: The name of the tool
      - "python -c 'import torch; print(torch.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cellpose:
          type: string
          description: The name of the tool
      - "cellpose --version 2>&1 | grep 'cellpose version' | sed 's/.*:\\s*//' | tr -d ' '":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - python:
          type: string
          description: The name of the tool
      - "python --version | sed 's/Python //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - torch:
          type: string
          description: The name of the tool
      - "python -c 'import torch; print(torch.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool
notes: |
  GPU support: Set `task.ext.use_gpu = true` to pass `--use_gpu` to cellpose.
  The Docker container includes CUDA 12.4 and falls back to CPU automatically when
  no GPU is available. Use the `process_gpu` label to request GPU resources from
  your executor. When running with conda/mamba, GPU support depends on having a
  CUDA-enabled PyTorch installation in your environment.

  Model selection via the model input channel:
    - Custom model file: file("/path/to/model")
    - Default (cpsam):   []

  Additional cellpose CLI arguments can be passed via `task.ext.args`:
    ext.args = '--diameter 30 --flow_threshold 0.4 --cellprob_threshold 0'

  Deprecated in cellpose 4.0.1+: `--chan`, `--chan2`, `--invert`, `--all_channels`,
  `--diam_mean`, `--pretrained_model_ortho`. Do not pass these via ext.args.

  Model weights are not bundled in the container. Cellpose downloads them on first
  use to `$CELLPOSE_LOCAL_MODELS_PATH` (set to the work directory).
authors:
  - "@josenimo"
  - "@FloWuenne"
maintainers:
  - "@josenimo"
  - "@FloWuenne"
  - "@kbestak"
