name: sistr
description: Serovar prediction of salmonella assemblies
keywords:
  - bacteria
  - fasta
  - salmonella
tools:
  - sistr:
      description: Salmonella In Silico Typing Resource (SISTR) commandline tool
        for serovar prediction
      homepage: https://github.com/phac-nml/sistr_cmd
      documentation: https://github.com/phac-nml/sistr_cmd
      tool_dev_url: https://github.com/phac-nml/sistr_cmd
      doi: "10.1371/journal.pone.0147101"
      licence:
        - "Apache-2.0"
      identifier: biotools:SISTR
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Nucleotide or protein sequences in FASTA format
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz,faa,faa.gz}"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tab":
          type: file
          description: SISTR serovar prediction
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  allele_fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*-allele.fasta":
          type: file
          description: FASTA file destination of novel cgMLST alleles
          pattern: "*.{fasta}"
          ontologies: []
  allele_json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*-allele.json":
          type: file
          description: Allele sequences and info to JSON
          pattern: "*.{json}"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  cgmlst_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*-cgmlst.csv":
          type: file
          description: CSV file destination for cgMLST allelic profiles
          pattern: "*.{csv}"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  versions_sistr:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sistr:
          type: string
          description: The name of the tool
      - echo $(sistr --version 2>&1) | sed "s/^.*sistr_cmd //; s/ .*\$//":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sistr:
          type: string
          description: The name of the tool
      - echo $(sistr --version 2>&1) | sed "s/^.*sistr_cmd //; s/ .*\$//":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
