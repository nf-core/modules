name: crabs_insilicopcr
description: CRABS extracts the amplicon region of the primer set by conducting
  an in silico PCR.
keywords:
  - insilico
  - PCR
  - amplicon
  - sequencing
tools:
  - crabs:
      description: |
        Crabs (Creating Reference databases for Amplicon-Based Sequencing)
        is a program to download and curate reference databases
        for eDNA metabarcoding analyses
      homepage: https://github.com/gjeunen/reference_database_creator
      documentation: https://github.com/gjeunen/reference_database_creator?tab=readme-ov-file#running-crabs
      tool_dev_url: https://github.com/gjeunen/reference_database_creator
      doi: 10.1111/1755-0998.13741
      licence:
        - "MIT License"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - crabsdb:
        type: file
        description: CRABSDB to conduct in silico PCR on
        pattern: "*.txt"
        ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.txt:
          type: file
          description: Extracted amplicon regions
          pattern: "*.insilicopcr.txt"
          ontologies: []
  versions_crabs:
    - - ${task.process}:
          type: string
          description: The name of the process
      - crabs:
          type: string
          description: The name of the tool
      - crabs --help 2>/dev/null | grep -oE 'v[0-9.]+' | cut -c2-:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - crabs:
          type: string
          description: The name of the tool
      - crabs --help 2>/dev/null | grep -oE 'v[0-9.]+' | cut -c2-:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@famosab"
  - "@a4000"
maintainers:
  - "@famosab"
  - "@a4000"
