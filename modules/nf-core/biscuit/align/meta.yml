name: biscuit_align
description: Aligns single- or paired-end reads from bisulfite-converted
  libraries to a reference genome using Biscuit.
keywords:
  - biscuit
  - DNA methylation
  - WGBS
  - scWGBS
  - bisulfite sequencing
  - aligner
  - bam
tools:
  - biscuit:
      description: A utility for analyzing sodium bisulfite conversion-based DNA
        methylation/modification data
      homepage: https://huishenlab.github.io/biscuit/
      documentation: https://huishenlab.github.io/biscuit/docs/alignment
      tool_dev_url: https://github.com/huishenlab/biscuit
      licence:
        - "MIT"
      identifier: biotools:biscuit
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Input genome fasta file
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - index:
        type: directory
        description: Directory containing biscuit genome index
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: Output BAM file containing read alignments
          pattern: "*.{bam}"
          ontologies: []
  bai:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bai":
          type: file
          description: Output BAM index
          pattern: "*.{bai}"
          ontologies: []
  versions_biscuit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - biscuit:
          type: string
          description: The name of the tool
      - "biscuit version |& sed '1!d; s/^.*BISCUIT Version: //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version |& sed '1!d; s/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - biscuit:
          type: string
          description: The name of the tool
      - "biscuit version |& sed '1!d; s/^.*BISCUIT Version: //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version |& sed '1!d; s/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@njspix"
maintainers:
  - "@njspix"
  - "@sateeshperi"
