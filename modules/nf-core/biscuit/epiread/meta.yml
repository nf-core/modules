name: biscuit_epiread
description: |
  Summarizes read-level methylation (and optionally SNV) information from a
  Biscuit BAM file in a standard-compliant BED format.
keywords:
  - biscuit
  - DNA methylation
  - WGBS
  - scWGBS
  - bisulfite sequencing
  - aligner
  - bam
tools:
  - biscuit:
      description: A utility for analyzing sodium bisulfite conversion-based DNA
        methylation/modification data
      homepage: https://huishenlab.github.io/biscuit/
      documentation: https://huishenlab.github.io/biscuit/epiread_format/
      tool_dev_url: https://github.com/huishenlab/biscuit
      licence:
        - "MIT"
      identifier: biotools:biscuit
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM file contained mapped reads
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bai:
        type: file
        description: BAM file index
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - snp_bed:
        type: file
        description: BED file containing SNP information (optional)
        ontologies: []
  - - meta4:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Input genome fasta file
        ontologies: []
  - - meta5:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - index:
        type: directory
        description: Directory containing biscuit genome index
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed.gz":
          type: file
          description: Gzipped BED file with methylation (and optionally SNV)
            information
          pattern: "*.{epiread.bed.gz}"
          ontologies: []
  versions_biscuit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - biscuit:
          type: string
          description: The name of the tool
      - "biscuit version |& sed '1!d; s/^.*BISCUIT Version: //'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version |& sed '1!d; s/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - biscuit:
          type: string
          description: The name of the tool
      - "biscuit version |& sed '1!d; s/^.*BISCUIT Version: //'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version |& sed '1!d; s/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@njspix"
maintainers:
  - "@njspix"
  - "@sateeshperi"
