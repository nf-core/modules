name: "goleft_indexsplit"
description: Quickly generate evenly sized (by amount of data) regions across a
  number of bam/cram files
keywords:
  - bam
  - bed
  - cram
  - index
  - split
tools:
  - "goleft":
      description: "goleft is a collection of bioinformatics tools distributed under
        MIT license in a single static binary"
      homepage: "https://github.com/brentp/goleft"
      documentation: "https://github.com/brentp/goleft"
      tool_dev_url: "https://github.com/brentp/goleft"
      doi: "10.1093/gigascience/gix090"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bai:
        type: file
        description: BAI/CRAI file
        pattern: "*.{bai,crai}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fai:
        type: file
        description: Reference fasta index file
        pattern: "*.fai"
        ontologies: []
  - split:
      type: boolean
      description: Split the regions
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: Bed file containing split regions
          pattern: "*.bed"
          ontologies: []
  versions_goleft:
    - - ${task.process}:
          type: string
          description: The name of the process
      - goleft:
          type: string
          description: The name of the tool
      - "goleft --version 2>&1 | sed '1!d;s/^.*goleft Version: //'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - goleft:
          type: string
          description: The name of the tool
      - "goleft --version 2>&1 | sed '1!d;s/^.*goleft Version: //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@matthdsm"
maintainers:
  - "@matthdsm"
