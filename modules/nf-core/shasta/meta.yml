name: shasta
description: The goal of the Shasta long read assembler is to rapidly produce
  accurate assembled sequence using DNA reads generated by Oxford Nanopore flow
  cells as input. Please note Assembler is design to focus on speed, so assembly
  may be considered somewhat non-deterministic as final assembly may vary across
  executions. See https://github.com/chanzuckerberg/shasta/issues/296.
keywords:
  - nanopore
  - de-novo
  - assembly
  - longread
tools:
  - shasta:
      description: Rapidly produce accurate assembled sequence using as input DNA
        reads generated by Oxford Nanopore flow cells.
      homepage: https://chanzuckerberg.github.io/shasta/index.html
      documentation: https://chanzuckerberg.github.io/shasta/index.html
      tool_dev_url: https://github.com/chanzuckerberg/shasta
      doi: "10.1038/s41587-020-0503-6"
      licence:
        - "MIT"
      identifier: biotools:shasta
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: Input file in FASTQ format.
        pattern: "*.{fastq,fastq.gz,fq,fq.gz}"
        ontologies:
          - edam: http://edamontology.org/format_1930
output:
  assembly:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_Assembly.fasta.gz":
          type: file
          description: Assembled FASTA file
          pattern: "${prefix}_Assembly.fasta.gz"
          ontologies: []
  gfa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_Assembly.gfa.gz":
          type: file
          description: Repeat graph
          pattern: "${prefix}_Assembly.gfa.gz"
          ontologies: []
  results:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ShastaRun/:
          type: directory
          description: Resulting assembly directory
          pattern: "ShastaRun"
  versions_shasta:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shasta:
          type: string
          description: The name of the tool
      - shasta --version | head -n 1 | cut -f 3 -d " ":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shasta:
          type: string
          description: The name of the tool
      - shasta --version | head -n 1 | cut -f 3 -d " ":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@fmalmeida"
maintainers:
  - "@fmalmeida"
