name: llamacpp_python_run
description: Python wrapper for running locally-hosted LLM with llama.cpp
keywords:
- llm
- llama
- ai
tools:
- llama-cpp-python:
    description: "Python wrapper for llama.cpp LLM inference tool"
    homepage: "https://llama-cpp-python.readthedocs.io/en/latest/"
    licence:
    - "MIT"
    identifier: ''
input:
- - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1' ]`- prompt_file:
  - prompt_file:
      type: file
      description: |
        Prompt file
        Structure: [ val(meta), path(prompt_file) ]
      ontologies: []
  - gguf_model:
      type: file
      description: |
        GGUF model
        Structure: [ val(meta), path(gguf_model) ]
      ontologies: []
output:
  output:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - "output.txt":
        type: file
        description: File with the output of LLM inference request
        ontologies: []
  versions_llama_cpp_python:
  - - ${task.process}:
        type: string
        description: The name of the process
    - llama-cpp-python:
        type: string
        description: The name of the tool
    - python3 -c 'import llama_cpp; print(llama_cpp.__version__)':
        type: eval
        description: The expression to obtain the version of the tool
topics:
  versions:
  - - ${task.process}:
        type: string
        description: The name of the process
    - llama-cpp-python:
        type: string
        description: The name of the tool
    - python3 -c 'import llama_cpp; print(llama_cpp.__version__)':
        type: eval
        description: The expression to obtain the version of the tool
authors:
- "@toniher"
- "@lucacozzuto"
maintainers:
- "@toniher"
- "@lucacozzuto"
