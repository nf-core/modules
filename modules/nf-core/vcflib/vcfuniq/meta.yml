name: vcflib_vcfuniq
description: List unique genotypes. Like GNU uniq, but for VCF records. Remove records
  which have the same position, ref, and alt as the previous record.
keywords:
  - vcf
  - uniq
  - deduplicate
tools:
  - vcflib:
      description: Command-line tools for manipulating VCF files
      homepage: https://github.com/vcflib/vcflib
      documentation: https://github.com/vcflib/vcflib#USAGE
      doi: "10.1101/2021.05.21.445151"
      licence: ["MIT"]
      identifier: biotools:vcflib
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - vcf:
        type: file
        description: Compressed VCF file
        pattern: "*.vcf.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
    - tbi:
        type: file
        description: Index of VCF file
        pattern: "*.vcf.gz.tbi"
        ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
          pattern: "*.vcf.gz"
      - "*.vcf.gz":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
          pattern: "*.vcf.gz"
  versions_vcflib:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vcflib:
          type: string
          description: The name of the tool
      - 1.0.14:
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vcflib:
          type: string
          description: The name of the tool
      - 1.0.14:
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@drpatelh"
maintainers:
  - "@drpatelh"
