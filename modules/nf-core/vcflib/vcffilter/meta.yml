name: "vcflib_vcffilter"
description: Command line tools for parsing and manipulating VCF files.
keywords:
  - filter
  - variant
  - vcf
  - quality
tools:
  - "vcflib":
      description: "Command line tools for parsing and manipulating VCF files."
      homepage: "https://github.com/vcflib/vcflib"
      documentation: "https://github.com/vcflib/vcflib"
      tool_dev_url: "https://github.com/vcflib/vcflib"
      doi: "10.1371/journal.pcbi.1009123"
      licence:
        - "MIT"
      identifier: biotools:vcflib
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test_sample_1' ]
    - vcf:
        type: file
        description: VCF file
        pattern: "*.{vcf,vcf.gz}"
        ontologies: []
    - tbi:
        type: file
        description: Index file
        pattern: "*.{tbi}"
        ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.vcf.gz":
          type: file
          description: Filtered VCF file
          pattern: "*.{vcf.gz}"
          ontologies: []
  versions_vcflib:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vcflib:
          type: string
          description: The name of the tool
      - 1.0.14:
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vcflib:
          type: string
          description: The name of the tool
      - 1.0.14:
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@zachary-foster"
maintainers:
  - "@zachary-foster"
