name: amrfinderplus_update
description: Identify antimicrobial resistance in gene or protein sequences
keywords:
  - bacteria
  - fasta
  - antibiotic resistance
tools:
  - amrfinderplus:
      description: AMRFinderPlus finds antimicrobial resistance and other genes in
        protein or nucleotide sequences.
      homepage: https://github.com/ncbi/amr/wiki
      documentation: https://github.com/ncbi/amr/wiki
      tool_dev_url: https://github.com/ncbi/amr
      doi: "10.1038/s41598-021-91456-0"
      licence:
        - "Public Domain"
      identifier: biotools:amrfinderplus
input: []
output:
  db:
    - amrfinderdb.tar.gz:
        type: file
        description: The latest AMRFinder+ database in a compressed tarball
        pattern: "*.tar.gz"
        ontologies:
          - edam: "http://edamontology.org/format_3981" # TAR format
          - edam: http://edamontology.org/format_3989 # GZIP format
  versions_amrfinder:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amrfinder:
          type: string
          description: The name of the tool
      - amrfinder --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amrfinder:
          type: string
          description: The name of the tool
      - amrfinder --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
