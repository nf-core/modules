name: amrfinderplus_run
description: Identify antimicrobial resistance in gene or protein sequences
keywords:
  - bacteria
  - fasta
  - antibiotic resistance
tools:
  - amrfinderplus:
      description: AMRFinderPlus finds antimicrobial resistance and other genes in
        protein or nucleotide sequences.
      homepage: https://github.com/ncbi/amr/wiki
      documentation: https://github.com/ncbi/amr/wiki
      tool_dev_url: https://github.com/ncbi/amr
      doi: "10.1038/s41598-021-91456-0"
      licence:
        - "Public Domain"
      identifier: biotools:amrfinderplus
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Nucleotide or protein sequences in FASTA format
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz,faa,faa.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA
  - db:
      type: file
      description: A compressed tarball of the AMRFinderPlus database to query
      pattern: "*.tar.gz"
      ontologies:
        - edam: "http://edamontology.org/format_3981" # TAR format
        - edam: http://edamontology.org/format_3989 # GZIP format
output:
  report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.tsv:
          type: file
          description: AMRFinder+ final report
          pattern: "*.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  mutation_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}-mutations.tsv:
          type: file
          description: Report of organism-specific point-mutations
          pattern: "*-mutations.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  versions_amrfinderplus:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amrfinderplus:
          type: string
          description: The name of the tool
      - amrfinder --version:
          type: eval
          description: The expression to obtain the version of the tool
  versions_amrfinderplus_database:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amrfinderplus-database:
          type: string
          description: The name of the tool
      - "amrfinder --database amrfinderdb --database_version 2>&1 | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}\\.[0-9]+' | tail -1":
          type: eval
          description: The expression to obtain the database version
  tool_version:
    - VER:
        type: string
        description: The version of the tool in string format (useful for
          downstream tools such as hAMRronization)
  db_version:
    - DBVER:
        type: string
        description: The version of the used database in string format (useful for
          downstream tools such as hAMRronization)
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amrfinderplus:
          type: string
          description: The name of the tool
      - amrfinder --version:
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - amrfinderplus-database:
          type: string
          description: The name of the tool
      - "amrfinder --database amrfinderdb --database_version 2>&1 | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}\\.[0-9]+' | tail -1":
          type: eval
          description: The expression to obtain the database version
authors:
  - "@rpetit3"
  - "@louperelo"
  - "@jfy133"
maintainers:
  - "@rpetit3"
  - "@louperelo"
  - "@jfy133"
