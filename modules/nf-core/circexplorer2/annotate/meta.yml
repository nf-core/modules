name: "circexplorer2_annotate"
description: Annotate circRNAs detected in the output from CIRCexplorer2 parse
keywords:
  - rna
  - circrna
  - annotate
tools:
  - "circexplorer2":
      description: "Circular RNA analysis toolkits"
      homepage: "https://github.com/YangLab/CIRCexplorer2/"
      documentation: "https://circexplorer2.readthedocs.io/en/latest/"
      doi: "10.1101/gr.202895.115"
      licence:
        - "MIT License"
      identifier: biotools:CIRCexplorer2
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - junctions:
        type: file
        description: Reformatted junctions file
        pattern: "*.{junction}"
        ontologies: []
  - fasta:
      type: file
      description: Genome FASTA file
      pattern: "*.{fa,fasta}"
      ontologies: []
  - gene_annotation:
      type: file
      description: Reformatted GTF file for CIRCexplorer2
      pattern: "*.{txt}"
      ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: Annotated circRNA TXT file
          pattern: "*.{txt}"
          ontologies: []
  versions_circexplorer2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - circexplorer2:
          type: string
          description: The name of the tool
      - CIRCexplorer2 --version 2>&1; true:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - circexplorer2:
          type: string
          description: The name of the tool
      - CIRCexplorer2 --version 2>&1; true:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@BarryDigby"
maintainers:
  - "@BarryDigby"
