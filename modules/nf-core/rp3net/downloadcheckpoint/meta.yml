name: rp3net_downloadcheckpoint
description: |
  Downloads the RP3Net model checkpoint from the EBI FTP server. The downloaded
  checkpoint file is used as input to the rp3net/rp3 inference module.
keywords:
  - download
  - model checkpoint
  - protein expression
  - machine learning
tools:
  - rp3net:
      description: |
        RP3Net is a deep learning model that predicts whether a given DNA or protein
        sequence will successfully produce a recombinant protein when expressed in
        Escherichia coli
      homepage: https://github.com/RP3Net/RP3Net
      documentation: https://github.com/RP3Net/RP3Net
      tool_dev_url: https://github.com/RP3Net/RP3Net
      licence:
        - "MIT"
      identifier: ""
input: []
output:
  checkpoint:
    - "*.ckpt":
        type: file
        description: |
          Pre-trained RP3Net model checkpoint file downloaded from the EBI FTP server
          (rp3net_v0.1_d.ckpt).
        pattern: "*.ckpt"
        ontologies: []
  versions_wget:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wget:
          type: string
          description: The name of the tool
      - wget --version 2>&1 | head -1 | sed 's/GNU Wget //' | sed 's/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wget:
          type: string
          description: The name of the tool
      - wget --version 2>&1 | head -1 | sed 's/GNU Wget //' | sed 's/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
