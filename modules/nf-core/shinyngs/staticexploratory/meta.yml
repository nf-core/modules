name: "shinyngs_staticexploratory"
description: Make exploratory plots for analysis of matrix data, including PCA, Boxplots and density plots
keywords:
  - exploratory
  - plot
  - boxplot
  - density
  - PCA
tools:
  - "shinyngs":
      description: "Provides Shiny applications for various array and NGS applications. Currently very RNA-seq centric, with plans for expansion."
      homepage: "https://github.com/pinin4fjords/shinyngs"
      documentation: "https://rawgit.com/pinin4fjords/shinyngs/master/vignettes/shinyngs.html"
      tool_dev_url: "https://github.com/pinin4fjords/shinyngs"
      licence: ["AGPL v3"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing information on variables for use in plots,
          probably experimental information, but at a minimum an id.
          e.g. [ id:'treatment' ]
    - sample:
        type: file
        description: |
          CSV-format sample sheet with sample metadata
        ontologies: []
    - feature_meta:
        type: file
        description: |
          TSV-format feature (e.g. gene) metadata
        ontologies: []
    - assay_files:
        type: file
        description: |
          List of TSV-format matrix files representing different measures for the same samples (e.g. raw and normalised).
        ontologies: []
    - variable:
        type: string
        description: |
          Variable to use for the contrast variable in the plots.
output:
  boxplots_png:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/png/boxplot.png":
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
  boxplots_html:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/html/boxplot.html":
          type: file
          description: |
            Meta-keyed tuple containing HTML output for box plots covering input
            matrices.
          ontologies: []
  densities_png:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/png/density.png":
          type: file
          description: |
            Meta-keyed tuple containing PNG output for density plots
            covering input matrices.
          ontologies: []
  densities_html:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/html/density.html":
          type: file
          description: |
            Meta-keyed tuple containing HTML output for density plots
            covering input matrices.
          ontologies: []
  pca2d_png:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/png/pca2d.png":
          type: file
          description: |
            Meta-keyed tuple containing a PNG output for 2D PCA plots covering
            specified input matrix (by default the last one in the input list.
          ontologies: []
  pca2d_html:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/html/pca2d.html":
          type: file
          description: |
            Meta-keyed tuple containing an HTML output for 2D PCA plots covering
            specified input matrix (by default the last one in the input list.
          ontologies: []
  pca3d_png:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/png/pca3d.png":
          type: file
          description: |
            Meta-keyed tuple containing a PNG output for 3D PCA plots covering
            specified input matrix (by default the last one in the input list.
          ontologies: []
  pca3d_html:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/html/pca3d.html":
          type: file
          description: |
            Meta-keyed tuple containing an HTML output for 3D PCA plots covering
            specified input matrix (by default the last one in the input list.
          ontologies: []
  mad_png:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/png/mad_correlation.png":
          type: file
          description: |
            Meta-keyed tuple containing a PNG output for MAD correlation plots
            covering specified input matrix (by default the last one in the input
            list.
          ontologies: []
  mad_html:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/html/mad_correlation.html":
          type: file
          description: HTML output for MAD correlation plots
          pattern: "*{.html}"
          ontologies: []
  dendro:
    - - meta:
          type: file
          description: |
            Meta-keyed tuple containing PNG output for box plots covering input
            matrices.
          ontologies: []
      - "*/png/sample_dendrogram.png":
          type: file
          description: |
            Meta-keyed tuple containing a PNG, for a sample clustering
            dendrogramcovering specified input matrix (by default the last one in
            the input list.
          ontologies: []
  versions_shinyngs:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shinyngs:
          type: string
          description: The name of the tool
      - 'Rscript -e "library(shinyngs); cat(as.character(packageVersion(''shinyngs'')))"':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shinyngs:
          type: string
          description: The name of the tool
      - 'Rscript -e "library(shinyngs); cat(as.character(packageVersion(''shinyngs'')))"':
          type: eval
          description: The expression to obtain the version of the tool
