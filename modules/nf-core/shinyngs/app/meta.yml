name: "shinyngs_app"
description: build and deploy Shiny apps for interactively mining differential abundance data
keywords:
  - differential
  - expression
  - rna-seq
  - deseq2
tools:
  - "shinyngs":
      description: "Provides Shiny applications for various array and NGS applications. Currently very RNA-seq centric, with plans for expansion."
      homepage: "https://github.com/pinin4fjords/shinyngs"
      documentation: "https://rawgit.com/pinin4fjords/shinyngs/master/vignettes/shinyngs.html"
      tool_dev_url: "https://github.com/pinin4fjords/shinyngs"
      licence: ["AGPL v3"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing information on experiment, at a minimum an id.
          e.g. [ id:'test' ]
    - sample:
        type: file
        description: |
          CSV-format sample sheet with sample metadata
        ontologies: []
    - feature_meta:
        type: file
        description: |
          TSV-format feature (e.g. gene) metadata
        ontologies: []
    - assay_files:
        type: file
        description: |
          List of TSV-format matrix files representing different measures for the same samples (e.g. raw and normalised).
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing information on experiment, at a minimum an id. To match meta.
          e.g. [ id:'test' ]
    - contrasts:
        type: file
        description: |
          CSV-format file with four columns identifying the sample sheet variable, reference level, treatment level, and optionally a comma-separated list of covariates used as blocking factors.
        ontologies: []
    - differential_results:
        type: file
        description: |
          List of TSV-format differential analysis outputs, one per row of the contrasts file
        ontologies: []
  - contrast_stats_assay:
      type: file
      description: contrast statistics
      ontologies: []
  - gene_sets:
      type: file
      description: |
        Optional: GMT-format gene set files used for enrichment, referenced in the
        app via the shinyngs `--enrichment_gene_sets` argument.
      pattern: "*.{gmt}"
      ontologies: []
  - enrichment_results:
      type: file
      description: |
        Optional: per-contrast enrichment result tables (e.g. GSEA output), matched
        to contrasts in the app via the shinyngs `--enrichment_filename_template` argument.
      ontologies: []
output:
  app:
    - - meta:
          type: map
          description: |
            Groovy Map containing information on experiment.
            e.g. [ id:'test' ]
      - "*/data.rds":
          type: file
          description: |
            The mini R script required build an application from data.rds.
          pattern: "app/app.R"
          ontologies:
            - edam: http://edamontology.org/format_3999 # R script
      - "*/app.R":
          type: file
          description: |
            The mini R script required build an application from data.rds.
          pattern: "app/app.R"
          ontologies:
            - edam: http://edamontology.org/format_3999 # R script
  versions_shinyngs:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shinyngs:
          type: string
          description: The name of the tool
      - 'Rscript -e "library(shinyngs); cat(as.character(packageVersion(''shinyngs'')))"':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shinyngs:
          type: string
          description: The name of the tool
      - 'Rscript -e "library(shinyngs); cat(as.character(packageVersion(''shinyngs'')))"':
          type: eval
          description: The expression to obtain the version of the tool
