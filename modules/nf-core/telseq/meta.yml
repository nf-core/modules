# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "telseq"
description: "Telseq: a software for calculating telomere length"
keywords:
  - bam
  - cram
  - genomics
  - samtools
  - telomere
  - telseq
tools:
  - "telseq":
      description: "A software for calculating telomere length"
      homepage: "https://github.com/zd1/telseq"
      documentation: "https://github.com/zd1/telseq"
      tool_dev_url: "https://github.com/zd1/telseq"
      doi: "10.1093/nar/gku181"
      licence: ["GPL v3"]
      args_id: "$args"
      identifier: ""
  - samtools:
      description: Tools for dealing with SAM, BAM and CRAM files
      homepage: http://www.htslib.org/
      documentation: http://www.htslib.org/doc/samtools.html
      tool_dev_url: https://github.com/samtools/samtools
      doi: 10.1093/bioinformatics/btp352
      licence: ["MIT"]
      identifier: "biotools:samtools"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
    - bai:
        type: file
        description: bam index file
        pattern: "*.{bai,crai}"
        ontologies: []
    - bed:
        type: file
        description: Optional exome regions in BED format. These regions will be excluded
        pattern: "*.bed"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Reference genome file
        pattern: "*.{fa,fasta}"
        ontologies: []
    - fai:
        type: file
        description: Fasta index file
        pattern: "*.fai"
        ontologies: []
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.telseq.tsv":
          type: file
          description: Telseq output
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_telseq:
    - - ${task.process}:
          type: string
          description: The name of the process
      - telseq:
          type: string
          description: The name of the tool
      - "echo 0.0.2":
          type: eval
          description: The expression to obtain the version of telseq
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | sed -n '1s/samtools //p'":
          type: eval
          description: The expression to obtain the version of samtools
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - telseq:
          type: string
          description: The name of the tool
      - "echo 0.0.2":
          type: eval
          description: The expression to obtain the version of telseq
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | sed -n '1s/samtools //p'":
          type: eval
          description: The expression to obtain the version of samtools
authors:
  - "@lindenb"
maintainers:
  - "@lindenb"
