name: metabat2_jgisummarizebamcontigdepths
description: Depth computation per contig step of metabat2
keywords:
  - sort
  - binning
  - depth
  - bam
  - coverage
  - de novo assembly
tools:
  - metabat2:
      description: Metagenome binning
      homepage: https://bitbucket.org/berkeleylab/metabat/src/master/
      documentation: https://bitbucket.org/berkeleylab/metabat/src/master/
      tool_dev_url: https://bitbucket.org/berkeleylab/metabat/src/master/
      doi: "10.7717/peerj.7359"
      licence:
        - "BSD-3-clause-LBNL"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: Sorted BAM file of reads aligned on the assembled contigs
        pattern: "*.bam"
        ontologies: []
    - bai:
        type: file
        description: BAM index file
        pattern: "*.bam.bai"
        ontologies: []
output:
  depth:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt.gz":
          type: file
          description: Text file listing the coverage per contig
          pattern: ".txt.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  versions_metabat2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - metabat2:
          type: string
          description: The name of the tool
      - metabat2 --help 2>&1 | sed -n "2s/.*:\([0-9]*\.[0-9]*\).*/\1/p":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - metabat2:
          type: string
          description: The name of the tool
      - metabat2 --help 2>&1 | sed -n "2s/.*:\([0-9]*\.[0-9]*\).*/\1/p":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@maxibor"
maintainers:
  - "@maxibor"
