name: "nanofilt"
description: Filtering and trimming of Oxford Nanopore Sequencing data
keywords:
  - nanopore
  - filtering
  - QC
tools:
  - "nanofilt":
      description: "Filtering and trimming of Oxford Nanopore Sequencing data"
      homepage: "https://github.com/wdecoster/nanofilt"
      documentation: "https://github.com/wdecoster/nanofilt"
      tool_dev_url: "https://github.com/wdecoster/nanofilt"
      doi: "10.1093/bioinformatics/bty149"
      licence:
        - "GLP-3.0"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: Gunziped fastq files from Oxford Nanopore sequencing.
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
  - summary_file:
      type: file
      description: Optional - Albacore or guppy summary file for quality scores
      ontologies: []
output:
  filtreads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.fastq.gz":
          type: file
          description: Gunziped fastq files after filtering.
          pattern: "*.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  log_file:
    - "*.log":
        type: file
        description: Log file generated by --logfile option in NanoFilt, the file
          must end with .log extension.
        pattern: "*.log"
        ontologies: []
  versions_nanofilt:
    - - ${task.process}:
          type: string
          description: The name of the process
      - nanofilt:
          type: string
          description: The name of the tool
      - NanoFilt -v | sed "s/NanoFilt //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - nanofilt:
          type: string
          description: The name of the tool
      - NanoFilt -v | sed "s/NanoFilt //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@lfreitasl"
maintainers:
  - "@lfreitasl"
