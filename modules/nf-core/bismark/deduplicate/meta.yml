name: bismark_deduplicate
description: |
  Removes alignments to the same position in the genome
  from the Bismark mapping output.
keywords:
  - bismark
  - 3-letter genome
  - map
  - methylation
  - 5mC
  - methylseq
  - bisulphite
  - bisulfite
  - bam
tools:
  - bismark:
      description: |
        Bismark is a tool to map bisulfite treated sequencing reads
        and perform methylation calling in a quick and easy-to-use fashion.
      homepage: https://github.com/FelixKrueger/Bismark
      documentation: https://github.com/FelixKrueger/Bismark/tree/master/Docs
      doi: 10.1093/bioinformatics/btr167
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:bismark
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM file containing read alignments
        pattern: "*.{bam}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.deduplicated.bam":
          type: file
          description: Deduplicated output BAM file containing read alignments
          pattern: "*.{deduplicated.bam}"
          ontologies: []
  report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.deduplication_report.txt":
          type: file
          description: Bismark deduplication reports
          pattern: "*.{deduplication_report.txt}"
          ontologies: []
  versions_bismark:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bismark:
          type: string
          description: The name of the tool
      - "bismark -v 2>&1 | sed -n 's/^.*Bismark Version: v//p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bismark:
          type: string
          description: The name of the tool
      - "bismark -v 2>&1 | sed -n 's/^.*Bismark Version: v//p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@phue"
maintainers:
  - "@phue"
  - "@sateeshperi"
