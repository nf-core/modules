name: bismark_report
description: Collects bismark alignment reports
keywords:
  - bismark
  - qc
  - methylation
  - 5mC
  - methylseq
  - bisulphite
  - bisulfite
  - report
tools:
  - bismark:
      description: |
        Bismark is a tool to map bisulfite treated sequencing reads
        and perform methylation calling in a quick and easy-to-use fashion.
      homepage: https://github.com/FelixKrueger/Bismark
      documentation: https://github.com/FelixKrueger/Bismark/tree/master/Docs
      doi: 10.1093/bioinformatics/btr167
      licence: ["GPL-3.0-or-later"]
      identifier: biotools:bismark
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - align_report:
        type: file
        description: Bismark alignment reports
        pattern: "*{report.txt}"
        ontologies: []
    - dedup_report:
        type: file
        description: Bismark deduplication reports
        pattern: "*.{deduplication_report.txt}"
        ontologies: []
    - splitting_report:
        type: file
        description: Bismark splitting reports
        pattern: "*{splitting_report.txt}"
        ontologies: []
    - mbias:
        type: file
        description: Text file containing methylation bias information
        pattern: "*.{txt}"
        ontologies: []
output:
  report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*report.{html,txt}":
          type: file
          description: Bismark reports
          pattern: "*.{html,txt}"
          ontologies: []
  versions_bismark:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bismark:
          type: string
          description: The name of the tool
      - "bismark -v 2>&1 | sed -n 's/^.*Bismark Version: v//p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bismark:
          type: string
          description: The name of the tool
      - "bismark -v 2>&1 | sed -n 's/^.*Bismark Version: v//p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@phue"
maintainers:
  - "@phue"
  - "@sateeshperi"
