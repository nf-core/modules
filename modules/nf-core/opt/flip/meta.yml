name: "opt_flip"
description: "flip corrects probes that are aligning to the opposite strand of their
  intended target genes by reverse complementing them"
keywords:
  - opt
  - opt flip
  - transcripts
  - off-target probes
  - align probes
tools:
  - "opt":
      description: "opt is a simple program that aligns probe sequences to transcript
        sequences to detect potential off-target probe activity"
      homepage: "https://github.com/JEFworks-Lab/off-target-probe-tracker"
      documentation: "https://github.com/JEFworks-Lab/off-target-probe-tracker/blob/main/README.md"
      tool_dev_url: "https://github.com/JEFworks-Lab/off-target-probe-tracker"
      licence:
        - GPL-3.0 license
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information of the probe panel sequences used for the xenium experiment
          e.g. `[ id:'breast_cancer_probe_panel_sequences' ]`
    - probes_fasta:
        type: file
        description: Fasta file for the probe sequences used in the xenium
          experiment
        pattern: "*.fasta"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing the information of the genomic features and fasta files used as references
          e.g. `[ id:'gencode_references' ]`
    - ref_annot_gff:
        type: file
        description: Reference annotations in gff format
        pattern: "*.gff"
        ontologies: []
    - ref_annot_fa:
        type: file
        description: Reference annotations in fasta format
        pattern: "*.fa"
        ontologies: []
output:
  fwd_oriented_fa:
    - - meta:
          type: map
          description: |
            Groovy Map containing information of the forward oriented fasta generated with the probes panel sequences 'opt flip'
            e.g. `[ id:'breast_cancer_probe_panel_sequences' ]`
      - ${prefix}/fwd_oriented.fa:
          type: file
          description: Fasta file for the forward oriented probe sequences
            generated with 'opt flip'
          pattern: "*fwd_oriented.fa"
          ontologies:
            - edam: http://edamontology.org/format_1929
  versions_opt:
    - - ${task.process}:
          type: string
          description: The name of the process
      - opt:
          type: string
          description: The name of the tool
      - opt --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - opt:
          type: string
          description: The name of the tool
      - opt --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@khersameesh24"
maintainers:
  - "@khersameesh24"
