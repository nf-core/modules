name: "kat_hist"
description: Creates a histogram of the number of distinct k-mers having a given frequency.
deprecated: true
keywords:
  - k-mer
  - histogram
  - count
tools:
  - "kat":
      description: "KAT is a suite of tools that analyse jellyfish hashes or sequence
        files (fasta or fastq) using kmer counts"
      homepage: https://www.earlham.ac.uk/kat-tools
      documentation: https://kat.readthedocs.io/en/latest/index.html
      tool_dev_url: https://github.com/TGAC/KAT
      doi: 10.1093/bioinformatics/btw663
      licence: ["GPL v3"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
output:
  hist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.hist":
          type: file
          description: KAT histogram of k-mer counts
          pattern: "*.hist"
          ontologies: []
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.hist.dist_analysis.json":
          type: file
          description: KAT histogram summary of distance analysis
          pattern: "*.hist.dist_analysis.json"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.png":
          type: file
          description: KAT plot of k-mer histogram in PNG format
          pattern: "*.png"
          ontologies: []
  ps:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.ps":
          type: file
          description: KAT plot of k-mer histogram in PS format
          pattern: "*.ps"
          ontologies: []
  pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.pdf":
          type: file
          description: KAT plot of k-mer histogram in PDF format
          pattern: "*.pdf"
          ontologies: []
  jellyfish_hash:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*-hash.jf*":
          type: file
          description: Jellyfish hash file
          pattern: "*-hist.jf*"
          ontologies: []
  versions_kat:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kat:
          type: string
          description: The name of the tool
      - kat hist --version | sed 's/kat //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kat:
          type: string
          description: The name of the tool
      - kat hist --version | sed 's/kat //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@mahesh-panchal"
maintainers:
  - "@mahesh-panchal"
