name: arriba_arriba
description: Arriba is a command-line tool for the detection of gene fusions
  from RNA-Seq data.
keywords:
  - fusion
  - arriba
  - detection
  - RNA-Seq
tools:
  - arriba:
      description: Fast and accurate gene fusion detection from RNA-Seq data
      homepage: https://github.com/suhrig/arriba
      documentation: https://arriba.readthedocs.io/en/latest/
      tool_dev_url: https://github.com/suhrig/arriba
      doi: "10.1101/gr.257246.119"
      licence:
        - "MIT"
      identifier: biotools:Arriba
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'test' ]
    - fasta:
        type: file
        description: Assembly FASTA file
        pattern: "*.{fasta}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'test' ]
    - gtf:
        type: file
        description: Annotation GTF file
        pattern: "*.{gtf}"
        ontologies: []
  - blacklist:
      type: file
      description: Blacklist file
      pattern: "*.{tsv}"
      ontologies:
        - edam: http://edamontology.org/format_3475 # TSV
  - known_fusions:
      type: file
      description: Known fusions file
      pattern: "*.{tsv}"
      ontologies:
        - edam: http://edamontology.org/format_3475 # TSV
  - cytobands:
      type: file
      description: Cytobands file
      pattern: "*.{tsv}"
      ontologies:
        - edam: http://edamontology.org/format_3475 # TSV
  - protein_domains:
      type: file
      description: Protein domains file
      pattern: "*.{gff3}"
      ontologies: []
output:
  fusions:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fusions.tsv":
          type: file
          description: File contains fusions which pass all of Arriba's filters.
          pattern: "*.{fusions.tsv}"
          ontologies: []
  fusions_fail:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fusions.discarded.tsv":
          type: file
          description: File contains fusions that Arriba classified as an artifact
            or that are also observed in healthy tissue.
          pattern: "*.{fusions.discarded.tsv}"
          ontologies: []
  versions_arriba:
    - - ${task.process}:
          type: string
          description: The name of the process
      - arriba:
          type: string
          description: The name of the tool
      - arriba -h | grep 'Version:' 2>&1 |  sed 's/Version:\s//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - arriba:
          type: string
          description: The name of the tool
      - arriba -h | grep 'Version:' 2>&1 |  sed 's/Version:\s//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@praveenraj2018"
  - "@rannick"
maintainers:
  - "@praveenraj2018"
  - "@rannick"
