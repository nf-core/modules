name: "kmcp_profile"
description: Generate taxonomic profile from search results
keywords:
  - metagenomics
  - classify
  - taxonomic profiling
  - fastq
  - sequences
  - kmers
  - index
tools:
  - "kmcp":
      description: "Accurate metagenomic profiling of both prokaryotic and viral populations
        by pseudo-mapping"
      homepage: "https://github.com/shenwei356/kmcp"
      documentation: "https://bioinf.shenwei.me/kmcp/usage/#profile"
      tool_dev_url: "https://github.com/shenwei356/kmcp"
      doi: "10.1093/bioinformatics/btac845"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - search_results:
        type: file
        description: Gzipped file output from kmcp search module
        pattern: "*.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
  - db:
      type: directory
      description: Database directory containing taxdump files and taxid file
output:
  profile:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.profile":
          type: file
          description: Tab-delimited format file with 17 columns.
          pattern: "*.profile"
          ontologies: []
  versions_kmcp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sofstam"
maintainers:
  - "@sofstam"
