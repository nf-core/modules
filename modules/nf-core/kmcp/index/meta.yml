name: "kmcp_index"
description: Construct KMCP database from k-mer files
keywords:
  - metagenomics
  - classify
  - taxonomic profiling
  - fastq
  - sequences
  - kmers
  - index
tools:
  - "kmcp":
      description: "Accurate metagenomic profiling of both prokaryotic and viral populations
        by pseudo-mapping"
      homepage: "https://github.com/shenwei356/kmcp"
      documentation: "https://github.com/shenwei356/kmcp#documents"
      tool_dev_url: "https://github.com/shenwei356/kmcp"
      doi: "10.1093/bioinformatics/btac845"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - compute_dir:
        type: directory
        description: Output directory generated by "kmcp compute"
        pattern: "*/"
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - taxdmp:
        type: directory
        description: |
          List or directory containing NCBI-like taxdmp files 
          (nodes.dmp, names.dmp, and optionally, merged.dmp, delnodes.dmp)
        pattern: "*/"
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - seq2taxidmap:
        type: file
        description: |
          Kraken2 style sequence to taxid mapping file, with two columns: 
          sequence ID and taxid
          (e.g. "accession1\t12345")
        pattern: "*.map"
output:
  kmcp:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}:
          type: directory
          description: Output directory containing the database from k-mer files.
          pattern: "*/"
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.log":
          type: file
          description: A log of kmcp/index output
          pattern: "*.log"
          ontologies: []
  versions_kmcp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sofstam"
maintainers:
  - "@sofstam"
