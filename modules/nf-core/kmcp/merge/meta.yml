name: "kmcp_merge"
description: Merge search results from multiple databases.
keywords:
  - metagenomics
  - classify
  - taxonomic profiling
  - fastq
  - sequences
  - kmers
tools:
  - "kmcp":
      description: "Accurate metagenomic profiling of both prokaryotic and viral populations
        by pseudo-mapping"
      homepage: "https://github.com/shenwei356/kmcp"
      documentation: "https://github.com/shenwei356/kmcp#documents"
      tool_dev_url: "https://github.com/shenwei356/kmcp"
      doi: "10.1093/bioinformatics/btac845"
      license:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - search_out:
        type: file
        description: The output file created by kmcp search
        pattern: "*.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
output:
  result:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gz":
          type: file
          description: Output file in gzipped format
          pattern: "*.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_kmcp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sofstam"
maintainers:
  - "@sofstam"
