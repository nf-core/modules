name: "kmcp_search"
description: Search sequences against database
keywords:
  - metagenomics
  - classify
  - taxonomic profiling
  - fastq
  - sequences
  - kmers
tools:
  - "kmcp":
      description: "Accurate metagenomic profiling of both prokaryotic and viral populations
        by pseudo-mapping"
      homepage: "https://github.com/shenwei356/kmcp"
      documentation: "https://github.com/shenwei356/kmcp#documents"
      tool_dev_url: "https://github.com/shenwei356/kmcp"
      doi: "10.1093/bioinformatics/btac845"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: gzipped fasta or fastq files
        pattern: "*.{fq.gz,fastq.gz,fa.gz}"
        ontologies: []
  - db:
      type: directory
      description: Database directory created by "kmcp index"
      pattern: "*"
output:
  result:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gz":
          type: file
          description: Output file in tab-delimited format with 15 columns
          pattern: "*.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_kmcp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kmcp:
          type: string
          description: The name of the tool
      - kmcp version 2>&1 | sed 's/^.*kmcp v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sofstam"
maintainers:
  - "@sofstam"
