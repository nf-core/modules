# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "gemmi_cif2mtz"
description: "Convert mmCIF structure files to MTZ X-ray crystallography data format using gemmi."
keywords:
- structural-biology
- crystallography
- format-conversion
- gemmi
- cif
- mtz
tools:
- "gemmi":
    description: "Gemmi is a library and command-line tool for macromolecular crystallography, structure formats, and validation."
    homepage: "https://gemmi.readthedocs.io/"
    documentation: "https://gemmi.readthedocs.io/en/latest/cif.html#converting-cif-to-mtz"
    tool_dev_url: "https://github.com/project-gemmi/gemmi"
    doi: "10.21105/joss.04200"
    licence: ["MPL-2.0"]
    identifier: ""

input:
- - meta:
      type: map
      description: |
        Groovy Map containing sample metadata, e.g. `[ id: 'sample1' ]`.
  - cif:
      type: file
      description: Input CIF/mmCIF structure file to convert.
      pattern: "*.cif"
      ontologies:
      - edam: "http://edamontology.org/format_1477"      # mmCIF structure format

output:
  mtz:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample metadata, e.g. `[ id: 'sample1' ]`.
    - "*.mtz":
        type: file
        description: Output MTZ X-ray crystallography data file.
        pattern: "*.mtz"
  versions_gemmi:
  - - "${task.process}":
        type: string
        description: The name of the process.
    - "gemmi":
        type: string
        description: The name of the tool.
    - "gemmi --version":
        type: eval
        description: The expression to obtain the version of the tool.

topics:
  versions:
  - - ${task.process}:
        type: string
        description: The name of the process.
    - gemmi:
        type: string
        description: The name of the tool.
    - gemmi --version:
        type: eval
        description: The expression to obtain the version of the tool.
authors:
- "@npechl"
maintainers:
- "@npechl"
