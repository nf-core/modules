# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "gemmi_validate"
description: "Validate mmCIF files with gemmi and capture the validation report."
keywords:
- structural-biology
- crystallography
- validation
- gemmi
tools:
- "gemmi":
    description: "Gemmi is a library and command-line tool for parsing, manipulating, and converting macromolecular structural biology data formats such as mmCIF, PDB, and MTZ."
    homepage: "https://gemmi.readthedocs.io/"
    documentation: "https://gemmi.readthedocs.io/en/latest/cif.html#validation"
    tool_dev_url: "https://github.com/project-gemmi/gemmi"
    doi: "10.21105/joss.04200"
    licence: ["MPL-2.0"]
    identifier: ""

input:
- - meta:
      type: map
      description: |
        Groovy Map containing sample metadata, e.g. `[ id: 'sample1' ]`.
  - cif:
      type: file
      description: Input CIF/mmCIF file to validate.
      pattern: "*.cif"
      ontologies:
      - edam: "http://edamontology.org/format_1477"      # mmCIF can be treated as structure format

output:
  log:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample metadata, e.g. `[ id: 'sample1' ]`.
    - "*.log":
        type: file
        description: Validation report from gemmi validate.
        pattern: "*.log"
  versions_gemmi:
  - - "${task.process}":
        type: string
        description: The name of the process.
    - "gemmi":
        type: string
        description: The name of the tool.
    - "gemmi --version":
        type: eval
        description: The expression to obtain the version of the tool.

topics:
  versions:
  - - ${task.process}:
        type: string
        description: The name of the process.
    - gemmi:
        type: string
        description: The name of the tool.
    - gemmi --version:
        type: eval
        description: The expression to obtain the version of the tool.
authors:
- "@npechl"
maintainers:
- "@npechl"
