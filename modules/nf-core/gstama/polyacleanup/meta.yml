name: gstama_polyacleanup
description: Helper script, remove remaining polyA sequences from Full Length
  Non Chimeric reads (Pacbio isoseq3)
keywords:
  - gstama
  - gstama/polyacleanup
  - long-read
  - isoseq
  - tama
  - trancriptome
  - annotation
tools:
  - gstama:
      description: Gene-Switch Transcriptome Annotation by Modular Algorithms
      homepage: https://github.com/sguizard/gs-tama
      documentation: https://github.com/GenomeRIK/tama/wiki
      tool_dev_url: https://github.com/sguizard/gs-tama
      doi: "10.1186/s12864-020-07123-7"
      licence:
        - "GPL v3 License"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Full Length Non Chimeric reads in fasta format
        pattern: "*.{fa,fasta}"
        ontologies: []
output:
  fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fa.gz":
          type: file
          description: The Full Length Non Chimeric reads cleaned from remaining
            polyA tails. The sequences are in FASTA format compressed with gzip.
          pattern: "*.fa.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_polya_flnc_report.txt.gz":
          type: file
          description: A text file describing the number of polyA tails removed
            and their length. Compressed with gzip.
          pattern: "*_polya_flnc_report.txt.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  tails:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_tails.fa.gz":
          type: file
          description: A gzip compressed FASTA file of trimmed polyA tails.
          pattern: "*_tails.fa.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  versions_gstama:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gstama:
          type: string
          description: The name of the tool
      - tama_collapse.py -version | sed -n 's/tc_version_date_//p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gstama:
          type: string
          description: The name of the tool
      - tama_collapse.py -version | sed -n 's/tc_version_date_//p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sguizard"
maintainers:
  - "@sguizard"
