---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/yaml-schema.json
name: simpleaf_quant
description: simpleaf is a program to simplify and customize the running and configuration of single-cell processing with alevin-fry.
keywords:
  - quantification
  - gene expression
  - SimpleAF
tools:
  - simpleaf:
      description: |
        SimpleAF is a tool for quantification of gene expression from RNA-seq data
      homepage: https://github.com/COMBINE-lab/simpleaf
      manuscript: https://doi.org/10.1093/bioinformatics/btad614
      licence: ["BSD-3-Clause"]
input:
  - chemistry: 
      type: string
      description: |
        Chemistry of the data. Possible values are "10xv2", "10xv3", or a string defining a custom chemistry specification. For more information, see [the documentation](https://hackmd.io/@PI7Og0l1ReeBZu_pjQGUQQ/rJMgmvr13) of alevin-fry's custom chemistry specification. 
  - use_piscem: 
      type: boolean
      description: |
        A flag indicating if the index is a piscem (default) index (`true`) or a salmon index (`false`).
  - map_dir: 
      type: directory or []
      description: |
        Directory containing the mapping results. If this is passed, no mapping will be performed and the quantification will be done using the provided mapping results. Everything passed to 'Mapping Options' will be ignored.
  - Mapping Options:
      type: tuple
      description: |
        A triple in which the first element (`meta`) is a map containing sample information and mapping options, the second element (`reads`) is a list of input FastQ files for paired-end data, and the third element (`index`) is a pah to the folder containing the index files. 
    - meta:
        type: map
        description: |
          Groovy Map containing mapping information.
    - reads:
        type: file
        description: |
          List of input FastQ files for paired-end data.
          Reads should be grouped by pairs. For example, if you have two samples with two paired-end reads each, the list should look like this:
          ```
          [
            ['sample1_R1.fastq.gz', 'sample1_R2.fastq.gz'],
            ['sample2_R1.fastq.gz', 'sample2_R2.fastq.gz']
          ]
          ```
    - index:
        type: directory or []
        description: Folder containing the index files generated by `piscem` or `salmon`. This is optional when a `map_dir` is provided.
    
  - Permit List Generation Options:
      type: tuple
      description: |
        A tuple in which the first element (`meta2`) is a map containing permit-list generation information, and the second element (`whitelist`) is a file containing the whitelist information.
    - meta2:
      type: map
      description: |
        Groovy Map containing permit-list generation information. The Map can contain at most one of the permit list generation options supported by alevin-fry. Possible options are: 
        1. 'k' (knee), which is a flag for the knee method and any value provided will be ignored; 
        2. 'f' (forced-cells), which takes an integer indicating the exact number of cells to recover; 
        3. 'e' (expect-cells), which takes an integer indicating the expected number of cells to recover; 
        4. 'x' (explicit-pl), which takes a string indicating the path to a valid permit list;
        5. 'u' (unfiltered-pl), which takes an empty string (if `chemistry` is defined as "10xv2" or "10xv3"), or a string indicating the path to a valid white list file. The difference between (4) and (5) is that (4) contains the exact permit list to filter the observed barcodes, while (5) will use the white list to generate a permit list via barcode correction.
    - whitelist (Optional):
        type: file
        description: |
          File containing the whitelist information. if no whitelist to provide, leave it as an empty list `[]`.
  - Simpleaf Quant Parameters:
    - type: Map
      description: |
        Groovy Map containing options supported by simpleaf quant. Possible key:value pairs are:
          - `'use_selective_alignment' : false`: (salmon) A flag indicating using selective alignment. (only if using salmon alevin as the underlying mapper)
          - `'struct-constraints' : false`: (piscem) A flag indicating enabling structural constraints. 
          - `'ignore-ambig-hits' : false`: (piscem) A flag indicating skipping checking of the equivalence classes of k-mers that were too ambiguous to be otherwise considered (passing this flag can speed up mapping slightly, but may reduce specificity).
          - `'no-poison' : false`: (piscem) A flag indicating not to consider poison k-mers, even if the underlying index contains them. In this case, the mapping results will be identical to those obtained as if no poison table was added to the index.
          - `'skipping-strategy' : 'permissive'`: (piscem) The skipping strategy to use for k-mer collection. Possible values are 'permissive' and 'strict'.
          - `'max-ec-card' : 4096`: (piscem) Determines the maximum cardinality equivalence class (number of (txp, orientation status) pairs) to examine (cannot be used with --ignore-ambig-hits). Replace 4096 with a different value to change the maximum cardinality.
          - `'max-hit-occ' : 256`: (piscem) In the first pass, consider only k-mers having <= --max-hit-occ hits. Replace 256 with a different value to change the maximum number of hits.
          - `'max-hit-occ-recover' : 1024`: (piscem) If all k-mers have > --max-hit-occ hits, then make a second pass and consider k-mers having <= --max-hit-occ-recover hits. Replace 1024 with a different value to change the maximum number of hits.
          - `'max-read-occ' : 2500`: (piscem) Reads with more than this number of mappings will not have their mappings reported. Replace 2500 with a different value to change the maximum number of mappings.
  - UMI Resolution Options:
    - meta3:
        type: map
        description: |
          Groovy Map containing txp2gene information
    - t2g_map:
        type: file
        description: |
          File mapping transcripts to genes. If using `simpleaf index`, this is the `t2g_3col.tsv` in the `ref` folder.
    - resolution:
        type: string
        description: |
          UMI resolution method. Possible values are 'cr-like' (default), 'cr-like-em', 'parsimony', 'parsimony-em', 'parsimony-gene', 'parsimony-gene-em'.

output:
  - meta:
      type: map
      description: |
        Groovy Map containing all parameters in the input `meta`, `meta2`, and `meta3` with the addition of the `resolution` parameter.
  - alevin_results:
      type: directory
      description: |
        Folder containing the Alevin results for a specific sample
      pattern: "*"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@fmalmeida"
  - "@maxulysse"
  - "@Khajidu"
  - "@apeltzer"
  - "@pinin4fjords"
maintainers:
  - "@fmalmeida"
  - "@maxulysse"
  - "@Khajidu"
  - "@apeltzer"
  - "@pinin4fjords"
