---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/yaml-schema.json
name: simpleaf_index
description: Indexing of transcriptome for gene expression quantification using SimpleAF
keywords:
  - indexing
  - transcriptome
  - gene expression
  - SimpleAF
tools:
  - simpleaf:
      description: |
        SimpleAF is a tool for quantification of gene expression from RNA-seq data
      homepage: https://github.com/COMBINE-lab/simpleaf
      licence: ["BSD-3-Clause"]
input:
  - use_piscem:
      type: boolean
      description: |
        use the default piscem for indexing, instead of salmon-alevin.

  - Reference Files:
    type: tuple
    description: |
      A tuple containing four elements. The first element is a genome FASTA file. The second element is a genome GTF/GFF3 file, and the third element is a transcript FASTA file. Only the first two elements or the third element should be provided. The latter conflicts with the first two elements. If not provided, leave the elment as `[]`.
    - meta: 
        type: map
        description: |
          Groovy Map containing information on the reference files used for indexing
    - genome_fasta: 
        type: file or []
        description: |
          reference genome to be used for the expanded reference construction. This must be coupled with a `genome_gtf` file.
    - genome_gtf:
        type: file or []
        description: |
          reference GTF/GFF3 file to be used for the expanded reference construction. This must be coupled with a `genome_fasta` file.
    - transcript_fasta:
        type: file or []
        description: |
          (Optional) target sequences used for constructing the index directly; avoid expanded reference construction). All 'Expanded Reference Options' are ignored if this is provided. This conflicts with `genome_fasta`/`genome_gtf`.

  - Simmpleaf Index parameters:
    type: Map
    description: |
      Groovy Map containing expanded reference options supported by simpleaf. possbible key:value pairs are:
    - Miscellaneous Parameters:
        - `'kmer-length': 31`:  the value of k to be used to construct the index. Replace 31 with the desired value.
        - `'gff3-format': false`: denotes that the input annotation is a GFF3 (instead of GTF) file
        - `'keep-duplicates': false`: keep duplicated identical sequences when constructing the index
        - `'overwrite': false`: overwrite existing files if the output directory is already populated.
    - Expanded Reference Options:
        - `'ref_type' : 'spliced+intronic'`: A string specify whether an expanded reference, spliced+intronic (or splici) or spliced+unspliced (or spliceu), should be built. Possible values are 'spliced+intronic' or 'spliced+unspliced'.
        - `'rlen' : 91`: the target read length the splici index will be built for. Replace 91 with the desired value.
        - `'dedup' : false`: deduplicate identical sequences in roers when building an expanded reference.
        - `'spliced' : 'spliced.fa'`: path to FASTA file with extra spliced sequence to add to the index. ONLY use if you have extra spliced sequences to add to the index. Replace 'spliced.fa' with the desired file path.
        - `'unspliced' : 'unspliced.fa'`: path to FASTA file with extra unspliced sequence to add to the index. ONLY use if you have extra unspliced sequences to add to the index. Replace 'unspliced.fa' with the desired file path.
    - Piscem Index Options: 
      - `'ninimizer-length' : 19`: the value of m to be used to construct the piscem index (must be < k)
      - `'decoy_paths' : 'decoy.fa'`: path to (optional) decoy sequence used to insert poison k-mer information into the index (only if using piscem >= 0.7)
      - `'seed' : 1`: seed value to use in SSHash index construction (try changing this in the rare event index build fails)
    - Alternative salmon-alevin Index Options:
    - `'sparse' : false`: if this flag is passed, build the sparse rather than dense index for mapping

output:
  - meta:
      type: map
      description: |
        Groovy Map containing information on genome_fasta or transcript_fasta (whichever was used), and all other parameters used for indexing
  - index:
      type: directory
      description: |
        Folder containing the Salmon index files
      pattern: "salmon/index"
  - transcript_tsv:
      type: file
      description: |
        Transcript-to-gene mapping file in 3-column TSV format
      pattern: "salmon/ref/t2g_3col.tsv"
  - salmon:
      type: directory
      description: |
        Folder containing the Salmon files
      pattern: "salmon"
  - versions:
      type: file
      description: |
        File containing software versions
      pattern: "versions.yml"
authors:
  - "@fmalmeida"
  - "@maxulysse"
  - "@Khajidu"
  - "@apeltzer"
  - "@pinin4fjords"
  - "@dongzehe"
maintainers:
  - "@fmalmeida"
  - "@maxulysse"
  - "@Khajidu"
  - "@apeltzer"
  - "@pinin4fjords"
  - "@dongzehe"
