name: fastqscan
description: FASTQ summary statistics in JSON format
keywords:
  - fastq
  - summary
  - statistics
tools:
  - fastqscan:
      description: FASTQ summary statistics in JSON format
      homepage: https://github.com/rpetit3/fastq-scan
      documentation: https://github.com/rpetit3/fastq-scan
      tool_dev_url: https://github.com/rpetit3/fastq-scan
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: FASTQ file
        pattern: "*.{fastq.gz,fq.gz}"
        ontologies: []
output:
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.json":
          type: file
          description: JSON formatted file of summary statistics
          pattern: "*.json"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  versions_fastqscan:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fastqscan:
          type: string
          description: The name of the tool
      - fastq-scan -v 2>&1 | sed 's/^.*fastq-scan //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fastqscan:
          type: string
          description: The name of the tool
      - fastq-scan -v 2>&1 | sed 's/^.*fastq-scan //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
