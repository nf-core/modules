name: "epang_split"
description: splits an alignment into reference and query parts
keywords:
  - phylogeny
  - phylogenetic placement
  - sequences
tools:
  - "epang":
      description: "Massively parallel phylogenetic placement of genetic sequences"
      homepage: "https://github.com/Pbdas/epa-ng"
      documentation: "https://github.com/Pbdas/epa-ng/wiki/Full-Stack-Example"
      tool_dev_url: "https://github.com/Pbdas/epa-ng"
      doi: "10.1093/sysbio/syy054"
      licence:
        - "GNU Affero General Public License v3.0"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - refaln:
        type: file
        description: reference alignment in any supported format including phylip
          and fasta, may be gzipped
        pattern: "*.{faa,fna,fa,fasta,fa,phy,aln,alnfaa,alnfna,alnfa,mfa,faa.gz,fna.gz,fa.gz,fasta.gz,fa.gz,phy.gz,aln.gz,alnfaa.gz,alnfna.gz,alnfa.gz,mfa.gz}"
        ontologies: []
    - fullaln:
        type: file
        description: full alignment in any supported format to split into
          reference and query alignments
        pattern: "*.{faa,fna,fa,fasta,fa,phy,aln,alnfaa,alnfna,alnfa,mfa,faa.gz,fna.gz,fa.gz,fasta.gz,fa.gz,phy.gz,aln.gz,alnfaa.gz,alnfna.gz,alnfa.gz,mfa.gz}"
        ontologies: []
output:
  query:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*query.fasta.gz":
          type: file
          description: query sequence alignment in gzipped fasta format
          ontologies: []
  reference:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*reference.fasta.gz":
          type: file
          description: reference sequence alignment in gzipped fasta format
          ontologies: []
  versions_epang:
    - - ${task.process}:
          type: string
          description: The name of the process
      - epa-ng:
          type: string
          description: The name of the tool
      - epa-ng --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - epa-ng:
          type: string
          description: The name of the tool
      - epa-ng --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@erikrikarddaniel"
maintainers:
  - "@erikrikarddaniel"
