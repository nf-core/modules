name: "mapad_index"
description: Create mapAD index for reference genome
keywords:
  - index
  - fasta
  - genome
  - reference
tools:
  - "mapad":
      description: "An aDNA aware short-read mapper"
      homepage: "https://github.com/mpieva/mapAD"
      documentation: "https://github.com/mpieva/mapAD"
      tool_dev_url: "https://github.com/mpieva/mapAD"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: FASTA file
        pattern: "*.{fasta,fa,fna}"
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - mapad/:
          type: directory
          description: mapAD genome index files
          pattern: "*.{tbw,tle,toc,tos,tpi,trt,tsa}"
  versions_mapad:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mapad:
          type: string
          description: The name of the tool
      - mapad --version | sed 's/^mapAD //':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mapad:
          type: string
          description: The name of the tool
      - mapad --version | sed 's/^mapAD //':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@jch-13"
maintainers:
  - "@jch-13"
