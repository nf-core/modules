name: "concoct_mergecutupclustering"
description: Merge consecutive parts of the original contigs original cut up by
  cut_up_fasta.py
keywords:
  - contigs
  - fragment
  - mags
  - binning
  - fasta
  - cut
  - cut up
  - merge
tools:
  - "concoct":
      description: "Clustering cONtigs with COverage and ComposiTion"
      homepage: "https://concoct.readthedocs.io/en/latest/index.html"
      documentation: "https://concoct.readthedocs.io/en/latest/index.html"
      tool_dev_url: "https://github.com/BinPro/CONCOCT"
      doi: "10.1038/nmeth.3103"
      licence:
        - "FreeBSD"
      identifier: biotools:concoct
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - clustering_csv:
        type: file
        description: Input cutup clustering result. Typically *_gt1000.csv from
          concoct
        pattern: "*.csv"
        ontologies:
          - edam: http://edamontology.org/format_3752
output:
  csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.csv":
          type: file
          description: Cluster assignments per contig part with consensus cluster
          pattern: "*.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  versions_concoct:
    - - ${task.process}:
          type: string
          description: The name of the process
      - concoct:
          type: string
          description: The name of the tool
      - concoct --version | cut -d " " -f2:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - concoct:
          type: string
          description: The name of the tool
      - concoct --version | cut -d " " -f2:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
