name: "concoct_concoct"
description: Unsupervised binning of metagenomic contigs by using nucleotide
  composition - kmer frequencies - and coverage data for multiple samples
keywords:
  - contigs
  - fragment
  - mags
  - binning
  - concoct
  - kmer
  - nucleotide composition
  - metagenomics
  - bins
tools:
  - "concoct":
      description: "Clustering cONtigs with COverage and ComposiTion"
      homepage: "https://concoct.readthedocs.io/en/latest/index.html"
      documentation: "https://concoct.readthedocs.io/en/latest/index.html"
      tool_dev_url: "https://github.com/BinPro/CONCOCT"
      doi: "10.1038/nmeth.3103"
      licence:
        - "FreeBSD"
      identifier: biotools:concoct
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - coverage_file:
        type: file
        description: Subcontig coverage TSV table (typically generated with
          concoct_coverage_table.py)
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475
    - fasta:
        type: file
        description: FASTA file containing subcontigs (typically generated with
          cutup_fasta.py)
        pattern: "*.fasta"
        ontologies: []
output:
  args_txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_args.txt":
          type: file
          description: File containing execution parameters
          pattern: "*_args.txt"
          ontologies: []
  clustering_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_clustering_gt1000.csv":
          type: file
          description: CSV containing information which subcontig is assigned to
            which cluster
          pattern: "*_clustering_gt1000.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  log_txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_log.txt":
          type: file
          description: Log file of tool execution
          pattern: "*_log.txt"
          ontologies: []
  original_data_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_original_data_gt1000.csv":
          type: file
          description: Original CONCOCT GT1000 output
          pattern: "*_original_data_gt1000.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  pca_components_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_PCA_components_data_gt1000.csv":
          type: file
          description: Untransformed PCA component values
          pattern: "*_PCA_components_data_gt1000.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  pca_transformed_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_PCA_transformed_data_gt1000.csv":
          type: file
          description: Transformed PCA component values
          pattern: "*_PCA_transformed_data_gt1000.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  versions_concoct:
    - - ${task.process}:
          type: string
          description: The name of the process
      - concoct:
          type: string
          description: The name of the tool
      - concoct --version | cut -d " " -f2:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - concoct:
          type: string
          description: The name of the tool
      - concoct --version | cut -d " " -f2:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
