name: "concoct_extractfastabins"
description: Creates a FASTA file for each new cluster assigned by CONCOCT
keywords:
  - contigs
  - fragment
  - mags
  - binning
  - fasta
  - cut
  - cut up
  - bins
  - merge
tools:
  - "concoct":
      description: "Clustering cONtigs with COverage and ComposiTion"
      homepage: "https://concoct.readthedocs.io/en/latest/index.html"
      documentation: "https://concoct.readthedocs.io/en/latest/index.html"
      tool_dev_url: "https://github.com/BinPro/CONCOCT"
      doi: "10.1038/nmeth.3103"
      licence:
        - "FreeBSD"
      identifier: biotools:concoct
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - original_fasta:
        type: file
        description: Original input FASTA file to CONOCT cut_up_fasta
        pattern: "*.{fasta,fna,fa,fas}"
        ontologies: []
    - csv:
        type: boolean
        description: Output table of merge_cutup_clustering with new cluster
          assignments
        pattern: ".csv"
output:
  fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}/*.fa.gz:
          type: file
          description: FASTA files containing CONCOCT predicted bin clusters,
            named numerically by CONCOCT cluster ID in a directory called
            `fasta_bins`
          pattern: "*.fa.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_concoct:
    - - ${task.process}:
          type: string
          description: The name of the process
      - concoct:
          type: string
          description: The name of the tool
      - concoct --version 2>&1 | sed -n 's/concoct //p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - concoct:
          type: string
          description: The name of the tool
      - concoct --version 2>&1 | sed -n 's/concoct //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
