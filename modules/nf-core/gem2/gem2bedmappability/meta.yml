name: "gem2_gem2bedmappability"
description: Convert a mappability file to bedgraph format
keywords:
  - mappability
  - bedgraph
  - index
  - gem
tools:
  - "gem2":
      description: "GEM2 is a high-performance mapping tool. It also provide a unique
        tool to evaluate mappability."
      homepage: "https://paoloribeca.science/gem"
      licence:
        - "Custom"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - map:
        type: file
        description: The mappability file created from the index
        pattern: "*.mappability"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing index information
    - index:
        type: file
        description: The index of the reference FASTA
        pattern: "*.gem"
        ontologies: []
output:
  bedgraph:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bg":
          type: file
          description: The resulting bedgraph file
          pattern: "*.bg"
          ontologies: []
  sizes:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sizes":
          type: file
          description: The chromosome sizes
          pattern: "*.sizes"
          ontologies: []
  versions_gem2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gem2:
          type: string
          description: The name of the tool
      - "20200110":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gem2:
          type: string
          description: The name of the tool
      - "20200110":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@nvnieuwk"
maintainers:
  - "@nvnieuwk"
