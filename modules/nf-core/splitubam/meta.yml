name: "splitubam"
description: split one ubam into multiple, per line, fast
keywords:
  - long-read
  - bam
  - genomics
tools:
  - "splitubam":
      description: "Split one ubam into multiple, per line, fast"
      homepage: "https://github.com/fellen31/splitubam"
      documentation: "https://github.com/fellen31/splitubam"
      tool_dev_url: "https://github.com/fellen31/splitubam"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:true ]`
    - bam:
        type: file
        description: (u)BAM file
        pattern: "*.{bam}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.bam":
          type: file
          description: Split (u)BAM file
          pattern: "*.{bam}"
          ontologies: []
  versions_splitubam:
    - - ${task.process}:
          type: string
          description: Name of the process
      - splitubam:
          type: string
          description: Name of the tool
      - splitubam --version | sed 's/.* //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: Name of the process
      - splitubam:
          type: string
          description: Name of the tool
      - splitubam --version | sed 's/.* //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@fellen31"
maintainers:
  - "@fellen31"
