name: "ripgrep"
description: ripgrep recursively searches directories for a regex pattern
keywords:
  - search
  - regex
  - patterns
tools:
  - "ripgrep":
      description: "ripgrep recursively searches directories for a regex pattern"
      homepage: "https://github.com/BurntSushi/ripgrep"
      documentation: "https://github.com/BurntSushi/ripgrep"
      tool_dev_url: "https://github.com/BurntSushi/ripgrep"
      licence:
        - "MIT"
        - "UNLICENSE"
      identifier: ""
  - "pigz":
      description: "Parallel implementation of the gzip algorithm."
      homepage: "https://zlib.net/pigz/"
      documentation: "https://zlib.net/pigz/pigz.pdf"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - files:
        type: file
        description: File(s) to be searched
        ontologies:
          - edam: http://edamontology.org/format_2330 # Text
          - edam: http://edamontology.org/format_3989 # GZIP
  - pattern:
      type: string
      description: Regex pattern to search for
  - pattern_file:
      type: file
      description: File containing list of patterns to search for
      ontologies:
        - edam: http://edamontology.org/format_2330 # Text
  - compress:
      type: boolean
      description: Compress the output file using pigz
      default: false
output:
  txt:
    - - meta:
          type: map
          description: Groovy map containing sample information
      - "*.txt{.gz,}":
          type: file
          description: Output file containing the search results
          pattern: "*.txt{.gz,}"
          ontologies:
            - edam: http://edamontology.org/format_2330 # Text
            - edam: http://edamontology.org/format_3989 # GZIP
  versions_ripgrep:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ripgrep:
          type: string
          description: The name of the tool
      - rg --version |& sed '1!d ; s/ripgrep // ; s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ripgrep:
          type: string
          description: The name of the tool
      - rg --version |& sed '1!d ; s/ripgrep // ; s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@itrujnara"
maintainers:
  - "@itrujnara"
