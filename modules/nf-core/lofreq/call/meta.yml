name: lofreq_call
description: Lofreq subcommand to call low frequency variants from alignments
keywords:
  - variant calling
  - low frequency variant calling
  - lofreq
  - lofreq/call
tools:
  - lofreq:
      description: A fast and sensitive variant-caller for inferring SNVs and indels
        from next-generation sequencing data
      homepage: https://csb5.github.io/lofreq/
      documentation: https://csb5.github.io/lofreq/commands/
      doi: "10.1093/nar/gks918 "
      licence: ["MIT"]
      identifier: biotools:lofreq
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM input file
        pattern: "*.{bam}"
        ontologies: []
    - intervals:
        type: file
        description: BED file containing target regions for variant calling
        pattern: "*.{bed}"
        ontologies: []
  - fasta:
      type: file
      description: The reference fasta file
      ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf.gz":
          type: file
          description: VCF output file
          pattern: "*.{vcf}"
          ontologies: []
  versions_lofreq:
  - - ${task.process}:
        type: string
        description: Process which generated the version
    - lofreq:
        type: string
        description: Tool name
    - "lofreq version | sed -n '1s/^.* //p'":
        type: eval
        description: The expression to obtain the version of the tool
topics:
  versions:
  - - ${task.process}:
        type: string
        description: Process which generated the version
    - lofreq:
        type: string
        description: Tool name
    - "lofreq version | sed -n '1s/^.* //p'":
        type: eval
        description: The expression to obtain the version of the tool
authors:
  - "@bjohnnyd"
maintainers:
  - "@bjohnnyd"
