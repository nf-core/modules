name: "lofreq_viterbi"
description: Lofreq subcommand to call low frequency variants from alignments when
  tumor-normal paired samples are available
keywords:
  - variant calling
  - low frequency variant calling
  - variants
  - bam
  - probabilistic realignment
tools:
  - "lofreq":
      description: "A fast and sensitive variant-caller for inferring SNVs and indels
        from next-generation sequencing data"
      homepage: https://csb5.github.io/lofreq/
      documentation: https://csb5.github.io/lofreq/commands/
      doi: 10.1093/nar/gks918
      licence: ["MIT"]
      identifier: biotools:lofreq
input:
  # Only when we have meta
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - bam:
        type: file
        description: Sorted BAM file
        pattern: "*.{bam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information about the reference fasta
          e.g. [ id:'reference' ]
    - fasta:
        type: file
        description: Reference genome FASTA file
        pattern: "*.{fasta}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.bam":
          type: file
          description: Realignment and sorted BAM file
          pattern: "*.{bam}"
          ontologies: []
  versions_lofreq:
    - - ${task.process}:
          type: string
          description: Process which generated the version
      - lofreq:
          type: string
          description: Tool name
      - "lofreq version | sed -n '1s/^.* //p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: Process which generated the version
      - lofreq:
          type: string
          description: Tool name
      - "lofreq version | sed -n '1s/^.* //p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@MarieLataretu"
maintainers:
  - "@MarieLataretu"
  - "@Krannich479"
