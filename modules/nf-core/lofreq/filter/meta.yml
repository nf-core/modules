name: lofreq_filter
description: Lofreq subcommand to remove variants with low coverage or strand bias
  potential
keywords:
  - variant calling
  - low frequency variant calling
  - filtering
  - lofreq
  - lofreq/filter
tools:
  - lofreq:
      description: A fast and sensitive variant-caller for inferring SNVs and indels
        from next-generation sequencing data
      homepage: https://csb5.github.io/lofreq/
      documentation: https://csb5.github.io/lofreq/commands/
      doi: "10.1093/nar/gks918 "
      licence: ["MIT"]
      identifier: biotools:lofreq
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - vcf:
        type: file
        description: VCF input file
        pattern: "*.{vcf}"
        ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gz":
          type: file
          description: VCF filtered output file
          pattern: "*.{vcf}"
          ontologies: []
  versions_lofreq:
  - - ${task.process}:
        type: string
        description: Process which generated the version
    - lofreq:
        type: string
        description: Tool name
    - "lofreq version | sed -n '1s/^.* //p'":
        type: eval
        description: The expression to obtain the version of the tool
topics:
  versions:
  - - ${task.process}:
        type: string
        description: Process which generated the version
    - lofreq:
        type: string
        description: Tool name
    - "lofreq version | sed -n '1s/^.* //p'":
        type: eval
        description: The expression to obtain the version of the tool
authors:
  - "@bjohnnyd"
maintainers:
  - "@bjohnnyd"
