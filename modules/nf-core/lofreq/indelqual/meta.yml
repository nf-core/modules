name: lofreq_indelqual
description: Inserts indel qualities in a BAM file
keywords:
  - variant calling
  - variants
  - bam
  - indel
  - qualities
tools:
  - lofreq:
      description: Lofreq is a fast and sensitive variant-caller for inferring SNVs
        and indels from next-generation sequencing data. It's indelqual programme inserts
        indel qualities in a BAM file
      homepage: https://csb5.github.io/lofreq/
      doi: "10.1093/nar/gks918"
      licence: ["MIT"]
      identifier: biotools:lofreq
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM file
        pattern: "*.{bam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information about the reference fasta
          e.g. [ id:'reference' ]
    - fasta:
        type: file
        description: Reference genome FASTA file
        pattern: "*.{fasta,fa}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: BAM file with indel qualities inserted into it
          pattern: "*.{bam}"
          ontologies: []
  versions_lofreq:
  - - ${task.process}:
        type: string
        description: Process which generated the version
    - lofreq:
        type: string
        description: Tool name
    - "lofreq version | awk 'NR==1{print \\$2}'":
        type: eval
        description: The expression to obtain the version of the tool
topics:
  versions:
  - - ${task.process}:
        type: string
        description: Process which generated the version
    - lofreq:
        type: string
        description: Tool name
    - "lofreq version | awk 'NR==1{print \\$2}'":
        type: eval
        description: The expression to obtain the version of the tool
authors:
