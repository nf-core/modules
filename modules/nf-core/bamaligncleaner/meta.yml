name: bamaligncleaner
description: removes unused references from header of sorted BAM/CRAM files.
keywords:
  - bam
  - clean
  - align
tools:
  - bamaligncleaner:
      description: Removes unaligned references in aligned BAM alignment file
      homepage: https://github.com/maxibor/bamAlignCleaner
      documentation: https://github.com/maxibor/bamAlignCleaner
      tool_dev_url: https://github.com/maxibor/bamAlignCleaner
      licence:
        - "GPL v3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM file
        pattern: "*.{bam,cram}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: Sorted BAM/CRAM file
          pattern: "*.{bam,cram}"
          ontologies: []
  versions_bamaligncleaner:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bamaligncleaner:
          type: string
          description: The name of the tool
      - bamAlignCleaner --version | sed 's/.*version //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bamaligncleaner:
          type: string
          description: The name of the tool
      - bamAlignCleaner --version | sed 's/.*version //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
