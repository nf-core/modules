name: "wipertools_reportgather"
description: A tool of the wipertools suite that merges wiping reports generated
  by wipertools_fastqwiper
keywords:
  - report
  - merge
  - union
tools:
  - "reportgather":
      description: "A tool of the wipertools suite that merges wiping reports generated
        by wipertools_fastqwiper."
      homepage: "https://github.com/mazzalab/fastqwiper"
      documentation: "https://github.com/mazzalab/fastqwiper"
      tool_dev_url: "https://github.com/mazzalab/fastqwiper"
      doi: "no DOI available"
      licence:
        - "GPL v2-or-later"
      identifier: ""
      args_id: "$args"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - report:
        type: file
        description: List of wiping reports to be merged
        pattern: "*.report"
        ontologies:
          - edam: "http://edamontology.org/format_2330"
output:
  gathered_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${prefix}.report:
          type: file
          description: The resulting report file
          pattern: "*.report"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_wipertools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wipertools:
          type: string
          description: The name of the tool
      - wipertools reportgather --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wipertools:
          type: string
          description: The name of the tool
      - wipertools reportgather --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@tm4zza"
maintainers:
  - "@mazzalab"
  - "@tm4zza"
