name: "wipertools_fastqgather"
description: A tool of the wipertools suite that merges FASTQ chunks produced by
  wipertools_fastqscatter
keywords:
  - fastq
  - merge
  - union
tools:
  - "fastqgather":
      description: "A tool of the wipertools suite that merges FASTQ chunks produced
        by wipertools_fastqscatter."
      homepage: "https://github.com/mazzalab/fastqwiper"
      documentation: "https://github.com/mazzalab/fastqwiper"
      tool_dev_url: "https://github.com/mazzalab/fastqwiper"
      doi: "no DOI available"
      licence:
        - "GPL v2-or-later"
      identifier: ""
      args_id: "$args"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - fastq:
        type: file
        description: List of FASTQ chunk files to be merged
        pattern: "*.{fastq,fastq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930"
          - edam: "http://edamontology.org/format_3989"
output:
  gathered_fastq:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${prefix}.fastq.gz:
          type: file
          description: The resulting FASTQ file
          pattern: "*.fastq.gz"
          ontologies:
            - edam: "http://edamontology.org/format_1930"
            - edam: "http://edamontology.org/format_3989"
  versions_wipertools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wipertools:
          type: string
          description: The name of the tool
      - wipertools fastqgather --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wipertools:
          type: string
          description: The name of the tool
      - wipertools fastqgather --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@tm4zza"
maintainers:
  - "@mazzalab"
  - "@tm4zza"
