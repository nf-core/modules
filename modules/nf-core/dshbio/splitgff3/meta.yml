name: dshbio_splitgff3
description: Split features in gzipped GFF3 format
keywords:
  - gff3
  - split
  - feature
tools:
  - dshbio:
      description: |
        Reads, features, variants, assemblies, alignments, genomic range trees, pangenome
        graphs, and a bunch of random command line tools for bioinformatics. LGPL version 3
        or later.
      homepage: https://github.com/heuermh/dishevelled-bio
      documentation: https://github.com/heuermh/dishevelled-bio
      licence:
        - "LGPL-3.0-or-later"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - gff3:
        type: file
        description: Features in gzipped GFF3 format to split
        pattern: "*.{gff3.gz}"
        ontologies: []
output:
  gff3:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gff3.gz":
          type: file
          description: Features in split gzipped GFF3 formatted files
          pattern: "*.{gff3.gz}"
          ontologies: []
  versions_dshbio:
    - - ${task.process}:
          type: string
          description: The name of the process
      - dsh-bio:
          type: string
          description: The name of the tool
      - dsh-bio --version | sed '1!d;s/dsh-bio-tools //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - dsh-bio:
          type: string
          description: The name of the tool
      - dsh-bio --version | sed '1!d;s/dsh-bio-tools //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@heuermh"
maintainers:
  - "@heuermh"
