name: "sambamba_markdup"
description: find and mark duplicate reads in BAM file
keywords:
  - markduplicates
  - duplicates
  - bam
tools:
  - "sambamba":
      description: "process your BAM data faster!"
      homepage: "https://lomereiter.github.io/sambamba/docs/sambamba-view.html"
      documentation: "https://lomereiter.github.io/sambamba/docs/sambamba-view.html"
      tool_dev_url: "https://github.com/biod/sambamba"
      licence:
        - "GPL v2"
      identifier: biotools:sambamba
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: Sorted BAM/CRAM/SAM file
          pattern: "*.{bam,cram,sam}"
          ontologies: []
  bai:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bai":
          type: file
          description: An optional BAM index file.
          pattern: "*.{bai}"
          ontologies: []
  versions_sambamba:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sambamba:
          type: string
          description: The name of the tool
      - sambamba --version 2>&1 | grep -oPm1 'sambamba \\K[0-9.]+':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sambamba:
          type: string
          description: The name of the tool
      - sambamba --version 2>&1 | grep -oPm1 'sambamba \\K[0-9.]+':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@BioInf2305"
maintainers:
  - "@BioInf2305"
