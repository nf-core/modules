name: "sambamba_flagstat"
description: Outputs some statistics drawn from read flags.
keywords:
  - stats
  - flagstat
  - sambamba
tools:
  - "sambamba":
      description: "Tools for working with SAM/BAM data"
      homepage: "https://lomereiter.github.io/sambamba/docs/sambamba-view.html"
      documentation: "https://lomereiter.github.io/sambamba/docs/sambamba-view.html"
      tool_dev_url: "https://github.com/biod/sambamba"
      licence:
        - "GPL v2"
      identifier: biotools:sambamba
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM file
        pattern: "*.{bam}"
        ontologies: []
output:
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.stats":
          type: file
          description: Stats file
          pattern: "*.{stats}"
          ontologies: []
  versions_sambamba:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sambamba:
          type: string
          description: The name of the tool
      - sambamba --version 2>&1 | grep -oPm1 'sambamba \\K[0-9.]+':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sambamba:
          type: string
          description: The name of the tool
      - sambamba --version 2>&1 | grep -oPm1 'sambamba \\K[0-9.]+':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@kubranarci"
maintainers:
  - "@kubranarci"
