name: "rpbp_getperiodiclengthsoffsets"
description: |
  Filter the per-read-length P-site offset table down to the
  (length, offset) pairs that will actually drive ORF-level scoring.
  Drops read lengths whose metagene profile is too sparsely populated,
  or whose periodicity Bayes factor is too low / too uncertain, so that
  downstream P-site counting only uses read lengths with a clean
  3-nucleotide signal.

  Wraps Rp-Bp's `get_periodic_lengths_and_offsets` Python helper directly.
  Thresholds are configured via named flags in `ext.args`:
  `--min-count` (default: 1000), `--min-bf-mean` (default: 5),
  `--max-bf-var` (default: no limit), `--min-bf-likelihood` (default: 0.5).
  Defaults mirror `rpbp.defaults.metagene_options`.
keywords:
  - rpbp
  - psite
  - offset
  - filter
  - riboseq
tools:
  - "rpbp":
      description: "Rp-Bp - Bayesian inference of ribosome profiling data for identifying translated open reading frames"
      homepage: "https://github.com/dieterich-lab/rp-bp"
      documentation: "https://rp-bp.readthedocs.io"
      tool_dev_url: "https://github.com/dieterich-lab/rp-bp"
      doi: "10.1093/nar/gkw1350"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information, e.g. `[ id:'sample1' ]`.
    - periodic_offsets:
        type: file
        description: Selected periodic offsets CSV from `rpbp/selectperiodicoffsets`.
        pattern: "*.periodic-offsets.csv.gz"
        ontologies: []
output:
  lengths_offsets:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}.tsv":
          type: file
          description: Per-read-length offsets (length, offset) that pass the periodicity filter.
          pattern: "*.tsv"
          ontologies: []
  versions_rpbp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rpbp:
          type: string
          description: The name of the tool
      - python -c "import rpbp; print(rpbp.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rpbp:
          type: string
          description: The name of the tool
      - python -c "import rpbp; print(rpbp.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
