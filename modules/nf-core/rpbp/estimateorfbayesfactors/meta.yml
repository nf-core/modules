name: "rpbp_estimateorfbayesfactors"
description: |
  Run Rp-Bp's `estimate-orf-bayes-factors`, which fits a Bayesian translated
  vs. untranslated model to per-ORF P-site profiles and emits a BED-like
  table of ORFs with translation Bayes factor scores.
keywords:
  - rpbp
  - orf
  - bayes
  - translation
  - riboseq
tools:
  - "rpbp":
      description: "Rp-Bp - Bayesian inference of ribosome profiling data for identifying translated open reading frames"
      homepage: "https://github.com/dieterich-lab/rp-bp"
      documentation: "https://rp-bp.readthedocs.io"
      tool_dev_url: "https://github.com/dieterich-lab/rp-bp"
      doi: "10.1093/nar/gkw1141"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information, e.g. `[ id:'sample1' ]`.
    - profiles:
        type: file
        description: Per-ORF P-site profile matrix from `rpbp/extractorfprofiles`.
        pattern: "*.profiles.mtx.gz"
        ontologies: []
  - - meta4:
        type: map
        description: |
          Groovy Map identifying the reference (e.g. `[ id:'reference' ]`).
    - orfs_genomic_bed:
        type: file
        description: Per-ORF genomic BED from `rpbp/preparegenome`.
        pattern: "*.orfs-genomic.annotated.bed.gz"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map identifying the model set (e.g. `[ id:'translated' ]`).
          Pass `[]` to fall back to the Stan models bundled with rpbp.
    - translated_models:
        type: file
        description: |
          Optional list of `.stan` files for the translated/foreground model.
          If not supplied, the module uses the `.stan` files bundled inside
          the rpbp Python package (resolved at runtime).
        pattern: "*.stan"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map identifying the model set (e.g. `[ id:'untranslated' ]`).
          Pass `[]` to fall back to the Stan models bundled with rpbp.
    - untranslated_models:
        type: file
        description: |
          Optional list of `.stan` files for the untranslated/background model.
          If not supplied, the module uses the `.stan` files bundled inside
          the rpbp Python package (resolved at runtime).
        pattern: "*.stan"
        ontologies: []
output:
  bayes_factors:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}.bayes-factors.bed.gz":
          type: file
          description: Per-ORF translation Bayes factors (BED).
          pattern: "*.bayes-factors.bed.gz"
          ontologies: []
  versions_rpbp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rpbp:
          type: string
          description: The name of the tool
      - python -c "import rpbp; print(rpbp.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rpbp:
          type: string
          description: The name of the tool
      - python -c "import rpbp; print(rpbp.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
