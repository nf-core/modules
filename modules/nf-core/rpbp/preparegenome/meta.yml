name: "rpbp_preparegenome"
description: |
  Build the Rp-Bp BED reference files required by `predict-translated-orfs`.

  Invokes Rp-Bp's `get_orfs` Python function directly to chain
  `gtf-to-bed12`, `extract-bed-sequences`, `extract-orf-coordinates`,
  `split-bed12-blocks` and `label-orfs`. Bypasses the `prepare-rpbp-genome`
  umbrella script so we skip its built-in `bowtie2-build` (rRNA index) and
  `STAR --runMode genomeGenerate` (alignment index) steps. None of the
  downstream Rp-Bp tools we wrap consume those indices - upstream alignment
  is supplied as the BAM.

  A minimal `chrName.txt` (one contig per line) is seeded from the FASTA
  headers because `gtf-to-bed12` reads it via `--chr-name-file` to control
  sort order.
keywords:
  - rpbp
  - orf
  - prepare
  - genome
  - bed
  - riboseq
tools:
  - "rpbp":
      description: "Rp-Bp - Bayesian inference of ribosome profiling data for identifying translated open reading frames"
      homepage: "https://github.com/dieterich-lab/rp-bp"
      documentation: "https://rp-bp.readthedocs.io"
      tool_dev_url: "https://github.com/dieterich-lab/rp-bp"
      doi: "10.1093/nar/gkw1141"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing identifiers, e.g. `[ id: 'reference' ]`.
    - fasta:
        type: file
        description: Genome FASTA.
        pattern: "*.{fa,fasta,fna}"
        ontologies: []
    - gtf:
        type: file
        description: Annotation GTF (canonical or hybrid, depending on extended-ORF mode).
        pattern: "*.gtf"
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}":
          type: directory
          description: Rp-Bp prepared BED reference directory.
  transcript_bed:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}/${name}.annotated.bed.gz":
          type: file
          description: Annotated transcripts BED used by `extract-metagene-profiles`.
          pattern: "*.annotated.bed.gz"
          ontologies: []
  orfs_genomic_bed:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}/transcript-index/${name}.orfs-genomic.annotated.bed.gz":
          type: file
          description: Per-ORF genomic BED used by `extract-orf-profiles` / `estimate-orf-bayes-factors`.
          pattern: "*.orfs-genomic.annotated.bed.gz"
          ontologies: []
  orfs_exons_bed:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}/transcript-index/${name}.orfs-exons.annotated.bed.gz":
          type: file
          description: Per-ORF exons BED used by `extract-orf-profiles`.
          pattern: "*.orfs-exons.annotated.bed.gz"
          ontologies: []
  versions_rpbp:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rpbp:
          type: string
          description: The name of the tool
      - python -c "import rpbp; print(rpbp.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rpbp:
          type: string
          description: The name of the tool
      - python -c "import rpbp; print(rpbp.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
