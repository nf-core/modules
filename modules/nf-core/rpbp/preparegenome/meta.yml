name: "rpbp_preparegenome"
description: |
  Build the per-ORF reference files that Rp-Bp's downstream scoring needs,
  starting from a genome FASTA and an annotation GTF. Enumerates every
  candidate open reading frame (ORF) in the annotation (annotated CDSs plus
  alternative start codons within transcript exons), records their genomic
  and per-exon coordinates, and labels them with the transcript and gene
  they belong to.

  Invokes Rp-Bp's `get_orfs` Python function directly, chaining the upstream
  helpers `gtf-to-bed12`, `extract-bed-sequences`, `extract-orf-coordinates`,
  `split-bed12-blocks` and `label-orfs`. Bypasses Rp-Bp's `prepare-rpbp-genome`
  umbrella script, which would also build `bowtie2` (rRNA filtering) and
  `STAR` (alignment) indices - neither is consumed by the Rp-Bp tools
  wrapped here, since alignment is supplied externally as a BAM.

  A minimal `chrName.txt` (one contig name per line) is seeded from the
  FASTA headers because `gtf-to-bed12` reads it via `--chr-name-file` to
  control output sort order.

  Note: emits the `*.annotated.bed.gz` filenames produced by `get_orfs`
  directly, rather than the `*.bed.gz`-renamed forms that the upstream
  umbrella `prepare-rpbp-genome` script produces. The downstream module
  outputs and consumers in this module set reference these names
  explicitly, so the two are functionally equivalent.
keywords:
  - rpbp
  - orf
  - prepare
  - genome
  - bed
  - riboseq
tools:
  - "rpbp":
      description: "Rp-Bp - Bayesian inference of ribosome profiling data for identifying translated open reading frames"
      homepage: "https://github.com/dieterich-lab/rp-bp"
      documentation: "https://rp-bp.readthedocs.io"
      tool_dev_url: "https://github.com/dieterich-lab/rp-bp"
      doi: "10.1093/nar/gkw1350"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing identifiers, e.g. `[ id: 'reference' ]`.
    - fasta:
        type: file
        description: Genome FASTA.
        pattern: "*.{fa,fasta,fna}"
        ontologies: []
    - gtf:
        type: file
        description: Annotation GTF (canonical or hybrid, depending on extended-ORF mode).
        pattern: "*.gtf"
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}":
          type: directory
          description: Rp-Bp prepared BED reference directory.
  transcript_bed:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}/${name}.annotated.bed.gz":
          type: file
          description: Annotated transcripts BED used by `extract-metagene-profiles`.
          pattern: "*.annotated.bed.gz"
          ontologies: []
  orfs_genomic_bed:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}/transcript-index/${name}.orfs-genomic.annotated.bed.gz":
          type: file
          description: Per-ORF genomic BED used by `extract-orf-profiles` / `estimate-orf-bayes-factors`.
          pattern: "*.orfs-genomic.annotated.bed.gz"
          ontologies: []
  orfs_exons_bed:
    - - meta:
          type: map
          description: Groovy Map inherited from input meta.
      - "${prefix}/transcript-index/${name}.orfs-exons.annotated.bed.gz":
          type: file
          description: Per-ORF exons BED used by `extract-orf-profiles`.
          pattern: "*.orfs-exons.annotated.bed.gz"
          ontologies: []
  versions_rpbp:
    - versions.yml:
        type: file
        description: File containing software versions.
        pattern: "versions.yml"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML
topics:
  versions:
    - versions.yml:
        type: file
        description: File containing software versions.
        pattern: "versions.yml"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
