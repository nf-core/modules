name: "ultra_align"
description: uLTRA aligner - A wrapper around minimap2 to improve small exon
  detection - Map reads on genome
keywords:
  - uLTRA
  - align
  - minimap2
  - long_read
  - isoseq
  - ont
tools:
  - "ultra":
      description: "Splice aligner of long transcriptomic reads to genome."
      homepage: "https://github.com/ksahlin/uLTRA"
      documentation: "https://github.com/ksahlin/uLTRA"
      tool_dev_url: "https://github.com/ksahlin/uLTRA"
      doi: "10.1093/bioinformatics/btab540"
      licence:
        - "GNU GPLV3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: A fasta or fastq file of reads to align
        pattern: "*.{fa,fasta,fastq}"
        ontologies:
          - edam: http://edamontology.org/format_1930
  - - meta2:
        type: map
        description: |
          Groovy Map containing genome information
          e.g. [ id:'test' ]
    - genome:
        type: file
        description: A fasta file of reference genome
        pattern: "*.{fa,fasta}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing genome information
          e.g. [ id:'test' ]
    - pickle:
        type: file
        description: Pickle files generated by uLTRA index
        pattern: "*.pickle"
        ontologies:
          - edam: http://edamontology.org/format_4002
    - db:
        type: file
        description: Database generated by uLTRA index
        pattern: "*.db"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: The aligned reads in bam format
          pattern: "*.bam"
          ontologies: []
  versions_ultra:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ultra:
          type: string
          description: The name of the tool
      - uLTRA --version | sed 's/uLTRA //':
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version | sed -n '1s/samtools //p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ultra:
          type: string
          description: The name of the tool
      - uLTRA --version | sed 's/uLTRA //':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version | sed -n '1s/samtools //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sguizard"
maintainers:
  - "@sguizard"
