name: "bbmap_bbmerge"
description: Merging overlapping paired reads into a single read.
keywords:
  - paired reads merging
  - fastq
  - overlap-based merging
tools:
  - bbmap:
      description: BBMap is a short read aligner, as well as various other
        bioinformatic tools.
      homepage: https://jgi.doe.gov/data-and-tools/software-tools/bbtools/bb-tools-user-guide/
      documentation: https://jgi.doe.gov/data-and-tools/software-tools/bbtools/bb-tools-user-guide/
      licence:
        - "UC-LBL license (see package)"
      identifier: biotools:bbmap
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: |
          List of input paired end fastq files
        pattern: "*.{fastq,fq}.gz"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
  - interleave:
      type: boolean
      description: |
        Indicates whether the input paired reads are interleaved or not
output:
  merged:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*_merged.fastq.gz":
          type: file
          description: merged reads
          pattern: "*_merged.fastq"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
  unmerged:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*_unmerged.fastq.gz":
          type: file
          description: unmerged reads
          pattern: "*_unmerged.fastq"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
  ihist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*_ihist.txt":
          type: file
          description: insert size histogram
          pattern: "*_ihist.txt"
          ontologies: []
  log:
    - "*.log":
        type: file
        description: log file containing stdout and stderr from bbmerge.sh
        pattern: "*.log"
        ontologies: []
  versions_bbmap:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bbmap:
          type: string
          description: The name of the tool
      - bbversion.sh | grep -v "Duplicate cpuset":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bbmap:
          type: string
          description: The name of the tool
      - bbversion.sh | grep -v "Duplicate cpuset":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@guille0387"
maintainers:
  - "@guille0387"
