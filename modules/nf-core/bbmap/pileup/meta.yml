name: "bbmap_pileup"
description: Calculates per-scaffold or per-base coverage information from an
  unsorted sam or bam file.
keywords:
  - fasta
  - genome
  - coverage
tools:
  - bbmap:
      description: BBMap is a short read aligner, as well as various other
        bioinformatic tools.
      homepage: https://jgi.doe.gov/data-and-tools/software-tools/bbtools/bb-tools-user-guide/
      documentation: https://jgi.doe.gov/data-and-tools/software-tools/bbtools/bb-tools-user-guide/
      tool_dev_url: "https://github.com/BioInfoTools/BBMap/blob/master/sh/pileup.sh"
      licence:
        - "UC-LBL license (see package)"
      identifier: biotools:bbmap
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
output:
  covstats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.stats.txt":
          type: file
          description: Coverage statistics
          pattern: "*.stats.txt"
          ontologies: []
  hist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.hist.txt":
          type: file
          description: "Histogram of # occurrences of each depth level"
          pattern: "*.hist.txt"
          ontologies: []
  versions_bbmap:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bbmap:
          type: string
          description: The name of the tool
      - bbversion.sh | grep -v 'Duplicate cpuset':
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools version | sed '1!d;s/.* //':
          type: eval
          description: The expression to obtain the version of the tool
  versions_pigz:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pigz:
          type: string
          description: The name of the tool
      - pigz --version 2>&1 | sed "s/^.*pigz[[:space:]]*//":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bbmap:
          type: string
          description: The name of the tool
      - bbversion.sh | grep -v 'Duplicate cpuset':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools version | sed '1!d;s/.* //':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - pigz:
          type: string
          description: The name of the tool
      - pigz --version 2>&1 | sed "s/^.*pigz[[:space:]]*//":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@edmundmiller"
maintainers:
  - "@edmundmiller"
