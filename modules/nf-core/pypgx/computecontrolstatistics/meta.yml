name: "pypgx_computecontrolstatistics"
description: Compute summary statistics for control gene from BAM files.
keywords:
  - pypgx
  - pharmacogenetics
  - controlstatistics
tools:
  - "pypgx":
      description: "A Python package for pharmacogenomics research"
      homepage: "https://pypgx.readthedocs.io/en/latest/"
      documentation: "https://pypgx.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/sbslee/pypgx"
      doi: "10.1371/journal.pone.0272129"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - bam:
        type: file
        description: Sorted BAM file
        pattern: "*.{bam}"
        ontologies: []
    - bai:
        type: file
        description: BAM index file
        pattern: "*.{bai}"
        ontologies: []
  - control_gene:
      type: string
      description: Gene to use as control gene
      pattern: "{VDR,EGFR,RYR1}"
output:
  control_stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
          pattern: "*.{zip}"
      - "*.zip":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
          pattern: "*.{zip}"
  versions_pypgx:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pypgx:
          type: string
          description: The name of the tool
      - pypgx -v 2>&1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pypgx:
          type: string
          description: The name of the tool
      - pypgx -v 2>&1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jorisvansteenbrugge"
maintainers:
  - "@jorisvansteenbrugge"
