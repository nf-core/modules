name: "pypgx_preparedepthofcoverage"
description: Prepare a depth of coverage file for all target genes with SV from
  BAM files.
keywords:
  - Pharmacogenetics
  - pypgx
  - SV
tools:
  - "pypgx":
      description: "A Python package for pharmacogenomics research"
      homepage: "https://pypgx.readthedocs.io/en/latest/"
      documentation: "https://pypgx.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/sbslee/pypgx"
      doi: "10.1371/journal.pone.0272129"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - bam:
        type: file
        description: Input BAM file
        pattern: "*.{bam}"
        ontologies: []
    - bai:
        type: file
        description: Input BAM index file
        pattern: "*.{bam.bai}"
        ontologies: []
output:
  coverage:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
          pattern: "*.{zip}"
      - "*.zip":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
          pattern: "*.{zip}"
  versions_pypgx:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pypgx:
          type: string
          description: The name of the tool
      - pypgx -v 2>&1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pypgx:
          type: string
          description: The name of the tool
      - pypgx -v 2>&1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jorisvansteenbrugge"
maintainers:
  - "@jorisvansteenbrugge"
