# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "htslib_bgziptabix"
description: "Multi-purpose module to compress, decompress and index files using bgzip and tabix."
keywords:
  - compress
  - decompress
  - index
  - bgzip
  - tabix
  - gzip
  - bzip
  - xz
tools:
  - "htslib":
      description: "C library for high-throughput sequencing data formats."
      homepage: "http://www.htslib.org/"
      documentation: "http://www.htslib.org/doc/"
      tool_dev_url: "https://github.com/samtools/htslib"
      doi: "10.1093/gigascience/giab007"
      licence: ["MIT"]
      identifier: biotools:htslib

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'sample1' ]
    - in_file:
        type: file
        description: Input file to compress or decompress
        pattern: "*"
        ontologies: []
  - action:
      type: string
      description: Action to perform, either `compress` or `decompress`
  - make_index:
      type: boolean
      description: Whether to create a tabix index for the output file; only used if `action` is `compress`
  - out_ext:
      type: string
      description: Output file extension without `.gz` suffix (for example `vcf`)
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'sample1' ]
      - "*":
          type: file
          description: Compressed or decompressed output file
          pattern: "*"
          ontologies: []
  versions_htslib:
    - - ${task.process}:
          type: string
          description: The name of the process
      - htslib:
          type: string
          description: The name of the tool
      - "bgzip --version | sed '1! d; s/bgzip (htslib) //'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - htslib:
          type: string
          description: The name of the tool
      - "bgzip --version | sed '1! d; s/bgzip (htslib) //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@itrujnara"
maintainers:
  - "@itrujnara"
