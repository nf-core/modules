name: gapseq_find
description: Predict metabolic pathways from genomic data using gapseq
keywords:
  - metabolic pathways
  - genomics
  - bacteria
  - pathway prediction
tools:
  - gapseq:
      description: |
        gapseq is designed to combine metabolic pathway analysis with metabolic network reconstruction and curation.
        The find command predicts metabolic pathways from genomic information and databases for pathways and reactions.
      homepage: https://github.com/jotech/gapseq
      documentation: https://gapseq.readthedocs.io/
      tool_dev_url: https://github.com/jotech/gapseq
      doi: "10.1186/s13059-021-02295-1"
      licence:
        - "AGPL-3.0-only"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Protein or genomic FASTA file
        pattern: "*.{fasta,fa,faa,fna,gz}"
        ontologies:
          - edam: http://edamontology.org/format_3989
output:
  reactions:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*-all-Reactions.tbl":
          type: file
          description: TBL file containing predicted reactions
          pattern: "*-all-Reactions.tbl"
          ontologies: []
  pathways:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*-all-Pathways.tbl":
          type: file
          description: TBL file containing predicted pathways
          pattern: "*-all-Pathways.tbl"
          ontologies: []
  fna:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fna":
          type: file
          description: Optional extracted sequences in FASTA format
          pattern: "*.fna"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.log":
          type: file
          description: Log files from gapseq find
          pattern: "*.log"
          ontologies: []
  versions_gapseq:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gapseq:
          type: string
          description: The name of the tool
      - gapseq -v 2>&1 | grep -oP "\d+\.\d+\.\d+":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gapseq:
          type: string
          description: The name of the tool
      - gapseq -v 2>&1 | grep -oP "\d+\.\d+\.\d+":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@brovolia"
maintainers:
  - "@brovolia"
