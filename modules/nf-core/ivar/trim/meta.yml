name: ivar_trim
description: Trim primer sequences rom a BAM file with iVar
keywords:
  - amplicon sequencing
  - trimming
  - fasta
tools:
  - ivar:
      description: |
        iVar - a computational package that contains functions broadly useful for viral amplicon-based sequencing.
      homepage: https://github.com/andersen-lab/ivar
      documentation: https://andersen-lab.github.io/ivar/html/manualpage.html
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:andersen-lab_ivar
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: Co-ordinate sorted BAM file
        pattern: "*.bam"
        ontologies: []
    - bai:
        type: file
        description: Index file for co-ordinate sorted BAM file
        pattern: "*.bai"
        ontologies: []
  - bed:
      type: file
      description: BED file with primer labels and positions
      pattern: "*.bed"
      ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: iVar generated trimmed bam file (unsorted)
          pattern: "*.bam"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.log":
          type: file
          description: Log file generated by iVar for use with MultiQC
          pattern: "*.log"
          ontologies: []
  versions_ivar:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ivar:
          type: string
          description: The name of the tool
      - ivar version | sed -n 's|iVar version \(.*\)|\1|p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ivar:
          type: string
          description: The name of the tool
      - ivar version | sed -n 's|iVar version \(.*\)|\1|p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@andersgs"
  - "@drpatelh"
maintainers:
  - "@andersgs"
  - "@drpatelh"
