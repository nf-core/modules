name: "freyja_boot"
description: Bootstrap sample demixing by resampling each site based on a
  multinomial distribution of read depth across all sites, where the event
  probabilities were determined by the fraction of the total sample reads found
  at each site, followed by a secondary resampling at each site according to a
  multinomial distribution (that is, binomial when there was only one SNV at a
  site), where event probabilities were determined by the frequencies of each
  base at the site, and the number of trials is given by the sequencing depth.
keywords:
  - variants
  - fasta
  - deconvolution
  - wastewater
  - bootstrapping
tools:
  - "freyja":
      description: "Freyja recovers relative lineage abundances from mixed SARS-CoV-2
        samples and provides functionality to analyze lineage dynamics."
      homepage: "https://github.com/andersen-lab/Freyja"
      documentation: "https://github.com/andersen-lab/Freyja/wiki"
      tool_dev_url: "https://github.com/andersen-lab/Freyja"
      doi: "10.1038/s41586-022-05049-6"
      licence:
        - "BSD-2-Clause"
      identifier: "biotools:freyja"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - variants:
        type: file
        description: File containing identified variants in a gff-like format
        pattern: "*.variants.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475 # TSV
    - depths:
        type: file
        description: File containing depth of the variants
        pattern: "*.depth.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475 # TSV
  - repeats:
      type: integer
      description: Number of bootstrap repeats to perform
  - barcodes:
      type: file
      description: File containing lineage defining barcodes
      pattern: "*barcodes.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752 # CSV
  - lineages_meta:
      type: file
      description: Optional file containing lineage metadata that correspond to
        barcodes
      pattern: "*lineages.json"
      ontologies:
        - edam: http://edamontology.org/format_3464 # JSON
  - lineages_topology:
      type: file
      description: Optional file containing lineage topology information that
        correspond to barcodes
      pattern: "*lineages.yml"
      ontologies:
        - edam: http://edamontology.org/format_3750 # YAML
output:
  lineages:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*lineages.csv":
          type: file
          description: a csv file that includes the lineages present and their
            corresponding abundances
          pattern: "*lineages.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  summarized:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*summarized.csv":
          type: file
          description: a csv file that includes the lineages present but
            summarized by constellation and their corresponding abundances
          pattern: "*summarized.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  versions_freyja:
    - - ${task.process}:
          type: string
          description: The name of the process
      - freyja:
          type: string
          description: The name of the tool
      - freyja --version | sed 's/.* //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - freyja:
          type: string
          description: The name of the tool
      - freyja --version | sed 's/.* //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@Joon-Klaps"
maintainers:
  - "@Joon-Klaps"
