name: mafft_guidetree
description: Guide tree rendering using MAFFT
keywords:
  - fasta
  - msa
  - guide tree
tools:
  - "mafft":
      description: Multiple alignment program for amino acid or nucleotide
        sequences based on fast Fourier transform
      homepage: https://mafft.cbrc.jp/alignment/software/
      documentation: https://mafft.cbrc.jp/alignment/software/manual/manual.html
      tool_dev_url: https://mafft.cbrc.jp/alignment/software/source.html
      doi: "10.1093/nar/gkf436"
      licence:
        - "BSD"
      identifier: biotools:MAFFT
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - fasta:
        type: file
        description: FASTA file containing the sequences to be used to render the
          guidetree.
        pattern: "*.{fa,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1919 # SEQUENCE-LIKE
          - edam: http://edamontology.org/format_1929 # FASTA
output:
  tree:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test']
      - "*.dnd":
          type: file
          description: Guide tree in Newick format.
          pattern: "*.dnd"
          ontologies:
            - edam: http://edamontology.org/format_2006 # PHYLOGENETIC TREE
  versions_mafft:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mafft:
          type: string
          description: The name of the tool
      - mafft --version 2>&1 | sed 's/v//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mafft:
          type: string
          description: The name of the tool
      - mafft --version 2>&1 | sed 's/v//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@luisas"
maintainers:
  - "@luisas"
