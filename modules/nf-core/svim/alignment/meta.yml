name: "svim_alignment"
description: Structural variant detection from long-read sequencing alignments using
  SVIM.
keywords:
  - structural variants
  - long reads
  - nanopore
  - pacbio
  - genomics
  - variant calling
tools:
  - "svim":
      description: "SVIM is a structural variant caller for long-read sequencing data
        that detects deletions, insertions, duplications, inversions and translocations
        from read alignments."
      homepage: "https://github.com/eldariont/svim"
      documentation: "https://github.com/eldariont/svim/wiki"
      tool_dev_url: "https://github.com/eldariont/svim"
      doi: "10.1093/bioinformatics/btz041"
      licence:
        - "GPL-3.0"
      identifier: "biotools:svim"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - bam:
        type: file
        description: Coordinate-sorted BAM/CRAM/SAM alignment file generated from long-read
          mapping
        pattern: "*.{bam,cram,sam}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
          - edam: "http://edamontology.org/format_2573"
          - edam: "http://edamontology.org/format_3462"
    - bai:
        type: file
        description: BAM index file
        pattern: "*.bai"
        ontologies:
          - edam: "http://edamontology.org/format_3327"
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Reference genome in FASTA format
        pattern: "*.{fa,fasta,fna}"
        ontologies:
          - edam: "http://edamontology.org/format_1929"
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.vcf":
          type: file
          description: Structural variant calls in VCF format generated by SVIM
          pattern: "*.vcf"
          ontologies:
            - edam: "http://edamontology.org/format_3016"
  versions_svim:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - svim:
          type: string
          description: The tool name
      - svim --version | sed "s/^.*svim //; s/ .*//":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - svim:
          type: string
          description: The tool name
      - svim --version | sed "s/^.*svim //; s/ .*//":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nourmahfel"
maintainers:
  - "@nourmahfel"
