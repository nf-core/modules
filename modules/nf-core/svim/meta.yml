# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json

name: "svim"
description: Structural variant detection from long-read sequencing alignments using SVIM.
keywords:
  - structural variants
  - long reads
  - nanopore
  - pacbio
  - genomics
  - variant calling

tools:
  - "svim":
      description: "SVIM is a structural variant caller for long-read sequencing data that detects deletions, insertions, duplications, inversions and translocations from read alignments."
      homepage: "https://github.com/eldariont/svim"
      documentation: "https://github.com/eldariont/svim/wiki"
      tool_dev_url: "https://github.com/eldariont/svim"
      doi: "10.1093/bioinformatics/btz041"
      licence: ["GPL-3.0"]
      identifier: "biotools:svim"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - bam:
        type: file
        description: Coordinate-sorted BAM/CRAM/SAM alignment file generated from long-read mapping
        pattern: "*.{bam,cram,sam}"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM
          - edam: "http://edamontology.org/format_2573" # CRAM
          - edam: "http://edamontology.org/format_3462" # SAM
    - bai:
        type: file
        description: BAM index file
        pattern: "*.bai"
        ontologies:
          - edam: "http://edamontology.org/format_3327" # BAI
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Reference genome in FASTA format
        pattern: "*.{fa,fasta,fna}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA

output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.vcf":
          type: file
          description: Structural variant calls in VCF format generated by SVIM
          pattern: "*.vcf"
          ontologies:
            - edam: "http://edamontology.org/format_3016" # VCF
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML

authors:
  - "@nourmahfel"

maintainers:
  - "@nourmahfel"
