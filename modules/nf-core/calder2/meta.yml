name: "calder2"
description: Hierarchical Hi-C compartment computation
keywords:
  - calder2
  - genome
  - topology
  - compartments
  - domains
  - hi-c
tools:
  - "calder2":
      description: "Hierarchical Hi-C compartment computation"
      homepage: "https://github.com/CSOgroup/CALDER2"
      documentation: "https://github.com/CSOgroup/CALDER2"
      tool_dev_url: "https://github.com/CSOgroup/CALDER2"
      doi: "10.1038/s41467-021-22666-3"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: Groovy Map containing sample information. E.g. [ id:'test',
          single_end:false ]
    - cool:
        type: file
        description: Path to COOL file
        pattern: "*.{cool.mcool}"
        ontologies: []
  - resolution:
      type: integer
      description: In case a .mcool file is provided, which resolution level to
        use for the analysis
output:
  output_folder:
    - - meta:
          type: map
          description: Groovy Map containing sample information. E.g. [ id:'test',
            single_end:false ]
      - ${prefix}/:
          type: directory
          description: Output folder containing sub-compartment (.tsv/.bed) and
            domain boundaries calls (.bed)
  intermediate_data_folder:
    - - meta:
          type: map
          description: Groovy Map containing sample information. E.g. [ id:'test',
            single_end:false ]
      - ${prefix}/intermediate_data/:
          type: directory
          description: Output folder containing intermediate data produced during
            the computation
  versions_calder:
    - - ${task.process}:
          type: string
          description: The name of the process
      - calder:
          type: string
          description: The name of the tool
      - "0.7":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - calder:
          type: string
          description: The name of the tool
      - "0.7":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@lucananni93"
maintainers:
  - "@lucananni93"
