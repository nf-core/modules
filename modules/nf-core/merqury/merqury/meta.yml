name: "merqury_merqury"
description: k-mer based assembly evaluation.
keywords:
  - "k-mer"
  - "assembly"
  - "evaluation"
tools:
  - "merqury":
      description: "Evaluate genome assemblies with k-mers and more."
      tool_dev_url: "https://github.com/marbl/merqury"
      doi: "10.1186/s13059-020-02134-9"
      licence:
        - "PUBLIC DOMAIN"
      identifier: biotools:merqury
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - meryl_db:
        type: file
        description: "Meryl read database"
        ontologies: []
    - assembly:
        type: file
        description: FASTA assembly file
        ontologies: []
output:
  assembly_only_kmers_bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_only.bed":
          type: file
          description: "The positions of the k-mers found only in an assembly for further
            investigation in .bed"
          pattern: "*_only.bed"
          ontologies: []
  assembly_only_kmers_wig:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_only.wig":
          type: file
          description: "The positions of the k-mers found only in an assembly for further
            investigation in .wig"
          pattern: "*_only.wig"
          ontologies: []
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.completeness.stats":
          type: file
          description: Assembly statistics file
          pattern: "*.completeness.stats"
          ontologies: []
  dist_hist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.dist_only.hist":
          type: file
          description: Histogram
          pattern: "*.dist_only.hist"
          ontologies: []
  spectra_cn_fl_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-cn.fl.png":
          type: file
          description: "Unstacked copy number spectra filled plot in PNG format"
          pattern: "*.spectra-cn.fl.png"
          ontologies: []
  spectra_cn_hist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-cn.hist":
          type: file
          description: "Copy number spectra histogram"
          pattern: "*.spectra-cn.hist"
          ontologies: []
  spectra_cn_ln_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-cn.ln.png":
          type: file
          description: "Unstacked copy number spectra line plot in PNG format"
          pattern: "*.spectra-cn.ln.png"
          ontologies: []
  spectra_cn_st_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-cn.st.png":
          type: file
          description: "Stacked copy number spectra line plot in PNG format"
          pattern: "*.spectra-cn.st.png"
          ontologies: []
  spectra_asm_fl_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-asm.fl.png":
          type: file
          description: "Unstacked assembly spectra filled plot in PNG format"
          pattern: "*.spectra-asm.fl.png"
          ontologies: []
  spectra_asm_hist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-asm.hist":
          type: file
          description: "Assembly spectra histogram"
          pattern: "*.spectra-asm.hist"
          ontologies: []
  spectra_asm_ln_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-asm.ln.png":
          type: file
          description: "Unstacked assembly spectra line plot in PNG format"
          pattern: "*.spectra-asm.ln.png"
          ontologies: []
  spectra_asm_st_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.spectra-asm.st.png":
          type: file
          description: "Stacked assembly spectra line plot in PNG format"
          pattern: "*.spectra-asm.st.png"
          ontologies: []
  assembly_qv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.qv:
          type: file
          description: "Assembly consensus quality estimation"
          pattern: "*.qv"
          ontologies: []
  scaffold_qv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.*.qv:
          type: file
          description: "Scaffold consensus quality estimation"
          pattern: "*.qv"
          ontologies: []
  read_ploidy:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.hist.ploidy":
          type: file
          description: "Ploidy estimate from read k-mer database"
          pattern: "*.hist.ploidy"
          ontologies: []
  hapmers_blob_png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.hapmers.blob.png":
          type: file
          description: "Hap-mer blob plot"
          pattern: "*.hapmers.blob.png"
          ontologies: []
  versions_merqury:
    - - ${task.process}:
          type: string
          description: The name of the process
      - merqury:
          type: string
          description: The name of the tool
      - '"1.3"':
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - merqury:
          type: string
          description: The name of the tool
      - '"1.3"':
          type: string
          description: The expression to obtain the version of the tool
authors:
