name: sequali
description: Sequence quality metrics for FASTQ and uBAM files.
keywords:
  - quality_control
  - qc
  - preprocessing
tools:
  - sequali:
      description: Fast sequencing quality metrics
      homepage: "https://github.com/rhpvorderman/sequali"
      documentation: "https://sequali.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/rhpvorderman/sequali"
      doi: "10.5281/zenodo.10854010"
      licence:
        - "AGPL v3-or-later"
      identifier: biotools:sequali
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: Input FASTQ(s) or uBAM file. The format is autodetected and
          compressed formats are supported.
        pattern: "*.{fastq,fq,fastq.gz,fq.gz,bam}"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
output:
  html:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.html":
          type: file
          description: HTML output file.
          pattern: "*.{html}"
          ontologies: []
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.json":
          type: file
          description: JSON output file.
          pattern: "*.{json}"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  versions_sequali:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sequali:
          type: string
          description: The name of the tool
      - sequali --version |& sed '1!d ; s/sequali //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sequali:
          type: string
          description: The name of the tool
      - sequali --version |& sed '1!d ; s/sequali //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@irliampa"
  - "@DarkoCucin"
maintainers:
  - "@irliampa"
  - "@DarkoCucin"
