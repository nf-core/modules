name: "igvreports"
description: A Python application to generate self-contained HTML reports for
  variant review and other genomic applications
keywords:
  - vcf
  - variant
  - genomics
tools:
  - "igvreports":
      description: "Creates self-contained html pages for visual variant review with
        IGV (igv.js)."
      homepage: "https://github.com/igvteam/igv-reports"
      documentation: "https://github.com/igvteam/igv-reports"
      tool_dev_url: "https://github.com/igvteam/igv-reports"
      doi: "10.1093/bioinformatics/btac830"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - sites:
        type: file
        description: |
          VCF, BED, MAF, BEDPE, or generic tab delimited file of genomic variant sites
        ontologies: []
    - tracks:
        type: file
        description: |
          List of any set of files of the types that IGV can display,
          eg BAM/CRAM, GTF/GFF, VCF, BED, etc
        ontologies: []
    - tracks_indices:
        type: file
        description: |
          List of indices for the tracks
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing genome information
          e.g. [ id:'genome_name' ]
    - fasta:
        type: file
        description: Reference fasta file
        pattern: "*.{fasta,fa}"
        ontologies: []
    - fai:
        type: file
        description: Reference fasta file index
        pattern: "*.{fai}"
        ontologies: []
output:
  report:
    - - meta:
          type: file
          description: |
            html report  with a table of genomic sites and an embedded
            IGV genome browser for viewing data for each site
          pattern: "*.{html}"
          ontologies: []
      - "*.html":
          type: file
          description: |
            html report  with a table of genomic sites and an embedded
            IGV genome browser for viewing data for each site
          pattern: "*.{html}"
          ontologies: []
  versions_igvreports:
    - - ${task.process}:
          type: string
          description: The name of the process
      - igvreports:
          type: string
          description: The name of the tool
      - python -c 'import igv_reports; print(igv_reports.__version__)':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - igvreports:
          type: string
          description: The name of the tool
      - python -c 'import igv_reports; print(igv_reports.__version__)':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@souljamie"
maintainers:
  - "@souljamie"
