name: "sylph_query"
description: Sylph query command for querying genome databases against reads/metagenomes
keywords:
  - query
  - metagenomics
  - sylph
  - containment
  - genome
tools:
  - sylph:
      description: Sylph quickly enables querying of genomes against even low-coverage
        shotgun metagenomes to find nearest neighbour ANI.
      homepage: https://github.com/bluenote-1577/sylph
      documentation: https://sylph-docs.github.io/
      tool_dev_url: https://github.com/bluenote-1577/sylph
      doi: 10.1038/s41587-024-02412-y
      licence:
        - "MIT"
      identifier: biotools:sylph

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - reads:
        type: file
        description: |
          List of input FastQ/FASTA files of size 1 and 2 for single-end and paired-end data,
          respectively. They are automatically sketched to .sylsp/.syldb
        pattern: "*.{fasta,fastq,fna,fa,fq,fas,fasta.gz,fastq.gz,fna,fa.gz,fq,fas.gz}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
          - edam: http://edamontology.org/format_1930 # FASTQ
  - database:
      type: file
      description: Pre-sketched *.syldb/*.sylsp files. Raw single-end fastq/fasta are
        allowed and will be automatically sketched to .sylsp/.syldb.
      pattern: "*.{syldb,sylsp}"
output:
  query_out:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.tsv":
          type: file
          description: Output TSV file of containment ANI query results.
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_sylph:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - sylph:
          type: string
          description: The tool name
      - sylph -V | sed "s/sylph //g":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - sylph:
          type: string
          description: The tool name
      - sylph -V | sed "s/sylph //g":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@ZunairKhm"
  - "@nghiaagent"
maintainers:
  - "@nghiaagent"
