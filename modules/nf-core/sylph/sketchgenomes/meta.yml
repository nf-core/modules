name: "sylph_sketchgenomes"
description: Sylph profile command for taxonoming profiling of genomes
keywords:
  - profile
  - metagenomics
  - sylph
  - classification
  - genomes
  - sketch
tools:
  - sylph:
      description: Sylph quickly enables querying of genomes against even low-coverage
        shotgun metagenomes to find nearest neighbour ANI.
      homepage: https://github.com/bluenote-1577/sylph
      documentation: https://github.com/bluenote-1577/sylph
      tool_dev_url: https://github.com/bluenote-1577/sylph
      doi: 10.1038/s41587-024-02412-y
      licence:
        - "MIT"
      identifier: biotools:sylph
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - fasta:
        type: file
        description: List of reference genome FASTA files to convert to sylph database
          file
        pattern: "*.{fasta,fas,fa,fna}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
output:
  syldb:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.syldb":
          type: file
          description: Sylph database sketch file for profiling
          pattern: "*.syldb"
  versions_sylph:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sylph:
          type: string
          description: The name of the tool
      - sylph -V | sed "s/sylph //g":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sylph:
          type: string
          description: The name of the tool
      - sylph -V | sed "s/sylph //g":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
