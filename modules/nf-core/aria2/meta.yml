name: "aria2"
description: CLI Download utility
keywords:
  - download
  - utility
  - http(s)
tools:
  - "aria2":
      description: "aria2 is a lightweight multi-protocol & multi-source, cross platform
        download utility operated in command-line. It supports HTTP/HTTPS, FTP, SFTP,
        BitTorrent and Metalink."
      homepage: "https://aria2.github.io/"
      documentation: "https://aria2.github.io/manual/en/html/index.html"
      tool_dev_url: "https://github.com/aria2/aria2/"
      licence:
        - "GPL v2"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - source_url:
        type: string
        description: Source URL to be downloaded
        pattern: "{http,https}*"
        ontologies:
          - edam: "http://edamontology.org/data_1052" # URL
output:
  downloaded_file:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - $downloaded_file:
          type: file
          description: Downloaded file from source
          pattern: "*.*"
          ontologies: []
  versions_aria2:
    - - ${task.process}:
          type: string
          description: Process name
      - aria2:
          type: string
          description: Tool name
      - aria2c --version 2>&1 | sed -n 's/^aria2 version \([^ ]*\).*/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: Process name
      - aria2:
          type: string
          description: Tool name
      - aria2c --version 2>&1 | sed -n 's/^aria2 version \([^ ]*\).*/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@JoseEspinosa"
  - "@leoisl"
maintainers:
  - "@JoseEspinosa"
  - "@leoisl"
