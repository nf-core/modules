name: mlst
description: Run Torsten Seemann's classic MLST on a genome assembly
keywords:
  - mlst
  - typing
  - bacteria
  - assembly
tools:
  - mlst:
      description: Scan contig files against PubMLST typing schemes
      homepage: https://github.com/tseemann/mlst
      licence:
        - "GPL v2"
      identifier: biotools:mlst
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Assembly fasta file
        pattern: "*.{fasta,fa,fna}"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: MLST calls in tsv format
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_mlst:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mlst:
          type: string
          description: The name of the tool
      - echo $(mlst --version 2>&1) | sed "s/mlst //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mlst:
          type: string
          description: The name of the tool
      - echo $(mlst --version 2>&1) | sed "s/mlst //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@lskatz"
  - "@tseemann"
maintainers:
  - "@lskatz"
  - "@tseemann"
