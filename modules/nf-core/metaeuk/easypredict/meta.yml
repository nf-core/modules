name: "metaeuk_easypredict"
description: Annotation of eukaryotic metagenomes using MetaEuk
keywords:
  - genomics
  - annotation
  - fasta
tools:
  - "metaeuk":
      description: "MetaEuk - sensitive, high-throughput gene discovery and annotation
        for large-scale eukaryotic metagenomics"
      homepage: https://github.com/soedinglab/metaeuk
      documentation: https://github.com/soedinglab/metaeuk
      tool_dev_url: https://github.com/soedinglab/metaeuk
      doi: "10.1186/s40168-020-00808-x"
      licence:
        - "GPL v3"
      identifier: biotools:MetaEuk
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Nucleotide FASTA file for annotation
        pattern: "*.{fasta,fa,fasta.gz,fa.gz}"
        ontologies: []
  - database:
      type: file
      description: Either a fasta file containing protein sequences, or a
        directory containing an mmseqs2-formatted protein database
      ontologies: []
output:
  faa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.fas:
          type: file
          description: Protein FASTA file containing the exons from the input
            FASTA file
          pattern: "*.{fas}"
          ontologies: []
  codon:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.codon.fas:
          type: file
          description: Nucleotide FASTA file of protein-coding sequences
          pattern: "*.{codon.fas}"
          ontologies: []
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: TSV file containing locations of each protein coding
            sequence in the input fasta
          pattern: "*.headersMap.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  gff:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gff":
          type: file
          description: Annotation file in GFF format
          pattern: "*.{gff}"
          ontologies: []
  versions_metaeuk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - metaeuk:
          type: string
          description: The name of the tool
      - "metaeuk | sed -n 's/.*Version: //p'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - metaeuk:
          type: string
          description: The name of the tool
      - "metaeuk | sed -n 's/.*Version: //p'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@prototaxites"
maintainers:
  - "@prototaxites"
