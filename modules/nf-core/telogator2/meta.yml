name: "telogator2"
description: "Allele-specific telomere length estimation and TVR characterization from long reads"
keywords:
  - bam
  - cram
  - genomics
  - telomere
  - long-read
  - pacbio
  - nanopore
tools:
  - "telogator2":
      description: "A method for measuring allele-specific TL and characterizing telomere variant repeat (TVR) sequences from long reads"
      homepage: "https://github.com/zstephens/telogator2"
      documentation: "https://github.com/zstephens/telogator2"
      tool_dev_url: "https://github.com/zstephens/telogator2"
      doi: "10.1093/bioinformatics/btae078"
      licence:
        - "MIT"
      args_id: "$args"
      identifier: "biotools:telogator2"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - reads:
        type: file
        description: BAM or CRAM file of long reads (PacBio or ONT)
        pattern: "*.{bam,cram}"
        ontologies:
          - edam: http://edamontology.org/format_2572
    - reads_index:
        type: file
        description: Index file for the input BAM/CRAM
        pattern: "*.{bai,crai}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Optional reference genome FASTA file
        pattern: "*.{fa,fasta,fa.gz}"
        ontologies:
          - edam: http://edamontology.org/format_1929
  - - meta3:
        type: map
        description: |
          Groovy Map containing reference index information
          e.g. [ id:'genome' ]
    - fai:
        type: file
        description: Optional FASTA index file
        pattern: "*.fai"
        ontologies: []
output:
  results:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${prefix}:
          type: directory
          description: Directory containing telogator2 output files including telomere length estimates and TVR characterization
          ontologies: []
  versions_telogator2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - telogator2:
          type: string
          description: The name of the tool
      - "telogator2 --version | sed 's/telogator2 //'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - telogator2:
          type: string
          description: The name of the tool
      - "telogator2 --version | sed 's/telogator2 //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
