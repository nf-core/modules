name: yara_mapper
description: Align reads to a reference genome using YARA
keywords:
  - align
  - genome
  - reference
tools:
  - yara:
      description: Yara is an exact tool for aligning DNA sequencing reads to
        reference genomes.
      homepage: https://github.com/seqan/seqan
      documentation: https://github.com/seqan/seqan
      tool_dev_url: https://github.com/seqan/seqan
      licence:
        - "https://raw.githubusercontent.com/seqan/seqan/develop/apps/yara/LICENSE"
      identifier: biotools:yara
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing index information
          e.g. [ id:'test' ]
    - index:
        type: file
        description: YARA genome index files
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.mapped.bam":
          type: file
          description: Sorted BAM file
          pattern: "*.{bam}"
          ontologies: []
  bai:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.mapped.bam.bai":
          type: file
          description: Sorted BAM file index
          pattern: "*.{bai}"
          ontologies: []
  versions_yara:
    - - ${task.process}:
          type: string
          description: The name of the process
      - yara:
          type: string
          description: The name of the tool
      - "yara_mapper --version 2>&1 | grep 'yara_mapper version' | sed 's/^.*yara_mapper version: //; s/ .*\\$//'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version 2>&1 | head -n1 | sed 's/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - yara:
          type: string
          description: The name of the tool
      - "yara_mapper --version 2>&1 | grep 'yara_mapper version' | sed 's/^.*yara_mapper version: //; s/ .*\\$//'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version 2>&1 | head -n1 | sed 's/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@apeltzer"
maintainers:
  - "@apeltzer"
