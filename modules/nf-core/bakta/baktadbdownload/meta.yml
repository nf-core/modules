name: "bakta_baktadbdownload"
description: Downloads BAKTA database from Zenodo
keywords:
  - bakta
  - annotation
  - fasta
  - bacteria
  - database
  - download
tools:
  - bakta:
      description: Rapid & standardized annotation of bacterial genomes, MAGs &
        plasmids
      homepage: https://github.com/oschwengers/bakta
      documentation: https://github.com/oschwengers/bakta
      tool_dev_url: https://github.com/oschwengers/bakta
      doi: "10.1099/mgen.0.000685"
      licence:
        - "GPL v3"
      identifier: biotools:bakta
input: []
output:
  db:
    - db*:
        type: directory
        description: BAKTA database directory
        pattern: "db*/"
  versions_bakta:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bakta:
          type: string
          description: The name of the tool
      - bakta --version 2>&1 | sed 's/bakta //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bakta:
          type: string
          description: The name of the tool
      - bakta --version 2>&1 | sed 's/bakta //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
  - "@jasmezz"
maintainers:
  - "@jfy133"
  - "@jasmezz"
