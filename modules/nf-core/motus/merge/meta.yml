name: "motus_merge"
description: Taxonomic meta-omics profiling using universal marker genes
keywords:
  - classify
  - metagenomics
  - fastq
  - taxonomic profiling
  - merging
  - merge
  - otu table
tools:
  - "motus":
      description: "Marker gene-based OTU (mOTU) profiling"
      homepage: "https://motu-tool.org/"
      documentation: "https://github.com/motu-tool/mOTUs/wiki"
      tool_dev_url: "https://github.com/motu-tool/mOTUs"
      doi: "10.1186/s40168-022-01410-z"
      licence:
        - "GPL v3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - input:
        type: file
        description: |
          List of output files (more than one) from motus profile,
          or a single directory containing motus output files.
        ontologies: []
  - db:
      type: directory
      description: |
        mOTUs database downloaded by `motus downloadDB`
        pattern: "db_mOTU/"
output:
  txt:
    - - meta:
          type: file
          description: OTU table in txt format, if BIOM format not requested
          pattern: "*.txt"
          ontologies: []
      - "*.txt":
          type: file
          description: OTU table in txt format, if BIOM format not requested
          pattern: "*.txt"
          ontologies: []
  biom:
    - - meta:
          type: file
          description: OTU table in txt format, if BIOM format not requested
          pattern: "*.txt"
          ontologies: []
      - "*.biom":
          type: file
          description: OTU table in biom format, if BIOM format requested
          pattern: "*.biom"
          ontologies:
            - edam: http://edamontology.org/format_3746 # BIOM format
  versions_motus:
    - - ${task.process}:
          type: string
          description: The name of the process
      - motus:
          type: string
          description: The name of the tool
      - 3.1.0:
          type: string
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - motus:
          type: string
          description: The name of the tool
      - 3.1.0:
          type: string
          description: The expression to obtain the version of the tool

authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
