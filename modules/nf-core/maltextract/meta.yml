name: maltextract
description: Tool for evaluation of MALT results for true positives of ancient
  metagenomic taxonomic screening
keywords:
  - malt
  - MaltExtract
  - HOPS
  - alignment
  - metagenomics
  - ancient DNA
  - aDNA
  - palaeogenomics
  - archaeogenomics
  - microbiome
  - authentication
  - damage
  - edit distance
tools:
  - maltextract:
      description: Java tool to work with ancient metagenomics
      homepage: https://github.com/rhuebler/hops
      documentation: https://github.com/rhuebler/hops
      tool_dev_url: https://github.com/rhuebler/hops
      doi: "10.1186/s13059-019-1903-0"
      licence:
        - "GPL 3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - rma6:
        type: file
        description: RMA6 files from MALT
        pattern: "*.rma6"
        ontologies: []
  - taxon_list:
      type: file
      description: List of target taxa to evaluate
      pattern: "*.txt"
      ontologies: []
  - ncbi_dir:
      type: directory
      description: Directory containing NCBI taxonomy map and tre files
      pattern: "${ncbi_dir}/"
output:
  results:
    - - meta:
          type: directory
          description: Directory containing MaltExtract text results files
          pattern: "results/"
      - results:
          type: directory
          description: Directory containing MaltExtract text results files
          pattern: "results/"

  versions_maltextract:
    - - ${task.process}:
          type: string
          description: The name of the process
      - maltextract:
          type: string
          description: The name of the tool
      - MaltExtract --help | head -n 2 | tail -n 1 | sed 's/MaltExtract version//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - maltextract:
          type: string
          description: The name of the tool
      - MaltExtract --help | head -n 2 | tail -n 1 | sed 's/MaltExtract version//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
