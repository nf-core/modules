name: methurator_gtestimator
description: |
  Run estimator for DNA methylation sequencing saturation.
keywords:
  - rrbs
  - BS-seq
  - methylation
  - 5mC
  - methylseq
  - bisulphite
  - bam
tools:
  - methurator:
      description: |
        Methurator is a Python package designed to estimate CpGs saturation
        for DNA methylation sequencing data.
      homepage: https://github.com/VIBTOBIlab/methurator
      documentation: https://github.com/VIBTOBIlab/methurator/README.md
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
        ontologies: []
    - bam:
        type: file
        description: Single BAM file
        pattern: "*.{bam,cram}"
        ontologies: []
    - bai:
        type: file
        description: Single BAM/CRAM index file
        pattern: "*.{bai,crai}"
        ontologies: []
    - fasta:
        type: file
        description: Input genome fasta file
        pattern: "*.{fasta,fa}"
        ontologies: []
output:
  summary_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
          ontologies: []
      - "${prefix}.yml":
          type: file
          description: |
            YAML file summarizing the saturation analysis results.
          pattern: "${prefix}.yml"
          ontologies: []
  versions_methurator:
    - - ${task.process}:
          type: string
          description: methurator gtestimator
      - methurator:
          type: string
          description: The name of the tool
      - methurator --version | sed 's/.* //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: methurator gtestimator
      - methurator:
          type: string
          description: The name of the tool
      - methurator --version | sed 's/.* //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@edogiuili"
maintainers:
  - "@edogiuili"
