name: methurator_gtestimator
description: |
  Methurator is a Python package designed to estimate CpGs saturation
  for DNA methylation sequencing data.
keywords:
  - rrbs
  - BS-seq
  - methylation
  - 5mC
  - methylseq
  - bisulphite
  - bam
tools:
  - methurator:
      description: |
        Methurator is a Python package designed to estimate CpGs saturation
        for DNA methylation sequencing data.
      homepage: https://github.com/VIBTOBIlab/methurator
      documentation: https://github.com/VIBTOBIlab/methurator/README.md
      licence: ["MIT"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM file
        pattern: "*.{bam,cram}"
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bai:
        type: file
        description: BAM/CRAM index file
        pattern: "*.{bai,crai}"
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Input genome fasta file
        pattern: "*.{fasta,fa}"
output:
  summary_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "methurator_*.yml":
          type: file
          description: |
            YAML file summarizing the saturation analysis results.
          pattern: "methurator_*.yml"
  versions:
    - versions.yml:
        type: file
        description: |
          File containing software versions
        pattern: "versions.yml"
authors:
  - "@edogiuili"
maintainers:
  - "@edogiuili"
