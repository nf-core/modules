name: methurator_gtestimator
description: |
  Run estimator for DNA methylation sequencing saturation.
keywords:
  - rrbs
  - BS-seq
  - methylation
  - 5mC
  - methylseq
  - bisulphite
  - bam
tools:
  - methurator:
      description: |
        Methurator is a Python package designed to estimate CpGs saturation
        for DNA methylation sequencing data.
      homepage: https://github.com/VIBTOBIlab/methurator
      documentation: https://github.com/VIBTOBIlab/methurator/README.md
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM file
        pattern: "*.{bam,cram}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bai:
        type: file
        description: BAM/CRAM index file
        pattern: "*.{bai,crai}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Input genome fasta file
        pattern: "*.{fasta,fa}"
        ontologies: []
output:
  summary_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - methurator_summary.yml:
          type: file
          description: |
            methurator gtestimator summary report in YAML format
          ontologies: []
  versions_methurator:
    - - ${task.process}:
          type: string
          description: methurator gtestimator
      - methurator:
          type: string
          description: methurator
      - methurator --version:
          type: eval
          description: methurator software versions
topics:
  versions:
    - - ${task.process}:
          type: string
          description: methurator gtestimator
      - methurator:
          type: string
          description: methurator
      - methurator --version:
          type: eval
          description: methurator software versions
authors:
  - "@edogiuili"
maintainers:
  - "@edogiuili"
