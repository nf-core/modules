name: "mcroni"
description: Analysis of mcr-1 gene (mobilized colistin resistance) for sequence
  variation
keywords:
  - resistance
  - fasta
  - mcr-1
tools:
  - "mcroni":
      description: "Scripts for finding and processing promoter variants upstream of
        mcr-1"
      homepage: "https://github.com/liampshaw/mcroni"
      documentation: "https://github.com/liampshaw/mcroni"
      tool_dev_url: "https://github.com/liampshaw/mcroni"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: A fasta file.
        pattern: "*.{fasta.gz,fasta,fa.gz,fa,fna.gz,fna}"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: mcroni results in TSV format
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  fa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fa":
          type: file
          description: mcr-1 matching sequences
          pattern: "*.fa"
          ontologies: []
  versions_mcroni:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mcroni:
          type: string
          description: The name of the tool
      - 1.0.4:
          type: string
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mcroni:
          type: string
          description: The name of the tool
      - 1.0.4:
          type: string
          description: The expression to obtain the version of the tool

authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
