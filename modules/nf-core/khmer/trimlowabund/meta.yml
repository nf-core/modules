# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "khmer_trimlowabund"
description: Removes low abundance k-mers from FASTA/FASTQ files
keywords:
  - quality control
  - genomics
  - filtering
  - reads
  - khmer
  - k-mer
tools:
  - "khmer":
      description: khmer k-mer counting library
      homepage: https://github.com/dib-lab/khmer
      documentation: https://khmer.readthedocs.io/en/latest/
      tool_dev_url: https://github.com/dib-lab/khmer
      doi: "10.12688/f1000research.6924.1"
      licence: ["BSD License"]
      identifier: biotools:khmer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - seq_file:
        type: file
        description: fasta/fastq file
        pattern: "*.{fa,fasta,fas,fq,fastq}"
        ontologies:
          - edam: "http://edamontology.org/data_2044" # Sequence
          - edam: "http://edamontology.org/format_1929" # FASTA
          - edam: "http://edamontology.org/format_1930" # FASTQ

output:
  trimmed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${output_path}:
          type: file
          description: fasta/fastq file with low abundance k-mers removed.
          pattern: "*.{fa,fasta,fas,fq,fastq}"
          ontologies:
            - edam: "http://edamontology.org/data_2044" # Sequence
            - edam: "http://edamontology.org/format_1929" # FASTA
            - edam: "http://edamontology.org/format_1930" # FASTQ
  versions_khmer:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - khmer:
          type: string
          description: The name of the tool
      - trim-low-abund.py --version 2>&1 | grep ^khmer | sed "s/^khmer //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - khmer:
          type: string
          description: The name of the tool
      - trim-low-abund.py --version 2>&1 | grep ^khmer | sed "s/^khmer //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@zachary-foster"
maintainers:
  - "@zachary-foster"
