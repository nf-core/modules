name: conifer
description: Calculate confidence scores from Kraken2 output
keywords:
  - classify
  - metagenomics
  - kraken2
  - confidence
tools:
  - conifer:
      description: "Calculate confidence scores from Kraken2 output"
      homepage: "https://github.com/Ivarz/Conifer"
      documentation: "https://github.com/Ivarz/Conifer"
      tool_dev_url: "https://github.com/Ivarz/Conifer"
      licence:
        - "BSD / BSD-2-Clause"
      identifier: biotools:conifer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - kraken_result:
        type: file
        description: |
          Raw Kraken2 standard output file
        ontologies: []
  - kraken_taxon_db:
      type: file
      description: Kraken2 taxo.k2d database file
      ontologies: []
output:
  score:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.score":
          type: file
          description: |
            Conifer report file containing confidence scores of Kraken2 classified reads.
          pattern: "*.score"
          ontologies: []
  versions_conifer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - conifer:
          type: string
          description: The name of the tool
      - conifer --version 2>&1 | sed 's/^.*Conifer //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - conifer:
          type: string
          description: The name of the tool
      - conifer --version 2>&1 | sed 's/^.*Conifer //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@icaromsc"
  - "@rpetit3"
maintainers:
  - "@icaromsc"
  - "@rpetit3"
