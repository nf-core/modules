name: "amulety_antiberta2"
description: A module to create antiberta2 embeddings of antibody (BCR) amino
  acid sequences using amulety.
keywords:
  - embeddings
  - BCR
  - antibody
  - GPU-accelerated
  - immunoinformatics
  - immunology
tools:
  - "amulety":
      description: "Python package to create embeddings of BCR and TCR amino acid sequences."
      homepage: "https://amulety.readthedocs.io/en/latest/"
      documentation: "https://amulety.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/immcantation/amulety"
      doi: "10.1101/2025.03.21.644583"
      licence:
        - "GPL v3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - tsv:
        type: file
        description: TSV with BCR/TCR nucleotide sequences in AIRR rearrangement
          format
        pattern: "*.{tsv}"
        ontologies:
          - edam: http://edamontology.org/format_3475 # TSV
  - chain:
      type: string
      description: |
        The chain to use for the embeddings. Can be either 'H' (heavy) or 'HL' (heavy + light, for single-cell data).
output:
  embedding:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.tsv":
          type: file
          description: TSV with antiberta2 embeddings.
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_amulety:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amulety:
          type: string
          description: The name of the tool
      - amulety --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - amulety:
          type: string
          description: The name of the tool
      - amulety --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@ggabernet"
maintainers:
  - "@ggabernet"
