name: "samtools_multicommand"
description: |
  Execute a series of samtools commands in a pipeline, allowing flexible composition of
  samtools operations such as view, sort, markdup, merge, fastq conversion and more.

  The exact order of operations is specified by the pipeline input, which takes a list such as
  [view, sort, markdup]. This is then interpolated to a script where the output of each command
  is streamed to the next before being written to disk. The script can handle references being passed,
  as well as writing indexes, outputting in CRAM format, and conversion to FASTA and FASTQ.

  samtools view ${args} input.bam |\
    samtools sort ${args2} |\
    samtools markdup ${args3} -o output.bam
keywords:
  - view
  - sort
  - markdup
  - fixmate
  - merge
  - cat
  - collate
  - fastq
  - fasta
  - bam
  - sam
  - cram
tools:
  - samtools:
      description: |
        SAMtools is a set of utilities for interacting with and post-processing
        short DNA sequence read alignments in the SAM, BAM and CRAM formats, written by Heng Li.
        These files are generated as output by short read aligners like BWA.
      homepage: http://www.htslib.org/
      documentation: http://www.htslib.org/doc/samtools.html
      doi: 10.1093/bioinformatics/btp352
      licence:
        - "MIT"
      identifier: biotools:samtools
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies:
          - edam: http://edamontology.org/data_0924
          - edam: http://edamontology.org/format_2572
          - edam: http://edamontology.org/format_3462
          - edam: http://edamontology.org/format_2573
    - index:
        type: file
        description: BAM.BAI/BAM.CSI/CRAM.CRAI file (optional)
        pattern: "*.{bai,csi,crai}"
        ontologies:
          - edam: http://edamontology.org/format_3326
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Fasta reference file
        pattern: "*.{fasta,fa}"
        ontologies:
          - edam: http://edamontology.org/format_1929
    - fai:
        type: file
        description: Fasta reference file index
        pattern: "*.{fai}"
        ontologies:
          - edam: http://edamontology.org/format_3326
  - pipeline:
      type: list
      description: |
        List of samtools commands to execute in sequence.
        Valid options: view, sort, markdup, fixmate, merge, cat, collate, fastq, fasta
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: optional BAM file output
          pattern: "*.{bam}"
          ontologies:
            - edam: http://edamontology.org/data_0924
            - edam: http://edamontology.org/format_2572
  cram:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.cram":
          type: file
          description: optional CRAM file output
          pattern: "*.{cram}"
          ontologies:
            - edam: http://edamontology.org/data_0924
            - edam: http://edamontology.org/format_3462
  sam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sam":
          type: file
          description: optional SAM file output
          pattern: "*.{sam}"
          ontologies:
            - edam: http://edamontology.org/data_0924
            - edam: http://edamontology.org/format_2573
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{bai,csi,crai}":
          type: file
          description: optional index file for alignment output
          pattern: "*.{bai,csi,crai}"
          ontologies:
            - edam: http://edamontology.org/format_3326
  fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fasta.gz":
          type: file
          description: FASTA files output when final command is "fasta".
          pattern: "*.fasta.gz"
          ontologies:
            - edam: http://edamontology.org/format_1929
            - edam: http://edamontology.org/format_3989
  fastq:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fastq.gz":
          type: file
          description: FASTQ file output when final command is "fastq".
          pattern: "*.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_1930
            - edam: http://edamontology.org/format_3989
  fasta_pair:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_{1,2}.fasta.gz":
          type: file
          description: Compressed FASTA file(s) with reads with either the READ1 or
            READ2 flag set in separate files.
          pattern: "*_{1,2}.fasta.gz"
          ontologies: []
  fasta_interleaved:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_interleaved.fasta.gz":
          type: file
          description: Compressed FASTA file with reads with either the READ1 or READ2
            flag set in a combined file. Needs collated input file.
          pattern: "*_interleaved.fasta.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  fasta_singleton:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_singleton.fasta.gz":
          type: file
          description: Compressed FASTA file with singleton reads
          pattern: "*_singleton.fasta.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  fasta_other:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_other.fasta.gz":
          type: file
          description: Compressed FASTA file with reads with either both READ1 and READ2
            flags set or unset
          pattern: "*_other.fasta.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  fastq_pair:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_{1,2}.fastq.gz":
          type: file
          description: Compressed FASTQ file(s) with reads with either the READ1
            or READ2 flag set in separate files.
          pattern: "*_{1,2}.fastq.gz"
          ontologies: []
  fastq_interleaved:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_interleaved.fastq":
          type: file
          description: Compressed FASTQ file with reads with either the READ1 or
            READ2 flag set in a combined file. Needs collated input file.
          pattern: "*_interleaved.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  fastq_singleton:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_singleton.fastq.gz":
          type: file
          description: Compressed FASTQ file with singleton reads
          pattern: "*_singleton.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  fastq_other:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_other.fastq.gz":
          type: file
          description: Compressed FASTQ file with reads with either both READ1 and
            READ2 flags set or unset
          pattern: "*_other.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_samtools:
    - - ${task.process}:
          type: string
          description: Name of the process
      - samtools:
          type: string
          description: Name of the tool
      - samtools version | sed "1!d;s/.* //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
