name: "slimfastq"
description: Fast, efficient, lossless compression of FASTQ files.
keywords:
  - FASTQ
  - compression
  - lossless
tools:
  - "slimfastq":
      description: "slimfastq efficiently compresses/decompresses FASTQ files"
      homepage: "https://github.com/Infinidat/slimfastq"
      tool_dev_url: "https://github.com/Infinidat/slimfastq"
      licence:
        - "BSD-3-clause"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fastq:
        type: file
        description: Either a single-end FASTQ file or paired-end files.
        pattern: "*.{fq.gz,fastq.gz}"
        ontologies: []
output:
  sfq:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sfq":
          type: file
          description: Either one or two sequence files in slimfastq compressed
            format.
          pattern: "*.{sfq}"
          ontologies: []
  versions_slimfastq:
    - - ${task.process}:
          type: string
          description: The name of the process
      - slimfastq:
          type: string
          description: The name of the tool
      - echo 2.04:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - slimfastq:
          type: string
          description: The name of the tool
      - echo 2.04:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@Midnighter"
maintainers:
  - "@Midnighter"
