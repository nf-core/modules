name: "annotsv_installannotations"
description: Install the AnnotSV annotations
keywords:
  - annotation
  - download
  - installation
  - structural variants
tools:
  - "annotsv":
      description: "Annotation and Ranking of Structural Variation"
      homepage: "https://lbgi.fr/AnnotSV/"
      documentation: "https://lbgi.fr/AnnotSV/"
      tool_dev_url: "https://github.com/lgmgeo/AnnotSV"
      licence:
        - "GPL v3"
      identifier: biotools:AnnotSV
input: []
output:
  annotations:
    - AnnotSV_annotations:
        type: file
        description: A folder containing the annotations
        pattern: "AnnotSV_annotations"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML
  versions_annotsv:
    - - ${task.process}:
          type: string
          description: The name of the process
      - annotsv:
          type: string
          description: The name of the tool
      - AnnotSV --version | sed 's/AnnotSV //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - annotsv:
          type: string
          description: The name of the tool
      - AnnotSV --version | sed 's/AnnotSV //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nvnieuwk"
maintainers:
  - "@nvnieuwk"
