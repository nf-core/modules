name: llamacpppython_run
description: Python wrapper for running locally-hosted LLM with llama.cpp
keywords:
  - inference
  - llama
  - llm
  - local-inference
  - offline-llm
tools:
  - llama-cpp-python:
      description: "Python wrapper for llama.cpp LLM inference tool"
      homepage: "https://llama-cpp-python.readthedocs.io/en/latest/"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - prompt_file:
        type: file
        description: |
          Prompt file
          Structure: [ val(meta), path(prompt_file) ]
        ontologies: []
    - gguf_model:
        type: file
        description: |
          GGUF model
          Structure: [ val(meta), path(gguf_model) ]
        ontologies: []
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.txt:
          type: file
          description: File with the output of LLM inference request
          ontologies: []
  versions_llama_cpp_python:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750
topics:
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750
authors:
  - "@toniher"
  - "@lucacozzuto"
maintainers:
  - "@toniher"
  - "@lucacozzuto"
