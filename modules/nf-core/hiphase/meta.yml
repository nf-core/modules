# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "hiphase"
description: Small and structural variant phasing tool for PacBio HiFi reads, supporting co-phasing of SNVs and SVs across multiple BAM files and samples
keywords:
  - pacbio
  - structural variant
  - phasing
  - pacbio hifi
  - snv
  - haplotagging
tools:
  - "hiphase":
      description: "Small and structural variant phasing tool for PacBio HiFi reads"
      homepage: "https://github.com/PacificBiosciences/HiPhase"
      documentation: "https://github.com/PacificBiosciences/HiPhase"
      tool_dev_url: "https://github.com/PacificBiosciences/HiPhase"
      licence: ["Pacific Biosciences Software License Agreement"]
      identifier: biotools:hiphase
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bams:
        type: file
        description: One or more sorted BAM/CRAM files
        pattern: "*.{bam,cram}"
        ontologies:
          - edam: http://edamontology.org/format_2572 # BAM
    - bais:
        type: file
        description: Index files associated with the BAM/CRAM files
        pattern: "*.{bai,crai,csi}"
        ontologies: []
    - snv:
        type: file
        description: Compressed VCF file containing SNV/small variants to phase (optional)
        pattern: "*.{vcf.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3016 # VCF
    - snv_index:
        type: file
        description: Index file for the SNV VCF (optional)
        pattern: "*.{tbi,csi}"
        ontologies: []
    - sv:
        type: file
        description: Compressed VCF file containing structural variants to co-phase (optional)
        pattern: "*.{vcf.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3016 # VCF
    - sv_index:
        type: file
        description: Index file for the SV VCF (optional)
        pattern: "*.{tbi,csi}"
        ontologies: []
    - samples:
        type: list
        description: "List of sample names to phase within the VCF, if empty only the first sample is phased."
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference genome information
          e.g. `[ id:'GRCh38' ]`
    - fasta:
        type: file
        description: Reference genome FASTA file used for the BAM alignment
        pattern: "*.{fasta,fa}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
    - fai:
        type: file
        description: FASTA index file (.fai) for the reference genome
        pattern: "*.fai"
        ontologies: []
  - - output_bam:
        type: boolean
        description: Whether to output haplotagged BAM files. Set to true to emit phased BAM files with haplotag information.
    - summary_file:
        type: boolean
        description: Whether to output a phasing summary file.
    - blocks_file:
        type: boolean
        description: Whether to output a phasing blocks file.
    - stats_file:
        type: boolean
        description: Whether to output a per-read phasing statistics file.
    - haplotag_file:
        type: boolean
        description: Whether to output a haplotag assignments file.
    - file_format:
        type: string
        description: Output file format for summary/blocks/stats/haplotag files, either 'tsv' or 'csv'.
output:
  vcfs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*_snv_phased.vcf.gz":
          type: file
          description: Phased and compressed SNV VCF file (optional, only emitted when SNV VCF input is provided)
          pattern: "*_snv_phased.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3016 # VCF
  sv_vcfs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*_sv_phased.vcf.gz":
          type: file
          description: Phased and compressed SV VCF file (optional, only emitted when SV VCF input is provided)
          pattern: "*_sv_phased.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3016 # VCF
  vcfs_indexes:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*_snv_phased.vcf.gz.{tbi,csi}":
          type: file
          description: Index file for the phased SNV VCF (optional)
          pattern: "*_snv_phased.vcf.gz.{tbi,csi}"
          ontologies: []
  sv_vcfs_indexes:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*_sv_phased.vcf.gz.{tbi,csi}":
          type: file
          description: Index file for the phased SV VCF (optional)
          pattern: "*_sv_phased.vcf.gz.{tbi,csi}"
          ontologies: []
  summary_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.summary.tsv":
          type: file
          description: TSV file containing phasing summary statistics (optional)
          pattern: "*.summary.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  summary_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.summary.csv":
          type: file
          description: CSV file containing phasing summary statistics (optional)
          pattern: "*.summary.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  blocks_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.blocks.tsv":
          type: file
          description: TSV file containing phasing block information (optional)
          pattern: "*.blocks.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  blocks_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.blocks.csv":
          type: file
          description: CSV file containing phasing block information (optional)
          pattern: "*.blocks.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  stats_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.stats.tsv":
          type: file
          description: TSV file containing per-read phasing statistics (optional)
          pattern: "*.stats.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  stats_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.stats.csv":
          type: file
          description: CSV file containing per-read phasing statistics (optional)
          pattern: "*.stats.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  haplotag_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.haplotag.tsv":
          type: file
          description: TSV file containing haplotag assignments per read (optional)
          pattern: "*.haplotag.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  haplotag_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.haplotag.csv":
          type: file
          description: CSV file containing haplotag assignments per read (optional)
          pattern: "*.haplotag.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  bams:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bam":
          type: file
          description: Haplotagged BAM file(s) with haplotype information in the HP tag (optional, only emitted when output_bam is true)
          pattern: "*.bam"
          ontologies:
            - edam: http://edamontology.org/format_2572 # BAM
  bams_indexes:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bam.{bai,csi}":
          type: file
          description: Index file(s) for the haplotagged BAM file(s) (optional, only emitted when output_bam is true)
          pattern: "*.bam.{bai,csi}"
          ontologies: []
  versions_hiphase:
    - - "HIPHASE":
          type: string
          description: Process name
      - hiphase:
          type: string
          description: Software name
      - version:
          type: string
          description: Version of hiphase
authors:
  - "@tanyasarkjain"
  - "@fellen31"
maintainers:
  - "@fellen31"
