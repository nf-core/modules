name: "mirtop_stats"
description: mirtop gff gets the number of isomiRs and miRNAs annotated in the
  GFF file by isomiR category.
keywords:
  - mirna
  - isomir
  - gff
tools:
  - "mirtop":
      description: "Small RNA-seq annotation"
      homepage: "https://github.com/miRTop/mirtop"
      documentation: "https://mirtop.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/miRTop/mirtop"
      licence:
        - "MIT License"
      identifier: biotools:miRTop
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - mirtop_gff:
        type: file
        description: Mirtop GFF file obtained with mirtop_gff
        pattern: "*.{gff}"
        ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - stats/*_stats.txt:
          type: file
          description: TXT file with stats
          pattern: "*.{txt}"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - stats/*_stats.log:
          type: file
          description: log file with stats
          pattern: "*.{log}"
          ontologies: []
  versions_mirtop:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mirtop:
          type: string
          description: The name of the tool
      - mirtop --version 2>&1 | tail -n 1 | sed 's/^mirtop //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mirtop:
          type: string
          description: The name of the tool
      - mirtop --version 2>&1 | tail -n 1 | sed 's/^mirtop //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@atrigila"
maintainers:
  - "@atrigila"
  - "@lpantano"
