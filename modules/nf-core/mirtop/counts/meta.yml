name: "mirtop_counts"
description: mirtop counts generates a file with the minimal information about
  each sequence and the count data in columns for each samples.
keywords:
  - mirna
  - isomir
  - gff
tools:
  - "mirtop":
      description: "Small RNA-seq annotation"
      homepage: "https://github.com/miRTop/mirtop"
      documentation: "https://mirtop.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/miRTop/mirtop"
      licence:
        - "MIT License"
      identifier: biotools:miRTop
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - mirtop_gff:
        type: file
        description: GFF file
        pattern: "*.{gff}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - hairpin:
        type: file
        description: Hairpin file
        pattern: "*.{fa,fasta}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - gtf:
        type: file
        description: GTF file
        pattern: "*.{gtf}"
        ontologies: []
    - species:
        type: string
        description: Species name of the GTF file
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - counts/*.tsv:
          type: file
          description: TSV file
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475
  versions_mirtop:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mirtop:
          type: string
          description: The name of the tool
      - mirtop --version 2>&1 | sed -n 's/^mirtop //p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mirtop:
          type: string
          description: The name of the tool
      - mirtop --version 2>&1 | sed -n 's/^mirtop //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@atrigila"
maintainers:
  - "@atrigila"
  - "@lpantano"
