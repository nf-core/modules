name: minia
description: Minia is a short-read assembler based on a de Bruijn graph
keywords:
  - assembler
  - short-read
  - de Bruijn
tools:
  - minia:
      description: |
        Minia is a short-read assembler based on a de Bruijn graph, capable of assembling
        a human genome on a desktop computer in a day. The output of Minia is a set of contigs.
      homepage: https://github.com/GATB/minia
      documentation: https://github.com/GATB/minia
      licence:
        - "AGPL-3.0-or-later"
      identifier: biotools:minia
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - reads:
        type: file
        description: Input reads in FastQ format
        pattern: "*.{fastq.gz, fastq}"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
output:
  contigs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.contigs.fa.gz":
          type: file
          description: The assembled contigs
          pattern: "*.contigs.fa.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  unitigs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.unitigs.fa.gz":
          type: file
          description: The assembled unitigs
          pattern: "*.unitigs.fa.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  h5:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.h5":
          type: file
          description: Minia assembly graph in binary h5 format
          pattern: "*.h5"
          ontologies: []

  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*-minia.log":
          type: file
          description: Minia assembly log file
          pattern: "*-minia.log"
          ontologies: []
  versions_minia:
    - - ${task.process}:
          type: string
          description: The name of the process
      - minia:
          type: string
          description: The name of the tool
      - minia -v | sed -n 's/Minia version //p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - minia:
          type: string
          description: The name of the tool
      - minia -v | sed -n 's/Minia version //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@drpatelh"
  - "@kevinmenden"
maintainers:
  - "@drpatelh"
  - "@kevinmenden"
