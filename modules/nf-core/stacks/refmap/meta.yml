---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "stacks_refmap"
## TODO nf-core: Add a description of the module and list keywords
description: write your description here
keywords:
  - sort
  - example
  - genomics
tools:
  - "stacks":
      ## TODO nf-core: Add a description and other details for the software below
      description: "Stacks is a software pipeline for building loci from short-read sequences."
      homepage: "https://catchenlab.life.illinois.edu/stacks/"
      documentation: "https://catchenlab.life.illinois.edu/stacks/manual/"
      tool_dev_url: "http://groups.google.com/group/stacks-users"
      doi: "10.1111/mec.12354"
      licence: ["GPL v3"]
      identifier: biotools:stacks

## TODO nf-core: Add a description of all of the variables used as input
input:
  #
  ## TODO nf-core: Delete / customise this example input
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input_1:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
## TODO nf-core: Add a description of all of the variables used as output
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf.gz":
          type: file
          description: Compressed VCF file
          pattern: "*.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format

  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@TheGreatJack"
maintainers:
  - "@TheGreatJack"
