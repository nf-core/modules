name: "geofetch"
description: geofetch is a command-line tool that downloads and organizes data
  and metadata from GEO and SRA
keywords:
  - GEO
  - expression
  - microarray
  - sequencing
tools:
  - "geofetch":
      description: "Downloads data and metadata from GEO and SRA and creates standard
        PEPs."
      homepage: "http://geofetch.databio.org/"
      documentation: "http://geofetch.databio.org/"
      tool_dev_url: "https://github.com/pepkit/geofetch"
      licence:
        - "BSD-2-clause"
      args_id: "$args"
      identifier: ""
input:
  - geo_accession:
      type: string
      description: GEO accession ID
output:
  samples:
    - - ${geo_accession}:
          type: file
          description: List of sample files fetched
          pattern: "${geo_accession}/*.CEL.gz"
          ontologies: []
      - ${geo_accession}/*.CEL.gz:
          type: file
          description: List of sample files fetched
          pattern: "${geo_accession}/*.CEL.gz"
          ontologies: []
  versions_geofetch:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - geofetch:
          type: string
          description: The tool name
      - geofetch --version 2>&1 | sed '1!d; s/^geofetch //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - geofetch:
          type: string
          description: The tool name
      - geofetch --version 2>&1 | sed '1!d; s/^geofetch //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@mribeirodantas"
maintainers:
  - "@mribeirodantas"
