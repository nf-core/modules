name: "rclone_check"
description: Check that files in source and destination paths match
keywords:
  - check
  - checksum
  - cloud
  - sync
tools:
  - "rclone":
      description: "Rclone is a command-line program to manage files on cloud storage."
      homepage: "https://rclone.org/"
      documentation: "https://rclone.org/commands/rclone_check/"
      tool_dev_url: "https://github.com/rclone/rclone"
      licence:
        - "MIT"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing source information
          e.g. [ id:'test' ]
    - source:
        type: string
        description: |
          File or directory containing source files to compare. This should be a path understood by Rclone,
          such as a local path or a configured remote path.
          Examples: `data/input`, `s3:bucket/path`, `gs:bucket/path`,
          `remote:path/to/data`.
    - destination:
        type: string
        description: |
          Directory containing destination files to compare. This should be the fully resolved target
          path understood by Rclone, such as a local path or a configured remote
          path. The module does not append sample IDs, basenames, or modify this
          path internally.
          Examples: `results/output`, `s3:bucket/output`, `gs:bucket/output`,
          `remote:path/to/output`.
  - rclone_config:
      type: file
      description: |
        Rclone configuration file defining the remotes used by source_path and/or
        destination_path. Authentication and remote-specific options should be
        configured in this file where possible.
      pattern: "*.conf"
      ontologies: []
output:
  combined:
    - - meta:
          type: map
          description: |
            Groovy Map containing source information
            e.g. [ id:'test' ]
      - ${prefix}.combined.txt:
          type: file
          description: Combined report of matching, missing, differing, and error paths.
          pattern: "*.combined.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  differ:
    - - meta:
          type: map
          description: |
            Groovy Map containing source information
            e.g. [ id:'test' ]
      - ${prefix}.differ.txt:
          type: file
          description: Report of paths present in both source and destination but different.
          pattern: "*.differ.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  missing_on_dst:
    - - meta:
          type: map
          description: |
            Groovy Map containing source information
            e.g. [ id:'test' ]
      - ${prefix}.missing_on_dst.txt:
          type: file
          description: Report of paths present in source but missing from destination.
          pattern: "*.missing_on_dst.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  missing_on_src:
    - - meta:
          type: map
          description: |
            Groovy Map containing source information
            e.g. [ id:'test' ]
      - ${prefix}.missing_on_src.txt:
          type: file
          description: Report of paths present in destination but missing from source.
          pattern: "*.missing_on_src.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  match:
    - - meta:
          type: map
          description: |
            Groovy Map containing source information
            e.g. [ id:'test' ]
      - ${prefix}.match.txt:
          type: file
          description: Report of matching paths.
          pattern: "*.match.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  error:
    - - meta:
          type: map
          description: |
            Groovy Map containing source information
            e.g. [ id:'test' ]
      - ${prefix}.error.txt:
          type: file
          description: Report of paths with read or hash errors.
          pattern: "*.error.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  exit_code:
    - - meta:
          type: map
          description: |
            Groovy Map containing checksum source information
            e.g. [ id:'test' ]
      - ${prefix}.exit_code.txt:
          type: file
          description: File with exit status.
          pattern: "*.exit_code.txt"
          ontologies:
            - edam: "http://edamontology.org/data_3671"
  versions_rclone:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rclone:
          type: string
          description: The name of the tool
      - rclone --version | sed -n '1s/^rclone v//p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - rclone:
          type: string
          description: The name of the tool
      - rclone --version | sed -n '1s/^rclone v//p':
          type: eval
          description: The expression to obtain the version of the tool
