name: "expansionhunterdenovo_profile"
description: Compute genome-wide STR profile
keywords:
  - expansionhunterdenovo
  - profile
  - STR
  - genome
  - bam
  - cram
tools:
  - "expansionhunterdenovo":
      description: "ExpansionHunter Denovo (EHdn) is a suite of tools for detecting
        novel expansions of short tandem repeats (STRs)."
      homepage: "https://github.com/Illumina/ExpansionHunterDenovo"
      documentation: "https://github.com/Illumina/ExpansionHunterDenovo/blob/master/documentation/00_Introduction.md"
      tool_dev_url: "https://github.com/Illumina/ExpansionHunterDenovo"
      licence: ["Apache License 2.0"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - alignment_file:
        type: file
        description: BAM/CRAM file
        pattern: "*.{bam,cram}"
        ontologies: []
    - alignment_index:
        type: file
        description: Index of the BAM/CRAM file
        pattern: "*.{bai,crai}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'test' ]
    - fasta:
        type: file
        description: The FASTA reference file
        pattern: "*.{fasta,fa}"
        ontologies: []
    - fasta_fai:
        type: file
        description: The index of the FASTA reference file
        pattern: "*.fai"
        ontologies: []
output:
  locus_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.locus.tsv":
          type: file
          description: The locus TSV file
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  motif_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.motif.tsv":
          type: file
          description: The motif TSV file
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  str_profile:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.str_profile.json":
          type: file
          description: The JSON file containing the STR profile
          pattern: "*.json"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  versions_expansionhunterdenovo:
    - - ${task.process}:
          type: string
          description: The name of the process
      - expansionhunterdenovo:
          type: string
          description: The name of the tool
      - ExpansionHunterDenovo --help |& sed '1!d;s/ExpansionHunter Denovo v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - expansionhunterdenovo:
          type: string
          description: The name of the tool
      - ExpansionHunterDenovo --help |& sed '1!d;s/ExpansionHunter Denovo v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nvnieuwk"
maintainers:
  - "@nvnieuwk"
