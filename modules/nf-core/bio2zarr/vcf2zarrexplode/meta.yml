name: "bio2zarr_vcf2zarrexplode"
description: Convert VCF(s) to intermediate columnar format (ICF)
keywords:
  - vcf
  - icf
  - zarr
  - convert
  - genomics
tools:
  - "vcf2zarr":
      description: "Convert bioinformatics data to Zarr"
      homepage: "https://sgkit-dev.github.io/bio2zarr/vcf2zarr/overview.html"
      documentation: "https://sgkit-dev.github.io/bio2zarr/"
      tool_dev_url: "https://github.com/sgkit-dev/bio2zarr"
      doi: "10.1101/2024.06.11.598241"
      licence:
        - "Apache-2.0"
      identifier: biotools:bio2zarr
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - vcf:
        type: file
        description: Input VCF/BCF file(s)
        pattern: "*.{vcf,vcf.gz,bcf,bcf.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_3016" # VCF
output:
  icf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.icf":
          type: directory
          description: Intermediate columnar format (ICF) directory produced by vcf2zarr explode
          pattern: "*.icf"
          ontologies: []
  versions_vcf2zarr:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vcf2zarr:
          type: string
          description: The name of the tool
      - vcf2zarr --version |& sed -n "s/.* //p":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vcf2zarr:
          type: string
          description: The name of the tool
      - vcf2zarr --version |& sed -n "s/.* //p":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@camlloyd"
maintainers:
  - "@camlloyd"
