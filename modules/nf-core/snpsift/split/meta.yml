name: snpsift_split
description: Splits/Joins VCF(s) file into chromosomes
keywords:
  - split
  - join
  - vcf
tools:
  - snpsift:
      description: SnpSift is a toolbox that allows you to filter and manipulate
        annotated files
      homepage: https://pcingola.github.io/SnpEff/ss_introduction/
      documentation: https://pcingola.github.io/SnpEff/ss_introduction/
      tool_dev_url: https://github.com/pcingola/SnpEff
      doi: "10.3389/fgene.2012.00035"
      licence:
        - "MIT"
      identifier: biotools:snpsift
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - vcf:
        type: file
        description: VCF file(s)
        pattern: "*.{vcf,vcf.gz}"
        ontologies: []
output:
  out_vcfs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf":
          type: file
          description: Split/Joined VCF file(s)
          pattern: "*.vcf"
          ontologies: []
  versions_snpsift:
    - - ${task.process}:
          type: string
          description: The name of the process
      - snpsift:
          type: string
          description: The name of the tool
      - SnpSift split -h 2>&1 | sed -n 's/.*version \([^ ]*\).*/\1/p;q':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - snpsift:
          type: string
          description: The name of the tool
      - SnpSift split -h 2>&1 | sed -n 's/.*version \([^ ]*\).*/\1/p;q':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@SusiJo"
  - "@jonasscheid"
maintainers:
  - "@SusiJo"
  - "@jonasscheid"
