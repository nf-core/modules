name: "jvarkit_dict2bed"
description: Extract BED file from hts files containing a dictionary (VCF,BAM,
  CRAM, DICT, etc...)
keywords:
  - vcf
  - bcf
  - bed
  - dict
  - dictionary
  - fasta
  - fai
tools:
  - "jvarkit":
      description: "Java utilities for Bioinformatics."
      homepage: "https://github.com/lindenb/jvarkit"
      documentation: "https://jvarkit.readthedocs.io/"
      tool_dev_url: "https://github.com/lindenb/jvarkit"
      doi: "10.6084/m9.figshare.1425030"
      licence:
        - "MIT License"
      args_id: "$args"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing dict file information
          e.g. [ id:'test_reference' ]
    - dict_files:
        type: file
        description: File(s) containing a dictionary VCF/BCF/BAM/DICT etc...
        pattern: "*.{vcf,bcf,vcf.gz,bcf.gz,dict,fai,bam,cram,interval_list}"
        ontologies: []
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing VCF information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: BED output file
          pattern: "*.{vcf,bcf,vcf.gz,bcf.gz}"
          ontologies: []
  versions_jvarkit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - jvarkit:
          type: string
          description: The name of the tool
      - jvarkit -v:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - jvarkit:
          type: string
          description: The name of the tool
      - jvarkit -v:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@lindenb"
maintainers:
  - "@lindenb"
