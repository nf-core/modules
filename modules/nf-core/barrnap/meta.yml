name: "barrnap"
description: barrnap uses a hmmer profile to find rrnas in reads or contig fasta
  files
keywords:
  - rrna
  - sequences
  - removal
tools:
  - "barrnap":
      description: "Barrnap predicts the location of ribosomal RNA genes in genomes
        (bacteria, archaea, metazoan mitochondria and eukaryotes)."
      homepage: "https://github.com/tseemann/barrnap"
      documentation: "https://github.com/tseemann/barrnap"
      tool_dev_url: "https://github.com/tseemann/barrnap"
      licence:
        - "GPL v3"
      identifier: biotools:barrnap
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - fasta:
        type: file
        description: fasta file
        pattern: "*.fasta"
        ontologies: []
    - dbname:
        type: string
        description: database to use(bacteria, archaea, eukaryota, metazoan
          mitochondria)
output:
  gff:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*.gff":
          type: file
          description: gff file containing coordinates of genes
          pattern: "*.gff"
          ontologies: []
  versions_barrnap:
    - - ${task.process}:
          type: string
          description: The name of the process
      - barrnap:
          type: string
          description: The name of the tool
      - 'barrnap --version 2>&1 | sed "s/barrnap //g"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - barrnap:
          type: string
          description: The name of the tool
      - 'barrnap --version 2>&1 | sed "s/barrnap //g"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@danilodileo"
  - "@srisarya"
maintainers:
  - "@danilodileo"
