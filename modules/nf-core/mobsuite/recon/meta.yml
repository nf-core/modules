name: mobsuite_recon
description: A tool to reconstruct plasmids in bacterial assemblies
keywords:
  - bacteria
  - plasmid
  - cluster
tools:
  - mobsuite:
      description: Software tools for clustering, reconstruction and typing of
        plasmids from draft assemblies.
      homepage: https://github.com/phac-nml/mob-suite
      documentation: https://github.com/phac-nml/mob-suite
      tool_dev_url: https://github.com/phac-nml/mob-suite
      doi: "10.1099/mgen.0.000435"
      licence:
        - "Apache License, Version 2.0"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: A bacterial genome assembly in FASTA format
        pattern: "*.{fasta,fa,fna}"
        ontologies: []
output:
  chromosome:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/chromosome.fasta:
          type: file
          description: FASTA file of all contigs found to belong to the chromosome
          pattern: "chromosome.fasta"
          ontologies: []
  contig_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/contig_report.txt:
          type: file
          description: Assignment of the contig to chromosome or a particular
            plasmid grouping
          pattern: "contig_report.txt"
          ontologies: []
  plasmids:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/plasmid_*.fasta:
          type: file
          description: Each plasmid group is written to an individual FASTA
          pattern: "plasmid_*.fasta"
          ontologies: []
  mobtyper_results:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/mobtyper_results.txt:
          type: file
          description: Aggregate MOB-typer report files for all identified plasmid
          pattern: "mobtyper_results.txt"
          ontologies: []
  versions_mobsuite:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mobsuite:
          type: string
          description: The name of the tool
      - mob_recon --version 2>&1 | sed 's/.*mob_recon //; s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mobsuite:
          type: string
          description: The name of the tool
      - mob_recon --version 2>&1 | sed 's/.*mob_recon //; s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
