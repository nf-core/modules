name: "macsyfinder_search"
description: Search for macromolecular systems in protein datasets using MacSyFinder
keywords:
  - genomics
  - protein
  - macromolecular systems
  - hmmer
  - search
tools:
  - "macsyfinder":
      description: "Detection of macromolecular systems in protein datasets using systems\
        \ modelling and similarity search"
      homepage: "https://github.com/gem-pasteur/macsyfinder"
      documentation: "https://macsyfinder.readthedocs.io"
      tool_dev_url: "https://github.com/gem-pasteur/macsyfinder"
      doi: "10.24072/pcjournal.250"
      licence: ["GPL v3"]
      identifier: biotools:macsyfinder
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', db_type:'unordered' ]`
          db_type specifies the type of dataset to process:
          - 'unordered' (default): Use for protein FASTA files from annotation tools (e.g., Prokka) where proteins are individual sequences without positional information
          - 'gembase': Use for ordered genomic sequences (e.g., contigs, chromosomes) where gene position and order matter
          - 'ordered_replicon': Use for complete replicons where gene order is important
    - proteins:
        type: file
        description: Protein sequence file in FASTA format
        pattern: "*.{fasta,faa,fa}"
        ontologies:
          - edam: "http://edamontology.org/format_1929"
  - models:
      type: directory
      description: Directory containing MacSyFinder model(s)
      pattern: "*"
  - model_names:
      type: string
      description: Space-separated list of model names to search for. If not provided,
        all models in the directory will be used.
output:
  results:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', db_type:'gembase' ]`
      - ${prefix}/*:
          type: directory
          description: Directory containing all MacSyFinder results
          pattern: "${prefix}/*"
  stdout:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', db_type:'gembase' ]`
      - ${prefix}/macsyfinder.out:
          type: file
          description: MacSyFinder standard output
          pattern: "${prefix}/macsyfinder.out"
          ontologies: []
  stderr:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', db_type:'gembase' ]`
      - ${prefix}/macsyfinder.err:
          type: file
          description: MacSyFinder standard error
          pattern: "${prefix}/macsyfinder.err"
          ontologies: []
  summary:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', db_type:'gembase' ]`
      - ${prefix}/all_systems.tsv:
          type: file
          description: Summary table of all detected systems
          pattern: "${prefix}/all_systems.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  best_solutions:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', db_type:'gembase' ]`
      - ${prefix}/all_best_solutions*:
          type: file
          description: Best solution files for detected systems
          pattern: "${prefix}/all_best_solutions*"
          ontologies: []
  versions_macsyfinder:
    - - ${task.process}:
          type: string
          description: The name of the process
      - macsyfinder:
          type: string
          description: The name of the tool
      - 'macsyfinder --version 2>&1 | head -1 | sed "s/^.*MacSyFinder //; s/ .*$//"':
          type: eval
          description: The expression to obtain the version of the tool
  versions_hmmer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - 'hmmsearch -h | grep -o "^# HMMER [0-9.]*" | sed "s/^# HMMER *//"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - macsyfinder:
          type: string
          description: The name of the tool
      - 'macsyfinder --version 2>&1 | head -1 | sed "s/^.*MacSyFinder //; s/ .*$//"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@brovolia"
maintainers:
  - "@brovolia"
