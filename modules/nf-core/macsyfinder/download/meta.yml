name: "macsyfinder_download"
description: Download MacSyFinder models using msf_data
keywords:
  - genomics
  - protein
  - macromolecular systems
  - models
  - database
tools:
  - "macsyfinder":
      description: "Detection of macromolecular systems in protein datasets using systems\
        \ modelling and similarity search"
      homepage: "https://github.com/gem-pasteur/macsyfinder"
      documentation: "https://macsyfinder.readthedocs.io"
      tool_dev_url: "https://github.com/gem-pasteur/macsyfinder"
      doi: "10.24072/pcjournal.250"
      licence: ["GPL v3"]
      identifier: biotools:macsyfinder
input:
  - model_name:
      type: string
      description: Name of the MacSyFinder model to download (e.g., 'TXSScan', 'CasFinder')
output:
  models:
    - model_data:
        type: directory
        description: Directory containing the downloaded MacSyFinder model(s)
        pattern: "models"
  versions_macsyfinder:
    - - ${task.process}:
          type: string
          description: The name of the process
      - macsyfinder:
          type: string
          description: The name of the tool
      - "macsyfinder --version 2>&1 | head -1 | sed 's/^.*MacSyFinder //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of the tool
  versions_macsydata:
    - - ${task.process}:
          type: string
          description: The name of the process
      - msf_data:
          type: string
          description: The name of the tool
      - "msf_data --version 2>&1 | grep -o 'MacSyLib [0-9.]*' | sed 's/MacSyLib //'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - macsyfinder:
          type: string
          description: The name of the tool
      - "macsyfinder --version 2>&1 | head -1 | sed 's/^.*MacSyFinder //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - msf_data:
          type: string
          description: The name of the tool
      - "msf_data --version 2>&1 | grep -o 'MacSyLib [0-9.]*' | sed 's/MacSyLib //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@brovolia"
maintainers:
  - "@brovolia"
