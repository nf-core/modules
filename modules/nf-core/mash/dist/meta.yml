name: mash_dist
description: Calculate Mash distances between reference and query sequences
keywords:
  - distance
  - estimate
  - reference
  - query
tools:
  - mash:
      description: Fast sequence distance estimator that uses MinHash
      homepage: https://github.com/marbl/Mash
      documentation: https://mash.readthedocs.io/en/latest/sketches.html
      tool_dev_url: https://github.com/marbl/Mash
      doi: "10.1186/s13059-016-0997-x"
      licence:
        - "https://github.com/marbl/Mash/blob/master/LICENSE.txt"
      identifier: biotools:mash
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - query:
        type: file
        description: FASTA, FASTQ or Mash sketch
        pattern: "*.{fasta,fasta.gz,fastq,fastq.gz,msh}"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
          - edam: http://edamontology.org/format_3911 # msh
  - reference:
      type: file
      description: FASTA, FASTQ or Mash sketch
      pattern: "*.{fasta,fasta.gz,fastq,fastq.gz,msh}"
      ontologies:
        - edam: http://edamontology.org/format_1930 # FASTQ
        - edam: http://edamontology.org/format_3911 # msh
output:
  dist:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: The results from mash dist
          pattern: "*.txt"
          ontologies: []
  versions_mash:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mash:
          type: string
          description: The name of the tool
      - mash --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mash:
          type: string
          description: The name of the tool
      - mash --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
