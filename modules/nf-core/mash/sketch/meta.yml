name: mash_sketch
description: Creates vastly reduced representations of sequences using MinHash
keywords:
  - mash
  - mash/sketch
  - minhash
  - reduced
  - representations
  - sequences
  - sketch
tools:
  - mash:
      description: Fast sequence distance estimator that uses MinHash
      homepage: https://github.com/marbl/Mash
      documentation: https://mash.readthedocs.io/en/latest/sketches.html
      tool_dev_url: https://github.com/marbl/Mash
      doi: "10.1186/s13059-016-0997-x"
      licence:
        - "https://github.com/marbl/Mash/blob/master/LICENSE.txt"
      identifier: biotools:mash
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: List of input paired-end FastQ files
        ontologies: []
output:
  mash:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.msh":
          type: file
          description: Sketch output
          pattern: "*.{mash}"
          ontologies: []
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.mash_stats":
          type: file
          description: Sketch statistics
          pattern: "*.{mash_stats}"
          ontologies: []
  versions_mash:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mash:
          type: string
          description: The name of the tool
      - mash --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mash:
          type: string
          description: The name of the tool
      - mash --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@thanhleviet"
maintainers:
  - "@thanhleviet"
