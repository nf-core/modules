name: dotmatch_count
description: Count fixed-window known targets with DotMatch
keywords:
  - dotmatch
  - count
  - known-target assignment
tools:
  - dotmatch:
      description: Deterministic known-target short-DNA assignment workflows.
      homepage: https://github.com/Dnncha/dotmatch
      licence:
        - Apache-2.0
input:
  - meta:
      type: map
      description: Sample metadata map containing an id field.
  - reads:
      type: file
      description: FASTQ or FASTQ.gz reads for one sample.
      pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
  - targets:
      type: file
      description: DotMatch target table with id and sequence columns.
      pattern: "*.{tsv,csv}"
output:
  - counts:
      type: file
      description: DotMatch target count matrix.
      pattern: "*.counts.tsv"
  - summary:
      type: file
      description: DotMatch JSON assignment and QC summary.
      pattern: "*.summary.json"
  - sample_qc:
      type: file
      description: DotMatch sample-level QC table for MultiQC.
      pattern: "*.sample_qc.tsv"
  - assignments:
      type: file
      description: Per-read assignment diagnostics.
      pattern: "*.assignments.tsv"
  - versions:
      type: file
      description: Software versions captured by the process.
      pattern: "versions.yml"
authors:
  - DotMatch contributors
maintainers:
  - DotMatch contributors
license: "Apache-2.0"
