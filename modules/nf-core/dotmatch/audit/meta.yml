name: dotmatch_audit
description: Audit a DotMatch target library before correction-based assignment
keywords:
  - dotmatch
  - audit
  - target safety
tools:
  - dotmatch:
      description: Deterministic known-target short-DNA assignment workflows.
      homepage: https://github.com/Dnncha/dotmatch
      licence:
        - Apache-2.0
input:
  - meta:
      type: map
      description: Metadata map containing an id field.
  - targets:
      type: file
      description: Target, guide, primer, or barcode table.
      pattern: "*.{tsv,csv}"
output:
  - audit_dir:
      type: directory
      description: Complete DotMatch audit output directory.
      pattern: "audit"
  - summary_json:
      type: file
      description: Structured audit summary.
      pattern: "audit/audit_summary.json"
  - summary_tsv:
      type: file
      description: Workflow-facing audit summary table.
      pattern: "audit/audit_summary.tsv"
  - target_safety:
      type: file
      description: Per-target correction safety table.
      pattern: "audit/target_safety.tsv"
  - collision_pairs:
      type: file
      description: Target pairs that collide or are too close for correction.
      pattern: "audit/collision_pairs.tsv"
  - versions:
      type: file
      description: Software versions captured by the process.
      pattern: "versions.yml"
authors:
  - DotMatch contributors
maintainers:
  - DotMatch contributors
license: "Apache-2.0"
