name: dotmatch_panel_check
description: Check a barcode panel for DotMatch assignment safety
keywords:
  - dotmatch
  - panel
  - barcode safety
tools:
  - dotmatch:
      description: Deterministic known-target short-DNA assignment workflows.
      homepage: https://github.com/Dnncha/dotmatch
      licence:
        - Apache-2.0
input:
  - meta:
      type: map
      description: Metadata map containing an id field.
  - panel:
      type: file
      description: Barcode panel table with id and sequence columns.
      pattern: "*.{tsv,csv}"
output:
  - panel_check_dir:
      type: directory
      description: Complete DotMatch panel-check output directory.
      pattern: "panel_check"
  - panel_summary:
      type: file
      description: Structured panel safety certificate.
      pattern: "panel_check/panel_summary.json"
  - target_safety:
      type: file
      description: Per-barcode safety table.
      pattern: "panel_check/target_safety.tsv"
  - collision_pairs:
      type: file
      description: Barcode pairs that collide or are too close for correction.
      pattern: "panel_check/collision_pairs.tsv"
  - versions:
      type: file
      description: Software versions captured by the process.
      pattern: "versions.yml"
authors:
  - DotMatch contributors
maintainers:
  - DotMatch contributors
license: "Apache-2.0"
