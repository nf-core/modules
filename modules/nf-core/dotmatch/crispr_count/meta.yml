name: "dotmatch_crispr_count"
description: Count known CRISPR guide sequences in FASTQ reads with explicit unmatched and ambiguous-read reporting
keywords:
  - CRISPR
  - sgRNA
  - guide counting
  - FASTQ
  - known-target assignment
tools:
  - "dotmatch":
      description: "Deterministic known-target short-DNA assignment for sequencing workflows."
      homepage: "https://github.com/dnncha/dotmatch"
      documentation: "https://dotmatch.readthedocs.io/"
      tool_dev_url: "https://github.com/dnncha/dotmatch"
      doi: "10.5281/zenodo.20541628"
      licence:
        - "Apache-2.0"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - reads:
        type: file
        description: FASTQ file containing CRISPR guide reads
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930"
  - library:
      type: file
      description: CSV or TSV table containing guide identifiers, sequences and optional gene annotations
      pattern: "*.{csv,tsv}"
      ontologies:
        - edam: "http://edamontology.org/format_3752"
        - edam: "http://edamontology.org/format_3475"
  - guide_start:
      type: integer
      description: Zero-based start position of the guide sequence in each read
  - guide_length:
      type: integer
      description: Number of bases in the guide sequence
  - k:
      type: integer
      description: Maximum edit distance allowed for assignment
  - metric:
      type: string
      description: Edit-distance metric, either hamming or levenshtein
output:
  counts:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.counts.mageck.tsv":
          type: file
          description: MAGeCK-compatible guide count matrix
          pattern: "*.counts.mageck.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  summary:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.summary.json":
          type: file
          description: Assignment and quality-control summary
          pattern: "*.summary.json"
          ontologies:
            - edam: "http://edamontology.org/format_3464"
  sample_qc:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.sample_qc.tsv":
          type: file
          description: Sample-level assignment and quality-control metrics
          pattern: "*.sample_qc.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  versions_dotmatch:
    - - ${task.process}:
          type: string
          description: The name of the process
      - dotmatch:
          type: string
          description: The name of the tool
      - dotmatch --version | sed "s/^dotmatch //":
          type: eval
          description: The expression used to obtain the tool version
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - dotmatch:
          type: string
          description: The name of the tool
      - dotmatch --version | sed "s/^dotmatch //":
          type: eval
          description: The expression used to obtain the tool version
authors:
  - "@dnncha"
maintainers:
  - "@dnncha"
