name: "wfmash"
description: a pangenome-scale aligner
keywords:
  - long read alignment
  - pangenome-scale
  - all versus all
  - mashmap
  - wavefront
tools:
  - "wfmash":
      description: "a pangenome-scale aligner"
      homepage: https://github.com/waveygang/wfmash
      documentation: https://github.com/waveygang/wfmash
      tool_dev_url: https://github.com/waveygang/wfmash
      doi: 10.5281/zenodo.6949373
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta_gz:
        type: file
        description: BGZIPPED FASTA target file to create the mappings from.
        pattern: "{fa.gz,fna.gz,fasta.gz}"
        ontologies: []
    - paf:
        type: file
        description: Optional inpute file in PAF format to derive the precise
          alignments for.
        pattern: "*.{paf}"
        ontologies: []
    - gzi:
        type: file
        description: The GZI index of the input FASTA file.
        pattern: "*.{gzi}"
        ontologies: []
    - fai:
        type: file
        description: The FASTA index of the input FASTA file.
        pattern: "*.{fai}"
        ontologies: []
  - query_self:
      type: boolean
      description: If set to true, the input FASTA will also be used as the query
        FASTA.
  - fasta_query_list:
      type: file
      description: Optional inpute file in FASTA format specifying the query
        sequences as a list.
      pattern: "*.{fa,fna,fasta}"
      ontologies: []
output:
  paf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.paf":
          type: file
          description: Alignments in PAF format
          pattern: "*.{paf}"
          ontologies: []
  versions_wfmash:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wfmash:
          type: string
          description: The name of the tool
      - wfmash --version 2>&1 | cut -f 1 -d "-" | cut -f 2 -d "v":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - wfmash:
          type: string
          description: The name of the tool
      - wfmash --version 2>&1 | cut -f 1 -d "-" | cut -f 2 -d "v":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@subwaystation"
maintainers:
  - "@subwaystation"
