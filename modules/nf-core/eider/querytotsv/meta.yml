name: eider_querytotsv
description: Generic DuckDB query to TSV text format
keywords:
  - duckdb
  - tsv
  - sql
  - query
tools:
  - eider:
      description: |
        Command line bioinformatics tools for DuckDB.
      homepage: https://github.com/heuermh/eider
      documentation: https://github.com/heuermh/eider
      licence: ["Apache-2.0"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - sql:
        type: file
        description: |
          SQL query template; at least one SQL statement
          should copy to an output file in TSV text format,
          e.g. COPY table_name TO 'file.tsv' (HEADER);
        pattern: "*.{sql|sql.bgz|sql.gz|sql.zst}"
    - files:
        type: file
        description: List of additional files to stage
        pattern: "*"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: |
            Query results in tab separated values (TSV) text format
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_eider:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - eider:
          type: string
          description: The tool name
      - "eider --version 2>&1 | grep -o 'eider .*' | cut -f2 -d ' '":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - eider:
          type: string
          description: The tool name
      - "eider --version 2>&1 | grep -o 'eider .*' | cut -f2 -d ' '":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@heuermh"
maintainers:
  - "@heuermh"
