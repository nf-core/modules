name: "cellranger_multi"
description: Module to use Cell Ranger's pipelines to analyze sequencing data produced
  from various Chromium technologies, including Single Cell Gene Expression, Single
  Cell Immune Profiling, Feature Barcoding, and Cell Multiplexing.
keywords:
  - align
  - reference
  - cellranger
  - multiomics
  - gene expression
  - vdj
  - antigen capture
  - antibody capture
  - crispr
tools:
  - "cellranger":
      description: Cell Ranger by 10x Genomics is a set of analysis pipelines that process
        Chromium single-cell data to align reads, generate feature-barcode matrices,
        perform clustering and other secondary analysis, and more.
      homepage: https://support.10xgenomics.com/single-cell-gene-expression/software/pipelines/latest/what-is-cell-ranger
      documentation: https://support.10xgenomics.com/single-cell-gene-expression/software/pipelines/latest/using/tutorial_cp
      tool_dev_url: https://support.10xgenomics.com/single-cell-gene-expression/software/pipelines/latest/using/tutorial_cp
      licence:
        - 10X Genomics EULA
      identifier: ""
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
    - gex_fastqs:
        type: file
        description: FASTQ files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
    - gex_options:
        type: map
        description: |
          Optional Cell Ranger gene expression section options as a Map.
          Supported keys: filter-probes, r1-length, r2-length, chemistry, expect-cells,
          force-cells, no-secondary, check-library-compatibility, no-target-umi-filter,
          include-introns, create-bam (defaults to true if not set).
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
    - vdj_fastqs:
        type: file
        description: FASTQ files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
    - vdj_options:
        type: map
        description: |
          Optional Cell Ranger VDJ section options as a Map.
          Supported keys: r1-length, r2-length.
  - - meta4:
        type: map
        description: |
          Groovy Map containing sample information
    - ab_fastqs:
        type: file
        description: FASTQ files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
    - ab_options:
        type: map
        description: |
          Optional Cell Ranger feature section options for Antibody Capture as a Map.
          Pass null to disable this modality. Supported keys: r1-length, r2-length.
  - - meta5:
        type: map
        description: |
          Groovy Map containing sample information
    - beam_fastqs:
        type: file
        description: FASTQ files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
    - beam_options:
        type: map
        description: |
          Optional Cell Ranger BEAM section options as a Map. Reserved for future use.
  - - meta6:
        type: map
        description: |
          Groovy Map containing sample information
    - cmo_fastqs:
        type: file
        description: FASTQ files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
    - cmo_options:
        type: map
        description: |
          Optional Cell Ranger CMO section options as a Map.
          Supported keys: min-assignment-confidence.
  - - meta7:
        type: map
        description: |
          Groovy Map containing sample information
    - crispr_fastqs:
        type: file
        description: FASTQ files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
    - crispr_options:
        type: map
        description: |
          Optional Cell Ranger feature section options for CRISPR Guide Capture as a Map.
          Pass null to disable this modality. Supported keys: r1-length, r2-length.
  - gex_reference:
      type: directory
      description: Folder containing Cellranger gene expression reference. Can also
        be a gzipped tarball
      pattern: "*.tar.gz"
  - gex_frna_probeset:
      type: file
      description: Fixed RNA profiling information containing custom probes in CSV format
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - gex_targetpanel:
      type: file
      description: Declaration of the target panel for Targeted Gene Expression analysis
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - vdj_reference:
      type: directory
      description: Folder containing Cellranger V(D)J reference. Can also be a gzipped
        tarball
      pattern: "*.tar.gz"
  - vdj_primer_index:
      type: file
      description: List of custom V(D)J inner enrichment primers
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - fb_reference:
      type: file
      description: The Feature Barcodes used for reference in Feature Barcoding Analysis
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - beam_antigen_panel:
      type: file
      description: The BEAM manifest in Feature Barcode CSV format
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - beam_control_panel:
      type: file
      description: The BEAM antigens set to control status, with corresponding MHC alleles,
        in Feature Barcode CSV format
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - cmo_reference:
      type: file
      description: Path to a custom Cell Multiplexing CSV reference IDs, or the `cmo-set`
        option in Cellranger
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - cmo_barcodes:
      type: file
      description: A CSV file appended to the Cellranger multi config linking samples
        to CMO IDs
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - cmo_barcode_assignment:
      type: file
      description: A CSV file that specifies the barcode-sample assignment in Cell Multiplexing
        analysis
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - frna_sampleinfo:
      type: file
      description: Sample information for fixed RNA analysis
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - ocm_barcodes:
      type: file
      description: A CSV file appended to the Cellranger multi config linking samples
        to OCM IDs
      pattern: "*.csv"
      ontologies:
        - edam: http://edamontology.org/format_3752
  - skip_renaming:
      type: boolean
      description: Skip renaming
output:
  config:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - cellranger_multi_config.csv:
          type: file
          description: The resolved Cellranger multi config used for analysis
          pattern: "cellranger_multi_config.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  outs:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "**/outs/**":
          type: file
          description: Files containing the outputs of Cell Ranger
          pattern: "${meta.id}/outs/*"
          ontologies: []
  versions_cellranger:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cellranger:
          type: string
          description: The name of the tool
      - cellranger --version | sed "s/.* //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cellranger:
          type: string
          description: The name of the tool
      - cellranger --version | sed "s/.* //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@klkeys"
maintainers:
  - "@klkeys"
