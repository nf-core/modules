# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "gcta_adjustgrm"
description: Adjust a dense GRM for incomplete tagging using `gcta --grm-adj`
keywords:
  - gcta
  - grm
  - genetics
tools:
  - "gcta":
      description: "Genome-wide Complex Trait Analysis (GCTA) estimates genetic relationships, variance components, and association statistics from genome-wide data."
      homepage: "https://yanglab.westlake.edu.cn/software/gcta/"
      documentation: "https://yanglab.westlake.edu.cn/software/gcta/static/gcta_doc_latest.pdf"
      tool_dev_url: "https://yanglab.westlake.edu.cn/software/gcta/"

input:
  - - meta:
        type: map
        description: |
          Groovy map containing dense GRM metadata
          e.g. `[ id:'plink_simulated' ]`
    - grm_id:
        type: file
        description: Dense GRM sample identifier file
        pattern: "*.grm.id"
        ontologies: []
    - grm_bin:
        type: file
        description: Dense GRM binary matrix file
        pattern: "*.grm.bin"
        ontologies: []
    - grm_n_bin:
        type: file
        description: Dense GRM sample-count matrix file
        pattern: "*.grm.N.bin"
        ontologies: []

output:
  grm_files:
    - - meta:
          type: map
          description: |
            Groovy map containing dense GRM metadata
            e.g. `[ id:'plink_simulated' ]`
      - "${meta.id}_adj.grm.id":
          type: file
          description: Adjusted GRM sample identifier file
          pattern: "${meta.id}_adj.grm.id"
          ontologies: []
      - "${meta.id}_adj.grm.bin":
          type: file
          description: Adjusted GRM binary matrix file
          pattern: "${meta.id}_adj.grm.bin"
          ontologies: []
      - "${meta.id}_adj.grm.N.bin":
          type: file
          description: Adjusted GRM sample-count matrix file
          pattern: "${meta.id}_adj.grm.N.bin"
          ontologies: []
  versions_gcta:
    - - "${task.process}":
          type: string
          description: The process the version was collected from
      - "gcta":
          type: string
          description: The tool name
      - "gcta --version 2>&1 | head -n 1":
          type: eval
          description: The command used to retrieve the GCTA version

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the version was collected from
      - gcta:
          type: string
          description: The tool name
      - gcta --version 2>&1 | head -n 1:
          type: eval
          description: The command used to retrieve the GCTA version

authors:
  - "@andongni"
maintainers:
  - "@andongni"
