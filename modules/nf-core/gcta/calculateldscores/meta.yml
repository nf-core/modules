# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "gcta_calculateldscores"
description: Calculate LD scores with GCTA and segment variants into LD-based SNP groups
keywords:
  - gcta
  - ld score
  - ldms
  - genetics
tools:
  - "gcta":
      description: "GCTA is a tool for genome-wide complex trait analysis."
      homepage: "https://yanglab.westlake.edu.cn/software/gcta/"
      documentation: "https://yanglab.westlake.edu.cn/software/gcta/static/gcta_doc_latest.pdf"
      tool_dev_url: "https://github.com/jianyangqt/gcta"
      licence: ["GPL-3.0-only"]
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing PLINK1 genotype metadata
          e.g. `[ id:'plink_simulated' ]`
    - bed:
        type: file
        description: PLINK1 genotype primary file
        pattern: "*.{bed}"
        ontologies:
          - edam: "http://edamontology.org/format_3003"
    - bim:
        type: file
        description: PLINK1 variant metadata file
        pattern: "*.{bim}"
        ontologies: []
    - fam:
        type: file
        description: PLINK1 sample metadata file
        pattern: "*.{fam}"
        ontologies: []
output:
  ld_scores:
    - - meta:
          type: map
          description: |
            Groovy Map containing PLINK1 genotype metadata
            e.g. `[ id:'plink_simulated' ]`
      - "${meta.id}_gcta_ld.score.ld":
          type: file
          description: GCTA LD score output file
          pattern: "${meta.id}_gcta_ld.score.ld"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  snp_group_files:
    - - meta:
          type: map
          description: |
            Groovy Map containing PLINK1 genotype metadata
            e.g. `[ id:'plink_simulated' ]`
      - "${meta.id}_snp_group1.txt":
          type: file
          description: First LD-derived SNP-group file
          pattern: "${meta.id}_snp_group1.txt"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
      - "${meta.id}_snp_group2.txt":
          type: file
          description: Second LD-derived SNP-group file
          pattern: "${meta.id}_snp_group2.txt"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
      - "${meta.id}_snp_group3.txt":
          type: file
          description: Third LD-derived SNP-group file
          pattern: "${meta.id}_snp_group3.txt"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
      - "${meta.id}_snp_group4.txt":
          type: file
          description: Fourth LD-derived SNP-group file
          pattern: "${meta.id}_snp_group4.txt"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_gcta:
    - - "${task.process}":
          type: string
          description: The process the versions were collected from
      - "gcta":
          type: string
          description: The tool name
      - "gcta --version 2>&1 | head -n 1":
          type: eval
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - gcta:
          type: string
          description: The tool name
      - gcta --version 2>&1 | head -n 1:
          type: eval
          description: The command used to generate the version of the tool
authors:
  - "@andongni"
maintainers:
  - "@andongni"
