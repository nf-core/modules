# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "gcta_reml"
description: Run univariate REML heritability estimation with a dense GRM
keywords:
  - gcta
  - reml
  - genetics
tools:
  - "gcta":
      description: "Genome-wide Complex Trait Analysis (GCTA) estimates genetic relationships, variance components, and association statistics from genome-wide data."
      homepage: "https://yanglab.westlake.edu.cn/software/gcta/"
      documentation: "https://yanglab.westlake.edu.cn/software/gcta/static/gcta_doc_latest.pdf"
      tool_dev_url: "https://yanglab.westlake.edu.cn/software/gcta/"
input:
  - - meta:
        type: map
        description: |
          Groovy map containing phenotype metadata
          e.g. `[ id:'QuantitativeTrait' ]`
    - phenotypes_file:
        type: file
        description: Phenotype file passed to `--pheno`
        pattern: "*.{phe,pheno,txt,tsv}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
  - - meta2:
        type: map
        description: |
          Groovy map containing dense GRM metadata
          e.g. `[ id:'plink_simulated' ]`
    - grm_id:
        type: file
        description: Dense GRM sample identifier file
        pattern: "*.grm.id"
        ontologies: []
    - grm_bin:
        type: file
        description: Dense GRM binary matrix file
        pattern: "*.grm.bin"
        ontologies: []
    - grm_n_bin:
        type: file
        description: Dense GRM sample-count matrix file
        pattern: "*.grm.N.bin"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy map containing quantitative covariate metadata
          e.g. `[ id:'covariates_quant' ]`
    - quant_covariates_file:
        type: file
        description: Quantitative covariates file, pass `[]` when absent
        pattern: "*.{covar,cov,txt,tsv}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
  - - meta4:
        type: map
        description: |
          Groovy map containing categorical covariate metadata
          e.g. `[ id:'covariates_cat' ]`
    - cat_covariates_file:
        type: file
        description: Categorical covariates file, pass `[]` when absent
        pattern: "*.{covar,cov,txt,tsv}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
output:
  reml_results:
    - - meta:
          type: map
          description: |
            Groovy map containing phenotype metadata
            e.g. `[ id:'QuantitativeTrait' ]`
      - "${meta.id}.hsq":
          type: file
          description: REML result file
          pattern: "${meta.id}.hsq"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_gcta:
    - - "${task.process}":
          type: string
          description: The process the version was collected from
      - "gcta":
          type: string
          description: The tool name
      - "gcta --version 2>&1 | head -n 1":
          type: eval
          description: The command used to retrieve the GCTA version
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the version was collected from
      - gcta:
          type: string
          description: The tool name
      - gcta --version 2>&1 | head -n 1:
          type: eval
          description: The command used to retrieve the GCTA version
authors:
  - "@andongni"
maintainers:
  - "@andongni"
