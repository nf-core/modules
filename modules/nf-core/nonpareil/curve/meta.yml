name: "nonpareil_curve"
description: Visualise metagenome redundancy curve in PNG format from a single
  Nonpareil npo file
keywords:
  - metagenomics
  - statistics
  - coverage
  - complexity
  - redundancy
  - diversity
  - visualisation
tools:
  - "nonpareil":
      description: "Estimate average coverage and create curves for metagenomic datasets"
      homepage: "https://github.com/lmrodriguezr/nonpareil"
      documentation: "https://nonpareil.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/lmrodriguezr/nonpareil"
      doi: "10.1128/msystems.00039-"
      licence:
        - "Artistic License 2.0"
      identifier: biotools:nonpareil
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - npo:
        type: file
        description: Single npo redundancy summary file from nonpareil itself
        pattern: "*.npo"
        ontologies: []
output:
  png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*.png":
          type: file
          description: PNG file of the Nonpareil curve
          pattern: "*.png"
          ontologies: []
  versions_nonpareil:
    - - ${task.process}:
          type: string
          description: Process which generated the version
      - Nonpareil:
          type: string
          description: Tool name
      - Rscript -e "library(Nonpareil); cat(paste(unlist(packageVersion('Nonpareil')), collapse = '.'))":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: Process which generated the version
      - Nonpareil:
          type: string
          description: Tool name
      - Rscript -e "library(Nonpareil); cat(paste(unlist(packageVersion('Nonpareil')), collapse = '.'))":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
