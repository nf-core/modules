name: "mgnifam_generatefamilies"
description: Iteratively builds protein family HMM profiles from MMseqs2 sequence
  clusters and expands them against a protein database
keywords:
  - protein families
  - hidden markov model
  - profile hmm
  - clustering
  - sequence alignment
  - proteomics
tools:
  - "mgnifam":
      description: Python package for iterative HMM-based protein family generation
        over large sequence databases, building an HMM from each cluster, recruiting
        new members, re-aligning, and either converging on a family or discarding
        the cluster
      homepage: "https://github.com/vagkaratzas/mgnifam"
      documentation: "https://github.com/vagkaratzas/mgnifam"
      tool_dev_url: "https://github.com/vagkaratzas/mgnifam"
      licence:
        - "MIT"
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - clusters_chunk:
        type: file
        description: Mandatory. Headerless TSV file of MMseqs2 sequence clusters,
          one representative-member pair per line (representative<TAB>member)
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475 # TSV
    - fasta_file:
        type: file
        description:Uncompressed FASTA file of the protein sequence
          database, with unique sequence names, referenced by the cluster members
        pattern: "*.{fa,fasta,fna,faa}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA

output:
  seed_msa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/seed_msa/*.sto.gz:
          type: file
          description: Optional. Per-family seed multiple sequence alignment in
            gzipped Stockholm format
          pattern: "*/seed_msa/*.sto.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  full_msa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/full_msa/*.sto.gz:
          type: file
          description: Optional. Per-family full multiple sequence alignment, including
            recruited members, in gzipped Stockholm format
          pattern: "*/full_msa/*.sto.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  hmm:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/hmm/*.hmm.gz:
          type: file
          description: Optional. Per-family profile HMM model in gzipped HMMER format
          pattern: "*/hmm/*.hmm.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  rf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/rf/*.txt:
          type: file
          description: Optional. Per-family reference annotation (RF) line, marking
            match-state columns of the seed alignment
          pattern: "*/rf/*.txt"
          ontologies:
            - edam: http://edamontology.org/format_3671 # Plain text format
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}_families.tsv:
          type: file
          description: Optional. Roster of the generated protein families
          pattern: "*/*_families.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}_metadata.csv:
          type: file
          description: Optional. Metadata describing the generated protein families
          pattern: "*/*_metadata.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}.log:
          type: file
          description: Optional. Diagnostic log of the family generation run
          pattern: "*/*.log"
          ontologies:
            - edam: http://edamontology.org/format_3671 # Plain text format
  reps_fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}_reps.fasta.gz:
          type: file
          description: Optional. Representative sequences of the generated families
            in gzipped FASTA format
          pattern: "*/*_reps.fasta.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  successful:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}_successful.txt:
          type: file
          description: Optional. List of clusters that successfully converged into
            families
          pattern: "*/*_successful.txt"
          ontologies:
            - edam: http://edamontology.org/format_3671 # Plain text format
  discarded:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}_discarded.csv:
          type: file
          description: Optional. Clusters discarded during family generation, with
            reasons
          pattern: "*/*_discarded.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  converged:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}/${prefix}_converged.txt:
          type: file
          description: Optional. List of clusters that converged during family generation
          pattern: "*/*_converged.txt"
          ontologies:
            - edam: http://edamontology.org/format_3671 # Plain text format
  versions_mgnifam:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mgnifam:
          type: string
          description: The name of the tool
      - mgnifam --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1:
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mgnifam:
          type: string
          description: The name of the tool
      - mgnifam --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1:
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
