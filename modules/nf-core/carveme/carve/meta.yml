name: carveme_carve
description: Reconstruct genome-scale metabolic models from protein FASTA files using CarveMe
keywords:
  - metabolic model
  - genome-scale
  - sbml
  - flux balance analysis
  - metabolic reconstruction
tools:
  - carveme:
      description: CarveMe is a python-based tool for genome-scale metabolic model
        reconstruction.
      homepage: https://carveme.readthedocs.io
      documentation: https://carveme.readthedocs.io
      tool_dev_url: https://github.com/cdanielmachado/carveme
      doi: "10.1093/nar/gky537"
      licence:
        - "Apache-2.0"
      identifier: biotools:carveme
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - fasta:
        type: file
        description: Protein FASTA file
        pattern: "*.{fa,faa,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
    - universe_file:
        type: file
        description: Optional. Reaction universe file in SBML format, passed to --universe-file.
        pattern: "*.xml"
        ontologies:
          - edam: "http://edamontology.org/format_2332" # XML
    - mediadb:
        type: file
        description: Optional. Media database file, passed to --mediadb.
        pattern: "*.{tsv,csv,txt}"
        ontologies:
          - edam: "http://edamontology.org/format_3475" # TSV
          - edam: "http://edamontology.org/format_3752" # CSV
          - edam: "http://edamontology.org/format_2330" # Textual format
    - soft:
        type: file
        description: Optional. Soft constraints file, passed to --soft.
        pattern: "*.{tsv,csv,txt}"
        ontologies:
          - edam: "http://edamontology.org/format_3475" # TSV
          - edam: "http://edamontology.org/format_3752" # CSV
          - edam: "http://edamontology.org/format_2330" # Textual format
    - hard:
        type: file
        description: Optional. Hard constraints file, passed to --hard.
        pattern: "*.{tsv,csv,txt}"
        ontologies:
          - edam: "http://edamontology.org/format_3475" # TSV
          - edam: "http://edamontology.org/format_3752" # CSV
          - edam: "http://edamontology.org/format_2330" # Textual format
    - reference:
        type: file
        description: Optional. Manually curated model of a close reference species, passed to --reference.
        pattern: "*.xml"
        ontologies:
          - edam: "http://edamontology.org/format_2332" # XML
output:
  model:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.xml:
          type: file
          description: SBML genome-scale metabolic model file
          pattern: "*.xml"
          ontologies:
            - edam: "http://edamontology.org/format_2332" # XML
  debug:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.log:
          type: file
          description: Optional debug files produced when --debug is passed. Contains the LP formulation (.lp) and solution (.sol) from the MILP solver.
          pattern: "*.log"
          ontologies:
            - edam: "http://edamontology.org/format_2330" # Textual format
  versions_carveme:
    - - ${task.process}:
          type: string
          description: The name of the process
      - carveme:
          type: string
          description: The name of the tool
      - "pip show carveme | sed -n 's/^Version: //p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - carveme:
          type: string
          description: The name of the tool
      - "pip show carveme | sed -n 's/^Version: //p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
