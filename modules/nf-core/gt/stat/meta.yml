# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "gt_stat"
description: "GenomeTools gt-stat utility to show statistics about features contained
  in GFF3 files"
keywords:
  - genome
  - gff3
  - annotation
  - statistics
  - stats
tools:
  - "gt":
      description: "The GenomeTools genome analysis system"
      homepage: "https://genometools.org/index.html"
      documentation: "https://genometools.org/documentation.html"
      tool_dev_url: "https://github.com/genometools/genometools"
      doi: "10.1109/TCBB.2013.68"
      licence:
        - "ISC"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test' ]`
    - gff3:
        type: file
        description: Input gff3 file
        pattern: "*.{gff,gff3}"
        ontologies: []
output:
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test' ]`
      - ${prefix}.yml:
          type: file
          description: Stats file in yaml format
          pattern: "*.yml"
          ontologies:
            - edam: http://edamontology.org/format_3750 # YAML
  versions_gt:
    - - ${task.process}:
          type: string
          description: The name of the process
      - genometools:
          type: string
          description: The name of the tool
      - gt --version | sed '1!d;s/gt (GenomeTools) //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - genometools:
          type: string
          description: The name of the tool
      - gt --version | sed '1!d;s/gt (GenomeTools) //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@GallVp"
maintainers:
  - "@GallVp"
