name: emmtyper
description: EMM typing of Streptococcus pyogenes assemblies
keywords:
  - fasta
  - Streptococcus pyogenes
  - typing
tools:
  - emmtyper:
      description: Streptococcus pyogenes in silico EMM typer
      homepage: https://github.com/MDU-PHL/emmtyper
      documentation: https://github.com/MDU-PHL/emmtyper
      tool_dev_url: https://github.com/MDU-PHL/emmtyper
      licence:
        - "GNU General Public v3 (GPL v3)"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: FASTA assembly file
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz}"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: Tab-delimited result file
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_emmtyper:
    - - ${task.process}:
          type: string
          description: The name of the process
      - emmtyper:
          type: string
          description: The name of the tool
      - python -c "import emmtyper; print(emmtyper.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - emmtyper:
          type: string
          description: The name of the tool
      - python -c "import emmtyper; print(emmtyper.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
