name: "genescopefk"
description: A derivative of GenomeScope2.0 modified to work with FastK
keywords:
  - k-mer
  - genome profile
  - histogram
tools:
  - "genescopefk":
      description: "A derivative of GenomeScope2.0 modified to work with FastK"
      homepage: "https://github.com/thegenemyers/GENESCOPE.FK"
      tool_dev_url: "https://github.com/thegenemyers/GENESCOPE.FK"
      license:
        - "https://github.com/thegenemyers/GENESCOPE.FK/blob/main/LICENSE"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fastk_histex_histogram:
        type: file
        description: A histogram formatted for GeneScope using the -G parameter
          from Fastk Histex
        pattern: "*.hist"
        ontologies: []
output:
  linear_plot:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_linear_plot.png":
          type: file
          description: A GeneScope linear plot in PNG format
          pattern: "*_linear_plot.png"
          ontologies: []
  log_plot:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_log_plot.png":
          type: file
          description: A GeneScope log plot in PNG format
          pattern: "*_log_plot.png"
          ontologies: []
  model:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_model.txt":
          type: file
          description: GeneScope model fit summary
          pattern: "*_model.txt"
          ontologies: []
  summary:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_summary.txt":
          type: file
          description: GeneScope histogram summary
          pattern: "*_summary.txt"
          ontologies: []
  transformed_linear_plot:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_transformed_linear_plot.png":
          type: file
          description: A GeneScope transformed linear plot in PNG format
          pattern: "*_transformed_linear_plot.png"
          ontologies: []
  transformed_log_plot:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_transformed_log_plot.png":
          type: file
          description: A GeneScope transformed log plot in PNG format
          pattern: "*_transformed_log_plot.png"
          ontologies: []
  kmer_cov:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - KMERCOV:
          type: float
          description: Average kmer coverage value extracted from summary file
          pattern: "[0-9.]+"
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_genescopefk.log":
          type: file
          description: GeneScopeFK command stdout log
          pattern: "*_genescopefk.log"
          ontologies: []
  versions_genescopefk:
    - - ${task.process}:
          type: string
          description: Name of the process
      - genescopefk:
          type: string
          description: Name of the tool
      - "R --version | sed '1!d; s/.*version //; s/ .*//'":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: Name of the process
      - genescopefk:
          type: string
          description: Name of the tool
      - "R --version | sed '1!d; s/.*version //; s/ .*//'":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@mahesh-panchal"
maintainers:
  - "@mahesh-panchal"
