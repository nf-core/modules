name: meningotype
description: Serotyping of Neisseria meningitidis assemblies
keywords:
  - fasta
  - Neisseria meningitidis
  - serotype
tools:
  - meningotype:
      description: In silico serotyping and finetyping (porA and fetA) of
        Neisseria meningitidis
      homepage: https://github.com/MDU-PHL/meningotype
      documentation: https://github.com/MDU-PHL/meningotype
      tool_dev_url: https://github.com/MDU-PHL/meningotype
      licence:
        - "GPL v3"
      identifier: biotools:meningotype
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: FASTA assembly file
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz}"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: Tab-delimited result file
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_meningotype:
    - - ${task.process}:
          type: string
          description: The name of the process
      - meningotype:
          type: string
          description: The name of the tool
      - meningotype --version 2>&1 | sed 's/^.*meningotype v//':
          type: eval
          description: The expression to obtain the version of the tool

  versions_biopython:
    - - ${task.process}:
          type: string
          description: The name of the process
      - biopython:
          type: string
          description: The name of the tool
      - python -c 'import Bio; print(Bio.__version__)':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - meningotype:
          type: string
          description: The name of the tool
      - meningotype --version 2>&1 | sed 's/^.*meningotype v//':
          type: eval
          description: The expression to obtain the version of the tool

    - - ${task.process}:
          type: string
          description: The name of the process
      - biopython:
          type: string
          description: The name of the tool
      - python -c 'import Bio; print(Bio.__version__)':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
