name: "elprep_filter"
description: "Filter, sort and markdup sam/bam files, with optional BQSR and variant
  calling."
keywords:
  - sort
  - bam
  - sam
  - filter
  - variant calling
tools:
  - "elprep":
      description: "elPrep is a high-performance tool for preparing .sam/.bam files
        for variant calling in sequencing pipelines. It can be used as a drop-in replacement
        for SAMtools/Picard/GATK4."
      homepage: "https://github.com/ExaScience/elprep"
      documentation: "https://github.com/ExaScience/elprep"
      tool_dev_url: "https://github.com/ExaScience/elprep"
      doi: "10.1371/journal.pone.0244471"
      licence:
        - "AGPL v3"
      identifier: biotools:elprep
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: Input SAM/BAM file
        pattern: "*.{bam,sam}"
        ontologies: []
    - bai:
        type: file
        description: Input BAM file index
        pattern: "*.bai"
        ontologies: []
    - target_regions_bed:
        type: file
        description: Optional BED file containing target regions for BQSR and
          variant calling.
        pattern: "*.bed"
        ontologies: []
    - filter_regions_bed:
        type: file
        description: Optional BED file containing regions to filter.
        pattern: "*.bed"
        ontologies: []
    - intermediate_bqsr_tables:
        type: file
        description: Optional list of BQSR tables, used when parsing files created
          by `elprep split`
        pattern: "*.table"
        ontologies: []
    - recall_file:
        type: file
        description: Recall file with intermediate results for bqsr
        pattern: "*.recall"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reference_sequences:
        type: file
        description: Optional SAM header to replace existing header.
        pattern: "*.sam"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reference_elfasta:
        type: file
        description: Elfasta file, required for BQSR and variant calling.
        pattern: "*.elfasta"
        ontologies: []
  - - meta4:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - known_sites_elsites:
        type: file
        description: Optional elsites file containing known SNPs for BQSR.
        pattern: "*.elsites"
        ontologies: []
  - run_haplotypecaller:
      type: boolean
      description: Run variant calling on the input files. Needed to generate gvcf
        output.
  - run_bqsr:
      type: boolean
      description: Run BQSR on the input files. Needed to generate recall metrics.
  - bqsr_tables_only:
      type: boolean
      description: Write intermediate BQSR tables, used when parsing files created
        by `elprep split`.
  - get_activity_profile:
      type: boolean
      description: Get the activity profile calculated by the haplotypecaller to
        the given file in IGV format.
  - get_assembly_regions:
      type: boolean
      description: Get the assembly regions calculated by haplotypecaller to the
        specified file in IGV format.
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{bam,sam}":
          type: file
          description: BAM/SAM file
          pattern: "*.{bam,sam}"
          ontologies: []
  logs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.log":
          type: file
          description: Log file
          pattern: "elprep-*.log"
          ontologies: []
  metrics:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.metrics.txt":
          type: file
          description: Metrics file
          pattern: "*.{metrics.txt}"
          ontologies: []
  recall:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.recall":
          type: file
          description: Recall file
          pattern: "*.{recall}"
          ontologies: []
  gvcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf.gz":
          type: file
          description: VCF file
          pattern: "*.{vcf.gz}"
          ontologies: []
  table:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.table":
          type: file
          description: Table
          pattern: "*.{table}"
          ontologies: []
  activity_profile:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.activity_profile.igv":
          type: file
          description: Activity profile
          pattern: "*.{activity_profile.igv}"
          ontologies: []
  assembly_regions:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.assembly_regions.igv":
          type: file
          description: Assembly regions
          pattern: "*.{assembly_regions.igv}"
          ontologies: []
  versions_elprep:
    - - ${task.process}:
          type: string
          description: The name of the process
      - elprep:
          type: string
          description: The name of the tool
      - elprep 2>&1 | sed -n '2s/^.*version //;s/ compiled.*$//p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - elprep:
          type: string
          description: The name of the tool
      - elprep 2>&1 | sed -n '2s/^.*version //;s/ compiled.*$//p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@matthdsm"
maintainers:
  - "@matthdsm"
