name: treerecs
description: Correct or reconcile gene trees against a species tree using Treerecs
keywords:
  - phylogeny
  - gene tree
  - species tree
  - reconciliation

tools:
  - treerecs:
      description: Reconciles and corrects gene trees using a species tree
      homepage: https://project.inria.fr/treerecs/
      documentation: https://project.inria.fr/treerecs/tutorial/
      tool_dev_url: https://gitlab.inria.fr/Phylophile/Treerecs
      licence: ["CECILL-C"]

input:
  - - meta:
        type: map
        description: Groovy Map containing sample information, for example [ id:'test' ]
    - species_tree:
        type: file
        description: Species tree file
        pattern: "*.{nwk,newick,nhx,xml,txt}"
    - gene_trees:
        type: file
        description: Gene tree file
        pattern: "*.{nwk,newick,nhx,xml,txt}"

output:
  - corrected_trees:
      - - meta:
            type: map
            description: Groovy Map containing sample information
        - "treerecs_output/${prefix}.nwk":
            type: file
            description: Corrected or reconciled tree in Newick format
            pattern: "*.nwk"

  - versions_treerecs:
      - - process:
            type: string
            description: Process name
        - tool:
            type: string
            description: Tool name
        - version:
            type: string
            description: Treerecs version

authors:
  - "@takahiro_fujita"