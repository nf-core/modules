name: bamtools_split
description: BamTools provides both a programmer's API and an end-user's toolkit for
  handling BAM files.
keywords:
  - bamtools
  - bamtools/split
  - bam
  - split
  - chunk
tools:
  - bamtools:
      description: C++ API & command-line toolkit for working with BAM data
      homepage: http://github.com/pezmaster31/bamtools
      documentation: https://github.com/pezmaster31/bamtools/wiki
      tool_dev_url: http://github.com/pezmaster31/bamtools
      licence: ["MIT"]
      identifier: biotools:bamtools
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: A list of one or more BAM files to merge and then split
        pattern: "*.bam"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: Several Bam files
          pattern: "*.bam"
          ontologies: []
  versions_bamtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bamtools:
          type: string
          description: The name of the tool
      - "bamtools --version | sed '2!d;s/bamtools //g'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sguizard"
  - "@matthdsm"
maintainers:
  - "@sguizard"
  - "@matthdsm"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bamtools:
          type: string
          description: The name of the tool
      - "bamtools --version | sed '2!d;s/bamtools //g'":
          type: eval
          description: The expression to obtain the version of the tool
