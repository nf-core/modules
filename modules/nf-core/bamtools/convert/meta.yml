name: bamtools_convert
description: BamTools provides both a programmer's API and an end-user's toolkit for
  handling BAM files.
keywords:
  - bamtools
  - bamtools/convert
  - bam
  - convert
  - bed
  - fasta
  - fastq
  - json
  - pileup
  - sam
  - yaml
tools:
  - bamtools:
      description: C++ API & command-line toolkit for working with BAM data
      homepage: http://github.com/pezmaster31/bamtools
      documentation: https://github.com/pezmaster31/bamtools/wiki
      tool_dev_url: http://github.com/pezmaster31/bamtools
      licence: ["MIT"]
      identifier: biotools:bamtools
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM file
        pattern: "*.bam"
        ontologies: []
output:
  data:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{bed,fasta,fastq,json,pileup,sam,yaml}":
          type: file
          description: Output file
          pattern: "*.{bed,fasta,fastq,json,pileup,sam,yaml}"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
            - edam: http://edamontology.org/format_3464 # JSON
            - edam: http://edamontology.org/format_3750 # YAML
  versions_bamtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bamtools:
          type: string
          description: The name of the tool
      - "bamtools --version | sed '2!d;s/bamtools //g'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sguizard"
maintainers:
  - "@sguizard"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bamtools:
          type: string
          description: The name of the tool
      - "bamtools --version | sed '2!d;s/bamtools //g'":
          type: eval
          description: The expression to obtain the version of the tool
