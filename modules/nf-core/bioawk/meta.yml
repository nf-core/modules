name: "bioawk"
description: Bioawk is an extension to Brian Kernighan's awk, adding the support
  of several common biological data formats.
keywords:
  - bioawk
  - fastq
  - fasta
  - sam
  - file manipulation
  - awk
tools:
  - bioawk:
      description: BWK awk modified for biological data
      homepage: https://github.com/lh3/bioawk
      documentation: https://github.com/lh3/bioawk
      tool_dev_url: https://github.com/lh3/bioawk
      licence:
        - Free software license
          (https://github.com/lh3/bioawk/blob/master/README.awk#L1)
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input:
        type: file
        description: |
          Input biological sequence file (optionally gzipped) to be manipulated via the program specified in `$args`.
        pattern: "*.{bed,gff,sam,vcf,fastq,fasta,tab,bed.gz,gff.gz,sam.gz,vcf.gz,fastq.gz,fasta.gz,tab.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3003 # BED
          - edam: http://edamontology.org/format_3016 # VCF
          - edam: http://edamontology.org/format_3989 # GZIP
          - edam: http://edamontology.org/format_1975 # GFF3
          - edam: http://edamontology.org/format_1929 # FASTA
          - edam: http://edamontology.org/format_1930 # FASTQ
          - edam: http://edamontology.org/format_3475 # TSV
  - program_file:
      type: file
      description: Optional file containing logic for awk to execute. If you don't
        wish to use a file, you can use `ext.args2` to specify the logic.
      pattern: "*"
      ontologies:
        - edam: http://edamontology.org/data_3671 # TXT
  - disable_redirect_output:
      type: boolean
      description: |
        Disable the redirection of awk output to a given file. This is
        useful if you want to use awk's built-in redirect to write files instead
        of the shell's redirect.
  - output_file_extension:
      type: string
      description: The suffix to add to the output file name.
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.${output_file_extension}":
          type: file
          description: Manipulated version of the input sequence file.
          ontologies: []
  versions_bioawk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bioawk:
          type: string
          description: The name of the tool
      - "1.0":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bioawk:
          type: string
          description: The name of the tool
      - "1.0":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
schema_version: 1.1.0
