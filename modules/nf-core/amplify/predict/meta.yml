name: "amplify_predict"
description: AMPlify is an attentive deep learning model for antimicrobial
  peptide prediction.
keywords:
  - antimicrobial peptides
  - AMPs
  - prediction
  - model
tools:
  - "amplify":
      description: "Attentive deep learning model for antimicrobial peptide prediction"
      homepage: "https://github.com/bcgsc/AMPlify"
      documentation: "https://github.com/bcgsc/AMPlify"
      tool_dev_url: "https://github.com/bcgsc/AMPlify"
      doi: "10.1186/s12864-022-08310-4"
      licence:
        - "GPL v3"
      identifier: biotools:amplify
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - faa:
        type: file
        description: amino acid sequences fasta
        pattern: "*.{fa,fa.gz,faa,faa.gz,fasta,fasta.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA
  - model_dir:
      type: directory
      description: Directory of where models are stored (optional)
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: amino acid sequences with prediction (AMP, non-AMP) and
            probability scores
          pattern: "*.{tsv}"
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  versions_amplify:
    - - ${task.process}:
          type: string
          description: The name of the process
      - AMPlify:
          type: string
          description: The name of the tool
      - AMPlify --help 2>&1 | sed -n 's/AMPlify v//p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - AMPlify:
          type: string
          description: The name of the tool
      - AMPlify --help 2>&1 | sed -n 's/AMPlify v//p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@louperelo"
maintainers:
  - "@louperelo"
