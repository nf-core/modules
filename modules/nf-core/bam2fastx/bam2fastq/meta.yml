name: "bam2fastx_bam2fastq"
description: Conversion of PacBio BAM files into gzipped fastq files, including
  splitting of barcoded data
keywords:
  - bam2fastx
  - bam2fastq
  - pacbio
tools:
  - "bam2fastx":
      description: "Converting and demultiplexing of PacBio BAM files into gzipped fasta
        and fastq files"
      homepage: "https://github.com/PacificBiosciences/bam2fastx"
      documentation: "https://github.com/PacificBiosciences/bam2fastx"
      tool_dev_url: "https://github.com/PacificBiosciences/bam2fastx"
      licence:
        - "BSD-3-clause-Clear"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: PacBio BAM file
        pattern: "*.bam"
        ontologies: []
    - index:
        type: file
        description: PacBio BAM file index (.pbi)
        pattern: "*.pbi"
        ontologies: []
output:
  fastq:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fastq.gz":
          type: file
          description: Gzipped FASTQ file
          pattern: "*.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_bam2fastx:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bam2fastx:
          type: string
          description: The name of the tool
      - bam2fastq --version 2>&1) | sed 's/^.*bam2fastq //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bam2fastx:
          type: string
          description: The name of the tool
      - bam2fastq --version 2>&1) | sed 's/^.*bam2fastq //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@priyanka-surana"
maintainers:
  - "@priyanka-surana"
  - "@muffato"
