# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
# # TODO nf-core: Add a description of the module and list keywords
name: "ciri2"
description: Circular RNA identification based on multiple seed matching
keywords:
  - circRNA
  - detection
  - genomics
  - transcriptomics
tools:
  ## TODO nf-core: Add a description and other details for the software below
  - "ciri2":
      description: "CIRI2: Circular RNA identification based on multiple seed matching"
      homepage: "https://ciri-cookbook.readthedocs.io/en/latest/CIRI2.html"
      documentation: "https://ciri-cookbook.readthedocs.io/en/latest/CIRI2.html"
      tool_dev_url: "https://github.com/bioinfo-biols/CIRI-full/tree/master/bin/CIRI_v2.0.6"
      doi: "10.1093/bib/bbx014"
      licence: ["GPL-2.0-only"]
      identifier: ""

input:
  ### TODO nf-core: Add a description of all of the variables used as input
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: Sorted BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM
          - edam: "http://edamontology.org/format_2573" # CRAM
          - edam: "http://edamontology.org/format_3462" # SAM

output:
  ### TODO nf-core: Add a description of all of the variables used as output
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bam":
          type: file
          description: Sorted BAM/CRAM/SAM file
          pattern: "*.{bam,cram,sam}"
          ontologies:
            - edam: "http://edamontology.org/format_2572" # BAM
            - edam: "http://edamontology.org/format_2573" # CRAM
            - edam: "http://edamontology.org/format_3462" # SAM
  versions_ciri2:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "ciri2":
          type: string
          description: The name of the tool
      - "ciri2 --version":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ciri2:
          type: string
          description: The name of the tool
      - ciri2 --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@razmia02"
maintainers:
  - "@razmia02"
