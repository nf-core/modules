name: "tidk_explore"
description: |
  `tidk explore` attempts to find the simple telomeric repeat unit in the genome provided.
  It will report this repeat in its canonical form (e.g. TTAGG -> AACCT).
keywords:
  - genomics
  - telomere
  - search
tools:
  - "tidk":
      description: tidk is a toolkit to identify and visualise telomeric repeats
        in genomes
      homepage: "https://github.com/tolkit/telomeric-identifier"
      documentation: "https://github.com/tolkit/telomeric-identifier"
      tool_dev_url: "https://github.com/tolkit/telomeric-identifier"
      doi: "10.5281/zenodo.10091385"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - fasta:
        type: file
        description: The input fasta file
        pattern: "*.{fsa,fa,fasta}"
        ontologies: []
output:
  explore_tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.tidk.explore.tsv":
          type: file
          description: Telomeres and their frequencies in TSV format
          pattern: "*.tidk.explore.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
  top_sequence:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.top.sequence.txt":
          type: file
          description: |
            The most frequent telomere sequence if one or more
            sequences are identified by the toolkit
          pattern: "*.top.sequence.txt"
          ontologies: []
  versions_tidk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - tidk:
          type: string
          description: The name of the tool
      - tidk --version | sed 's/tidk //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - tidk:
          type: string
          description: The name of the tool
      - tidk --version | sed 's/tidk //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@GallVp"
maintainers:
  - "@GallVp"
