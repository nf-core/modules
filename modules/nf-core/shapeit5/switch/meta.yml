name: "shapeit5_switch"
description: Program to compute switch error rate and genotyping error rate
  given simulated or trio data.
keywords:
  - error
  - phasing
  - genotype
  - switch
tools:
  - "shapeit5":
      description: "Fast and accurate method for estimation of haplotypes (phasing)"
      homepage: "https://odelaneau.github.io/shapeit5/"
      documentation: "https://odelaneau.github.io/shapeit5/docs/documentation"
      tool_dev_url: "https://github.com/odelaneau/shapeit5"
      doi: "10.1101/2022.10.19.512867 "
      licence:
        - "MIT"
      identifier: biotools:shapeit5
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - estimate:
        type: file
        description: Imputed data.
        pattern: "*.{vcf,bcf,vcf.gz,bcf.gz}"
        ontologies: []
    - estimate_index:
        type: file
        description: Index file of the freq VCF/BCF file.
        pattern: "*.{vcf,bcf,vcf.gz,bcf.gz}"
        ontologies: []
    - region:
        type: string
        description: Target region used for imputation, including left and right
          buffers (e.g. chr20:1000000-2000000).
        pattern: "chrXX:leftBufferPosition-rightBufferPosition"
    - pedigree:
        type: file
        description: |
          Pedigree information in the following format: offspring father mother.
        pattern: "*.{txt, tsv}"
        ontologies: []
    - truth:
        type: file
        description: Validation dataset called at the same positions as the
          imputed file.
        pattern: "*.{vcf,bcf,vcf.gz,bcf.gz}"
        ontologies: []
    - truth_index:
        type: file
        description: Index file of the truth VCF/BCF file.
        pattern: "*.{vcf,bcf,vcf.gz,bcf.gz}"
        ontologies: []
    - freq:
        type: file
        description: File containing allele frequencies at each site.
        pattern: "*.{vcf,bcf,vcf.gz,bcf.gz}"
        ontologies: []
    - freq_index:
        type: file
        description: Index file of the freq VCF/BCF file.
        pattern: "*.{vcf.gz.csi,bcf.gz.csi}"
        ontologies: []
output:
  errors:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt.gz":
          type: file
          description: Estimates errors from the phased file.
          pattern: "*.txt.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  versions_shapeit5:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shapeit5:
          type: string
          description: The name of the tool
      - 'SHAPEIT5_switch | sed "5!d;s/^.*Version *: //; s/ .*$//"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - shapeit5:
          type: string
          description: The name of the tool
      - 'SHAPEIT5_switch | sed "5!d;s/^.*Version *: //; s/ .*$//"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@LouisLeNezet"
maintainers:
  - "@LouisLeNezet"
