name: sourmash_index
description: Create a database of sourmash signatures (a group of FracMinHash
  sketches) to be used as references.
keywords:
  - signatures
  - sourmash
  - genomics
  - metagenomics
  - mapping
  - kmer
tools:
  - sourmash:
      description: "Compute and compare FracMinHash signatures for DNA data sets."
      homepage: "https://sourmash.readthedocs.io/"
      documentation: "https://sourmash.readthedocs.io/"
      tool_dev_url: "https://github.com/sourmash-bio/sourmash"
      doi: "10.21105/joss.00027"
      licence:
        - "BSD-3-clause"
      identifier: biotools:sourmash
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - signatures:
        type: file
        description: Files containing signature (hash sketches) of reference
          genomes
        pattern: "*.{sig}"
        ontologies: []
  - ksize:
      type: integer
      description: ksize value
output:
  signature_index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sbt.zip":
          type: file
          description: Database of signatures
          pattern: "*.{sbt.zip}"
          ontologies: []
  versions_sourmash:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sourmash:
          type: string
          description: The name of the tool
      - sourmash --version 2>&1 | sed 's/^sourmash //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sourmash:
          type: string
          description: The name of the tool
      - sourmash --version 2>&1 | sed 's/^sourmash //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@emnilsson"
maintainers:
  - "@emnilsson"
