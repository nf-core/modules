name: sourmash_sketch
description: Create a signature (a group of FracMinHash sketches) of a sequence
  using sourmash
keywords:
  - hash sketch
  - sourmash
  - genomics
  - metagenomics
  - taxonomic classification
  - taxonomic profiling
  - kmer
tools:
  - sourmash:
      description: Compute and compare FracMinHash signatures for DNA and protein
        data sets.
      homepage: https://sourmash.readthedocs.io/
      documentation: https://sourmash.readthedocs.io/
      tool_dev_url: https://github.com/sourmash-bio/sourmash
      doi: "10.21105/joss.00027"
      licence:
        - "BSD-3-clause"
      identifier: biotools:sourmash
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - library:
        type: file
        description: One or more FASTA or FASTQ file(s) containing (genomic, transcriptomic, or proteomic)
          sequence data
        pattern: "*.{fna,fa,fasta,fastq,fq,faa}.gz"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
output:
  signatures:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sig":
          type: file
          description: FracMinHash signature of the given sequence
          pattern: "*.{sig}"
          ontologies: []
  versions_sourmash:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sourmash:
          type: string
          description: The name of the tool
      - sourmash --version 2>&1 | sed 's/^sourmash //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sourmash:
          type: string
          description: The name of the tool
      - sourmash --version 2>&1 | sed 's/^sourmash //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@Midnighter"
maintainers:
  - "@Midnighter"
