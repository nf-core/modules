name: cnvkit_export
description: Convert copy number ratio tables (.cnr files) or segments (.cns) to
  another format.
keywords:
  - cnvkit
  - copy number
  - export
tools:
  - cnvkit:
      description: |
        CNVkit is a Python library and command-line software toolkit to infer and
        visualize copy number from high-throughput DNA sequencing data.
        It is designed for use with hybrid capture, including both whole-exome and custom
        target panels, and short-read sequencing platforms such as Illumina and Ion Torrent.
      homepage: https://cnvkit.readthedocs.io/en/stable/index.html
      documentation: https://cnvkit.readthedocs.io/en/stable/index.html
      licence:
        - "Apache-2.0"
      identifier: biotools:cnvkit
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - cns:
        type: file
        description: CNVKit CNS file.
        pattern: "*.cns"
        ontologies: []
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.${suffix}:
          type: file
          description: Output file
          ontologies: []
  versions_cnvkit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cnvkit:
          type: string
          description: The name of the tool
      - 'cnvkit.py version | sed -e "s/cnvkit v//g"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cnvkit:
          type: string
          description: The name of the tool
      - 'cnvkit.py version | sed -e "s/cnvkit v//g"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@adamrtalbot"
  - "@priesgo"
maintainers:
  - "@adamrtalbot"
  - "@priesgo"
