name: cnvkit_access
description: Calculate the sequence-accessible coordinates in chromosomes from
  the given reference genome, output as a BED file.
keywords:
  - cvnkit
  - access
  - fasta
  - copy number
tools:
  - cnvkit:
      description: |
        CNVkit is a Python library and command-line software toolkit to infer and visualize copy number from high-throughput DNA sequencing data.
        It is designed for use with hybrid capture, including both whole-exome and custom target panels, and short-read sequencing platforms such as Illumina and Ion Torrent.
      homepage: https://cnvkit.readthedocs.io/en/stable/index.html
      documentation: https://cnvkit.readthedocs.io/en/stable/index.html
      tool_dev_url: "https://github.com/etal/cnvkit"
      doi: 10.1371/journal.pcbi.1004873
      licence:
        - "Apache-2.0"
      identifier: biotools:cnvkit
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Genome FASTA.
        pattern: "*.fasta"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - exclude_bed:
        type: file
        description: Additional regions to exclude, in BED format. Can be used
          multiple times.
        ontologies: []
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: File containing accessible regions.
          pattern: "*.{bed}"
          ontologies: []
  versions_cnvkit:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - cnvkit:
          type: string
          description: The tool name
      - cnvkit.py version | sed -e "s/cnvkit v//g":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - cnvkit:
          type: string
          description: The tool name
      - cnvkit.py version | sed -e "s/cnvkit v//g":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@adamrtalbot"
  - "@priesgo"
maintainers:
  - "@adamrtalbot"
  - "@priesgo"
