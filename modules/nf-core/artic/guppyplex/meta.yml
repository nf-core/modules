name: artic_guppyplex
description: Aggregates fastq files with demultiplexed reads
keywords:
  - artic
  - aggregate
  - demultiplexed reads
tools:
  - artic:
      description: ARTIC pipeline - a bioinformatics pipeline for working with
        virus sequencing data sequenced with nanopore
      homepage: https://artic.readthedocs.io/en/latest/
      documentation: https://artic.readthedocs.io/en/latest/
      tool_dev_url: https://github.com/artic-network/fieldbioinformatics
      licence:
        - "MIT"
      identifier: biotools:artic
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fastq_dir:
        type: directory
        description: Directory containing the fastq files with demultiplexed reads
        pattern: "*"
output:
  fastq:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fastq.gz":
          type: file
          description: Aggregated FastQ files
          pattern: "*.{fastq.gz}"
          ontologies: []
  versions_artic:
    - - ${task.process}:
          type: string
          description: The name of the process
      - artic:
          type: string
          description: The name of the tool
      - artic -v 2>&1 | sed "s/^.*artic //; s/ .*$//":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - artic:
          type: string
          description: The name of the tool
      - artic -v 2>&1 | sed "s/^.*artic //; s/ .*$//":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@joseespinosa"
  - "@drpatelh"
maintainers:
  - "@joseespinosa"
  - "@drpatelh"
