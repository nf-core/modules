name: fasttree
description: Produces a Newick format phylogeny from a multiple sequence
  alignment. Capable of bacterial genome size alignments.
keywords:
  - phylogeny
  - newick
  - alignment
tools:
  - fasttree:
      description: FastTree infers approximately-maximum-likelihood phylogenetic
        trees from alignments of nucleotide or protein sequences
      homepage: http://www.microbesonline.org/fasttree/
      documentation: http://www.microbesonline.org/fasttree/#Usage
      licence:
        - "GPL v2"
      identifier: biotools:fasttree
input:
  - alignment:
      type: file
      description: A FASTA format multiple sequence alignment file
      pattern: "*.{fasta,fas,fa,mfa}"
      ontologies: []
output:
  phylogeny:
    - "*.tre":
        type: file
        description: A phylogeny in Newick format
        pattern: "*.{tre}"
        ontologies: []
  versions_fasttree:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fasttree:
          type: string
          description: The name of the tool
      - fasttree -help 2>&1 | head -1 | sed 's/^FastTree \([0-9.]*\) .*$/\1/':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fasttree:
          type: string
          description: The name of the tool
      - fasttree -help 2>&1 | head -1 | sed 's/^FastTree \([0-9.]*\) .*$/\1/':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@aunderwo"
maintainers:
  - "@aunderwo"
