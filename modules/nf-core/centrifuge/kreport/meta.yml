name: "centrifuge_kreport"
description: Creates Kraken-style reports from centrifuge out files
keywords:
  - classify
  - metagenomics
  - fastq
  - db
  - report
  - kraken
tools:
  - centrifuge:
      description: Centrifuge is a classifier for metagenomic sequences.
      homepage: https://ccb.jhu.edu/software/centrifuge/
      documentation: https://ccb.jhu.edu/software/centrifuge/manual.shtml
      doi: 10.1101/gr.210641.116
      licence:
        - "GPL v3"
      identifier: biotools:centrifuge
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - report:
        type: file
        description: File containing the centrifuge classification report
        pattern: "*.{txt}"
        ontologies: []
  - db:
      type: directory
      description: Path to directory containing centrifuge database files
output:
  kreport:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: |
            File containing kraken-style report from centrifuge
            out files.
          pattern: "*.{txt}"
          ontologies: []
  versions_centrifuge:
    - - ${task.process}:
          type: string
          description: The name of the process
      - centrifuge:
          type: string
          description: The name of the tool
      - centrifuge --version 2>&1 | sed '1!d;s/.* version //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - centrifuge:
          type: string
          description: The name of the tool
      - centrifuge --version 2>&1 | sed '1!d;s/.* version //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sofstam"
  - "@jfy133"
maintainers:
  - "@sofstam"
  - "@jfy133"
