name: centrifuge_centrifuge
description: Classifies metagenomic sequence data
keywords:
  - classify
  - metagenomics
  - fastq
  - db
tools:
  - centrifuge:
      description: Centrifuge is a classifier for metagenomic sequences.
      homepage: https://ccb.jhu.edu/software/centrifuge/
      documentation: https://ccb.jhu.edu/software/centrifuge/manual.shtml
      doi: 10.1101/gr.210641.116
      licence:
        - "GPL v3"
      identifier: biotools:centrifuge
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
  - db:
      type: directory
      description: Path to directory containing centrifuge database files
  - save_unaligned:
      type: boolean
      description: If true unmapped fastq files are saved
  - save_aligned:
      type: boolean
      description: If true mapped fastq files are saved
output:
  report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*report.txt":
          type: file
          description: |
            File containing a classification summary
          pattern: "*.{report.txt}"
          ontologies: []
  results:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*results.txt":
          type: file
          description: |
            File containing classification results
          pattern: "*.{results.txt}"
          ontologies: []
  sam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{sam,tab}":
          type: file
          description: |
            Optional output file containing read alignments (SAM format )or a table of per-read hit information (TAB)s
          pattern: "*.{sam,tab}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  fastq_mapped:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.mapped.fastq{,.1,.2}.gz":
          type: file
          description: Mapped fastq files
          pattern: "*.mapped.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  fastq_unmapped:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.unmapped.fastq{,.1,.2}.gz":
          type: file
          description: Unmapped fastq files
          pattern: "*.unmapped.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  versions_centrifuge:
    - - ${task.process}:
          type: string
          description: The name of the process
      - centrifuge:
          type: string
          description: The name of the tool
      - centrifuge --version 2>&1 | sed '1!d;s/.* version //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - centrifuge:
          type: string
          description: The name of the tool
      - centrifuge --version 2>&1 | sed '1!d;s/.* version //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sofstam"
  - "@jfy133"
  - "@sateeshperi"
maintainers:
  - "@sofstam"
  - "@jfy133"
  - "@sateeshperi"
