name: "blat"
description: Queries a sequence subject
keywords:
  - blat
  - sequence
  - search
tools:
  - "blat":
      description: "BLAT is a bioinformatics software tool which performs rapid mRNA/DNA
        and cross-species protein alignments."
      homepage: "https://kentinformatics.com/"
      documentation: "https://kentinformatics.com/documentation"
      doi: "10.1101/gr.229202"
      licence:
        - "Free for academic, nonprofit and personal use"
      identifier: biotools:blat
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - query:
        type: file
        description: Sequence file
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,nib,2bit}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing subject information
          e.g. `[ id:'test', single_end:false ]`
    - subject:
        type: file
        description: Sequence file
        pattern: "*.{fa,nib,2bit}"
        ontologies: []
output:
  psl:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*.psl":
          type: file
          description: Search results
          pattern: "*.{psl}"
          ontologies: []
  versions_blat:
    - - ${task.process}:
          type: string
          description: The name of the process
      - blat:
          type: string
          description: The name of the tool
      - blat 2>&1 | sed '1!d;s/^.*BLAT v. //;s/ fast.*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - blat:
          type: string
          description: The name of the tool
      - blat 2>&1 | sed '1!d;s/^.*BLAT v. //;s/ fast.*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@d-jch"
maintainers:
  - "@d-jch"
