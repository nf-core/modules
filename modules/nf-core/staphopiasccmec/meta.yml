name: staphopiasccmec
description: Predicts Staphylococcus aureus SCCmec type based on primers.
keywords:
  - amr
  - fasta
  - sccmec
tools:
  - staphopiasccmec:
      description: Predicts Staphylococcus aureus SCCmec type based on primers.
      homepage: https://staphopia.emory.edu
      documentation: https://github.com/staphopia/staphopia-sccmec
      tool_dev_url: https://github.com/staphopia/staphopia-sccmec
      doi: 10.7717/peerj.5261
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: FASTA assembly file
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz}"
        ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: Tab-delimited results
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_staphopiasccmec:
    - - ${task.process}:
          type: string
          description: The name of the process
      - staphopiasccmec:
          type: string
          description: The name of the tool
      - staphopia-sccmec --version 2>&1 | sed "s/^.*staphopia-sccmec //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - staphopiasccmec:
          type: string
          description: The name of the tool
      - staphopia-sccmec --version 2>&1 | sed "s/^.*staphopia-sccmec //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
