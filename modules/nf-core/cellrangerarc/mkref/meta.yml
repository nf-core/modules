name: cellrangerarc_mkref
description: Module to build the reference needed by the 10x Genomics Cell
  Ranger Arc tool. Uses the cellranger-arc mkref command.
keywords:
  - reference
  - mkref
  - index
tools:
  - cellrangerarc:
      description: Cell Ranger Arc is a set of analysis pipelines that process
        Chromium Single Cell Arc data.
      homepage: https://support.10xgenomics.com/single-cell-multiome-atac-gex/software/pipelines/latest/what-is-cell-ranger-arc
      documentation: https://support.10xgenomics.com/single-cell-multiome-atac-gex/software/pipelines/latest/what-is-cell-ranger-arc
      tool_dev_url: https://support.10xgenomics.com/single-cell-multiome-atac-gex/software/pipelines/latest/what-is-cell-ranger-arc
      licence:
        - 10x Genomics EULA
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing genome information
          e.g. `[ id:'genome' ]`
    - fasta:
        type: file
        description: Reference genome FASTA file
        pattern: "*.{fasta,fa}"
        ontologies: []
    - gtf:
        type: file
        description: Reference transcriptome GTF file
        pattern: "*.gtf"
        ontologies: []
    - motifs:
        type: file
        description: Sequence motif file (e.g., from transcription factors)
        pattern: "*.txt"
        ontologies: []
    - reference_config:
        type: file
        description: JSON-like file holding organism, genome, reference fasta path,
          reference annotation gtf path, contigs that should be excluded and
          sequence format motif file path
        pattern: config
        ontologies: []
output:
  reference:
    - - meta:
          type: map
          description: |
            Groovy Map containing genome information
            e.g. `[ id:'genome' ]`
      - ${reference_name}:
          type: directory
          description: Folder called like the reference_name containing all the
            reference indices needed by Cell Ranger Arc
  config:
    - - meta:
          type: map
          description: |
            Groovy Map containing genome information
            e.g. `[ id:'genome' ]`
      - config:
          type: file
          description: Configuration file
          ontologies: []
  versions_cellrangerarc:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cellrangerarc:
          type: string
          description: The name of the tool
      - cellranger-arc --version 2>&1 | sed 's/cellranger-arc cellranger-arc-//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cellrangerarc:
          type: string
          description: The name of the tool
      - cellranger-arc --version 2>&1 | sed 's/cellranger-arc cellranger-arc-//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@ggabernet"
  - "@heylf"
