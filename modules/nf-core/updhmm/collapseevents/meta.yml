# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/environment-schema.json
name: updhmm_collapseevents
description: Collapse overlapping UPD events into consolidated regions
keywords:
  - updhmm
  - collapseevents
  - upd
  - family analysis
  - trio
  - bioconductor
  - genomics
  - region consolidation
tools:
  - updhmm:
      description: "R/Bioconductor package for UPD detection in trio data"
      homepage: "https://bioconductor.org/packages/UPDhmm/"
      documentation: "https://bioconductor.org/packages/UPDhmm/"
      tool_dev_url: "https://github.com/bjdmeest/UPDhmm"
      doi: "10.1093/bioinformatics/btaa1010"
      licence:
        - "GPL-3.0-or-later"
      identifier: "biotools:updhmm"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - upd_events_rds:
        type: file
        description: |
          UPD events in RDS format from UPDHMM_CALCULATEEVENTS containing
          detected uniparental disomy regions ready for collapsing
        pattern: "*.upd_events.rds"
        ontologies:
          - edam: "http://edamontology.org/format_3590"
output:
  upd_collapsed_txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.upd_collapsed.txt":
          type: file
          description: Collapsed UPD events in tab-delimited text format
          pattern: "*.upd_collapsed.txt"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  upd_collapsed_rds:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.upd_collapsed.rds":
          type: file
          description: Collapsed UPD events in RDS format
          pattern: "*.upd_collapsed.rds"
          ontologies:
            - edam: "http://edamontology.org/format_3590"
  session_info:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.R_sessionInfo.log":
          type: file
          description: |
            R session information log containing package versions and
            system details for reproducibility
          pattern: "*.R_sessionInfo.log"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_updhmm:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - bioconductor-updhmm:
          type: string
          description: The tool name
      - Rscript -e "library(UPDhmm); cat(as.character(packageVersion('UPDhmm')))":
          type: string
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - bioconductor-updhmm:
          type: string
          description: The tool name
      - Rscript -e "library(UPDhmm); cat(as.character(packageVersion('UPDhmm')))":
          type: string
          description: The command used to generate the version of the tool
authors:
  - "@saramenasantamaria"
maintainers:
  - "@saramenasantamaria"