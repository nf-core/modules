# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/environment-schema.json
name: updhmm_calculateevents
description: Calculate UPD events from processed trio VCF data using Hidden Markov Model
keywords:
  - updhmm
  - calculateevents
  - upd
  - family analysis
  - trio
  - hidden markov model
  - genomics
tools:
  - updhmm:
      description: "R/Bioconductor package for UPD detection in trio data"
      homepage: "https://bioconductor.org/packages/UPDhmm/"
      documentation: "https://bioconductor.org/packages/UPDhmm/"
      tool_dev_url: "https://github.com/bjdmeest/UPDhmm"
      doi: "10.1093/bioinformatics/btaa1010"
      licence:
        - "GPL-3.0-or-later"
      identifier: "biotools:updhmm"
  - biocparallel:
      description: "Bioconductor package for parallel evaluation"
      homepage: "https://bioconductor.org/packages/BiocParallel/"
      documentation: "https://bioconductor.org/packages/BiocParallel/"
      licence:
        - "Artistic-2.0"
      identifier: "biotools:biocparallel"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - processed_vcf_rds:
        type: file
        description: |
          Processed VCF data in RDS format from UPDHMM_VCFCHECK containing
          validated trio genotypes ready for UPD event detection
        pattern: "*.processed.rds"
        ontologies:
          - edam: "http://edamontology.org/format_3590"
output:
  upd_events_txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.upd_events.txt":
          type: file
          description: Detected UPD events in tab-delimited text format
          pattern: "*.upd_events.txt"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  upd_events_rds:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.upd_events.rds":
          type: file
          description: Detected UPD events in RDS format
          pattern: "*.upd_events.rds"
          ontologies:
            - edam: "http://edamontology.org/format_3590"
  session_info:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.R_sessionInfo.log":
          type: file
          description: |
            R session information log containing package versions and
            system details for reproducibility
          pattern: "*.R_sessionInfo.log"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_updhmm:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - bioconductor-updhmm:
          type: string
          description: The tool name
      - Rscript -e "library(UPDhmm); cat(as.character(packageVersion('UPDhmm')))":
          type: string
          description: The command used to generate the version of the tool
  versions_biocparallel:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - bioconductor-biocparallel:
          type: string
          description: The tool name
      - Rscript -e "library(BiocParallel); cat(as.character(packageVersion('BiocParallel')))":
          type: string
          description: The command used to generate the version of the tool
  versions_rbase:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - r-base:
          type: string
          description: The tool name
      - Rscript -e "cat(strsplit(version[['version.string']], ' ')[[1]][3])":
          type: string
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - bioconductor-updhmm:
          type: string
          description: The tool name
      - Rscript -e "library(UPDhmm); cat(as.character(packageVersion('UPDhmm')))":
          type: string
          description: The command used to generate the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - bioconductor-biocparallel:
          type: string
          description: The tool name
      - Rscript -e "library(BiocParallel); cat(as.character(packageVersion('BiocParallel')))":
          type: string
          description: The command used to generate the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - r-base:
          type: string
          description: The tool name
      - Rscript -e "cat(strsplit(version[['version.string']], ' ')[[1]][3])":
          type: string
          description: The command used to generate the version of the tool
authors:
  - "@saramenasantamaria"
maintainers:
  - "@saramenasantamaria"