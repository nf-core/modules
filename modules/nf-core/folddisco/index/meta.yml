name: folddisco_index
description: Build a geometric-hashing index of discontinuous structural motifs
  from a directory of protein structure files
keywords:
  - protein structure
  - structural motif
  - motif search
  - geometric hashing
  - indexing
  - pdb
  - mmcif
tools:
  - folddisco:
      description: Fast indexing and search of discontinuous motifs in protein
        structures.
      homepage: https://github.com/steineggerlab/folddisco
      documentation: https://github.com/steineggerlab/folddisco
      tool_dev_url: https://github.com/steineggerlab/folddisco
      doi: "10.1038/s41587-026-03162-9"
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:folddisco
      args_id: $args
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - structures:
        type: file
        description: Mandatory. One or more protein structure files (PDB or
          mmCIF) — staged into a directory that folddisco indexes.
        pattern: "*.{pdb,cif,mmcif}"
        ontologies:
          - edam: "http://edamontology.org/format_1476" # PDB
          - edam: "http://edamontology.org/format_1477" # mmCIF
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${prefix}:
          type: directory
          description: Directory containing the folddisco geometric-hashing
            index files (${prefix}, ${prefix}.offset, ${prefix}.lookup,
            ${prefix}.type).
          pattern: "${prefix}"
          ontologies: []
  versions_folddisco:
    - - ${task.process}:
          type: string
          description: The name of the process
      - folddisco:
          type: string
          description: The name of the tool
      - folddisco version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - folddisco:
          type: string
          description: The name of the tool
      - folddisco version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
