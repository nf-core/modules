name: "bwafastalign_mem"
description: Performs fastq alignment to a fasta reference using BWA-FastAlign.
keywords:
  - mem
  - bwa
  - bwafastalign
  - alignment
  - map
  - fastq
  - bam
  - sam
  - cram
tools:
  - "bwafastalign":
      description: "Faster and Cheaper Sequence Alignment on Commercial CPUs (A faster
        version of bwa-mem with identical outputs)."
      homepage: "https://github.com/zzhofict/BWA-FastAlign"
      documentation: "https://github.com/zzhofict/BWA-FastAlign"
      doi: "10.1145/3774934.3786421"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference/index information
          e.g. [ id:'test' ]
    - index:
        type: file
        description: BWA genome index files
        pattern: "Directory containing BWA index *.{0132,amb,ann,bwt.2bit.64,pac}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Reference genome in FASTA format
        pattern: "*.{fa,fasta,fna}"
        ontologies: []
  - sort_bam:
      type: boolean
      description: use samtools sort (true) or samtools view (false)
      pattern: "true or false"
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.{sam,bam,cram}:
          type: file
          description: Output alignment file (SAM, BAM, or CRAM)
          pattern: "*.{sam,bam,cram}"
          ontologies: []
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.{csi,crai}:
          type: file
          description: Index file for BAM (.csi) or CRAM (.crai) output
          pattern: "*.{csi,crai}"
          ontologies: []
  versions_bwafastalign:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bwafastalign:
          type: string
          description: The name of the tool
      - 1.0.0:
          type: string
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: Name of the tool
      - samtools --version 2>&1 | sed '1!d;s/.* //':
          type: eval
          description: The expression to obtain the version of the tool
  versions_mbuffer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mbuffer:
          type: string
          description: The name of the tool
      - mbuffer --version 2>&1 | sed -n 's/mbuffer version//p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bwafastalign:
          type: string
          description: The name of the tool
      - 1.0.0:
          type: string
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: Name of the tool
      - samtools --version 2>&1 | sed '1!d;s/.* //':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - mbuffer:
          type: string
          description: The name of the tool
      - mbuffer --version 2>&1 | sed -n 's/mbuffer version//p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@peterpru"
maintainers:
  - "@peterpru"
