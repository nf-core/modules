name: "metaphlan3_mergemetaphlantables"
description: Merges output abundance tables from MetaPhlAn3
keywords:
  - metagenomics
  - classification
  - merge
  - table
  - profiles
tools:
  - metaphlan3:
      description: Identify clades (phyla to species) present in the metagenome obtained
        from a microbiome sample and their relative abundance
      homepage: https://huttenhower.sph.harvard.edu/metaphlan/
      documentation: https://github.com/biobakery/MetaPhlAn
      doi: "10.7554/eLife.65088"
      licence: ["MIT License"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - profiles:
        type: file
        description: List of per-sample MetaPhlAn3 taxonomic abundance tables
        pattern: "*"
        ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.txt:
          type: file
          description: Combined MetaPhlAn3 table
          pattern: "*.txt"
          ontologies: []
  versions_metaphlan3:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - metaphlan3:
          type: string
          description: The tool name
      - "metaphlan --version 2>&1 | cut -d ' ' -f 3":
          type: string
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - metaphlan3:
          type: string
          description: The tool name
      - "metaphlan --version 2>&1 | cut -d ' ' -f 3":
          type: string
          description: The command used to generate the version of the tool
authors:
  - "@jfy133"
maintainers:
  - "@jfy133"
