name: agat_convertbed2gff
description: |
  Takes a bed12 file and converts to a GFF3 file
keywords:
  - genome
  - bed
  - gff
  - conversion
tools:
  - agat:
      description: "AGAT is a toolkit for manipulation and getting information from
        GFF/GTF files"
      homepage: "https://github.com/NBISweden/AGAT"
      documentation: "https://agat.readthedocs.io/"
      tool_dev_url: "https://github.com/NBISweden/AGAT"
      doi: "10.5281/zenodo.3552717"
      licence:
        - "GPL v3"
      identifier: biotools:AGAT
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bed:
        type: file
        description: Input bed12 file
        pattern: "*.bed"
        ontologies:
          - edam: "http://edamontology.org/format_3586"
output:
  gff:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.gff":
          type: file
          description: Output GFF3 file
          pattern: "*.{gff}"
          ontologies:
            - edam: "http://edamontology.org/format_1975"
  versions_agat:
    - - ${task.process}:
          type: string
          description: The name of the process
      - agat:
          type: string
          description: The name of the tool
      - agat_convert_bed2gff.pl --help | grep Version | cut -d" " -f11:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - agat:
          type: string
          description: The name of the tool
      - agat_convert_bed2gff.pl --help | grep Version | cut -d" " -f11:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@GallVp"
maintainers:
  - "@GallVp"
