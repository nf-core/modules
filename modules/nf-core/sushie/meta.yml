name: "sushie"
description: Software to perform multi-ancestry SNP fine-mapping on molecular data
keywords:
  - gwas
  - fine mapping
  - ld
tools:
  - "sushie":
      description: "Software to perform multi-ancestry SNP fine-mapping on molecular
        data"
      homepage: "https://github.com/mancusolab/sushie/"
      documentation: "https://mancusolab.github.io/sushie/"
      tool_dev_url: "https://github.com/mancusolab/sushie/"
      doi: "10.1038/s41588-025-02262-7"
      licence:
        - "MIT"
      identifier: biotools:sushie
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - study_locus_files: {}
  - ld_files: {}
  - sample_sizes: {}
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bam":
          type: file
          description: Sorted BAM/CRAM/SAM file
          pattern: "*.{bam,cram,sam}"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
            - edam: "http://edamontology.org/format_2573"
            - edam: "http://edamontology.org/format_3462"
  versions_sushie:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sushie:
          type: string
          description: The name of the tool
      - "0.17":
          type: string
          description: The expression to obtain the version of the tool
  corr:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.sushie.corr.tsv": {}
  cs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.sushie.cs.tsv": {}
  weights:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.sushie.weights.tsv": {}
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.log": {}
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sushie:
          type: string
          description: The name of the tool
      - "0.17":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@camlloyd"
maintainers:
  - "@camlloyd"
