# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "eautils_gtf2bed"
description: Convert a GTF/GFF annotation file to BED12 format
keywords:
  - gtf
  - gff
  - bed
  - bed12
  - annotation
  - conversion
tools:
  - "gtf2bed":
      description: |
        Perl script from the ea-utils package that converts GTF/GFF annotation
        files to BED12 format, handling exons, start/stop codons, and miRNAs.
        Produces UCSC-compatible BED with proper thin/thick regions.
      homepage: "https://expressionanalysis.github.io/ea-utils/"
      documentation: "https://github.com/ExpressionAnalysis/ea-utils/blob/master/clipper/gtf2bed"
      tool_dev_url: "https://github.com/ExpressionAnalysis/ea-utils"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'genome' ]`
    - gtf:
        type: file
        description: GTF or GFF annotation file
        pattern: "*.{gtf,gff,gtf.gz,gff.gz}"
        ontologies:
          - edam: http://edamontology.org/format_2306 # GTF
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'genome' ]`
      - "${prefix}.bed":
          type: file
          description: BED12 format annotation file with one entry per transcript
          pattern: "*.bed"
          ontologies:
            - edam: http://edamontology.org/format_3003 # BED
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML

topics:
  versions:
    - versions.yml:
        type: string
        description: The name of the process
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
