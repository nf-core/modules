name: "hmmer_eslalipid"
description: Calculate pairwise percent identity for all sequence pairs in a multiple sequence alignment
keywords:
  - alignment
  - msa
  - pairwise identity
  - sequence comparison
  - hmmer
  - easel
tools:
  - "hmmer":
      description: |
        Biosequence analysis using profile hidden Markov models. The esl-alipid
        utility is an Easel miniapp bundled with the HMMER package.
      homepage: "http://hmmer.org/"
      documentation: "http://hmmer.org/documentation.html"
      tool_dev_url: "https://github.com/EddyRivasLab/hmmer"
      doi: "10.1371/journal.pcbi.1002195"
      licence:
        - "BSD-3-Clause"
      identifier: "biotools:hmmer"
      args_id: "$args"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - aln:
        type: file
        description: |
          Multiple sequence alignment file in any Easel-supported format
          (Stockholm, aligned FASTA, Clustal, etc.). Mandatory.
        pattern: "*.{sto,stk,sthlm,aln,fasta,fa,clustal}"
        ontologies:
          - edam: http://edamontology.org/format_1921 # Alignment format
output:
  pid:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.alipid.txt:
          type: file
          description: |
            Whitespace-delimited table of pairwise percent identities.
            Columns: name1, name2, %id, nid, alen.
          pattern: "*.alipid.txt"
          ontologies:
            - edam: http://edamontology.org/format_3671 # Plain text
  versions_hmmer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmsearch -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
  versions_easel:
    - - ${task.process}:
          type: string
          description: The name of the process
      - easel:
          type: string
          description: The name of the tool
      - esl-alipid -h | sed '2!d;s/^# Easel *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmsearch -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - easel:
          type: string
          description: The name of the tool
      - esl-alipid -h | sed '2!d;s/^# Easel *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
