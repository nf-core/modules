name: "hmmer_eslreformat"
description: reformats sequence files, see HMMER documentation for details. The
  module requires that the format is specified in ext.args in a config file, and
  that this comes last. See the tools help for possible values.
keywords:
  - sort
  - hmmer
  - reformat
tools:
  - "hmmer":
      description: "Biosequence analysis using profile hidden Markov models"
      homepage: http://hmmer.org/
      documentation: http://hmmer.org/documentation.html
      doi: "10.1371/journal.pcbi.1002195"
      licence:
        - "BSD-3-Clause"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - seqfile:
        type: file
        description: Sequences, aligned or not, in any supported format
        pattern: "*"
        ontologies: []
  - postprocessing_script:
      type: string
      description: Post processing script in shell, e.g., '| sed "/^>/!s/-//g"'
      pattern: "| *"
output:
  seqreformated:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.*.gz":
          type: file
          description: Reformatted sequence file
          pattern: "*.*.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_hmmer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmsearch -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
  versions_easel:
    - - ${task.process}:
          type: string
          description: The name of the process
      - easel:
          type: string
          description: The name of the tool
      - esl-reformat -h | sed '2!d;s/^# Easel *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmsearch -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - easel:
          type: string
          description: The name of the tool
      - esl-reformat -h | sed '2!d;s/^# Easel *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@erikrikarddaniel"
maintainers:
  - "@erikrikarddaniel"
