name: "hmmer_hmmpress"
description: compress and index profile database for hmmscan
keywords:
  - hidden Markov model
  - HMM
  - hmmer
  - hmmpress
  - hmmscan
tools:
  - "hmmer":
      description: "Biosequence analysis using profile hidden Markov models"
      homepage: "http://hmmer.org"
      documentation: "http://hmmer.org/documentation.html"
      tool_dev_url: "https://github.com/EddyRivasLab/hmmer"
      doi: "10.1371/journal.pcbi.1002195"
      licence:
        - "BSD"
      identifier: biotools:hmmer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - hmmfile:
        type: file
        description: HMMER flatfile database of HMM profiles
        pattern: "*"
        ontologies: []
output:
  compressed_db:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.h3?":
          type: list
          description: Binary files with compressed profiles and their index
          pattern: "*.h3?"
  versions_hmmer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmsearch -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmsearch -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@ochkalova"
maintainers:
  - "@ochkalova"
