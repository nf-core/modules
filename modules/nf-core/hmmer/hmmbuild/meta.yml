name: "hmmer_hmmbuild"
description: create an hmm profile from a multiple sequence alignment
keywords:
  - search
  - hidden Markov model
  - HMM
  - hmmer
  - hmmsearch
tools:
  - "hmmer":
      description: "Biosequence analysis using profile hidden Markov models"
      homepage: "http://hmmer.org"
      documentation: "http://hmmer.org/documentation.html"
      tool_dev_url: "https://github.com/EddyRivasLab/hmmer"
      doi: "10.1371/journal.pcbi.1002195"
      licence: ["BSD"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - alignment:
        type: file
        description: multiple sequence alignment in fasta, clustal, stockholm or phylip
          format
        pattern: "*"
        ontologies: []
  - mxfile:
      type: file
      description: read substitution score matrix, for use when building profiles from
        single sequences (--singlemx option)
      pattern: "*"
      ontologies: []
output:
  hmm:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.hmm.gz":
          type: file
          description: Gzipped HMM file
          pattern: "*.{hmm.gz}"
          ontologies: []
  hmmbuildout:
    - "*.hmmbuild.txt":
        type: file
        description: HMM build output
        ontologies: []
  versions_hmmer:
    - - ${task.process}:
          type: string
          description: The process name
      - hmmer:
          type: string
          description: The tool name
      - hmmbuild -h | grep -o '^# HMMER [0-9.]*' | sed 's/^# HMMER //':
          type: eval
          description: The tool version

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process name
      - hmmer:
          type: string
          description: The tool name
      - hmmbuild -h | grep -o '^# HMMER [0-9.]*' | sed 's/^# HMMER //':
          type: eval
          description: The tool version

authors:
  - "@erikrikarddaniel"
maintainers:
  - "@erikrikarddaniel"
