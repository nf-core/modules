name: "hmmer_hmmstat"
description: display summary statistics for each profile HMM in an HMM database file
keywords:
  - hidden markov model
  - HMM
  - hmmer
  - statistics
  - profile
  - summary
tools:
  - "hmmer":
      description: "Biosequence analysis using profile hidden Markov models"
      homepage: "http://hmmer.org"
      documentation: "http://hmmer.org/documentation.html"
      tool_dev_url: "https://github.com/EddyRivasLab/hmmer"
      doi: "10.1371/journal.pcbi.1002195"
      licence:
        - "BSD"
      identifier: "biotools:hmmer"
      args_id: "$args"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - hmm:
        type: file
        description: Mandatory. HMM database file containing one or more profile HMMs
          in plain text format
        pattern: "*.hmm"
        ontologies:
          - edam: http://edamontology.org/data_1364 # HMM
output:
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.hmmstat.txt:
          type: file
          description: Plain text report containing per-profile summary statistics
            (name, accession, length, alphabet type, etc.) for each HMM in the database
          pattern: "*.hmmstat.txt"
          ontologies:
            - edam: http://edamontology.org/format_3671 # Plain text
  versions_hmmer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmstat -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hmmer:
          type: string
          description: The name of the tool
      - hmmstat -h | sed '2!d;s/^# HMMER *//;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
