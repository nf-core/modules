# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "pbmm2_align"
description: Alignment with PacBio's minimap2 frontend
keywords:
  - align
  - pacbio
  - genomics
tools:
  - "pbmm2":
      description: "A minimap2 frontend for PacBio native data formats"
      homepage: "https://github.com/PacificBiosciences/pbmm2"
      documentation: "https://github.com/PacificBiosciences/pbmm2"
      tool_dev_url: "https://github.com/PacificBiosciences/pbmm2"
      licence:
        - "BSD-3-clause-Clear"
      identifier: biotools:pbmm2
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - bam:
        type: file
        description: Sorted BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - fasta:
        type: file
        description: fasta file to align bam to
        pattern: "*.{fasta}"
        ontologies: []
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.bam":
          type: file
          description: Sorted BAM/CRAM/SAM file
          pattern: "*.{bam,cram,sam}"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
            - edam: "http://edamontology.org/format_2573"
            - edam: "http://edamontology.org/format_3462"
  versions_pbmm2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pbmm2:
          type: string
          description: The name of the tool
      - pbmm2 --version  | grep -m 1 pbmm2 | sed 's/pbmm2 //g':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pbmm2:
          type: string
          description: The name of the tool
      - pbmm2 --version  | grep -m 1 pbmm2 | sed 's/pbmm2 //g':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@tanyasarkjain"
maintainers:
  - "@tanyasarkjain"
