name: bowtie_align
description: Align reads to a reference genome using bowtie
keywords:
  - align
  - map
  - fastq
  - fasta
  - genome
  - reference
tools:
  - bowtie:
      description: |
        bowtie is a software package for mapping DNA sequences against
        a large reference genome, such as the human genome.
      homepage: http://bowtie-bio.sourceforge.net/index.shtml
      documentation: http://bowtie-bio.sourceforge.net/manual.shtml
      arxiv: arXiv:1303.3997
      licence:
        - "Artistic-2.0"
      identifier: biotools:bowtie
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing genome information
          e.g. [ id:'sarscov2' ]
    - index:
        type: file
        description: Bowtie genome index files
        pattern: "*.ebwt"
        ontologies: []
  - save_unaligned:
      type: boolean
      description: Whether to save fastq files containing the reads which did not
        align.
output:
  bam:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.bam":
          type: file
          description: Output BAM file containing read alignments
          pattern: "*.{bam}"
          ontologies: []
  log:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.out":
          type: file
          description: Log file
          pattern: "*.log"
          ontologies: []
  fastq:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*fastq.gz":
          type: file
          description: Unaligned FastQ files
          pattern: "*.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  versions_bowtie:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bowtie:
          type: string
          description: The name of the tool
      - bowtie --version 2>&1 | sed -n 's/.*bowtie-align-s version //p':
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools version | sed '1!d;s/.* //':
          type: eval
          description: The expression to obtain the version of the tool
  versions_gzip:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gzip:
          type: string
          description: The name of the tool
      - gzip --version 2>&1 | sed '1!d;s/gzip //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bowtie:
          type: string
          description: The name of the tool
      - bowtie --version 2>&1 | sed -n 's/.*bowtie-align-s version //p':
