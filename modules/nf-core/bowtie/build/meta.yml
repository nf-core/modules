name: bowtie_build
description: Create bowtie index for reference genome
keywords:
  - index
  - fasta
  - genome
  - reference
tools:
  - bowtie:
      description: |
        bowtie is a software package for mapping DNA sequences against
        a large reference genome, such as the human genome.
      homepage: http://bowtie-bio.sourceforge.net/index.shtml
      documentation: http://bowtie-bio.sourceforge.net/manual.shtml
      arxiv: arXiv:1303.3997
      licence:
        - "Artistic-2.0"
      identifier: biotools:bowtie
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing information about the genome fasta
          e.g. [ id:'test' ]
    - fasta:
        type: file
        description: Input genome fasta file
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing information about the genome fasta
            e.g. [ id:'test' ]
      - bowtie:
          type: string
          description: Folder containing bowtie genome index files
          pattern: "*.ebwt"
          ontologies: []
  versions_bowtie:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bowtie:
          type: string
          description: Folder containing bowtie genome index files
          pattern: "*.ebwt"
          ontologies: []
      - bowtie --version 2>&1 | sed -n 's/.*bowtie-align-s version //p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bowtie:
          type: string
          description: Folder containing bowtie genome index files
          pattern: "*.ebwt"
          ontologies: []
      - bowtie --version 2>&1 | sed -n 's/.*bowtie-align-s version //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@kevinmenden"
  - "@drpatelh"
maintainers:
  - "@kevinmenden"
  - "@drpatelh"
