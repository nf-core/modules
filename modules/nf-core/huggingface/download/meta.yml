name: huggignface_hub
description: Tool for downloading models from HuggingFace
keywords:
  - llm
  - llama
  - ai
tools:
  - huggignface_hub:
      description: "HuggingFace Hub CLI interface"
      homepage: "https://huggingface.co/docs/huggingface_hub/guides/cli"
      licence: ["MIT"]
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`- prompt_file:
    - hf_repo:
        type: string
        description: HuggingFace repository
    - hf_file:
        type: string
        description: HuggingFace GGUF file
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - output:
          type: file
          description: Model in GGUF format
          pattern: "*.gguf"
  versions_huggingface_hub:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - huggingface_hub:
          type: string
          description: The name of the tool
      - hf --version:
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@toniher"
  - "@lucacozzuto"
maintainers:
  - "@toniher"
  - "@lucacozzuto"
