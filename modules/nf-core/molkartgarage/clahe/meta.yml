name: "molkartgarage_clahe"
description: Contrast-limited adjusted histogram equalization (CLAHE) on
  single-channel tif images.
keywords:
  - clahe
  - image_processing
  - imaging
  - correction
tools:
  - "molkartgarage":
      description: "One-stop-shop for scripts and tools for processing data for molkart
        and spatial omics pipelines."
      homepage: https://github.com/SchapiroLabor/molkart-local/tree/main
      documentation: https://github.com/SchapiroLabor/molkart-local/tree/main
      tool_dev_url: https://github.com/SchapiroLabor/molkart-local/blob/main/scripts/molkart_clahe.py
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1']`
    - image:
        type: file
        description: Single-channel tiff file to be corrected.
        pattern: "*.{tif,tiff}"
        ontologies:
          - edam: http://edamontology.org/format_3591 # TIFF
output:
  img_clahe:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1']`
      - "*.tiff":
          type: file
          description: CLAHE corrected tiff file.
          pattern: "*.{tiff}"
          ontologies:
            - edam: http://edamontology.org/format_3591 # TIFF
  versions_clahe:
    - - ${task.process}:
          type: string
          description: The name of the process
      - clahe:
          type: string
          description: The name of the tool
      - python /local/scripts/molkart_clahe.py --version:
          type: eval
          description: The expression to obtain the version of the tool
  versions_scikitimage:
    - - ${task.process}:
          type: string
          description: The name of the process
      - scikit-image:
          type: string
          description: The name of the tool
      - python -c 'import skimage; print(skimage.__version__)':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - clahe:
          type: string
          description: The name of the tool
      - python /local/scripts/molkart_clahe.py --version:
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - scikit-image:
          type: string
          description: The name of the tool
      - python -c 'import skimage; print(skimage.__version__)':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@kbestak"
maintainers:
  - "@kbestak"
