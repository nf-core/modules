name: "sdrfpipelines_convertmhcquant"
description: |
  Convert an SDRF (Sample and Data Relationship Format) file into an
  mhcquant-style samplesheet and a matching search-presets table using the
  `parse_sdrf convert-mhcquant` subcommand from the sdrf-pipelines package.
keywords:
  - sdrf
  - samplesheet
  - proteomics
  - immunopeptidomics
  - mhcquant
  - metadata
tools:
  - "sdrf-pipelines":
      description: "A set of tools to validate and convert SDRF files for proteomics
        pipelines."
      homepage: "https://github.com/bigbio/sdrf-pipelines"
      documentation: "https://github.com/bigbio/sdrf-pipelines"
      tool_dev_url: "https://github.com/bigbio/sdrf-pipelines"
      doi: "10.1021/acs.jproteome.1c00505"
      licence:
        - "Apache-2.0"
      identifier: "biotools:sdrf-pipelines"
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample/run information
          e.g. `[ id:'PXD009752' ]`
    - sdrf:
        type: file
        description: SDRF file describing the experimental design and sample
          metadata.
        pattern: "*.{tsv,sdrf.tsv}"
        ontologies:
          - edam: http://edamontology.org/format_3475
output:
  samplesheet:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample/run information
      - "*.samplesheet.tsv":
          type: file
          description: mhcquant-style samplesheet derived from the SDRF file.
          pattern: "*.samplesheet.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
  search_presets:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample/run information
      - "*.search_presets.tsv":
          type: file
          description: |
            Search parameter presets derived from the SDRF file (one row per
            unique search configuration).
          pattern: "*.search_presets.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "sdrf-pipelines":
          type: string
          description: The name of the tool
      - "parse_sdrf --version | cut -d ' ' -f 2":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jonasscheid"
maintainers:
  - "@jonasscheid"
