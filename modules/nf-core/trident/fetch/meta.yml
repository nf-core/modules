name: "trident_fetch"
description: Download data from a remote Poseidon repository
keywords:
  - poseidon-trident
  - poseidon
  - trident
  - fetch
tools:
  - "trident":
      description: "A tool (trident) to work with modular genotype databases formatted
        using Poseidon."
      homepage: "https://www.poseidon-adna.org/"
      documentation: "https://www.poseidon-adna.org/#/trident?id=fetch-command"
      tool_dev_url: "https://github.com/poseidon-framework/poseidon-hs/"
      doi: "10.7554/eLife.98317.1"
      licence:
        - "MIT"
      identifier: ""
input:
  - - archive_dir:
        type: directory
        description: |
          The path to the directories containing any previously downloaded Poseidon archive files.
          If this is provided, trident fetch will check these directories, and only download missing packages from the Poseidon-Framework server.
    - fetch_s:
        type: string
        description: The fetchString provided to trident fetch (`--fetchString`),
          if any.
    - fetch_fn:
        type: file
        description: A file containing a list of fetchStrings provided to trident
          fetch (`--fetchFile`), if any.
        pattern: "*.txt"
        ontologies:
          - edam: http://edamontology.org/format_2330 ## Text
output:
  poseidon_yml:
    - output_archive/*/POSEIDON.yml:
        type: file
        description: The POSEIDON.yml file of any newly downloaded package(s).
        pattern: "output_archive/*/POSEIDON.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 ## YAML
  geno_vcf:
    - output_archive/*/*.{vcf,vcf.gz}:
        type: file
        description: The genotype files of any newly downloaded VCF-formatted package(s).
        pattern: "output_archive/*/*.{vcf,vcf.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3016 ## VCF
          - edam: http://edamontology.org/format_3989 ## GZIP
  geno_plink:
    - output_archive/*/*.{bed,bed.gz}:
        type: file
        description: The genotype files of any newly downloaded plink-formatted package(s).
        pattern: "output_archive/*/*.{bed,bed.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3286 ## Plink PED
          - edam: http://edamontology.org/format_3989 ## GZIP
  snp_plink:
    - output_archive/*/*.{bim,bim.gz}:
        type: file
        description: The SNP information files of any newly downloaded plink-formatted package(s).
        pattern: "output_archive/*/*.{bim,bim.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3286 ## Plink PED
          - edam: http://edamontology.org/format_3989 ## GZIP
  ind_plink:
    - output_archive/*/*.{fam,fam.gz}:
        type: file
        description: The individual information files of any newly downloaded plink-formatted package(s).
        pattern: "output_archive/*/*.{fam,fam.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3286 ## Plink PED
          - edam: http://edamontology.org/format_3989 ## GZIP
  geno_eigenstrat:
    - output_archive/*/*.{geno,geno.gz}:
        type: file
        description: The genotype files of any newly downloaded eigenstrat-formatted package(s).
        pattern: "output_archive/*/*.{geno,geno.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3989 ## GZIP
  snp_eigenstrat:
    - output_archive/*/*.{snp,snp.gz}:
        type: file
        description: The SNP information files of any newly downloaded eigenstrat-formatted package(s).
        pattern: "output_archive/*/*.{snp,snp.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3989 ## GZIP
  ind_eigenstrat:
    - output_archive/*/*.{ind,ind.gz}:
        type: file
        description: The individual information files of any newly downloaded eigenstrat-formatted package(s).
        pattern: "output_archive/*/*.{ind,ind.gz}"
        ontologies:
          - edam: http://edamontology.org/format_3989 ## GZIP
  janno:
    - output_archive/*/*.janno:
        type: file
        description: The .janno annotation files of any newly downloaded package(s).
        pattern: "output_archive/*/*.janno"
        ontologies: []
  ssf:
    - output_archive/*/*.ssf:
        type: file
        description: The .ssf files of any newly downloaded package(s).
        pattern: "output_archive/*/*.ssf"
        ontologies: []
  bib:
    - output_archive/*/*.bib:
        type: file
        description: The .bib bibliography files of any newly downloaded package(s).
        pattern: "output_archive/*/*.bib"
        ontologies:
          - edam: http://edamontology.org/data_3505 ## Bibliography
  changelog:
    - output_archive/*/CHANGELOG.md:
        type: file
        description: The CHANGELOG.md files of any newly downloaded package(s).
        pattern: "output_archive/*/CHANGELOG.md"
        ontologies: []
  readme:
    - output_archive/*/README.md:
        type: file
        description: The README.md files of any newly downloaded package(s).
        pattern: "output_archive/*/README.md"
        ontologies: []
  versions_trident:
    - - ${task.process}:
          type: string
          description: The name of the process
      - trident:
          type: string
          description: The name of the tool
      - trident --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - trident:
          type: string
          description: The name of the tool
      - trident --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@TCLamnidis"
maintainers:
  - "@TCLamnidis"
