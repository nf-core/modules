name: seqsero2
description: Salmonella serotype prediction from reads and assemblies
keywords:
  - fasta
  - fastq
  - salmonella
  - sertotype
tools:
  - seqsero2:
      description: Salmonella serotype prediction from genome sequencing data
      homepage: https://github.com/denglab/SeqSero2
      documentation: https://github.com/denglab/SeqSero2
      tool_dev_url: https://github.com/denglab/SeqSero2
      doi: "10.1128/AEM.01746-19"
      licence: ["GPL v2"]
      identifier: biotools:SeqSero2
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - seqs:
        type: file
        description: FASTQ or FASTA formatted sequences
        pattern: "*.{fq.gz,fastq.gz,fna.gz,fna,fasta.gz,fasta,fa.gz,fa}"
        ontologies: []
output:
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/*_log.txt:
          type: file
          description: A log of serotype antigen results
          pattern: "*_log.txt"
          ontologies: []
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/*_result.tsv:
          type: file
          description: Tab-delimited summary of the SeqSero2 results
          pattern: "*_result.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - results/*_result.txt:
          type: file
          description: Detailed summary of the SeqSero2 results
          pattern: "*_result.txt"
          ontologies: []
  versions_seqsero2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqsero2:
          type: string
          description: The name of the tool
      - SeqSero2_package.py --version 2>&1 | sed 's/^.*SeqSero2_package.py //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqsero2:
          type: string
          description: The name of the tool
      - SeqSero2_package.py --version 2>&1 | sed 's/^.*SeqSero2_package.py //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rpetit3"
maintainers:
  - "@rpetit3"
