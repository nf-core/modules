name: "savana_cna"
description: "Copy-number aberration calling with SAVANA for long-read tumour/normal alignments."
keywords:
  - cna
  - copy-number
  - long-read
  - nanopore
  - pacbio
  - genomics
tools:
  - "savana":
      description: "SAVANA: somatic SV and copy-number aberration caller for long-read data."
      homepage: "https://github.com/cortes-ciriano-lab/savana"
      documentation: "https://github.com/cortes-ciriano-lab/savana#readme"
      tool_dev_url: "https://github.com/cortes-ciriano-lab/savana"
      doi: "10.1038/s41592-025-02708-0"
      licence: ["Apache-2.0"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - tumour:
        type: file
        description: Tumour BAM/CRAM file
        pattern: "*.{bam,cram}"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM
          - edam: "http://edamontology.org/format_2573" # CRAM
    - tumour_index:
        type: file
        description: Tumour BAM/CRAM index
        pattern: "*.{bai,crai}"
        ontologies: []
    - normal:
        type: file
        description: Optional normal BAM/CRAM file
        pattern: "*.{bam,cram}"
        optional: true
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM
          - edam: "http://edamontology.org/format_2573" # CRAM
    - normal_index:
        type: file
        description: Optional normal BAM/CRAM index
        pattern: "*.{bai,crai}"
        optional: true
        ontologies: []
    - snp_vcf:
        type: file
        description: Optional SNP VCF for allele counting (mutually exclusive with g1000_vcf and allele_counts_het_snps)
        pattern: "*.{vcf,vcf.gz}"
        optional: true
        ontologies:
          - edam: "http://edamontology.org/format_3016" # VCF
    - allele_counts_het_snps:
        type: file
        description: Optional precomputed allele counts of heterozygous SNPs
        pattern: "*.bed"
        optional: true
        ontologies:
          - edam: "http://edamontology.org/format_3003" # BED
    - breakpoints:
        type: file
        description: Optional SAVANA breakpoints VCF to be included in CNA analysis
        pattern: "*.{vcf,vcf.gz}"
        optional: true
        ontologies:
          - edam: "http://edamontology.org/format_3016" # VCF

  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. `[ id:'hg38' ]`
    - ref:
        type: file
        description: Reference FASTA
        pattern: "*.{fa,fasta}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA
    - ref_index:
        type: file
        description: Reference FASTA index
        pattern: "*.fai"
        ontologies: []

  - contigs:
      type: file
      description: Optional contigs list file for SAVANA to restrict analysis to specific contigs
      pattern: "*.txt"
      optional: true
      ontologies:
        - edam: "http://edamontology.org/format_2330" # TXT
  - blacklist:
      type: file
      description: Optional blacklist BED for CNA analysis
      pattern: "*.bed"
      optional: true
      ontologies:
        - edam: "http://edamontology.org/format_3003" # BED
  - g1000_vcf:
      type: string
      description: Optional 1000G preset for allele counting (mutually exclusive with snp_vcf and allele_counts_het_snps)
      optional: true

output:
  cna:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}_segmented_absolute_copy_number.tsv:
          type: file
          description: Segmented absolute copy number
          pattern: "*.tsv"
          optional: true
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  ranked_solutions:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}_ranked_solutions.tsv:
          type: file
          description: Ranked purity/ploidy solutions
          pattern: "*_ranked_solutions.tsv"
          optional: true
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  fitted_purity_ploidy:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}_fitted_purity_ploidy.tsv:
          type: file
          description: Final purity/ploidy fit
          pattern: "*_fitted_purity_ploidy.tsv"
          optional: true
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  segmented_log2r:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}_read_counts_*_log2r_segmented.tsv:
          type: file
          description: Segmented log2R copy number
          pattern: "*_read_counts_*_log2r_segmented.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  raw_read_counts:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}_raw_read_counts.tsv:
          type: file
          description: Raw binned read counts
          pattern: "*_raw_read_counts.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  binned_ref:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*kbp_bin_ref_*_${prefix}*.bed":
          type: file
          description: Binned reference BED (with or without SV breakpoint integration)
          pattern: "*kbp_bin_ref_*_*.bed"
          ontologies:
            - edam: "http://edamontology.org/format_3003" # BED
  allele_counts:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}_allele_counts_hetSNPs.bed:
          type: file
          description: Allele counts for heterozygous SNPs (optional)
          pattern: "*_allele_counts_hetSNPs.bed"
          ontologies:
            - edam: "http://edamontology.org/format_3003" # BED

  no_fit:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - No_fit_found_PARAMS.tsv:
          type: file
          description: Report containing rejected candidate purity/ploidy solutions when no fit is found.
          pattern: "No_fit_found_PARAMS.tsv"
          optional: true
          ontologies:
            - edam: "http://edamontology.org/format_3475" # TSV
  versions_savana:
    - - ${task.process}:
          type: string
          description: Process name
      - savana:
          type: string
          description: Tool version
      - python -c "import importlib.metadata as m; print(m.version('savana'))":
          type: eval
          description: Command to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: Process name
      - savana:
          type: string
          description: Tool version
      - python -c "import importlib.metadata as m; print(m.version('savana'))":
          type: eval
          description: Command to obtain the version of the tool
authors:
  - "@manascripts"
maintainers:
  - "@manascripts"
