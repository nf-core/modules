name: "bwameme_mem"
description: Performs fastq alignment to a fasta reference using BWA-MEME
keywords:
  - mem
  - bwa
  - bwamem2
  - bwameme
  - alignment
  - map
  - fastq
  - bam
  - sam
  - cram
tools:
  - "bwameme":
      description: "Faster BWA-MEM2 using learned-index"
      homepage: https://github.com/kaist-ina/BWA-MEME
      documentation: https://github.com/kaist-ina/BWA-MEME#getting-started
      doi: "10.1093/bioinformatics/btac137"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input FastQ files of size 1 and 2 for single-end and paired-end data,
          respectively.
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference/index information
          e.g. [ id:'test' ]
    - index:
        type: file
        description: BWA genome index files
        pattern: "Directory containing BWA index *.{0132,amb,ann,bwt.2bit.64,pac}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Reference genome in FASTA format
        pattern: "*.{fa,fasta,fna}"
        ontologies: []
  - sort_bam:
      type: boolean
      description: use samtools sort (true) or samtools view (false)
      pattern: "true or false"
output:
  output:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.{sam,bam,cram}:
          type: file
          description: Output alignment file (SAM, BAM, or CRAM)
          pattern: "*.{sam,bam,cram}"
          ontologies: []
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.{csi,crai}:
          type: file
          description: Index file for BAM (.csi) or CRAM (.crai) output
          pattern: "*.{csi,crai}"
          ontologies: []
  versions_bwameme:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bwameme:
          type: string
          description: The name of the tool
      - 1.0.6:
          type: string
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: Name of the tool
      - samtools version | sed "1!d;s/.* //":
          type: eval
          description: The expression to obtain the version of the tool
  versions_mbuffer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mbuffer:
          type: string
          description: The name of the tool
      - mbuffer --version 2>&1 | sed -n 's/mbuffer version //p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bwameme:
          type: string
          description: The name of the tool
      - 1.0.6:
          type: string
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: Name of the tool
      - samtools version | sed "1!d;s/.* //":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - mbuffer:
          type: string
          description: The name of the tool
      - mbuffer --version 2>&1 | sed -n 's/mbuffer version //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@ramprasadn"
maintainers:
  - "@ramprasadn"
