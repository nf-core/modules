name: icountmini_metagene
description: Plot a metagene of cross-link events/sites around various transcriptomic
  landmarks.
keywords:
  - iCLIP
  - gtf
  - genomics
tools:
  - icount:
      description: Computational pipeline for analysis of iCLIP data
      homepage: https://icount.readthedocs.io/en/latest/
      documentation: https://icount.readthedocs.io/en/latest/
      licence: ["MIT"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bed:
        type: file
        description: BED file of crosslinks
        ontologies: []
  - segmentation:
      type: file
      description: A iCount segmentation file
      pattern: "*.{gtf}"
      ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - metagene_*/*plot_data.tsv:
          type: file
          description: Metagene table
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_icount_mini:
    - - ${task.process}:
          type: string
          description: The name of the process
      - iCount-Mini:
          type: string
          description: The name of the tool
      - iCount-Mini -v:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - iCount-Mini:
          type: string
          description: The name of the tool
      - iCount-Mini -v:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@marc-jones"
  - "@chris-cheshire"
  - "@charlotteanne"
maintainers:
  - "@marc-jones"
  - "@chris-cheshire"
  - "@charlotteanne"
