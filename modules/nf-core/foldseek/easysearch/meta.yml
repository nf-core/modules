name: "foldseek_easysearch"
description: Search for protein structural hits against a foldseek database of
  protein structures
keywords:
  - protein
  - structure
  - comparisons
tools:
  - "foldseek":
      description: "Foldseek: fast and accurate protein structure search"
      homepage: "https://search.foldseek.com/search"
      documentation: "https://github.com/steineggerlab/foldseek"
      tool_dev_url: "https://github.com/steineggerlab/foldseek"
      doi: "10.1038/s41587-023-01773-0"
      licence:
        - "GPL v3"
      identifier: biotools:foldseek
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - pdb:
        type: file
        description: Protein structure(s) in PDB, mmCIF or mmJSON format to
          compare against a foldseek database (also works with folder input)
        pattern: "*.{pdb,mmcif,mmjson}"
        ontologies:
          - edam: "http://edamontology.org/format_1476" # PDB
          - edam: "http://edamontology.org/format_1477" # mmCIF
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information for the foldseek db
          e.g. `[ id:'test', single_end:false ]`
    - db:
        type: directory
        description: foldseek database from protein structures
        pattern: "*"
output:
  aln:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - ${prefix}.m8:
          type: file
          description: |
            Structural comparisons file output
            Query, Target, Identity, Alignment length, Mismatches, Gap openings,
            Query start, Query end, Target start, Target end, E-value, Bit score
          pattern: "*.{m8}"
          ontologies: []
  versions_foldseek:
    - - ${task.process}:
          type: string
          description: The name of the process
      - foldseek:
          type: string
          description: The name of the tool
      - "foldseek --help |& sed -n 's/.*Version: //p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - foldseek:
          type: string
          description: The name of the tool
      - "foldseek --help |& sed -n 's/.*Version: //p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
