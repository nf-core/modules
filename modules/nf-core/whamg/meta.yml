name: "whamg"
description: The wham suite consists of two programs, wham and whamg. wham, the
  original tool, is a very sensitive method with a high false discovery rate.
  The second program, whamg, is more accurate and better suited for general
  structural variant (SV) discovery.
keywords:
  - whamg
  - wham
  - vcf
  - bam
  - variant calling
tools:
  - "whamg":
      description: "Structural variant detection and association testing"
      homepage: "https://github.com/zeeev/wham"
      documentation: "https://github.com/zeeev/wham"
      tool_dev_url: "https://github.com/zeeev/wham"
      doi: "10.1371/journal.pcbi.1004572"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/SAM file
        pattern: "*.{bam,sam}"
        ontologies: []
    - bai:
        type: file
        description: BAM index file
        pattern: "*.bai"
        ontologies: []
  - fasta:
      type: file
      description: Reference Fasta file
      pattern: "*.{fasta,fa}"
      ontologies: []
  - fasta_fai:
      type: file
      description: Index of the reference Fasta
      pattern: "*.fai"
      ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf.gz":
          type: file
          description: Compressed VCF file
          pattern: "*.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  tbi:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf.gz.tbi":
          type: file
          description: Index of the VCF file
          pattern: "*.vcf.gz.tbi"
          ontologies: []
  graph:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: Graph file
          pattern: "*.txt"
          ontologies: []
  versions_whamg:
    - - ${task.process}:
          type: string
          description: The name of the process
      - whamg:
          type: string
          description: The name of the tool
      - "whamg 2>&1 | sed -n 's/^Version: v\\([^-]*\\).*/\\1/p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - whamg:
          type: string
          description: The name of the tool
      - "whamg 2>&1 | sed -n 's/^Version: v\\([^-]*\\).*/\\1/p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nvnieuwk"
maintainers:
  - "@nvnieuwk"
