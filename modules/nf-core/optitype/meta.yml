name: optitype
description: Perform HLA-I typing of sequencing data
keywords:
  - hla-typing
  - ILP
  - HLA-I
tools:
  - optitype:
      description: Precision HLA typing from next-generation sequencing data
      homepage: https://github.com/FRED-2/OptiType
      documentation: https://github.com/FRED-2/OptiType
      doi: "10.1093/bioinformatics/btu548"
      licence:
        - "BSD-3-Clause"
      identifier: biotools:optitype
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM file
        pattern: "*.{bam}"
        ontologies: []
    - bai:
        type: file
        description: BAM index file
        pattern: "*.{bai}"
        ontologies: []
output:
  hla_type:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', seq_type:'DNA' ]
      - ${prefix}/*.tsv:
          type: file
          description: HLA type
          pattern: "${prefix}/*.tsv"
          ontologies: []
  coverage_plot:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', seq_type:'DNA' ]
      - ${prefix}/*.pdf:
          type: file
          description: OptiType coverage plot
          pattern: "${prefix}/*.pdf"
          ontologies: []
  versions_optitype:
    - - ${task.process}:
          type: string
          description: The name of the process
      - optitype:
          type: string
          description: The name of the tool
      - 'grep "Version:" $(which OptiTypePipeline.py) | sed "s/Version: //g"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - optitype:
          type: string
          description: The name of the tool
      - 'grep "Version:" $(which OptiTypePipeline.py) | sed "s/Version: //g"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@apeltzer"
maintainers:
  - "@apeltzer"
  - "@christopher-mohr"
