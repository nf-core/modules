name: vg_deconstruct
description: Deconstruct snarls present in a variation graph in GFA format to
  variants in VCF format
keywords:
  - vcf
  - gfa
  - graph
  - pangenome graph
  - variation graph
  - graph projection to vcf
tools:
  - vg:
      description: |
        Variation graph data structures, interchange formats, alignment, genotyping,
        and variant calling methods.
      homepage: https://github.com/vgteam/vg
      documentation: https://github.com/vgteam/vg/wiki
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - gfa:
        type: file
        description: Variation graph in GFA format
        pattern: "*.{gfa}"
        ontologies:
          - edam: http://edamontology.org/format_3975
  - pb:
      type: file
      description: Optional snarls file (from vg snarls) to avoid recomputing.
        Usually ends with "pb". See "vg snarls".
      pattern: "*.{pb}"
      ontologies: []
  - gbwt:
      type: file
      description: Optional GBWT file (from vg gbwt) so to only consider alt
        traversals that correspond to GBWT threads FILE.
      pattern: "*.{gbwt}"
      ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.vcf":
          type: file
          description: Variants in VCF format
          pattern: "*.{vcf}"
          ontologies: []
  versions_vg:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vg:
          type: string
          description: The name of the tool
      - vg 2>&1 | sed -n 's/.*version v\([0-9.]*\).*/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - vg:
          type: string
          description: The name of the tool
      - vg 2>&1 | sed -n 's/.*version v\([0-9.]*\).*/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@heuermh, @subwaystation"
maintainers:
  - "@heuermh, @subwaystation"
