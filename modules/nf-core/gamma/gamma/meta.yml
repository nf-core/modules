name: "gamma_gamma"
description: Gene Allele Mutation Microbial Assessment
keywords:
  - gamma
  - gene-calling
  - microbial
  - allele
tools:
  - "gamma":
      description: "Tool for Gene Allele Mutation Microbial Assessment"
      homepage: "https://github.com/rastanton/GAMMA"
      documentation: "https://github.com/rastanton/GAMMA"
      tool_dev_url: "https://github.com/rastanton/GAMMA"
      doi: "10.1093/bioinformatics/btab607"
      licence: ["Apache License 2.0"]
      identifier: biotools:gamma
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: FASTA file
        pattern: "*.{fa,fasta}"
        ontologies: []
  - db:
      type: file
      description: Database in FASTA format
      pattern: "*.{fa,fasta}"
      ontologies: []
output:
  gamma:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gamma":
          type: file
          description: GAMMA file with annotated gene matches
          pattern: "*.{gamma}"
          ontologies: []
  psl:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.psl":
          type: file
          description: PSL file with all gene matches found
          pattern: "*.{psl}"
          ontologies: []
  gff:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gff":
          type: file
          description: GFF file
          pattern: "*.{gff}"
          ontologies: []
  fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fasta":
          type: file
          description: multifasta file of the gene matches
          pattern: "*.{fasta}"
          ontologies: []
  versions_gamma:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gamma:
          type: string
          description: The name of the tool
      - "2.1":
          type: string
          description: The hard-coded version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gamma:
          type: string
          description: The name of the tool
      - "2.1":
          type: string
          description: The hard-coded version of the tool
authors:
  - "@sateeshperi"
  - "@rastanton"
  - "@jvhagey"
maintainers:
  - "@sateeshperi"
  - "@rastanton"
  - "@jvhagey"
