name: "fastx_collapser"
description: Collapses identical sequences in a FASTQ/A file into a single sequence
  (while maintaining reads counts)
keywords:
  - collapse
  - genomics
  - fasta
  - fastq
tools:
  - "fastx":
      description: "A collection of command line tools for Short-Reads FASTA/FASTQ files
        preprocessing"
      homepage: "http://hannonlab.cshl.edu/fastx_toolkit/"
      documentation: "http://hannonlab.cshl.edu/fastx_toolkit/commandline.html"
      tool_dev_url: "https://github.com/agordon/fastx_toolkit"
      licence:
        - "AGPL"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - fastx:
        type: file
        description: Decompressed FASTA/FASTQ input file
        pattern: "*.{fastq,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1930
output:
  fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - ${prefix}.fasta:
          type: file
          description: Collapsed FASTA file
          pattern: "*.fasta"
          ontologies: []
  versions_fastx:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fastx:
          type: string
          description: The name of the tool
      - fastx_collapser -h 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fastx:
          type: string
          description: The name of the tool
      - fastx_collapser -h 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jvfe"
maintainers:
  - "@jvfe"
