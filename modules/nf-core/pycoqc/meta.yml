name: pycoqc
description: write your description here
keywords:
  - qc
  - quality control
  - sequencing
  - nanopore
tools:
  - pycoqc:
      description: PycoQC computes metrics and generates interactive QC plots for
        Oxford Nanopore technologies sequencing data
      homepage: https://github.com/tleonardi/pycoQC
      documentation: https://tleonardi.github.io/pycoQC/
      tool_dev_url: https://github.com/tleonardi/pycoQC
      doi: "10.21105/joss.01236"
      licence:
        - "GNU General Public v3 (GPL v3)"
      identifier: biotools:pycoqc
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - summary:
        type: file
        description: sequencing summary file
        pattern: "*.{txt}"
        ontologies: []
output:
  html:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.html":
          type: file
          description: Results in HTML format
          ontologies: []
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.json":
          type: file
          description: Results in JSON format
          pattern: "*.{json}"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  versions_pycoqc:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pycoqc:
          type: string
          description: The name of the tool
      - pycoQC --version 2>&1 | sed "s/^.*pycoQC v//; s/ .*\$//":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pycoqc:
          type: string
          description: The name of the tool
      - pycoQC --version 2>&1 | sed "s/^.*pycoQC v//; s/ .*\$//":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@joseespinosa"
  - "@drpatelh"
maintainers:
  - "@joseespinosa"
  - "@drpatelh"
