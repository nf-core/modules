name: "varnet"
description: VarNet is a deep learning-based somatic variant caller that utilizes
  a two-stage filtering and prediction architecture. It processes aligned reads from
  tumor and normal data to identify somatic mutations using a deep neural network
  approach.
keywords:
  - variant calling
  - machine learning
  - neural network
  - somatic
tools:
  - "varnet":
      description: "A deep learning-based somatic variant caller"
      homepage: "https://github.com/skandlab/VarNet"
      documentation: "https://github.com/skandlab/VarNet"
      tool_dev_url: "https://github.com/skandlab/VarNet"
      doi: "10.1038/s41467-022-31765-8"
      licence:
        - "PolyForm Noncommercial License 1.0.0"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input_normal:
        type: file
        description: BAM/CRAM file from normal sample
        pattern: "*.{bam,cram}"
        ontologies: []
    - index_normal:
        type: file
        description: Index of normal BAM/CRAM file
        pattern: "*.{bai,crai}"
        ontologies: []
    - input_tumor:
        type: file
        description: BAM/CRAM file from tumor sample
        pattern: "*.{bam,cram}"
        ontologies: []
    - index_tumor:
        type: file
        description: Index of tumor BAM/CRAM file
        pattern: "*.{bai,crai}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
    - intervals:
        type: file
        description: BED file containing target intervals
        pattern: "*.bed"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing reference information
    - fasta:
        type: file
        description: The reference fasta file
        pattern: "*.{fasta,fa}"
        ontologies: []
  - - meta4:
        type: map
        description: |
          Groovy Map containing reference information
    - fai:
        type: file
        description: Index of reference fasta file
        pattern: "*.fai"
        ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - ${prefix}.vcf.gz:
          type: file
          description: Compressed VCF file
          pattern: "*.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format

  versions_varnet:
    - - ${task.process}:
          type: string
          description: The name of the process
      - varnet:
          type: string
          description: The name of the tool
      - "1.5.0":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - varnet:
          type: string
          description: The name of the tool
      - "1.5.0":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@kiranchari"
maintainers:
  - "@kiranchari"
