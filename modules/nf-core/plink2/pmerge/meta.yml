name: "plink2_pmerge"
description: Merge a second PLINK 2 fileset into the first and write a new combined PLINK 2 fileset
keywords:
  - plink2
  - pmerge
  - merge
  - fileset
  - quality control
tools:
  - "plink2":
      description: |
        Whole genome association analysis toolset, designed to perform a range
        of basic, large-scale analyses in a computationally efficient manner
      homepage: "http://www.cog-genomics.org/plink/2.0/"
      documentation: "http://www.cog-genomics.org/plink/2.0/data#pmerge"
      doi: "10.1186/s13742-015-0047-8"
      licence:
        - "GPL v3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - pgen:
        type: file
        description: PLINK 2 binary genotype table
        pattern: "*.{pgen}"
        ontologies: []
    - pvar:
        type: file
        description: PLINK 2 variant information file
        pattern: "*.{pvar}"
        ontologies: []
    - psam:
        type: file
        description: PLINK 2 sample information file
        pattern: "*.{psam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information for the second fileset
          e.g. [ id:'test2', single_end:false ]
    - pgen2:
        type: file
        description: PLINK 2 binary genotype table to merge in
        pattern: "*.{pgen}"
        ontologies: []
    - pvar2:
        type: file
        description: PLINK 2 variant information file to merge in
        pattern: "*.{pvar}"
        ontologies: []
    - psam2:
        type: file
        description: PLINK 2 sample information file to merge in
        pattern: "*.{psam}"
        ontologies: []
output:
  pgen:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.pgen":
          type: file
          description: Merged PLINK 2 binary genotype table
          pattern: "*.{pgen}"
          ontologies: []
  pvar:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.pvar":
          type: file
          description: Merged PLINK 2 variant information file
          pattern: "*.{pvar}"
          ontologies: []
  psam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.psam":
          type: file
          description: Merged PLINK 2 sample information file
          pattern: "*.{psam}"
          ontologies: []
  versions_plink2:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink2:
          type: string
          description: The name of the tool
      - "plink2 --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink2:
          type: string
          description: The name of the tool
      - "plink2 --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@lyh970817"
maintainers:
  - "@lyh970817"
