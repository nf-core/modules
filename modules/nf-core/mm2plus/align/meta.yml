name: mm2plus_align
description: A versatile pairwise aligner for genomic and spliced nucleotide sequences
keywords:
  - align
  - fasta
  - fastq
  - genome
  - paf
  - reference
tools:
  - mm2plus:
      description: |
        A versatile pairwise aligner for genomic and spliced nucleotide sequences.
      homepage: https://github.com/at-cg/mm2-plus
      documentation: https://github.com/at-cg/mm2-plus#readme_mm2
      licence: ["MIT"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: |
          List of input BAM, or input FASTA or FASTQ files of size 1 and 2 for single-end
          and paired-end data, respectively.
        ontologies:
          - edam: http://edamontology.org/format_2572 # BAM
          - edam: http://edamontology.org/format_1929 # FASTA
          - edam: http://edamontology.org/format_1930 # FASTQ
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'test_ref']
    - reference:
        type: file
        description: |
          Reference database in FASTA format.
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
  - bam_format:
      type: boolean
      description: Specify that output should be in BAM format
  - bam_index_extension:
      type: string
      description: BAM alignment index extension (e.g. "bai")
  - cigar_paf_format:
      type: boolean
      description: Specify that output CIGAR should be in PAF format
  - cigar_bam:
      type: boolean
      description: |
        Write CIGAR with >65535 ops at the CG tag. This is recommended when
        doing XYZ (https://github.com/lh3/minimap2#working-with-65535-cigar-operations)
output:
  paf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.paf":
          type: file
          description: Alignment in PAF format
          pattern: "*.paf"
          ontologies: []
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: Alignment in BAM format
          pattern: "*.bam"
          ontologies:
            - edam: http://edamontology.org/format_2572 # BAM
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam.${bam_index_extension}":
          type: file
          description: BAM alignment index
          pattern: "*.bam.*"
          ontologies:
            - edam: http://edamontology.org/format_3327 # BAM index
  versions_mm2plus:
    - - ${task.process}:
          type: string
          description: The process name
      - mm2plus:
          type: string
          description: The tool name
      - mm2plus --version:
          type: eval
          description: The tool version
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The process name
      - samtools:
          type: string
          description: The tool name
      - samtools version | sed '1!d;s/.* //':
          type: eval
          description: The tool version
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process name
      - mm2plus:
          type: string
          description: The tool name
      - mm2plus --version:
          type: eval
          description: The tool version
    - - ${task.process}:
          type: string
          description: The process name
      - samtools:
          type: string
          description: The tool name
      - samtools version | sed '1!d;s/.* //':
          type: eval
          description: The tool version
authors:
  - "@fellen31"
maintainers:
  - "@fellen31"
