name: "ilastik_multicut"
description: Ilastik is a tool that utilizes machine learning algorithms to
  classify pixels, segment, track and count cells in images. Ilastik contains a
  graphical user interface to interactively label pixels. However, this nextflow
  module will implement the --headless mode, to apply pixel classification using
  a pre-trained .ilp file on an input image.
keywords:
  - multicut
  - segmentation
  - pixel classification
tools:
  - "ilastik":
      description: "Ilastik is a user friendly tool that enables pixel classification,
        segmentation and analysis."
      homepage: "https://www.ilastik.org/"
      documentation: "https://www.ilastik.org/documentation/"
      tool_dev_url: "https://github.com/ilastik/ilastik"
      license:
        - "GPL3"
      identifier: biotools:ilastik
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - h5:
        type: file
        description: h5 file containing image stack to classify file
        pattern: "*.{h5,hdf5}"
        ontologies:
          - edam: http://edamontology.org/format_3590 # HDF5
    - probs:
        type: file
        description: Probability map for boundary based segmentation as exported
          by the pixel classification workflow.
        pattern: "*.{h5,hdf5}"
        ontologies:
          - edam: http://edamontology.org/format_3590 # HDF5
  - ilp:
      type: file
      description: Trained 'Boundary-based Segmentation with Multicut' .ilp
        project file
      pattern: "*.{ilp}"
      ontologies: [] # no existing ontology
output:
  mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tiff":
          type: file
          description: Multicut segmentation mask output.
          pattern: "*.{tiff}"
          ontologies:
            - edam: http://edamontology.org/format_3591
  versions_ilastik:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ilastik:
          type: string
          description: The name of the tool
      - /opt/ilastik-1.4.0-Linux/run_ilastik.sh --headless --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ilastik:
          type: string
          description: The name of the tool
      - /opt/ilastik-1.4.0-Linux/run_ilastik.sh --headless --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@FloWuenne"
maintainers:
  - "@FloWuenne"
