name: "kaiju_mkfmi"
description: Make Kaiju FMI-index file from a protein FASTA file
keywords:
  - classify
  - metagenomics
  - fastq
  - taxonomic profiling
  - database
  - index
tools:
  - "kaiju":
      description: "Fast and sensitive taxonomic classification for metagenomics"
      homepage: "https://bioinformatics-centre.github.io/kaiju/"
      documentation: "https://github.com/bioinformatics-centre/kaiju/blob/master/README.md"
      tool_dev_url: "https://github.com/bioinformatics-centre/kaiju"
      doi: "10.1038/ncomms11257"
      licence: ["GNU GPL v3"]
      identifier: biotools:kaiju
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - fasta:
        type: file
        description: Uncompressed Protein FASTA file (mandatory)
        pattern: "*.{fa,faa,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
  - nodes_dmp:
      type: file
      description: NCBI nodes.dmp file (mandatory)
      pattern: "nodes.dmp"
      ontologies:
        - edam: http://edamontology.org/format_3751 # DSV
  - keep_intermediate:
      type: boolean
      description: "Keep intermediate files"
      pattern: true|false
output:
  fmi:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*.{fmi,dmp}":
          type: file
          description: Kaiju FM-index file and nodes.dmp file required for Kaiju classification
          pattern: "*.{fmi,dmp}"
          ontologies: []
  bwt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*.bwt":
          type: file
          description: Kaiju intermedite bwt-index file (not needed for classification)
          pattern: "*.{bwt}"
          ontologies: []
  sa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*.sa":
          type: file
          description: Kaiju intermedite bwt-index file (not needed for classification)
          pattern: "*.{sa}"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@alxndrdiaz"
  - "@jfy133"
