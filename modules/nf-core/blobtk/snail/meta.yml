# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "blobtk_snail"
description: |
  Creates blobtk snail plots.
keywords:
  - svg
  - bkt
  - blobtoolkit
  - snailplot
tools:
  - btk:
      description: |
        BlobTk contains a set of core functions used by BlobToolKit tools.
        Implemented in Rust, these functions are intended to be accessible
        from the command line, as python modules and will include web assembly
        code for use in javascript.
      homepage: https://github.com/genomehubs/blobtk/
      documentation: https://github.com/genomehubs/blobtk/wiki/
      licence: ["MIT"]
      identifier: biotools:btk
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information and blobtk arguments
          e.g. `[ id:'sample1']`
    - fasta:
        type: file
        description: |
          Input assembly FASTA.
        pattern: "*.fasta"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
    - full_table:
        type: file
        description: |
          Full table TSV from blast.
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_1915 # TSV
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information and blobtk arguments
          e.g. `[ id:'sample1']`
    - blob_dir:
        type: directory
        description: |
          A local path to a BlobDir.
        pattern: "*/"
  - format:
      type: string
      description: |
        Output format for the snail plot.
      pattern: "{png,svg,json,yaml}"

output:
  images:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.{svg,png}":
          type: file
          description: |
            BlobTK image results of input arguments.
          ontologies:
            - edam: http://edamontology.org/format_3604 # SVG
            - edam: http://edamontology.org/format_3603 # PNG
  descriptions:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.{json,yaml}":
          type: file
          description: |
            BlobTK files describing the snail plot.
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
            - edam: http://edamontology.org/format_3750 # YAML
  versions_blobtk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - blobtk:
          type: string
          description: The name of the tool
      - "blobtk --version | cut -d' ' -f2":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - blobtk:
          type: string
          description: The name of the tool
      - "blobtk --version | cut -d' ' -f2":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
