# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "blobtk_create"
description: |
  Creates a minimal blobdir.
keywords:
  - blobdir
  - bkt
  - blobtoolkit
  - metadata
tools:
  - btk:
      description: |
        BlobTk contains a set of core functions used by BlobToolKit tools.
        Implemented in Rust, these functions are intended to be accessible
        from the command line, as python modules and will include web assembly
        code for use in javascript.
      homepage: https://github.com/genomehubs/blobtk/
      documentation: https://github.com/genomehubs/blobtk/wiki/
      licence: ["MIT"]
      identifier: biotools:btk
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information and blobtk arguments
          e.g. `[ id:'sample1']`
    - fasta:
        type: file
        description: |
          Input assembly FASTA.
        pattern: "*.fasta"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
    - full_table:
        type: file
        description: |
          Full table TSV from busco.
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_1915 # TSV

output:
  blobdir:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "${prefix}/":
          type: directory
          description: |
            A minimal blobdir directory
          ontologies: []
  versions_blobtk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - blobtk:
          type: string
          description: The name of the tool
      - "blobtk --version | cut -d' ' -f2":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - blobtk:
          type: string
          description: The name of the tool
      - "blobtk --version | cut -d' ' -f2":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
