name: tabix_tabix
description: |
  Create a tabix index from a sorted bgzip TAB-delimited genome file, or
  extract regions from a bgzipped VCF file using an optional regions file.
keywords:
  - index
  - tabix
  - vcf
  - extract
  - regions
tools:
  - tabix:
      description: Generic indexer for TAB-delimited genome position files.
      homepage: https://www.htslib.org/doc/tabix.html
      documentation: https://www.htslib.org/doc/tabix.1.html
      doi: 10.1093/bioinformatics/btq671
      licence: ["MIT"]
      identifier: biotools:tabix
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - tab:
        type: file
        description: TAB-delimited genome position file compressed with bgzip
        pattern: "*.{bed.gz,gff.gz,sam.gz,vcf.gz}"
        ontologies: []
    - index:
        type: file
        description: |
          Tabix index for the input file. Required when extracting regions.
          Pass [] when creating an index instead.
        pattern: "*.{tbi,csi}"
        ontologies: []
    - regions:
        type: file
        description: |
          Optional file of regions to extract (BED or chr:start-end format).
          Pass [] to create an index instead of extracting regions.
        pattern: "*.{bed,txt,tsv}"
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{tbi,csi}":
          type: file
          description: Tabix index file (tbi or csi). Emitted when no regions file is provided.
          pattern: "*.{tbi,csi}"
          ontologies: []
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "${prefix}.vcf.gz":
          type: file
          description: Bgzipped VCF of extracted regions. Emitted when a regions file is provided.
          pattern: "*.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3016 # VCF
  versions_tabix:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tabix:
          type: string
          description: The tool name
      - tabix -h 2>&1 | grep -oP 'Version:\s*\K[^\s]+':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tabix:
          type: string
          description: The tool name
      - tabix -h 2>&1 | grep -oP 'Version:\s*\K[^\s]+':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@joseespinosa"
  - "@drpatelh"
  - "@maxulysse"
maintainers:
  - "@joseespinosa"
  - "@drpatelh"
  - "@maxulysse"
