name: tabix_extract
description: Extract regions from a bgzipped VCF file using tabix
keywords:
  - tabix
  - vcf
  - extract
  - regions
  - index
tools:
  - tabix:
      description: |
        Tabix indexes a TAB-delimited genome position file in.tab.bgz and creates
        an index file. It can also extract regions from a bgzipped VCF/BCF/BED/GFF file.
      homepage: http://www.htslib.org/
      documentation: http://www.htslib.org/doc/tabix.html
      doi: 10.1093/bioinformatics/btq671
      licence: ["MIT"]
      identifier: biotools:tabix

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - vcf:
        type: file
        description: bgzipped VCF file
        pattern: "*.vcf.gz"
        ontologies:
          - edam: http://edamontology.org/format_3016 # VCF
    - tbi:
        type: file
        description: Tabix index for the VCF file
        pattern: "*.vcf.gz.tbi"
        ontologies:
          - edam: http://edamontology.org/format_3326 # Index
  - - meta2:
        type: map
        description: |
          Groovy Map containing regions information
          e.g. [ id:'regions' ]
    - regions:
        type: file
        description: |
          Optional file of regions to extract (one per line, BED or chr:start-end format).
          Pass an empty list [] to extract all records.
        pattern: "*.{bed,txt,tsv}"
        ontologies: []
  - create_index:
      type: boolean
      description: |
        Whether to create a tabix index (.tbi) for the output VCF.
        Set to true to emit the tbi output channel.

output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${prefix}.vcf.gz:
          type: file
          description: bgzipped extracted VCF file
          pattern: "*.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3016 # VCF
  tbi:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${prefix}.vcf.gz.tbi:
          type: file
          description: Optional tabix index for the extracted VCF
          pattern: "*.vcf.gz.tbi"
          ontologies:
            - edam: http://edamontology.org/format_3326 # Index
  versions_tabix:
    - - ${task.process}:
          type: string
          description: Name of the process
      - tabix:
          type: string
          description: Name of the tool
      - tabix -h 2>&1 | grep -oP 'Version:\s*\K[^\s]+':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: Name of the process
      - tabix:
          type: string
          description: Name of the tool
      - tabix -h 2>&1 | grep -oP 'Version:\s*\K[^\s]+':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@luisasantus"
maintainers:
  - "@luisasantus"
