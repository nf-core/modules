name: genmap_index
description: create index file for genmap
keywords:
  - index
  - mappability
  - fasta
tools:
  - genmap:
      description: Ultra-fast computation of genome mappability.
      homepage: https://github.com/cpockrandt/genmap
      documentation: https://github.com/cpockrandt/genmap
      tool_dev_url: https://github.com/cpockrandt/genmap
      doi: "10.1093/bioinformatics/btaa222"
      licence:
        - "BSD-3-Clause"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: fasta file to index
        pattern: "*.{fasta,fa,fna}"
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}:
          type: directory
          description: Genmap index directory
  versions_genmap:
    - - ${task.process}:
          type: string
          description: The name of the process
      - genmap:
          type: string
          description: The name of the tool
      - "genmap --version |& sed 's/GenMap version: //'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - genmap:
          type: string
          description: The name of the tool
      - "genmap --version |& sed 's/GenMap version: //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jianhong"
  - "@nvnieuwk"
maintainers:
  - "@jianhong"
  - "@nvnieuwk"
