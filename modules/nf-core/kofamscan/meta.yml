name: "kofamscan"
description: Produces annotation using kofamscan against a Profile database and
  a KO list
keywords:
  - fasta
  - kegg
  - kofamscan
tools:
  - "kofamscan":
      description: "KofamKOALA assigns K numbers to the user's sequence data by HMMER/HMMSEARCH
        against KOfam"
      homepage: "https://www.genome.jp/tools/kofamkoala/"
      documentation: "https://github.com/takaram/kofam_scan"
      tool_dev_url: "https://github.com/takaram/kofam_scan"
      doi: "10.1093/bioinformatics/btz859"
      licence:
        - "MIT License"
      identifier: biotools:kofamscan
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Input fasta file containing query sequences
        pattern: "*.{fa,fasta}"
        ontologies: []
  - profiles:
      type: directory
      description: Directory containing the Profiles database
      pattern: "*"
  - ko_list:
      type: file
      description: File containing list of KO entries with their data
      pattern: "*.{fa,fasta}"
      ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: Application-specific text file with hits information
          pattern: "*.{txt}"
          ontologies: []
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: Tab separated file containing with detailed hits
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_kofamscan:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kofamscan:
          type: string
          description: kofamscan version string
      - "exec_annotation --version 2>&1 | sed 's/exec_annotation //;'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - kofamscan:
          type: string
          description: kofamscan version string
      - "exec_annotation --version 2>&1 | sed 's/exec_annotation //;'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@toniher"
maintainers:
  - "@toniher"
