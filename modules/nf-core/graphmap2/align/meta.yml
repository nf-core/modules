name: graphmap2_align
description: A versatile pairwise aligner for genomic and spliced nucleotide
  sequences
keywords:
  - align
  - fasta
  - fastq
  - genome
  - reference
tools:
  - graphmap2:
      description: |
        A versatile pairwise aligner for genomic and spliced nucleotide sequences.
      homepage: https://github.com/lbcb-sci/graphmap2
      documentation: https://github.com/lbcb-sci/graphmap2#graphmap2---a-highly-sensitive-and-accurate-mapper-for-long-error-prone-reads
      licence:
        - "MIT"
      identifier: biotools:Graphmap2
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: file containing reads to be aligned.
        ontologies: []
  - fasta:
      type: file
      description: |
        Reference database in FASTA format.
      ontologies: []
  - index:
      type: file
      description: |
        FASTA index in gmidx.
      ontologies: []
output:
  sam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sam":
          type: file
          description: Alignment in SAM format
          pattern: "*.sam"
          ontologies: []
  versions_graphmap2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - graphmap2:
          type: string
          description: The name of the tool
      - "graphmap2 2>&1 | sed -n 's/Version: v//p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - graphmap2:
          type: string
          description: The name of the tool
      - "graphmap2 2>&1 | sed -n 's/Version: v//p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@yuukiiwa"
  - "@drpatelh"
maintainers:
  - "@yuukiiwa"
  - "@drpatelh"
