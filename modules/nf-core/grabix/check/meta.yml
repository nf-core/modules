name: "grabix_check"
description: Checks if the input file is bgzip compressed or not
keywords:
  - compression
  - bgzip
  - grabix
tools:
  - grabix:
      description: "a wee tool for random access into BGZF files."
      homepage: "https://github.com/arq5x/grabix"
      documentation: "https://github.com/arq5x/grabix"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input:
        type: file
        pattern: "*.gz"
        description: file to check compression
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
output:
  compress_bgzip:
    - meta:
        type: string
        description: environmental variable with value "yes" or "no"
  versions_grabix:
    - - ${task.process}:
          type: string
          description: The name of the process
      - grabix:
          type: string
          description: The name of the tool
      - "grabix |& sed -n 's/^version: //p'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - grabix:
          type: string
          description: The name of the tool
      - "grabix |& sed -n 's/^version: //p'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@MartaSantanaSilva"
maintainers:
  - "@MartaSantanaSilva"
