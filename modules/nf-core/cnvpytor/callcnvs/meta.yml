name: cnvpytor_callcnvs
description: Command line tool for calling CNVs in whole genome sequencing data
keywords:
  - CNV
  - call
  - wgs
tools:
  - cnvpytor:
      description: calling CNVs using read depth
      homepage: https://github.com/abyzovlab/CNVpytor
      documentation: https://github.com/abyzovlab/CNVpytor
      tool_dev_url: https://github.com/abyzovlab/CNVpytor
      doi: "10.1101/2021.01.27.428472v1"
      licence:
        - "MIT"
      identifier: biotools:cnvpytor
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test']
    - pytor:
        type: file
        description: pytor file containing partitions of read depth histograms
          using mean-shift method
        pattern: "*.{pytor}"
        ontologies: []
  - bin_sizes:
      type: string
      description: list of binsizes separated by space e.g. "1000 10000" and
        "1000"
output:
  pytor:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${pytor.baseName}.pytor:
          type: file
          description: pytor files containing cnv calls
          pattern: "*.{pytor}"
          ontologies: []
  versions_cnvpytor:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cnvpytor:
          type: string
          description: The name of the tool
      - cnvpytor --version | sed -n 's/.*CNVpytor \(.*\)/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cnvpytor:
          type: string
          description: The name of the tool
      - cnvpytor --version | sed -n 's/.*CNVpytor \(.*\)/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sima-r"
maintainers:
  - "@sima-r"
