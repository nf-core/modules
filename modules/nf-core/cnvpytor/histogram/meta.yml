name: cnvpytor_histogram
description: calculates read depth histograms
keywords:
  - cnv calling
  - histogram
  - read depth
tools:
  - cnvpytor:
      description: calling CNVs using read depth
      homepage: https://github.com/abyzovlab/CNVpytor
      documentation: https://github.com/abyzovlab/CNVpytor
      tool_dev_url: https://github.com/abyzovlab/CNVpytor
      doi: "10.1101/2021.01.27.428472v1"
      licence:
        - "MIT"
      identifier: biotools:cnvpytor
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - pytor:
        type: file
        description: pytor file containing read depth data
        pattern: "*.{pytor}"
        ontologies: []
  - bin_sizes:
      type: string
      description: list of binsizes separated by space e.g. "1000 10000" and
        "1000"
output:
  pytor:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - ${pytor.baseName}.pytor:
          type: file
          description: pytor file containing read depth histograms binned based on
            given bin size(s)
          pattern: "*.{pytor}"
          ontologies: []
  versions_cnvpytor:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cnvpytor:
          type: string
          description: The name of the tool
      - 1.3.2:
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - cnvpytor:
          type: string
          description: The name of the tool
      - 1.3.2:
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@sima-r"
  - "@ramprasadn"
maintainers:
  - "@sima-r"
  - "@ramprasadn"
