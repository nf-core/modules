name: calc_inflation
description: Calculate LDAK inflation diagnostics from full-genome and quarter REML outputs
keywords:
  - ldak
  - inflation
  - qc
  - reml
tools:
  - r-base:
      description: R programming language runtime used for statistical post-processing
      homepage: https://www.r-project.org/
      documentation: https://www.r-project.org/
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing report metadata.
          Expected keys:
            - id (string): Output prefix for inflation report (for example, 'inflation_Y1').
    - ldak_reml_file:
        type: file
        description: Full-genome LDAK REML output file (`*.reml`)
    - quarter_reml_files:
        type: file
        description: One or more quarter/chromosome LDAK REML output files used for inflation comparison
output:
  inflation_results:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - ${meta.id}.txt:
          type: file
          description: Inflation summary report (`<meta.id>.txt`)
  versions_r_base:
    - - ${task.process}:
          type: string
          description: The name of the process
      - r-base:
          type: string
          description: The tool name
      - Rscript --version 2>&1 | cut -d" " -f3:
          type: eval
          description: The expression used to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - r-base:
          type: string
          description: The tool name
      - Rscript --version 2>&1 | cut -d" " -f3:
          type: eval
          description: The expression used to obtain the version of the tool
authors:
  - "andongni"
