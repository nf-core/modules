name: ldak_reml
description: Run linkage disequilibrium-adjusted kinship (LDAK) restricted maximum likelihood (REML) heritability estimation on a precomputed genomic relationship matrix (GRM) and phenotype
keywords:
  - ldak
  - reml
  - heritability
tools:
  - ldak6:
      description: LDAK toolset for kinship, heritability, and association analyses
      homepage: https://dougspeed.com/ldak/
      documentation: https://dougspeed.com/ldak/
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing phenotype metadata.
          Expected keys:
            - id (string): Output prefix for REML artifacts.
    - phenotype_file:
        type: file
        description: Headerless phenotype file passed to `--pheno`
    - mpheno:
        type: integer
        description: Optional phenotype column index passed to `--mpheno`; pass [] to use fallback `1`
    - prevalence:
        type: float
        description: Optional disease prevalence passed to `--prevalence`; pass [] when absent
  - - meta2:
        type: map
        description: |
          Groovy Map containing GRM metadata.
          Expected keys:
            - id (string): GRM identifier.
    - grm_bin:
        type: file
        description: GRM binary matrix (`.grm.bin`)
    - grm_id:
        type: file
        description: GRM sample identifiers (`.grm.id`)
    - grm_details:
        type: file
        description: GRM details (`.grm.details`)
    - grm_adjust:
        type: file
        description: GRM adjustment factors (`.grm.adjust`)
  - - meta3:
        type: map
        description: Metadata map paired with optional keep input.
    - keep_file:
        type: file
        description: Optional keep file for sample filtering; pass [] when GRM is pre-filtered
  - - meta4:
        type: map
        description: Metadata map paired with optional quantitative covariates input.
    - quant_covariates_file:
        type: file
        description: Optional quantitative covariates file passed to `--covar`; pass [] when absent
  - - meta5:
        type: map
        description: Metadata map paired with optional categorical covariates input.
    - cat_covariates_file:
        type: file
        description: Optional categorical covariates file passed to `--factors`; pass [] when absent
output:
  reml_results:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.reml":
          type: file
          description: REML summary output (`<prefix>.reml`)
  coeff:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.coeff":
          type: file
          description: Optional coefficient output (`<prefix>.coeff`)
  combined:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.combined":
          type: file
          description: Optional combined output (`<prefix>.combined`)
  cross:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.cross":
          type: file
          description: Optional cross output (`<prefix>.cross`)
  indi_blp:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.indi.blp":
          type: file
          description: Optional individual best linear prediction (BLP) output (`<prefix>.indi.blp`)
  indi_res:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.indi.res":
          type: file
          description: Optional individual residual output (`<prefix>.indi.res`)
  progress:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.progress":
          type: file
          description: Optional progress output (`<prefix>.progress`)
  share:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.share":
          type: file
          description: Optional share output (`<prefix>.share`)
  vars:
    - - meta:
          type: map
          description: Metadata map propagated from input
      - "${prefix}.vars":
          type: file
          description: Optional variance component output (`<prefix>.vars`)
  versions_ldak6:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ldak6:
          type: string
          description: The tool name
      - ldak6 --version 2>&1 | grep -oP '(?<=^Version )[0-9.]+':
          type: eval
          description: The expression used to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ldak6:
          type: string
          description: The tool name
      - ldak6 --version 2>&1 | grep -oP '(?<=^Version )[0-9.]+':
          type: eval
          description: The expression used to obtain the version of the tool
authors:
  - "@lyh970817"
maintainers:
  - "@lyh970817"
