# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "ldak_kvik_step2"
description: "Run LDAK-KVIK step 2 association testing from step 1 prediction artifacts"
keywords:
  - "ldak"
  - "kvik"
  - "gwas"
  - "association"
tools:
  - "ldak6":
      description: "LDAK and LDAK-KVIK for mixed-model GWAS and heritability analysis."
      homepage: "https://dougspeed.com/ldak/"
      documentation: "https://dougspeed.com/ldak-kvik/"
      tool_dev_url: "https://github.com/dougspeed/LDAK"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing genotype information
          Keep only the genotype analysis identifier and optional chromosome in this map
          The PLINK bundle must already be staged with basename `meta.id`, or `meta.id.chr<meta.chr>` when `chr` is provided
          e.g. `[ id:'chr01.vcf', chr:1 ]`
    - bed:
        type: file
        description: PLINK BED genotype file passed to `--bfile`
        pattern: "*.bed"
        ontologies:
          - edam: "http://edamontology.org/format_3003"
    - bim:
        type: file
        description: PLINK BIM variant file paired with the BED input
        pattern: "*.bim"
        ontologies: []
    - fam:
        type: file
        description: PLINK FAM sample file paired with the BED input
        pattern: "*.fam"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing phenotype information
          Keep `id` as the phenotype-specific analysis identifier used for the step 2 output prefix
          Keep `is_binary` for trait metadata propagation even though the documented step 2 command does not take `--binary`
          e.g. `[ id:'Y1', is_binary:false ]`
    - phenotype_file:
        type: file
        description: Phenotype file passed to `--pheno`
        pattern: "*.{txt,tsv,pheno,phe}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
  - - meta3:
        type: map
        description: |
          Groovy Map containing step 1 prediction artifact information
          e.g. `[ id:'Y1', is_binary:false ]`
    - step1_root:
        type: file
        description: LDAK-KVIK step 1 root file
        pattern: "*.step1.root"
        ontologies: []
    - step1_loco_details:
        type: file
        description: LDAK-KVIK step 1 LOCO details file
        pattern: "*.step1.loco.details"
        ontologies: []
    - step1_loco_prs:
        type: file
        description: LDAK-KVIK step 1 LOCO PRS file
        pattern: "*.step1.loco.prs"
        ontologies: []
  - - meta4:
        type: map
        description: |
          Groovy Map containing quantitative covariate information
          e.g. `[ id:'qcov' ]`
    - quant_covariates_file:
        type: file
        optional: true
        description: Optional quantitative covariates file passed to `--covar`; provide `[]` when absent
        pattern: "*.{txt,tsv,covar,cov}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
  - - meta5:
        type: map
        description: |
          Groovy Map containing categorical covariate information
          e.g. `[ id:'ccov' ]`
    - cat_covariates_file:
        type: file
        optional: true
        description: Optional categorical covariates file passed to `--factors`; provide `[]` when absent
        pattern: "*.{txt,tsv,covar,cov}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
  - - meta6:
        type: map
        description: |
          Groovy Map containing keep-file information
          e.g. `[ id:'keep' ]`
    - keep_file:
        type: file
        optional: true
        description: Optional sample keep file passed to `--keep`; provide `[]` when absent
        pattern: "*.{txt,tsv,keep}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
  - mpheno:
      type: integer
      description: Optional phenotype column index passed to `--mpheno`; provide `[]` to use the module fallback of `1`

output:
  results:
    - - meta:
          type: map
          description: |
            Groovy Map containing genotype information
            e.g. `[ id:'chr01.vcf', chr:1 ]`
      - meta2:
          type: map
          description: |
            Groovy Map containing phenotype information
            e.g. `[ id:'Y1', is_binary:false ]`
      - "${meta2.id}.step2.assoc":
          type: file
          description: LDAK-KVIK step 2 association results
          pattern: "*.step2.assoc"
          ontologies: []
  summaries:
    - - meta:
          type: map
          description: |
            Groovy Map containing genotype information
            e.g. `[ id:'chr01.vcf', chr:1 ]`
      - meta2:
          type: map
          description: |
            Groovy Map containing phenotype information
            e.g. `[ id:'Y1', is_binary:false ]`
      - "${meta2.id}.step2.summaries":
          type: file
          description: Optional LDAK-KVIK step 2 summary output
          pattern: "*.step2.summaries"
          ontologies: []
  pvalues:
    - - meta:
          type: map
          description: |
            Groovy Map containing genotype information
            e.g. `[ id:'chr01.vcf', chr:1 ]`
      - meta2:
          type: map
          description: |
            Groovy Map containing phenotype information
            e.g. `[ id:'Y1', is_binary:false ]`
      - "${meta2.id}.step2.pvalues":
          type: file
          description: Optional LDAK-KVIK step 2 pvalue output
          pattern: "*.step2.pvalues"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing genotype information
            e.g. `[ id:'chr01.vcf', chr:1 ]`
      - meta2:
          type: map
          description: |
            Groovy Map containing phenotype information
            e.g. `[ id:'Y1', is_binary:false ]`
      - "${meta2.id}.step2.log":
          type: file
          description: LDAK-KVIK step 2 log file
          pattern: "*.step2.log"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_ldak6:
    - - "${task.process}":
          type: string
          description: The process the versions were collected from
      - "ldak6":
          type: string
          description: The tool name
      - "ldak6 --version 2>&1 | head -n 1":
          type: eval
          description: The command used to generate the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - ldak6:
          type: string
          description: The tool name
      - ldak6 --version 2>&1 | head -n 1:
          type: eval
          description: The command used to generate the version of the tool
authors:
  - "@andongni"
maintainers:
  - "@andongni"
