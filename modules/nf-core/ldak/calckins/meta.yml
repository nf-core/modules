name: ldak_calckins
description: Calculate kinship matrices with linkage disequilibrium-adjusted kinship (LDAK), configurable power, and optional single nucleotide polymorphism (SNP) weights
keywords:
  - ldak
  - kinship
  - grm
  - weights
tools:
  - ldak6:
      description: LDAK toolset for kinship, heritability, and association analyses
      homepage: https://dougspeed.com/ldak/
      documentation: https://dougspeed.com/ldak/
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing genotype-bundle metadata.
          Expected keys:
            - id (string): Sample identifier used as output prefix (for example, 'plink_merged').
    - bed:
        type: file
        description: PLINK BED genotype file
        ontologies: []
    - bim:
        type: file
        description: PLINK BIM variant file
        ontologies: []
    - fam:
        type: file
        description: PLINK FAM sample file
        ontologies: []
  - - meta2:
        type: map
        description: Metadata map paired with optional weights input.
    - weights_file:
        type: file
        description: Optional LDAK weights file passed to `--weights`; provide [] to skip. If absent, module sets `--ignore-weights YES`.
        ontologies: []
  - power:
      type: string
      description: LDAK `--power` value controlling SNP weighting model (for example, '-.25' or '-1')
output:
  ldak_grm:
    - - meta:
          type: map
          description: Metadata map carried forward from input
      - "${prefix}.grm.bin":
          type: file
          description: LDAK genomic relationship matrix (GRM) binary matrix
          ontologies: []
      - "${prefix}.grm.id":
          type: file
          description: LDAK GRM sample identifiers
          ontologies: []
      - "${prefix}.grm.details":
          type: file
          description: LDAK GRM details file
          ontologies: []
      - "${prefix}.grm.adjust":
          type: file
          description: LDAK GRM adjustment factors
          ontologies: []
  versions_ldak6:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ldak6:
          type: string
          description: The tool name
      - ldak6 --version 2>&1 | grep -oP '(?<=^Version )[0-9.]+':
          type: eval
          description: The expression used to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ldak6:
          type: string
          description: The tool name
      - ldak6 --version 2>&1 | grep -oP '(?<=^Version )[0-9.]+':
          type: eval
          description: The expression used to obtain the version of the tool
authors:
  - "@lyh970817"
maintainers:
  - "@lyh970817"
