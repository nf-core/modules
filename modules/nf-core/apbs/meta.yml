name: "apbs"
description: |
  Compute biomolecular electrostatics by solving the Poisson-Boltzmann equation
  using APBS (Adaptive Poisson-Boltzmann Solver). Produces electrostatic potential
  maps and solvation energy values for large biomolecular assemblages.
keywords:
  - electrostatics
  - poisson-boltzmann
  - solvation
  - structural-biology
  - biophysics
  - computational-chemistry
tools:
  - "apbs":
      description: |
        APBS (Adaptive Poisson-Boltzmann Solver) is a software package for modelling
        biomolecular solvation through solution of the Poisson-Boltzmann equation.
        It computes electrostatic solvation energies and potentials for large
        biomolecular assemblages and is widely used in structural biology and
        computational biophysics.
      homepage: "http://www.poissonboltzmann.org/"
      documentation: "https://apbs.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/Electrostatics/apbs"
      licence:
        - "BSD-3-Clause"
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - input_file:
        type: file
        description: |
          APBS input configuration file (`.in` or `.apbs` extension) specifying the
          electrostatics calculation, including paths to molecular structure files
          (PQR/PDB) and calculation parameters.
        pattern: "*.{in,apbs}"
        ontologies:
          - edam: "http://edamontology.org/format_2330"

output:
  dx:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.dx":
          type: file
          description: |
            OpenDX format volumetric electrostatic potential map file output by APBS.
            Optional: not all calculation types produce potential map output.
          pattern: "*.dx"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.log":
          type: file
          description: |
            APBS standard output log file containing calculation results, including
            electrostatic solvation energies and run diagnostics.
          pattern: "*.log"
          ontologies:
            - edam: "http://edamontology.org/format_2330"
  versions_apbs:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "apbs":
          type: string
          description: The name of the tool
      - "apbs --version 2>&1 | grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+' | tail -n1":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "apbs":
          type: string
          description: The name of the tool
      - "apbs --version 2>&1 | grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+' | tail -n1":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
