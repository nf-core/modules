name: "stardist"
description: Cell and nuclear segmentation with star-convex shapes
keywords:
  - stardist
  - segmentation
  - image
tools:
  - "stardist":
      description: "Stardist is an cell segmentation tool developed in Python by Martin
        Weigert and Uwe Schmidt"
      homepage: "https://stardist.net/"
      documentation: "https://stardist.net/faq/"
      tool_dev_url: "https://github.com/stardist/stardist"
      doi: "10.1109/ISBIC56247.2022.9854534"
      licence:
        - "BSD 3-Clause"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - image:
        type: file
        description: Single channel nuclear image
        pattern: "*.{tiff,tif}"
        ontologies:
            - edam: http://edamontology.org/format_3591 # TIFF
output:
  mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.stardist.tif":
          type: file
          description: labelled mask output from stardist in tif format.
          pattern: "*.{tiff,tif}"
          ontologies:
            - edam: http://edamontology.org/format_3591 # TIFF
  versions_stardist:
    - - ${task.process}:
          type: string
          description: The name of the process
      - stardist:
          type: string
          description: The name of the tool
      - python -c "import stardist; print(stardist.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
  versions_python:
    - - ${task.process}:
          type: string
          description: The name of the process
      - python:
          type: string
          description: The name of the tool
      - python --version:
          type: eval
          description: The expression to obtain the version of the tool
  versions_ilastik:
    - - ${task.process}:
          type: string
          description: The name of the process
      - ilastik:
          type: string
          description: The name of the tool
      - /opt/ilastik-1.4.0-Linux/run_ilastik.sh --headless --version:
          type: eval
          description: The expression to obtain the version of the tool
  versions_tensorflow:
    - - ${task.process}:
          type: string
          description: The name of the process
      - tensorflow:
          type: string
          description: The name of the tool
      - 'python -m pip show --version tensorflow | grep "Version" | sed -e "s/Version: //g"':
          type: eval
          description: The expression to obtain the version of the tool
  versions_tifffile:
    - - ${task.process}:
          type: string
          description: The name of the process
      - tifffile:
          type: string
          description: The name of the tool
      - 'python -m pip show --version tifffile | grep "Version" | sed -e "s/Version: //g"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
