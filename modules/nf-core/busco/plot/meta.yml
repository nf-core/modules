name: "busco_plot"
description: BUSCO summary plot generation using the built-in 'busco --plot' command
keywords:
  - genome
  - fasta
  - annotation
  - busco
  - transcriptome
  - quality control
tools:
  - busco:
      description: BUSCO provides measures for quantitative assessment of genome assembly, gene set, and transcriptome completeness based on evolutionarily informed expectations of gene content from near-universal single-copy orthologs selected from OrthoDB.
      homepage: https://busco.ezlab.org/
      documentation: https://busco.ezlab.org/busco_userguide.html
      tool_dev_url: https://gitlab.com/ezlab/busco
      doi: "10.1007/978-1-4939-9173-0_14"
      licence: ["MIT"]
      identifier: biotools:busco
input:
  - short_summary_json:
      type: file
      description: One or more short summary json files from BUSCO
      pattern: "short_summary.*.json"
      ontologies:
        - edam: http://edamontology.org/format_3750 # JSON
output:
  png:
    - "*.png":
        type: file
        description: A summary plot in png format
        pattern: "*.png"
        ontologies: []
  versions_busco:
    - - ${task.process}:
          type: string
          description: The name of the process
      - busco:
          type: string
          description: The name of the tool
      - busco --version 2> /dev/null | sed 's/BUSCO //g':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - busco:
          type: string
          description: The name of the tool
      - busco --version 2> /dev/null | sed 's/BUSCO //g':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@GallVp"
  - "@dialvarezs"
maintainers:
  - "@GallVp"
  - "@dialvarezs"
containers:
  docker:
    linux/amd64:
      name: community.wave.seqera.io/library/busco:6.1.0--6d1f7006d91892b3
      build_id: bd-6d1f7006d91892b3_1
      scan_id: sc-7ee408324c396471_1
  singularity:
    linux/amd64:
      name: oras://community.wave.seqera.io/library/busco:6.1.0--c7528d5825eb19b5
