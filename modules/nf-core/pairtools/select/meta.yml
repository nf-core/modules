name: pairtools_select
description: Select pairs according to given condition by options.args
keywords:
  - select
  - pairs
  - filter
tools:
  - pairtools:
      description: CLI tools to process mapped Hi-C data
      homepage: http://pairtools.readthedocs.io/
      documentation: http://pairtools.readthedocs.io/
      tool_dev_url: https://github.com/mirnylab/pairtools
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input:
        type: file
        description: pairs file
        ontologies: []
output:
  selected:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.selected.pairs.gz":
          type: file
          description: Selected pairs file
          pattern: "*.{selected.pairs.gz}"
          ontologies: []
  unselected:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.unselected.pairs.gz":
          type: file
          description: Rest pairs file.
          pattern: "*.{unselected.pairs.gz}"
          ontologies: []
  versions_pairtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pairtools:
          type: string
          description: The name of the tool
      - pairtools --version | sed 's/.*pairtools.*version //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pairtools:
          type: string
          description: The name of the tool
      - pairtools --version | sed 's/.*pairtools.*version //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jianhong"
maintainers:
  - "@jianhong"
