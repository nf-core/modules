name: pairtools_dedup
description: Find and remove PCR/optical duplicates
keywords:
  - dedup
  - deduplication
  - PCR/optical duplicates
  - pairs
tools:
  - pairtools:
      description: CLI tools to process mapped Hi-C data
      homepage: http://pairtools.readthedocs.io/
      documentation: http://pairtools.readthedocs.io/
      tool_dev_url: https://github.com/mirnylab/pairtools
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input:
        type: file
        description: pair file
        ontologies: []
output:
  pairs:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.pairs.gz":
          type: file
          description: Duplicates removed pairs
          pattern: "*.{pairs.gz}"
          ontologies: []
  stat:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.pairs.stat":
          type: file
          description: stats of the pairs
          pattern: "*.{pairs.stat}"
          ontologies: []
  versions_pairtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pairtools:
          type: string
          description: The name of the tool
      - pairtools --version | sed 's/.*pairtools.*version //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pairtools:
          type: string
          description: The name of the tool
      - pairtools --version | sed 's/.*pairtools.*version //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jianhong"
maintainers:
  - "@jianhong"
