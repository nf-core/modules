name: pairtools_flip
description: Flip pairs to get an upper-triangular matrix
keywords:
  - flip
  - pairs
  - upper-triangular matrix
tools:
  - pairtools:
      description: CLI tools to process mapped Hi-C data
      homepage: http://pairtools.readthedocs.io/
      documentation: http://pairtools.readthedocs.io/
      tool_dev_url: https://github.com/mirnylab/pairtools
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - sam:
        type: file
        description: pair file
        ontologies: []
  - chromsizes:
      type: file
      description: chromosome size file
      ontologies: []
output:
  flip:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.flip.gz":
          type: file
          description: output file of flip
          pattern: "*.{flip.gz}"
          ontologies: []
  versions_pairtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pairtools:
          type: string
          description: The name of the tool
      - pairtools --version | sed 's/.*pairtools.*version //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - pairtools:
          type: string
          description: The name of the tool
      - pairtools --version | sed 's/.*pairtools.*version //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@jianhong"
maintainers:
  - "@jianhong"
