name: "mdust"
description: mdust from DFCI Gene Indices Software Tools for masking
  low-complexity DNA sequences
keywords:
  - genomics
  - dna
  - low-complexity
  - masking
tools:
  - "mdust":
      description: "mdust from DFCI Gene Indices Software Tools for masking low-complexity
        DNA sequences"
      homepage: "https://github.com/lh3/mdust"
      documentation: "https://github.com/lh3/mdust"
      tool_dev_url: "https://github.com/lh3/mdust"
      licence:
        - "The Artistic License"
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - fasta:
        type: file
        description: Input fasta file
        pattern: "*.{fa,fsa,faa,fas,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
output:
  fasta:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.fasta":
          type: file
          description: Output fasta file
          pattern: "*.{fasta}"
          ontologies:
            - edam: http://edamontology.org/format_1929
  versions_mdust:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mdust:
          type: string
          description: The name of the tool
      - 2006.10.17:
          type: string
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mdust:
          type: string
          description: The name of the tool
      - 2006.10.17:
          type: string
          description: The expression to obtain the version of the tool

authors:
  - "@GallVp"
maintainers:
  - "@GallVp"
