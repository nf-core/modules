name: "centrifuger_build"
description: Build centrifuger database for taxonomic profiling
keywords:
  - metagenomics
  - taxonomic-classification
  - database-build
  - centrifuger
  - centrifuge
tools:
  - "centrifuger":
      description: "Lossless compression of microbial genomes for efficient and accurate metagenomic sequence classification."
      homepage: "https://github.com/mourisl/centrifuger"
      documentation: "https://github.com/mourisl/centrifuger"
      tool_dev_url: "https://github.com/mourisl/centrifuger"
      doi: "10.1186/s13059-024-03244-4"
      licence:
        - "MIT"
      identifier: biotools:centrifuger
input:
  - - meta:
        type: map
        description: Groovy Map containing sample information. e.g. `[id:'test',
          single_end:false ]`
    - reference:
        type: file
        description: |
          One or more reference genome sequence files in FASTA format.
          These are internally converted into a reference list file for centrifuged-build using the -l
        ontologies: []
  - taxonomy_nodes:
      type: file
      description: NCBI taxonomy nodes.dmp file
      ontologies: []
  - taxonomy_names:
      type: file
      description: NCBI taxonomy names.dmp file
      ontologies: []
  - conversion_table:
      type: file
      description: |
        Mapping of sequence IDs to taxonomy IDs.
        Required for all runs.
      ontologies: []
output:
  db:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}:
          type: directory
          description: Centrifuger database index files
          pattern: "${prefix}"
          ontologies: []
  versions_centrifuger:
    - - ${task.process}:
          type: string
          description: The name of the process
      - centrifuger:
          type: string
          description: The name of the tool
      - centrifuger -v 2>&1 | head -n 1 | cut -d ' ' -f 2:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - centrifuger:
          type: string
          description: The name of the tool
      - centrifuger -v 2>&1 | head -n 1 | cut -d ' ' -f 2:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@haris18s"
maintainers:
  - "@haris18s"
