name: seqkit_tab2fx
description: Convert tabular format (first two/three columns) to FASTA/Q format.
keywords:
  - fasta
  - fastq
  - text
  - tabular
  - convert
tools:
  - seqkit:
      description: |
        Cross-platform and ultrafast toolkit for FASTA/Q file manipulation, written by Wei Shen.
      homepage: https://github.com/shenwei356/seqkit
      documentation: https://bioinf.shenwei.me/seqkit/
      doi: 10.1371/journal.pone.0163962
      publication:
        author: "Shen W., Le S., Li Y. & Hu F."
        year: 2016
        title: "SeqKit: A Cross-Platform and Ultrafast Toolkit for FASTA/Q File Manipulation"
        source: "PLoS ONE"
      licence: ["MIT"]
      identifier: biotools:seqkit
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - text:
        type: file
        description: Text file in tabular format
        pattern: "*.txt[.gz,.zst]"
        ontologies: []
  - out_ext:
      type: string
      description: Output file extension (for example `fa.zst`, `fq.gz`)
output:
  fastx:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.f*":
          type: file
          description: Sequence file in fasta/q format
          pattern: "*.{fa,fq}[.gz,.zst]"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
  versions_seqkit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - seqkit version | sed 's/^.*v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - seqkit version | sed 's/^.*v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@heuermh"
maintainers:
  - "@heuermh"
