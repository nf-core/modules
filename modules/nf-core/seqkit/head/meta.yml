# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "seqkit_head"
description: Subset FASTA/FASTQ files to some number of sequences
keywords:
  - filter
  - subset
  - reads
  - fasta
  - fastq
  - seqkit
tools:
  - "seqkit":
      description: "A cross-platform and ultrafast toolkit for FASTA/Q file manipulation"
      homepage: "https://bioinf.shenwei.me/seqkit/"
      documentation: "https://bioinf.shenwei.me/seqkit/usage/"
      tool_dev_url: "https://github.com/shenwei356/seqkit"
      doi: "10.1371/journal.pone.0163962"
      publication:
        author: "Shen W., Le S., Li Y. & Hu F."
        year: 2016
        title: "SeqKit: A Cross-Platform and Ultrafast Toolkit for FASTA/Q File Manipulation"
        source: "PLoS ONE"
      licence: ["MIT"]
      identifier: biotools:seqkit

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - fastqs:
        type: file
        description: FASTA or FASTQ files to subset
        pattern: "*.{fa,fasta,fq,fastq}"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
    - seq_count:
        type: integer
        description: The number of sequences to include in the subset

output:
  subset:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - ${prefix}_subset_*:
          type: file
          description: Subset FASTA/FASTQ files
          pattern: "*.{fa,fasta,fq,fastq}"

          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
  versions_seqkit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - seqkit version | sed 's/^.*v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - seqkit version | sed 's/^.*v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@zachary-foster"
maintainers:
  - "@zachary-foster"
