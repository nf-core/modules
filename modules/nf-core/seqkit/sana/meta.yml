name: "seqkit_sana"
description: Sanitize broken single line FASTQ files
keywords:
  - fastq
  - quality check
  - skip malformed
  - parser
tools:
  - "seqkit":
      description: A cross-platform and ultrafast toolkit for FASTA/Q file manipulation.
      homepage: "https://bioinf.shenwei.me/seqkit"
      documentation: "https://bioinf.shenwei.me/seqkit"
      tool_dev_url: "https://github.com/shenwei356/seqkit"
      doi: "10.1371/journal.pone.0163962"
      publication:
        author: "Shen W., Le S., Li Y. & Hu F."
        year: 2016
        title: "SeqKit: A Cross-Platform and Ultrafast Toolkit for FASTA/Q File Manipulation"
        source: "PLoS ONE"
      licence: ["MIT"]
      identifier: biotools:seqkit
input:
  - - meta:
        type: map
        description: Groovy Map containing sample information. e.g. [ id:'sample1']
    - reads:
        type: file
        description: One line for each sequence and quality value
        pattern: "*.{fq,fastq}{,.gz}"
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
output:
  reads:
    - - meta:
          type: map
          description: Groovy Map containing sample information. e.g. [ id:'sample1']
      - ${prefix}${extension}:
          type: file
          description: Parsed fastq file without malformed entries/lines
          pattern: "*.${extension}"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
  log:
    - - meta:
          type: map
          description: Groovy Map containing sample information. e.g. [ id:'sample1']
      - ${prefix}.log:
          type: file
          description: Log file produced by the seqkit/sana software
          pattern: "*.log"
          ontologies: []
  versions_seqkit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - seqkit version | sed 's/^.*v//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - seqkit version | sed 's/^.*v//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
