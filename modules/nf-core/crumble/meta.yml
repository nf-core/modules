name: "crumble"
description: Controllable lossy compression of BAM/CRAM files
keywords:
  - compress
  - bam
  - sam
  - cram
tools:
  - "crumble":
      description: "Controllable lossy compression of BAM/CRAM files"
      homepage: "https://github.com/jkbonfield/crumble"
      documentation: "https://github.com/jkbonfield/crumble"
      tool_dev_url: "https://github.com/jkbonfield/crumble"
      doi: "10.1093/bioinformatics/bty608"
      licence:
        - "multiple BSD style licenses"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
        ontologies: []
  - keepbed:
      type: file
      description: BED file defining regions to keep quality
      ontologies: []
  - bedout:
      type: boolean
      description: set to true to output suspicious regions to a BED file
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: optional filtered/compressed BAM file
          pattern: "*.{bam}"
          ontologies: []
  cram:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.cram":
          type: file
          description: optional filtered/compressed CRAM file
          pattern: "*.{cram}"
          ontologies: []
  sam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.sam":
          type: file
          description: optional filtered/compressed SAM file
          pattern: "*.{sam}"
          ontologies: []
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: optional suspicious regions BED file
          pattern: "*{bed}"
          ontologies: []
  versions_crumble:
    - - ${task.process}:
          type: string
          description: The name of the process
      - crumble:
          type: string
          description: The name of the tool
      - 0.9.1:
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - crumble:
          type: string
          description: The name of the tool
      - 0.9.1:
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@priyanka-surana"
maintainers:
  - "@priyanka-surana"
