name: "sexdeterrmine"
description: Calculate the relative coverage on the Gonosomes vs Autosomes from
  the output of samtools depth, with error bars.
keywords:
  - sex determination
  - genetic sex
  - relative coverage
  - ancient dna
tools:
  - "sexdeterrmine":
      description: "A python script carry out calculate the relative coverage of X and
        Y chromosomes, and their associated error bars, out of capture data."
      homepage: "https://github.com/TCLamnidis/Sex.DetERRmine"
      documentation: "https://github.com/TCLamnidis/Sex.DetERRmine/README.md"
      tool_dev_url: "https://github.com/TCLamnidis/Sex.DetERRmine"
      doi: "10.1038/s41467-018-07483-5"
      licence:
        - "GPL v3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - depth:
        type: file
        description: Output from samtools depth (with header)
        pattern: "*"
        ontologies: []
  - sample_list_file:
      type: file
      description: File containing the list of samples to be processed.
      ontologies: []
output:
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.json":
          type: file
          description: JSON formatted table of relative coverages on the X and Y,
            with associated error bars.
          pattern: "*.json"
          ontologies:
            - edam: http://edamontology.org/format_3464 #JSON
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: TSV table of relative coverages on the X and Y, with
            associated error bars.
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 #TSV
  versions_sexdeterrmine:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sexdeterrmine:
          type: string
          description: The name of the tool
      - sexdeterrmine --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - sexdeterrmine:
          type: string
          description: The name of the tool
      - sexdeterrmine --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@TCLamnidis"
maintainers:
  - "@TCLamnidis"
