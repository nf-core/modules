name: "hhsuite_hhblits"
description: Fast and sensitive protein sequence searching based on the pairwise
  alignment of hidden Markov models (HMMs)
keywords:
  - sensitive search
  - HMM
  - alignment
tools:
  - "hhsuite":
      description: "HH-suite3 for fast remote homology detection and deep protein annotation"
      homepage: "https://github.com/soedinglab/hh-suite"
      documentation: "https://github.com/soedinglab/hh-suite/wiki"
      tool_dev_url: "https://github.com/soedinglab/hh-suite"
      doi: "10.1371/journal.pone.0082138"
      licence:
        - "GPL v3"
      identifier: biotools:hh-suite
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - aln:
        type: file
        description: Input multiple sequence alignment file in a2m or a3m format
        pattern: "*.{a2m,a2m.gz,a3m,a3m.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_3281" # A2M
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - hh_db:
        type: directory
        description: Input hhsuite formatted database
        pattern: "*/"
output:
  hhr:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.hhr":
          type: file
          description: Human-readable result file in a custom text format designed
            by the HH-suite
          pattern: "*.hhr"
          ontologies: []
  versions_hhsuite:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hhsuite:
          type: string
          description: The name of the tool
      - hhblits -h 2>&1 | sed '1!d;s/^HHblits //;s/://':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - hhsuite:
          type: string
          description: The name of the tool
      - hhblits -h 2>&1 | sed '1!d;s/^HHblits //;s/://':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
