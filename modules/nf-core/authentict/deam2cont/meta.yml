name: "authentict_deam2cont"
description: Use deamination patterns to estimate contamination in
  single-stranded libraries
keywords:
  - authentict
  - ancientDNA
  - single-stranded
  - deamination
  - contamination
  - damage
tools:
  - "authentict":
      description: "Estimates present-day DNA contamination in ancient DNA single-stranded
        libraries."
      homepage: "https://github.com/StephanePeyregne/AuthentiCT"
      documentation: "https://github.com/StephanePeyregne/AuthentiCT"
      tool_dev_url: "https://github.com/StephanePeyregne/AuthentiCT"
      doi: "10.1186/s13059-020-02123-y"
      licence:
        - "GPL v3"
      identifier: biotools:authentict
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/CRAM/SAM file (Mandatory)
        pattern: "*.{bam,cram,sam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - config:
        type: file
        description: Optional AuthentiCT configuration text file
        pattern: "*"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - positions:
        type: file
        description: Optional text file with positions that sequences should
          overlap
        pattern: "*"
        ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: Maximum likelihood estimates with associated standard
            errors
          pattern: "*.txt"
          ontologies: []
  versions_authentict:
    - - ${task.process}:
          type: string
          description: The name of the process
      - authentict:
          type: string
          description: The name of the tool
      - echo \$(AuthentiCT --version 2>&1):
          type: eval
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version 2>&1 | head -n1 | sed 's/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - authentict:
          type: string
          description: The name of the tool
      - echo \$(AuthentiCT --version 2>&1):
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version 2>&1 | head -n1 | sed 's/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@scarlhoff"
  - "@StephanePeyregne"
maintainers:
  - "@scarlhoff"
  - "@StephanePeyregne"
