name: "presto_filterseq"
description: Filter reads by quality score.
keywords:
  - immcantation
  - airrseq
  - genomics
  - immunoinformatics
tools:
  - "presto":
      description: "A bioinformatics toolkit for processing high-throughput lymphocyte
        receptor sequencing data."
      homepage: "https://immcantation.readthedocs.io"
      documentation: "https://presto.readthedocs.io"
      tool_dev_url: "https://bitbucket.org/kleinstein/presto"
      doi: "10.1093/bioinformatics/btu138"
      licence:
        - "AGPL v3"
      identifier: biotools:presto-measure
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - reads:
        type: file
        description: compressed fastq file
        pattern: "*.{fastq.gz}"
        ontologies:
          - edam: http://edamontology.org/format_1930
output:
  reads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*_quality-pass.fastq.gz":
          type: file
          description: filtered fastq.gz file
          pattern: "*.{fastq.gz}"
          ontologies:
            - edam: http://edamontology.org/format_1930
  logs:
    - "*_command_log.txt":
        type: file
        description: command logs
        pattern: "*.txt"
        ontologies: []
  versions_presto:
    - - ${task.process}:
          type: string
          description: The name of the process
      - presto:
          type: string
          description: the name of the tool
      - FilterSeq.py --version | grep -o "[0-9][0-9.]*" | head -n 1:
          type: eval
          description: The expression to obtain the version of the tool
  log_tab:
    - "*.tab":
        type: file
        description: parsed log table
        pattern: "*.tab"
        ontologies:
          - edam: http://edamontology.org/format_3475
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - presto:
          type: string
          description: the name of the tool
      - FilterSeq.py --version | grep -o "[0-9][0-9.]*" | head -n 1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@ggabernet"
maintainers:
  - "@ggabernet"
  - "@Vivian0105"
