name: nextclade_datasetget
description: Get dataset for SARS-CoV-2 genome clade assignment, mutation
  calling, and sequence quality checks (C++ implementation)
keywords:
  - nextclade
  - variant
  - consensus
tools:
  - nextclade:
      description: SARS-CoV-2 genome clade assignment, mutation calling, and
        sequence quality checks
      homepage: https://github.com/nextstrain/nextclade
      documentation: https://github.com/nextstrain/nextclade
      tool_dev_url: https://github.com/nextstrain/nextclade
      licence: ["MIT"]
      identifier: biotools:nextclade
input:
  - dataset:
      type: string
      description: Name of dataset to retrieve. A list of available datasets can
        be obtained using the nextclade dataset list command.
      pattern: ".+"
  - tag:
      type: string
      description: Version tag of the dataset to download. A list of available
        datasets can be obtained using the nextclade dataset list command.
      pattern: ".+"
output:
  dataset:
    - $prefix:
        type: directory
        description: Directory containing the dataset
  versions_nextclade:
    - - ${task.process}:
          type: string
          description: The process the process
      - nextclade:
          type: string
          description: The tool name
      - nextclade --version 2>&1 | sed 's/.*nextclade \\([^ ]*\\:
          type: eval
          description: The expression to obtain the tool version
  versions_nextclade_dataset:
    - - ${task.process}:
          type: string
          description: The process the process
      - nextclade-dataset:
          type: string
          description: The dataset version used
      - "grep 'tag' $dataset/pathogen.json | sed -n 's/.*\\\"tag\\\": \\\"\\\\([0-9-]\\\\+Z\\\\":
          type: eval
          description: The expression to obtain the dataset version
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - nextclade:
          type: string
          description: The tool name
      - nextclade --version 2>&1 | sed 's/.*nextclade \\([^ ]*\\:
          type: eval
          description: The expression to obtain the dataset version
authors:
  - "@antunderwood"
  - "@drpatelh"
maintainers:
