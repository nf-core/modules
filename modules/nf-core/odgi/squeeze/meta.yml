name: "odgi_squeeze"
description: Squeezes multiple graphs in ODGI format into the same file in ODGI
  format.
keywords:
  - squeeze
  - odgi
  - gfa
  - combine graphs
tools:
  - "odgi":
      description: "An optimized dynamic genome/graph implementation"
      homepage: "https://github.com/pangenome/odgi"
      documentation: "https://odgi.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/pangenome/odgi"
      doi: "10.1093/bioinformatics/btac308"
      licence:
        - "MIT"
      identifier: biotools:odgi
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - graphs:
        type: file
        description: Pangenome graph files in ODGI format.
        pattern: "*.{og}"
        ontologies: []
output:
  graph:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.og":
          type: file
          description: Squeezed pangenome graph in ODGI format.
          pattern: "*.{og}"
          ontologies: []
  versions_odgi:
    - - ${task.process}:
          type: string
          description: The name of the process
      - odgi:
          type: string
          description: The name of the tool
      - odgi version | sed 's/^v//; s|-.*||':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - odgi:
          type: string
          description: The name of the tool
      - odgi version | sed 's/^v//; s|-.*||':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@subwaystation"
maintainers:
  - "@subwaystation"
