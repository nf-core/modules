name: "odgi_viz"
description: Visualize a variation graph in 1D.
keywords:
  - variation graph
  - pangenome graph
  - gfa
  - graph viz
tools:
  - "odgi":
      description: "An optimized dynamic genome/graph implementation"
      homepage: "https://github.com/pangenome/odgi"
      documentation: "https://odgi.readthedocs.io/en/latest/"
      tool_dev_url: "https://github.com/pangenome/odgi"
      doi: "10.1093/bioinformatics/btac308"
      licence:
        - "MIT"
      identifier: biotools:odgi
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - graph:
        type: file
        description: Pangenome graph in binary ODGI or in GFA v1.0 format
        pattern: "*.{og,gfa}"
        ontologies:
          - edam: http://edamontology.org/format_3975
output:
  png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.png":
          type: file
          description: A 1D visualization of a pangenome graph.
          pattern: "*.{png}"
          ontologies: []
  versions_odgi:
    - - ${task.process}:
          type: string
          description: The name of the process
      - odgi:
          type: string
          description: The name of the tool
      - odgi version | sed 's/^v//; s/-.*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - odgi:
          type: string
          description: The name of the tool
      - odgi version | sed 's/^v//; s/-.*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@subwaystation"
maintainers:
  - "@subwaystation"
