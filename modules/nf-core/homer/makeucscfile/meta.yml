name: homer_makeucscfile
description: Create a UCSC bed graph with the HOMER suite
keywords:
  - peaks
  - bed
  - bedGraph
tools:
  - homer:
      description: |
        HOMER (Hypergeometric Optimization of Motif EnRichment) is a suite of tools for Motif Discovery and next-gen sequencing analysis.
      documentation: http://homer.ucsd.edu/homer/
      doi: 10.1016/j.molcel.2010.05.004.
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:homer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - tagDir:
        type: directory
        description: "The 'Tag Directory'"
        pattern: "tagDir"
output:
  bedGraph:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bedGraph.gz":
          type: file
          description: The UCSC bed graph
          pattern: "*.bedGraph.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP
  versions_homer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@edmundmiller"
maintainers:
  - "@edmundmiller"
