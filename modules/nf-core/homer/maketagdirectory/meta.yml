name: homer_maketagdirectory
description: Create a tag directory with the HOMER suite
keywords:
  - peaks
  - bed
  - bam
  - sam
tools:
  - homer:
      description: |
        HOMER (Hypergeometric Optimization of Motif EnRichment) is a suite of tools for Motif Discovery and next-gen sequencing analysis.
      documentation: http://homer.ucsd.edu/homer/
      doi: 10.1016/j.molcel.2010.05.004.
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:homer
  - samtools:
      description: |
        SAMtools is a set of utilities for interacting with and post-processing
        short DNA sequence read alignments in the SAM, BAM and CRAM formats, written by Heng Li.
        These files are generated as output by short read aligners like BWA.
      homepage: http://www.htslib.org/
      documentation: http://www.htslib.org/doc/samtools.html
      doi: 10.1093/bioinformatics/btp352
      licence:
        - "MIT"
      identifier: biotools:homer
  - DESeq2:
      description: |
        Differential gene expression analysis based on the negative binomial distribution
      homepage: "https://bioconductor.org/packages/DESeq2"
      documentation: "https://bioconductor.org/packages/DESeq2"
      tool_dev_url: "https://github.com/mikelove/DESeq2"
      doi: 10.18129/B9.bioc.DESeq2
      licence:
        - "LGPL-3.0-or-later"
      identifier: biotools:homer
  - edgeR:
      description: |
        Empirical Analysis of Digital Gene Expression Data in R
      homepage: "https://bioinf.wehi.edu.au/edgeR"
      documentation: "https://bioconductor.org/packages/edgeR"
      tool_dev_url: "https://git.bioconductor.org/packages/edgeR"
      doi: 10.18129/B9.bioc.edgeR
      licence:
        - "GPL >=2"
      identifier: biotools:homer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: BAM/BED/SAM file
        pattern: "*.{bam,bed,sam}"
        ontologies: []
  - fasta:
      type: file
      description: Fasta file of reference genome
      pattern: "*.fasta"
      ontologies: []
output:
  tagdir:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_tagdir":
          type: directory
          description: The "Tag Directory"
          pattern: "*_tagdir"
  taginfo:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_tagdir/tagInfo.txt":
          type: directory
          description: The tagInfo.txt included to ensure there's proper output
          pattern: "*_tagdir/tagInfo.txt"
  versions_homer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
  versions_samtools:
    - - ${task.process}:
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - samtools --version 2>&1 | sed '1!d;s/^.*samtools //':
          type: eval
          description: The expression to obtain the version of the tool
  versions_deseq2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - deseq2:
          type: string
          description: The name of the tool
      - Rscript -e "cat(as.character(packageVersion('DESeq2')))":
          type: eval
          description: The expression to obtain the version of the tool
  versions_edger:
    - - ${task.process}:
          type: string
          description: The name of the process
      - edger:
          type: string
          description: The name of the tool
      - Rscript -e "cat(as.character(packageVersion('edgeR')))":
          type: eval
          description: The expression to obtain the version of the tool
topics:
