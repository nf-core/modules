name: homer_annotatepeaks
description: Annotate peaks with HOMER suite
keywords:
  - annotations
  - peaks
  - bed
tools:
  - homer:
      description: |
        HOMER (Hypergeometric Optimization of Motif EnRichment) is a suite of tools for Motif Discovery and next-gen sequencing analysis.
      documentation: http://homer.ucsd.edu/homer/
      doi: 10.1016/j.molcel.2010.05.004.
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:homer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - peak:
        type: file
        description: Peak file to annotate
        ontologies: []
  - fasta:
      type: file
      description: Fasta file of reference genome
      pattern: "*.fasta"
      ontologies: []
  - gtf:
      type: file
      description: GTF file of reference genome
      pattern: "*.gtf"
      ontologies: []
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*annotatePeaks.txt":
          type: file
          description: Annotated peaks in txt file
          pattern: "*annotatePeaks.txt"
          ontologies: []
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*annStats.txt":
          type: file
          description: Annotation statistics in txt file
          pattern: "*annStats.txt"
          ontologies: []
  versions_homer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@drpatelh"
  - "@kevinmenden"
maintainers:
  - "@drpatelh"
  - "@kevinmenden"
