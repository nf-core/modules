name: homer_findpeaks
description: Find peaks with HOMER suite
keywords:
  - annotation
  - peaks
  - enrichment
tools:
  - homer:
      description: |
        HOMER (Hypergeometric Optimization of Motif EnRichment) is a suite of tools for Motif Discovery and next-gen sequencing analysis.
      homepage: "http://homer.ucsd.edu/homer/index.html"
      documentation: "http://homer.ucsd.edu/homer/"
      tool_dev_url: "http://homer.ucsd.edu/homer/ngs/peaks.html"
      doi: 10.1016/j.molcel.2010.05.004.
      licence:
        - "GPL-3.0-or-later"
      identifier: biotools:homer
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - tagDir:
        type: directory
        description: "The 'Tag Directory'"
        pattern: "tagDir"
  - uniqmap:
      type: directory
      description: "(directory of binary files specifying uniquely mappable locations)
        Download from http://biowhat.ucsd.edu/homer/groseq/"
      pattern: "uniqmap/"
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.peaks.txt":
          type: file
          description: "Peaks in txt file"
          pattern: "*.peaks.txt"
          ontologies: []
  versions_homer:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - homer:
          type: string
          description: The name of the tool
      - "4.11":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@edmundmiller"
maintainers:
  - "@edmundmiller"
