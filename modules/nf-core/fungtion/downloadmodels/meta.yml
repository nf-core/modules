name: "fungtion_downloadmodels"
description: |
  Downloads the pretrained ESM-1b weights (esm1b_t33_650M_UR50S.pt) that fungtion
  uses for fungal effector prediction into a local models/ directory via
  `fungtion setup-models`. The downloaded directory is used as input to the
  FUNGTION_FUNGTION prediction module.
keywords:
  - fungal
  - effector
  - protein
  - prediction
  - language model
  - deep learning
  - model
  - download
tools:
  - "fungtion":
      description: |
        Fungtion predicts and visualizes fungal effector proteins from protein FASTA
        sequences using ESM-1b protein language model embeddings and R-based SVM models.
        For predicted effectors it can generate similarity-network and relationship-tree
        visualizations and an HTML report.
      homepage: "https://github.com/noHup-cc/fungtion"
      documentation: "https://github.com/noHup-cc/fungtion"
      tool_dev_url: "https://github.com/noHup-cc/fungtion"
      licence:
        - "MIT"
      identifier: biotools:fungtion

input: []

output:
  models:
    - models:
        type: directory
        description: |
          Directory containing the pretrained ESM-1b weights (esm1b_t33_650M_UR50S.pt)
          downloaded by `fungtion setup-models`. This directory is passed as the
          `pretrain` input to FUNGTION_FUNGTION.
        pattern: "models"
        ontologies: []
  versions_fungtion:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fungtion:
          type: string
          description: The name of the tool
      - fungtion --version 2>&1 | head -1:
          type: eval
          description: The expression to obtain the version of the tool
  versions_python:
    - - ${task.process}:
          type: string
          description: The name of the process
      - python:
          type: string
          description: The name of the tool
      - python --version | sed 's/Python //':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fungtion:
          type: string
          description: The name of the tool
      - fungtion --version 2>&1 | head -1:
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - python:
          type: string
          description: The name of the tool
      - python --version | sed 's/Python //':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@vagkaratzas"
maintainers:
  - "@vagkaratzas"
