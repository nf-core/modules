name: "octopusv_clean"
description: Clean broken VCF/SVCF files using OctopuSV clean
keywords:
  - vcf
  - sv
  - structural-variants
  - clean
  - harmonization
tools:
  - "octopusv":
      description: "End-to-end structural variant post-processing: standardize, merge,
        compare, and export SVs."
      homepage: "https://github.com/ylab-hi/OctopuSV"
      documentation: "https://github.com/ylab-hi/OctopuSV"
      tool_dev_url: "https://github.com/ylab-hi/OctopuSV"
      doi: "10.1093/bioinformatics/btaf599"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'sample1' ]
    - vcf:
        type: file
        description: Input VCF/SVCF file to clean
        pattern: "*.{vcf,vcf.gz,svcf,svcf.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_3016"
    - fasta:
        type: file
        description: Optional reference FASTA for chromosome harmonization
        pattern: "*.{fa,fasta}"
        optional: true
        ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.vcf.gz":
          type: file
          description: Gzipped VCF file
          pattern: "*.vcf.gz"
          ontologies:
            - edam: "http://edamontology.org/format_3016"
            - edam: "http://edamontology.org/format_3989"
  versions_octopusv:
    - - ${task.process}:
          type: string
          description: The name of the process
      - octopusv:
          type: string
          description: The name of the tool
      - python -c "import importlib.metadata as m; print(m.version('octopusv'))":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - octopusv:
          type: string
          description: The name of the tool
      - python -c "import importlib.metadata as m; print(m.version('octopusv'))":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@manascripts"
maintainers:
  - "@manascripts"
