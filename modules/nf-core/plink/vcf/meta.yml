name: plink_vcf
description: Analyses variant calling files using plink
keywords:
  - plink
  - vcf
  - variant
  - call
tools:
  - plink:
      description: |
        Whole genome association analysis toolset, designed to perform a range
        of basic, large-scale analyses in a computationally efficient manner
      homepage: "https://www.cog-genomics.org/plink"
      tool_dev_url: "https://www.cog-genomics.org/plink/1.9/dev"
      licence: ["GPL"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - vcf:
        type: file
        description: Variant calling file (vcf)
        pattern: "*.{vcf}"
        ontologies: []
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: PLINK binary biallelic genotype table
          pattern: "*.{bed}"
          ontologies: []
  bim:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bim":
          type: file
          description: PLINK extended MAP file
          pattern: "*.{bim}"
          ontologies: []
  fam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fam":
          type: file
          description: PLINK sample information file
          pattern: "*.{fam}"
          ontologies: []
  versions_plink:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@Mxrcon"
  - "@abhi18av"
maintainers:
  - "@Mxrcon"
  - "@abhi18av"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
