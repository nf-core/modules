name: "plink_splitx"
description: Set the pseudoautosomal-region boundary on chromosome X, splitting the region into X and XY components, and write a new PLINK binary fileset
keywords:
  - plink
  - split-x
  - pseudoautosomal region
  - sex chromosome
  - quality control
tools:
  - "plink":
      description: "Whole genome association analysis toolset, designed to perform a range of basic, large-scale analyses in a computationally efficient manner."
      homepage: "https://www.cog-genomics.org/plink"
      documentation: "https://www.cog-genomics.org/plink/1.9/data#split_x"
      tool_dev_url: "https://www.cog-genomics.org/plink/1.9/dev"
      licence:
        - "GPL"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bed:
        type: file
        description: PLINK binary biallelic genotype table file
        pattern: "*.{bed}"
        ontologies: []
    - bim:
        type: file
        description: PLINK extended MAP file
        pattern: "*.{bim}"
        ontologies: []
    - fam:
        type: file
        description: PLINK sample information file
        pattern: "*.{fam}"
        ontologies: []
  - build:
      type: string
      description: Genome build code passed to --split-x (e.g. 'b37', 'b38', 'hg19', 'hg38')
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: PLINK binary biallelic genotype table file with the X pseudoautosomal region split off
          pattern: "*.{bed}"
          ontologies: []
  bim:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bim":
          type: file
          description: PLINK extended MAP file with the X pseudoautosomal region split off
          pattern: "*.{bim}"
          ontologies: []
  fam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fam":
          type: file
          description: PLINK sample information file
          pattern: "*.{fam}"
          ontologies: []
  versions_plink:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@lyh970817"
maintainers:
  - "@lyh970817"
