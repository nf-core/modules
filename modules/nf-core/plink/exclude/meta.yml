name: plink_exclude
description: Exclude variant identifiers from plink bfiles
keywords:
  - exclude
  - plink
  - variant identifiers
tools:
  - plink:
      description: Whole genome association analysis toolset, designed to perform a
        range of basic, large-scale analyses in a computationally efficient manner.
      homepage: https://www.cog-genomics.org/plink
      licence: ["GPL"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bed:
        type: file
        description: PLINK binary biallelic genotype table
        pattern: "*.{bed}"
        ontologies: []
    - bim:
        type: file
        description: PLINK extended MAP file
        pattern: "*.{bim}"
        ontologies: []
    - fam:
        type: file
        description: PLINK sample information file
        pattern: "*.{fam}"
        ontologies: []
    - variants:
        type: file
        description: A text file containing variant identifiers to remove (one per line)
        pattern: "*.{txt}"
        ontologies: []
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bed":
          type: file
          description: PLINK binary biallelic genotype table file
          pattern: "*.{bed}"
          ontologies: []
  bim:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bim":
          type: file
          description: PLINK extended MAP file
          pattern: "*.{bim}"
          ontologies: []
  fam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.fam":
          type: file
          description: PLINK sample information file
          pattern: "*.{fam}"
          ontologies: []
  versions_plink:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@atrigila"
maintainers:
  - "@atrigila"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
