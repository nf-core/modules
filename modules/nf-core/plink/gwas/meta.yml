name: "plink_gwas"
description: Generate GWAS association studies
keywords:
  - association
  - GWAS
  - case/control
tools:
  - "plink":
      description: "Whole genome association analysis toolset, designed to perform a
        range of basic, large-scale analyses in a computationally efficient manner."
      homepage: "https://www.cog-genomics.org/plink"
      documentation: "https://www.cog-genomics.org/plink/1.9/assoc"
      tool_dev_url: "https://www.cog-genomics.org/plink/1.9/dev"
      licence: ["GPL"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing genotype sample information for PLINK BED/BIM/FAM input
          e.g. [ id:'test' ]
    - bed:
        type: file
        description: PLINK binary biallelic genotype table file
        pattern: "*.{bed}"
        ontologies: []
    - bim:
        type: file
        description: PLINK extended MAP file
        pattern: "*.{bim}"
        ontologies: []
    - fam:
        type: file
        description: PLINK sample information file
        pattern: "*.{fam}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing genotype sample information for VCF input
          e.g. [ id:'test' ]
    - vcf:
        type: file
        description: Variant calling file (vcf), optionally gzip-compressed
        pattern: "*.{vcf,vcf.gz}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing genotype sample information for BCF input
          e.g. [ id:'test' ]
    - bcf:
        type: file
        description: PLINK variant information + sample ID + genotype call binary file
        pattern: "*.{bcf,bcf.gz}"
        ontologies: []
  - - meta4:
        type: map
        description: |
          Groovy Map containing phenotype information for `--pheno`
          May optionally include `is_binary` to annotate binary traits
          e.g. [ id:'test' ] or [ id:'test', is_binary:true ]
          The phenotype file can be paired with BED/BIM/FAM, VCF, or BCF genotype inputs
    - phe:
        type: file
        description: PLINK phenotype file passed with `--pheno` for BED/BIM/FAM, VCF, or BCF input modes.
          Phenotypes can be read from the third column by default or from a named
          column with `--pheno-name` via module arguments
        pattern: "*.{phe}"
        ontologies: []
output:
  assoc:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{assoc,qassoc}":
          type: file
          description: PLINK GWAS association output file (`.assoc` for case/control traits, `.qassoc` for quantitative traits)
          pattern: "*.{assoc,qassoc}"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.log":
          type: file
          description: PLINK GWAS association log file
          pattern: "*.{log}"
          ontologies: []
  nosex:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.nosex":
          type: file
          description: PLINK GWAS association file that retains phenotypes for samples
            with ambiguous sex. Produced with the option --allow-no-sex
          pattern: "*.{nosex}"
          ontologies: []
  versions_plink:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@LorenzoS96"
maintainers:
  - "@LorenzoS96"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - plink:
          type: string
          description: The name of the tool
      - "plink --version 2>&1 | sed 's/^PLINK v//;s/ .*//'":
          type: eval
          description: The expression to obtain the version of the tool
