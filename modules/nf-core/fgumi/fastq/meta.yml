name: "fgumi_fastq"
description: Convert a BAM file to interleaved FASTQ format with fgumi
keywords:
  - bam
  - fastq
  - convert
  - UMIs
tools:
  - "fgumi":
      description: "High-performance tools for UMI-tagged sequencing data."
      homepage: "https://github.com/fulcrumgenomics/fgumi"
      documentation: "https://fgumi.readthedocs.io/"
      tool_dev_url: "https://github.com/fulcrumgenomics/fgumi"
      licence:
        - "MIT"
      identifier: biotools:fgumi
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: Input BAM file
        pattern: "*.bam"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
output:
  reads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.fastq.gz":
          type: file
          description: Interleaved FASTQ file (gzip-compressed)
          pattern: "*.fastq.gz"
          ontologies:
            - edam: "http://edamontology.org/format_1930"
            - edam: http://edamontology.org/format_3989
  versions_fgumi:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed "s/^fgumi //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed "s/^fgumi //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nh13"
maintainers:
  - "@nh13"
