name: "fgumi_filter"
description: |
  Filters consensus reads generated by simplex or duplex consensus calling.
  This is a high-performance replacement for fgbio FilterConsensusReads.
keywords:
  - umi
  - filter
  - consensus
  - bam
tools:
  - "fgumi":
      description: "High-performance tools for working with UMI-tagged sequencing data."
      homepage: "https://github.com/fulcrumgenomics/fgumi"
      documentation: "https://docs.rs/fgumi"
      tool_dev_url: "https://github.com/fulcrumgenomics/fgumi"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: Consensus BAM file to be filtered
        pattern: "*.bam"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
  - - meta2:
        type: map
        description: |
          Groovy Map containing genome information
          e.g. [ id:'genome' ]
    - fasta:
        type: file
        description: Reference genome FASTA file
        pattern: "*.{fa,fasta,fna}"
        ontologies:
          - edam: "http://edamontology.org/format_1929"
  - min_reads:
      type: integer
      description: Minimum number of reads required to keep a consensus read
  - keep_rejected:
      type: boolean
      description: Whether to keep rejected reads in a separate BAM file
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "${prefix}.bam":
          type: file
          description: Filtered consensus BAM file
          pattern: "*.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
  rejects:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "${prefix}.rejects.bam":
          type: file
          description: Optional BAM file containing reads that were filtered out
          pattern: "*.rejects.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "${prefix}.stats.txt":
          type: file
          description: Optional text file containing filtering statistics
          pattern: "*.stats.txt"
          ontologies: []
  versions_fgumi:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - fgumi:
          type: string
          description: The tool name
      - 'fgumi --version | sed "s/^fgumi //"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - fgumi:
          type: string
          description: The tool name
      - 'fgumi --version | sed "s/^fgumi //"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sppearce"
maintainers:
  - "@sppearce"
