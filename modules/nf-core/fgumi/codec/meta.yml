name: "fgumi_codec"
description: Call CODEC consensus reads from a UMI-grouped BAM with fgumi
keywords:
  - UMIs
  - consensus
  - codec
  - bam
  - duplex
tools:
  - "fgumi":
      description: "High-performance tools for UMI-tagged sequencing data."
      homepage: "https://github.com/fulcrumgenomics/fgumi"
      documentation: "https://fgumi.readthedocs.io/"
      tool_dev_url: "https://github.com/fulcrumgenomics/fgumi"
      licence:
        - "MIT"
      identifier: biotools:fgumi
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: UMI-grouped BAM file (from fgumi group)
        pattern: "*.bam"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
  - keep_rejected:
      type: boolean
      description: If true, output rejected reads to a separate BAM file
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "${prefix}.bam":
          type: file
          description: CODEC consensus BAM file
          pattern: "*.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
  rejects:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "${prefix}.rejects.bam":
          type: file
          description: Optional BAM of reads rejected during consensus calling
          pattern: "*.rejects.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
  stats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "${prefix}.stats.txt":
          type: file
          description: Consensus statistics file (TSV)
          pattern: "*.stats.txt"
          ontologies: []
  versions_fgumi:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed "s/^fgumi //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed "s/^fgumi //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nh13"
maintainers:
  - "@nh13"
