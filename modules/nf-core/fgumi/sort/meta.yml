name: "fgumi_sort"
description: |
  Sorts a SAM or BAM file. Several sort orders are available, including coordinate,
  queryname, and template-coordinate. This is a high-performance replacement for fgbio SortBam.
keywords:
  - sort
  - bam
  - sam
tools:
  - "fgumi":
      description: "High-performance tools for working with UMI-tagged sequencing data."
      homepage: "https://github.com/fulcrumgenomics/fgumi"
      documentation: "https://docs.rs/fgumi"
      tool_dev_url: "https://github.com/fulcrumgenomics/fgumi"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - bam:
        type: file
        description: |
          The input SAM or BAM file to be sorted.
        pattern: "*.{bam,sam}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bam":
          type: file
          description: |
            Sorted output BAM file.
          pattern: "*.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572"
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.{csi,bai}":
          type: file
          description: |
            Index file if the bam file is coordinate sorted.
          pattern: "*.{csi,bai}"
          ontologies:
            - edam: "http://edamontology.org/format_3327"
  versions_fgumi:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - fgumi:
          type: string
          description: The tool name
      - 'fgumi --version | sed "s/^fgumi //"':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - fgumi:
          type: string
          description: The tool name
      - 'fgumi --version | sed "s/^fgumi //"':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sppearce"
maintainers:
  - "@sppearce"
