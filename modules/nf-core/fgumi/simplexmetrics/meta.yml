name: "fgumi_simplexmetrics"
description: Collects a suite of metrics to QC simplex (single-strand) UMI
  sequencing data
keywords:
  - UMIs
  - QC
  - bam
  - simplex
  - metrics
tools:
  - "fgumi":
      description: "High-performance tools for UMI-tagged sequencing data."
      homepage: "https://github.com/fulcrumgenomics/fgumi"
      documentation: "https://fgumi.readthedocs.io/"
      tool_dev_url: "https://github.com/fulcrumgenomics/fgumi"
      licence:
        - "MIT"
      identifier: biotools:fgumi
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: UMI-grouped BAM file (from fgumi group)
        pattern: "*.bam"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
    - intervals:
        type: file
        description: Optional intervals file to restrict analysis (BED or Picard
          interval list format)
        pattern: "*.{bed,interval_list,txt}"
        ontologies: []
output:
  family_sizes:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.family_sizes.txt":
          type: file
          description: Metrics on the frequency of families of different sizes
          pattern: "*.family_sizes.txt"
          ontologies: []
  simplex_yield_metrics:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.simplex_yield_metrics.txt":
          type: file
          description: Summary QC metrics produced using 5%, 10%, 15%...100% of
            the data
          pattern: "*.simplex_yield_metrics.txt"
          ontologies: []
  umi_counts:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.umi_counts.txt":
          type: file
          description: Metrics on the frequency of observations of UMIs within
            reads and tag families
          pattern: "*.umi_counts.txt"
          ontologies: []
  pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.simplex_qc.pdf":
          type: file
          description: Optional plots generated from the metrics files (requires R
            with ggplot2 and scales)
          pattern: "*.simplex_qc.pdf"
          ontologies: []
  versions_fgumi:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed "s/^fgumi //":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed "s/^fgumi //":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@nh13"
maintainers:
  - "@nh13"
