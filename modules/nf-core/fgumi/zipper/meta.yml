# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "fgumi_zipper"
description: Merge unmapped and mapped BAM files, transferring tags and metadata.
keywords:
  - fgbio
  - umi
  - unmapped
  - ubam
  - zipperbams
tools:
  - "fgumi":
      description: "High-performance tools for UMI-tagged sequencing data."
      homepage: "https://github.com/fulcrumgenomics/fgumi/blob/v0.1.2/README.md"
      documentation: "https://github.com/fulcrumgenomics/fgumi/blob/v0.1.2/README.md"
      tool_dev_url: "https://github.com/fulcrumgenomics/fgumi"
      licence: ["MIT"]

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - mapped:
        type: file
        description: mapped BAM/SAM file
        pattern: "*.{bam, sam}"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM
          - edam: "http://edamontology.org/format_3462" # SAM
    - unmapped:
        type: file
        description: unmapped BAM file
        pattern: "*.bam"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. `[ id:'GRCh38' ]`
    - fasta:
        type: file
        description: fasta file containing genomic sequence information
        pattern: "*.{fasta,fna,fa}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA
    - fasta_index:
        type: file
        description: fasta index file
        pattern: "*.fai"
        ontologies:
          - edam: "http://edamontology.org/format_2573" # BAM index
    - fasta_dict:
        type: file
        description: dict file containing a sequence dictionary for the fasta file
        pattern: "*.dict"
        ontologies: []

output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bam":
          type: file
          description: Merged BAM file
          pattern: "*.{bam}"
          ontologies:
            - edam: "http://edamontology.org/format_2572" # BAM
  versions_fgumi:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "fgumi":
          type: string
          description: The name of the tool
      - "fgumi --version | sed -n 's/^fgumi //p'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - fgumi:
          type: string
          description: The name of the tool
      - fgumi --version | sed -n 's/^fgumi //p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@matthdsm"
maintainers:
  - "@matthdsm"
