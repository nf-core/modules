name: "eido_convert"
description: Convert any PEP project or Nextflow samplesheet to any format
keywords:
  - eido
  - convert
  - PEP
  - format
  - samplesheet
tools:
  - "eido":
      description: "Convert any PEP project or Nextflow samplesheet to any format"
      homepage: "http://eido.databio.org/en/latest/"
      documentation: "http://eido.databio.org/en/latest/"
      doi: "10.1093/gigascience/giab077"
      licence:
        - "BSD-2-Clause"
      identifier: biotools:eido-python-package
input:
  - samplesheet:
      type: file
      description: Nextflow samplesheet or PEP project
      pattern: "*.{yaml,yml,csv}"
      ontologies:
        - edam: http://edamontology.org/format_3750
        - edam: http://edamontology.org/format_3752
  - format:
      type: string
      description: Extension of an output file
output:
  samplesheet_converted:
    - ${prefix}.${format}:
        type: file
        description: PEP project or samplesheet converted to csv file
        ontologies: []
  versions_eido:
    - - ${task.process}:
          type: string
          description: The name of the process
      - eido:
          type: string
          description: The name of the tool
      - eido --version 2>&1 | sed 's/^.*eido //;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - eido:
          type: string
          description: The name of the tool
      - eido --version 2>&1 | sed 's/^.*eido //;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rafalstepien"
maintainers:
  - "@rafalstepien"
  - "@khoroshevskyi"
