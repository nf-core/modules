name: "eido_validate"
description: Validate samplesheet or PEP config against a schema
keywords:
  - eido
  - validate
  - schema
  - format
  - pep
tools:
  - "validate":
      description: "Validate samplesheet or PEP config against a schema."
      homepage: "http://eido.databio.org/en/latest/"
      documentation: "http://eido.databio.org/en/latest/"
      doi: "10.1093/gigascience/giab077"
      licence:
        - "BSD-2-Clause"
      identifier: biotools:eido-python-package
input:
  - samplesheet:
      type: file
      description: Samplesheet or PEP file to be validated
      pattern: "*.{yaml,yml,csv}"
      ontologies:
        - edam: http://edamontology.org/format_3750
        - edam: http://edamontology.org/format_3752
  - schema:
      type: file
      description: Schema that the samplesheet will be validated against
      pattern: "*.{yaml,yml}"
      ontologies:
        - edam: http://edamontology.org/format_3750
output:
  log:
    - "*.log":
        type: file
        description: File containing validation log.
        pattern: "*.log"
        ontologies: []
  versions_eido:
    - - ${task.process}:
          type: string
          description: The name of the process
      - eido:
          type: string
          description: The name of the tool
      - eido --version 2>&1 | sed 's/^.*eido //;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - eido:
          type: string
          description: The name of the tool
      - eido --version 2>&1 | sed 's/^.*eido //;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@rafalstepien"
maintainers:
  - "@rafalstepien"
  - "@khoroshevskyi"
