name: "leviosam2_index"
description: Index chain files for lift over
keywords:
  - leviosam2
  - index
  - lift
tools:
  - "leviosam2":
      description: "Fast and accurate coordinate conversion between assemblies"
      homepage: "https://github.com/milkschen/leviosam2/blob/main/workflow/README.md"
      documentation: "https://github.com/milkschen/leviosam2/blob/main/workflow/README.md"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'reference' ]`
    - fai:
        type: file
        description: FAI (FASTA index) file of the target reference
        pattern: "*.{fai}"
        ontologies: []
  - chain:
      type: file
      description: Chain file to index.
      pattern: "*.{chain}"
      ontologies:
        - edam: http://edamontology.org/format_3982
output:
  clft:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'reference' ]`
      - "*.clft":
          type: file
          description: Clft file of indexed chain
          pattern: "*.{clft}"
          ontologies: []
  versions_leviosam2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - "leviosam2":
          type: string
          description: The name of the tool
      - leviosam2 --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - "leviosam2":
          type: string
          description: The name of the tool
      - leviosam2 --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@lgrochowalski"
maintainers:
  - "@lgrochowalski"
