name: "wget"
description: The non-interactive network downloader
keywords:
  - "wget"
  - "download"
  - "network"
tools:
  - "wget":
      description: "wget is a free utility for non-interactive download of files from
        the Web."
      homepage: "https://www.gnu.org/software/wget/"
      documentation: "https://www.gnu.org/software/wget/manual/wget.html"
      licence:
        - "GPL"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - url:
        type: string
        description: URL to download
        pattern: "^https?://*.*"
    - suffix:
        type: string
        description: Output suffix
output:
  outfile:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - ${prefix}.${suffix}:
          type: file
          description: Downloaded file
          pattern: "*.*"
          ontologies: []
  versions_wget:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - wget:
          type: string
          description: The name of the tool
      - wget --version | head -1 | cut -d " " -f 3:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - wget:
          type: string
          description: The name of the tool
      - wget --version | head -1 | cut -d " " -f 3:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@itrujnara"
maintainers:
  - "@itrujnara"
