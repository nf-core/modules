name: "taxonkit_name2taxid"
description: Convert taxon names to TaxIds
keywords:
  - taxonomy
  - taxids
  - taxon name
  - conversion
tools:
  - "taxonkit":
      description: "A Cross-platform and Efficient NCBI Taxonomy Toolkit"
      homepage: "https://bioinf.shenwei.me/taxonkit/"
      documentation: "https://bioinf.shenwei.me/taxonkit/usage/#name2taxid"
      tool_dev_url: "https://github.com/shenwei356/taxonkit"
      doi: "10.1016/j.jgg.2021.03.006"
      licence:
        - "MIT"
      identifier: biotools:taxonkit

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - name:
        type: string
        description: Taxon name to look up (provide either this or names.txt, not
          both)
    - names_txt:
        type: file
        description: File with taxon names to look up, each on their own line
          (provide either this or name, not both)
        ontologies: []
  - taxdb:
      type: file
      description: Taxonomy database unpacked from
        ftp://ftp.ncbi.nih.gov/pub/taxonomy/taxdump.tar.gz
      ontologies: []
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.tsv":
          type: file
          description: TSV file of Taxon names and their taxon ID
          pattern: "*.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions_taxonkit:
    - - ${task.process}:
          type: string
          description: The name of the process
      - taxonkit:
          type: string
          description: The name of the tool
      - taxonkit version | sed 's/.* v//':
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - taxonkit:
          type: string
          description: The name of the tool
      - taxonkit version | sed 's/.* v//':
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@mahesh-panchal"
maintainers:
  - "@mahesh-panchal"
