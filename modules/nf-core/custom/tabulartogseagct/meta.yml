name: "custom_tabulartogseagct"
description: Convert a TSV or CSV with features by row and observations by
  column to a GCT format file as consumed by GSEA
keywords:
  - gsea
  - gct
  - tabular
tools:
  - tabulartogseagct:
      description: "Convert a TSV or CSV with features by row and observations by column
        to a GCT format file as consumed by GSEA"
      tool_dev_url: "https://github.com/nf-core/modules/blob/master/modules/nf-core/custom/tabulartogseagct/main.nf"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing matrix information
          e.g. [ id:'test' ]
    - tabular:
        type: file
        description: Tabular (e.g. TSV or CSV file) containing a numeric matrix
          with features (e.g. genes) by row and samples by column.
        pattern: "*.{tsv,csv}"
        ontologies:
          - edam: http://edamontology.org/format_3475
          - edam: http://edamontology.org/format_3752
output:
  gct:
    - - meta:
          type: map
          description: |
            Groovy Map containing matrix information
            e.g. [ id:'test' ]
      - "*.gct":
          type: file
          description: GCT format version of input TSV
          pattern: "*.{gct}"
          ontologies: []
  versions_mawk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mawk:
          type: string
          description: The name of the tool
      - mawk --version | sed '1!d;s/mawk //;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - mawk:
          type: string
          description: The name of the tool
      - mawk --version | sed '1!d;s/mawk //;s/ .*//':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
