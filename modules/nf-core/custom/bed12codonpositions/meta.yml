# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "custom_bed12codonpositions"
description: |
  Expand a BED12 file into a BED6 of in-frame positions along the
  spliced feature (one BED6 row per codon by default). BED12 records
  describe multi-block intervals with blockStarts/blockSizes; this
  module walks the blocks in mRNA order (left-to-right on '+' strand,
  right-to-left on '-' strand) and emits the genomic coordinate of
  every step-th position starting at the configured frame offset.
  Spans wider than 1 nt that cross a block boundary are split into one
  BED row per block.
keywords:
  - bed12
  - bed6
  - codon
  - splicing
  - coordinates
tools:
  - "bed12codonpositions":
      description: |
        Python helper that expands a BED12 into per-codon BED6
        positions along the spliced feature, with configurable frame,
        step and span width via `ext.args`.
      tool_dev_url: "https://github.com/nf-core/modules/blob/master/modules/nf-core/custom/bed12codonpositions/main.nf"
      licence: ["MIT"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample/feature-set information
          e.g. `[ id:'catalogue' ]`
    - bed12:
        type: file
        description: |
          BED12 file with one record per multi-block feature. blockStarts
          are offsets from column 2 (start); blockSizes are in nt; blocks
          must be in ascending genomic-coordinate order.
        pattern: "*.{bed,bed12}"
        ontologies:
          - edam: http://edamontology.org/format_3586 # BED
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map matching the input meta.
      - ${prefix}.bed:
          type: file
          description: |
            BED6 file with one row per in-frame mRNA position projected
            back to genomic coordinates. Columns are chrom, start, end,
            name (from BED12 column 4), score (0), strand. Sorted in
            mRNA-traversal order, which means descending genomic order
            on '-' strand records.
          pattern: "*.bed"
          ontologies:
            - edam: http://edamontology.org/format_3003 # BED
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
topics:
  versions:
    - versions.yml:
        type: string
        description: The name of the process
authors:
  - "@pinin4fjords"
maintainers:
  - "@pinin4fjords"
