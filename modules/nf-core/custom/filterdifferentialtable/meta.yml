name: "custom_filterdifferentialtable"
description: Filters a differential expression table based on logFC and adjusted
  p-value thresholds
keywords:
  - filter
  - differential expression
  - logFC
  - significance statistic
  - p-value
tools:
  - "pandas":
      description: "Python library for data manipulation and analysis"
      homepage: "https://pandas.pydata.org/"
      documentation: "https://pandas.pydata.org/docs/"
      tool_dev_url: "https://github.com/pandas-dev/pandas"
      doi: "10.5281/zenodo.3509134"
      licence:
        - "BSD-3-Clause"
      identifiers:
        - "biotools:pandas"
        - "conda:pandas"
      identifier: biotools:pandas
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - input_file:
        type: file
        description: Input differential expression table (CSV, TSV, or TXT format)
        pattern: "*.{csv,tsv,txt}"
        ontologies:
          - edam: http://edamontology.org/format_3752
          - edam: http://edamontology.org/format_3475
  - - logfc_column:
        type: string
        description: Name of the column containing log fold change values
    - fc_threshold:
        type: float
        description: Fold change threshold for filtering
    - fc_cardinality:
        type: string
        description: |
          Operator to compare the fold change values with the threshold.
          Valid values are: ">=", "<=", ">", "<".
  - - stat_column:
        type: string
        description: |
          Name of the column containing the significance statistic values
          (eg. adjusted p-values).
    - stat_threshold:
        type: float
        description: Statistic threshold for filtering
    - stat_cardinality:
        type: string
        description: |
          Operator to compare the column values with the threshold.
          Valid values are: ">=", "<=", ">", "<".
output:
  filtered:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_filtered.tsv":
          type: file
          description: Filtered differential expression table
          pattern: "*_filtered.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
  filtered_up:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_filtered_up.tsv":
          type: file
          description: Filtered differential expression table for overexpressed
            genes
          pattern: "*_filtered_up.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
  filtered_down:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*_filtered_down.tsv":
          type: file
          description: Filtered differential expression table for underexpressed
            genes
          pattern: "*_filtered_down.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
  versions_customfilterdifferentialtable:
    - - ${task.process}:
          type: string
          description: The name of the process
      - CUSTOM_FILTERDIFFERENTIALTABLE:
          type: string
          description: The name of the tool
      - python -c "import pandas as pd; print(pd.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - CUSTOM_FILTERDIFFERENTIALTABLE:
          type: string
          description: The name of the tool
      - python -c "import pandas as pd; print(pd.__version__)":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@pinin4fjords"
  - "@WackerO"
maintainers:
  - "@pinin4fjords"
  - "@WackerO"
