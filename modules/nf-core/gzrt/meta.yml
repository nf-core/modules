name: "gzrt"
description: gzrecover is a program that will attempt to extract any readable
  data out of a gzip file that has been corrupted
keywords:
  - corrupted
  - fastq
  - recovery
tools:
  - "gzrt":
      description: "Unofficial build of the gzip Recovery Toolkit aka gzrecover"
      homepage: "https://www.urbanophile.com/arenn/hacking/gzrt/gzrt.html"
      documentation: "https://www.urbanophile.com/arenn/hacking/gzrt/gzrt.html"
      tool_dev_url: "https://github.com/arenn/gzrt"
      doi: "no DOI available"
      licence:
        - "GPL v2"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - fastqgz:
        type: file
        description: FASTQ.gz files
        pattern: "*.{gz}"
        ontologies:
          - edam: "http://edamontology.org/format_3989" # GZIP
output:
  recovered:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - ${prefix}*.fastq.gz:
          type: file
          description: Recovered FASTQ.gz files
          pattern: "*.{gz}"
          ontologies:
            - edam: "http://edamontology.org/format_3989" # GZIP
  versions_gzrt:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gzrt:
          type: string
          description: The name of the tool
      - gzrecover -V |& sed '1!d ; s/gzrecover //':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gzrt:
          type: string
          description: The name of the tool
      - gzrecover -V |& sed '1!d ; s/gzrecover //':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@mazzalab"
maintainers:
  - "@mazzalab"
  - "@tm4zza"
