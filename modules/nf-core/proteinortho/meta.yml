name: "proteinortho"
description: Proteinortho is a tool to detect orthologous genes within different
  species.
keywords:
  - orthology
  - co-orthology
  - homology
  - sequence similarity
  - spectral clustering
  - comparative genomics
  - genomics
tools:
  - "proteinortho":
      description: "Proteinortho is a tool to detect orthologous genes within different
        species."
      homepage: "https://gitlab.com/paulklemm_PHD/proteinortho"
      documentation: "https://gitlab.com/paulklemm_PHD/proteinortho#proteinortho"
      tool_dev_url: "https://gitlab.com/paulklemm_PHD/proteinortho"
      doi: "10.3389/fbinf.2023.1322477"
      licence:
        - "GPL v3"
      identifier: biotools:proteinortho
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test' ]`
    - fasta_files:
        type: file
        description: Input fasta files (proteomes or transcriptomes), at least 2
          are needed
        pattern: "*.{fa,fasta,faa,fna,fn}"
        ontologies: []
output:
  orthologgroups:
    - - meta:
          type: file
          description: Orthology table
          pattern: "*.proteinortho.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
      - ${prefix}.proteinortho.tsv:
          type: file
          description: Orthology table
          pattern: "*.proteinortho.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  orthologgraph:
    - - meta:
          type: file
          description: Orthology table
          pattern: "*.proteinortho.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
      - ${prefix}.proteinortho-graph:
          type: file
          description: Orthology graph
          pattern: "*.proteinortho-graph"
          ontologies: []
  blastgraph:
    - - meta:
          type: file
          description: Orthology table
          pattern: "*.proteinortho.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
      - ${prefix}.blast-graph:
          type: file
          description: BLAST graph
          pattern: "*.blast-graph"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@pmjklemm"
maintainers:
  - "@pmjklemm"
