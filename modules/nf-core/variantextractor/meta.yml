# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: variantextractor
description: |
  Deterministic and standard extractor of SNVs, indels and structural variants (SVs)
  from VCF files. Homogenizes multiallelic variants, MNPs and SVs (including imprecise
  paired breakends and single breakends) to facilitate downstream processing.
keywords:
  - vcf
  - variant
  - structural variant
  - normalization
  - homogenization
tools:
  - variant-extractor:
      description: |
        Deterministic and standard extractor of SNVs, indels and structural variants
        from VCF files built under the frame of EUCANCan.
      homepage: https://github.com/EUCANCan/variant-extractor
      documentation: https://eucancan.github.io/variant-extractor/
      tool_dev_url: https://github.com/EUCANCan/variant-extractor
      doi: "10.1016/j.xgen.2024.100639"
      licence: ["MIT"]
      identifier: biotools:variant_extractor
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information.
          e.g. [ id:'sample1' ]
    - vcf:
        type: file
        description: Input VCF file containing variants to be extracted and homogenized.
        pattern: "*.{vcf,vcf.gz}"
        ontologies: []
output:
  vcf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'sample1' ]
      - "*.vcf":
          type: file
          description: |
            VCF file with variants extracted and homogenized (multiallelic split,
            MNPs decomposed, SV breakends deduplicated).
          pattern: "*.vcf"
          ontologies: []
  versions_variantextractor:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - variant-extractor:
          type: string
          description: The tool name
      - 'python3 -c "import variant_extractor; print(variant_extractor.__version__)"':
          type: string
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - variant-extractor:
          type: string
          description: The tool name
      - 'python3 -c "import variant_extractor; print(variant_extractor.__version__)"':
          type: string
          description: The command used to generate the version of the tool
authors:
  - "@sbreuch"
maintainers:
  - "@sbreuch"
