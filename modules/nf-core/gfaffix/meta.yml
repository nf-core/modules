name: gfaffix
description: Collapse walk-preserving shared affixes in variation graphs in GFA
  format
keywords:
  - gfa
  - graph
  - pangenome
  - variation graph
tools:
  - gfaffix:
      description: |
        GFAffix identifies walk-preserving shared affixes in variation graphs and
        collapses them into a non-redundant graph structure.
      homepage: https://github.com/marschall-lab/GFAffix
      documentation: https://github.com/marschall-lab/GFAffix
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - gfa:
        type: file
        description: Variation graph in GFA format
        pattern: "*.{gfa}"
        ontologies:
          - edam: http://edamontology.org/format_3975
output:
  gfa:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gfa":
          type: file
          description: Non-redundant variation graph in GFA 1.0 format
          pattern: "*.{gfa}"
          ontologies:
            - edam: http://edamontology.org/format_3975
  affixes:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.txt":
          type: file
          description: Shared affixes in tab-separated values (TSV) text format
          pattern: "*.{txt}"
          ontologies: []
  versions_tool1:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gfaffix:
          type: string
          description: The name of the tool
      - gfaffix --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gfaffix:
          type: string
          description: The name of the tool
      - gfaffix --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@heuermh"
maintainers:
  - "@heuermh"
