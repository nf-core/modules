name: "clustalo_guidetree"
description: Renders a guidetree in clustalo
keywords:
  - guide tree
  - msa
  - newick
tools:
  - "clustalo":
      description: "Latest version of Clustal: a multiple sequence alignment program
        for DNA or proteins"
      homepage: "http://www.clustal.org/omega/"
      documentation: "http://www.clustal.org/omega/"
      tool_dev_url: "http://www.clustal.org/omega/"
      doi: "10.1038/msb.2011.75"
      licence:
        - "GPL v2"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test']`
    - fasta:
        type: file
        description: Input sequences in FASTA format
        pattern: "*.{fa,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1919 # SEQUENCE-LIKE
          - edam: http://edamontology.org/format_1929 # FASTA
output:
  tree:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test']`
      - "*.dnd":
          type: file
          description: Guide tree file in Newick format
          pattern: "*.{dnd}"
          ontologies:
            - edam: http://edamontology.org/format_2006 # PHYLOGENETIC TREE
  versions_clustalo:
    - - ${task.process}:
          type: string
          description: The name of the process
      - clustalo:
          type: string
          description: The name of the tool
      - clustalo --version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - clustalo:
          type: string
          description: The name of the tool
      - clustalo --version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@luisas"
  - "@JoseEspinosa"
maintainers:
  - "@luisas"
  - "@JoseEspinosa"
