name: "learnmsa_align"
description: Align sequences using learnMSA
keywords:
  - alignment
  - MSA
  - genomics
tools:
  - "learnmsa":
      description: "learnMSA: Learning and Aligning large Protein Families"
      homepage: "https://github.com/Gaius-Augustus/learnMSA"
      documentation: "https://github.com/Gaius-Augustus/learnMSA"
      tool_dev_url: "https://github.com/Gaius-Augustus/learnMSA"
      doi: "10.1093/gigascience/giac104"
      licence:
        - "MIT"
      identifier: biotools:learnMSA
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test']`
    - fasta:
        type: file
        description: Input sequences in FASTA format.
        pattern: "*.{fa,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1919
          - edam: http://edamontology.org/format_1929
output:
  alignment:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test']`
      - "*.aln":
          type: file
          description: Alignment file, in FASTA format.
          pattern: "*.aln"
          ontologies:
            - edam: http://edamontology.org/format_2554
            - edam: http://edamontology.org/format_1921
            - edam: http://edamontology.org/format_1984
  versions_learnmsa:
    - - ${task.process}:
          type: string
          description: The name of the process
      - learnmsa:
          type: string
          description: The name of the tool
      - learnMSA -h | sed -nE 's/.*version ([0-9.]+).*/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - learnmsa:
          type: string
          description: The name of the tool
      - learnMSA -h | sed -nE 's/.*version ([0-9.]+).*/\1/p':
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@luisas"
  - "@JoseEspinosa"
maintainers:
  - "@luisas"
  - "@JoseEspinosa"
