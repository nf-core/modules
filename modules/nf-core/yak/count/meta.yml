name: "yak_count"
description: a tool to build k-mer hash table for fasta and fastq files
keywords:
  - kmer
  - fastq
  - sequence
  - count
  - assembly
tools:
  - "yak":
      description: "Yet another k-mer analyzer"
      homepage: "https://github.com/lh3/yak"
      documentation: "https://github.com/lh3/yak/blob/master/README.md"
      tool_dev_url: "https://github.com/lh3/yak"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - fastq:
        type: file
        description: reads fastq/fasta file
        pattern: "*.{fastq.gz,fq.gz,fasta.gz,fa.gz}"
        ontologies: []
output:
  yak:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.yak":
          type: file
          description: k-mer hash table of input
          pattern: "*.{yak}"
          ontologies: []
  versions_yak:
    - - ${task.process}:
          type: string
          description: The name of the process
      - yak:
          type: string
          description: The name of the tool
      - yak version:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - yak:
          type: string
          description: The name of the tool
      - yak version:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@yumisims"
maintainers:
  - "@yumisims"
