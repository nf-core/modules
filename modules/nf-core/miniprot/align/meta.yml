name: miniprot_align
description: A versatile pairwise aligner for genomic and spliced nucleotide sequences
keywords:
  - align
  - fasta
  - protein
  - genome
  - paf
  - gff
tools:
  - miniprot:
      description: |
        A versatile pairwise aligner for genomic and protein sequences.
      homepage: https://github.com/lh3/miniprot
      documentation: https://github.com/lh3/miniprot
      licence: ["MIT"]
      identifier: biotools:miniprot
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - pep:
        type: file
        description: a fasta file contains one or multiple protein sequences
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference information
    - ref:
        type: file
        description: Reference database in FASTA format or miniprot index format.
        ontologies: []
output:
  paf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.paf":
          type: file
          description: Alignment in PAF format
          pattern: "*.paf"
          ontologies: []
  gff:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.gff":
          type: file
          description: Alignment in gff format
          pattern: "*.gff"
          ontologies: []
  versions_miniprot:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - miniprot:
          type: string
          description: The tool name
      - "miniprot --version":
          type: eval
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - miniprot:
          type: string
          description: The tool name
      - "miniprot --version":
          type: eval
          description: The command used to generate the version of the tool
authors:
  - "@yumisims"
  - "@muffato"
maintainers:
  - "@yumisims"
  - "@muffato"
