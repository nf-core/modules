name: miniprot_index
description: Provides fasta index required by miniprot alignment.
keywords:
  - index
  - fasta
  - genome
  - reference
tools:
  - miniprot:
      description: |
        A versatile pairwise aligner for genomic and protein sequences.
      homepage: https://github.com/lh3/miniprot
      documentation: https://github.com/lh3/miniprot
      licence: ["MIT"]
      identifier: biotools:miniprot
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: |
          Reference database in FASTA format.
        ontologies: []
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.mpi":
          type: file
          description: miniprot fasta index.
          pattern: "*.mpi"
          ontologies: []
  versions_miniprot:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - miniprot:
          type: string
          description: The tool name
      - "miniprot --version":
          type: eval
          description: The command used to generate the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - miniprot:
          type: string
          description: The tool name
      - "miniprot --version":
          type: eval
          description: The command used to generate the version of the tool
authors:
  - "@yumisims"
  - "@muffato"
maintainers:
  - "@yumisims"
  - "@muffato"
