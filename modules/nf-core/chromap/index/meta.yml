name: chromap_index
description: Indexes a fasta reference genome ready for chromatin profiling.
keywords:
  - index
  - fasta
  - genome
  - reference
tools:
  - chromap:
      description: Fast alignment and preprocessing of chromatin profiles
      homepage: https://github.com/haowenz/chromap
      documentation: https://github.com/haowenz/chromap
      tool_dev_url: https://github.com/haowenz/chromap
      licence:
        - "GPL v3"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id:'test' ]
    - fasta:
        type: file
        description: Reference genome FASTA file
        pattern: "*.{fa,fasta,fna}"
        ontologies:
          - edam: "http://edamontology.org/format_1929"
output:
  index:
    - - meta:
          type: map
          description: |
            Groovy Map containing reference information
            e.g. [ id:'test' ]
      - "*.index":
          type: file
          description: Index file of the reference genome
          pattern: "*.{index}"
          ontologies: []
  versions_chromap:
    - - ${task.process}:
          type: string
          description: The name of the process
      - chromap:
          type: string
          description: The name of the tool
      - chromap --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - chromap:
          type: string
          description: The name of the tool
      - chromap --version 2>&1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@mahesh-panchal"
  - "@joseespinosa"
maintainers:
  - "@mahesh-panchal"
  - "@joseespinosa"
