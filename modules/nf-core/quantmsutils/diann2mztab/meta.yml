name: "quantmsutils_diann2mztab"
description: "Convert DIA-NN results to mzTab, MSstats, and Triqler formats using
  quantms-utils"
keywords:
  - "quantms-utils"
  - "diann"
  - "mztab"
  - "msstats"
  - "triqler"
  - "proteomics"
tools:
  - "quantms-utils":
      description: "quantms-utils is a Python package for proteomics data processing"
      homepage: "https://github.com/bigbio/quantms-utils"
      documentation: "https://quantms-utils.readthedocs.io/"
      tool_dev_url: "https://github.com/bigbio/quantms-utils"
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', name:'test', condition:'test' ]
    - report:
        type: file
        description: "DIA-NN main report file (tsv or parquet)"
        pattern: "*.{tsv,parquet}"
        ontologies:
          - edam: http://edamontology.org/format_3475
    - report_pg:
        type: file
        description: "DIA-NN protein group matrix file"
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475
    - report_pr:
        type: file
        description: "DIA-NN precursor matrix file"
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475
    - diann_version:
        type: string
        description: |
          DIA-NN version
    - exp_design:
        type: file
        description: "Experimental design file describing sample conditions"
        pattern: "*.tsv"
        ontologies:
          - edam: http://edamontology.org/format_3475
    - ms_information:
        type: file
        description: "MS statistics/information files in parquet format"
        pattern: "*.parquet"
        ontologies: []
    - fasta:
        type: file
        description: "FASTA database file used for the search"
        pattern: "*.{fasta,fa}"
        ontologies: []
output:
  out_msstats:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', name:'test', condition:'test' ]
      - "*msstats_in.csv":
          type: file
          description: "MSstats input file for statistical analysis"
          pattern: "*msstats_in.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752
  out_triqler:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', name:'test', condition:'test' ]
      - "*triqler_in.tsv":
          type: file
          description: "Triqler input file for protein quantification with uncertainty"
          pattern: "*triqler_in.tsv"
          ontologies:
            - edam: http://edamontology.org/format_3475
  out_mztab:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', name:'test', condition:'test' ]
      - "*.mzTab":
          type: file
          description: "mzTab output file (standard proteomics exchange format)"
          pattern: "*.mzTab"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', name:'test', condition:'test' ]
      - "*.log":
          type: file
          description: "Log file from conversion process"
          pattern: "*.log"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: "File containing software versions"
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750
authors:
  - "@daichengxin"
  - "@wanghong"
  - "@pinin4fjords"
maintainers:
  - "@daichengxin"
  - "@pinin4fjords"
