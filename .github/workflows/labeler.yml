name: labeler

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  save-pr-number:
    runs-on: ubuntu-latest
    name: Save PR number
    steps:
      - name: Save PR number
        run: |
          mkdir -p ./pr
          echo ${{ github.event.pull_request.number }} > ./pr/pr_number.txt
      - name: Upload PR number
        uses: actions/upload-artifact@v4
        with:
          name: pr_number
          path: pr/
          retention-days: 1
